body:
  text: 卷之二十四痞滿痞滿須分上下中其間虛實不相同臨時脈證能消息種杏成林十里紅上焦者心肺之分上焦如霧謂清陽之氣所會也中焦者脾胃之所也中焦如漚謂水穀之變化也下焦者腎肝之位下焦如瀆謂便溺之所流行也故心之上下痞滿者屬上焦痞者氣痞塞而不通也腹滿者屬中焦小腹滿者屬下焦痞與滿不同滿則內脹而外有形痞則內覺痞悶而外無形也在上者吐之在中下者下之實則瀉之虛則補之可也凡為醫者要識脈證審其病證知其病之所在診其脈知其病之虛實吐下之不差補瀉之適則十全之功自可得也世人治痞皆言氣惟有東垣作血虛乃自瀉心湯立法啓端抽緒盡其余痞之為病由陰伏陽蓄氣與血不運處心下位中央皆土之病也經云太陰所至為積飲痞隔太陰者濕土也土壅塞乃土來心下為痞滿也痞之凝滯閉塞人皆知氣之不運也獨東垣指以血病言之謂下多則亡陰而損血此前人之所未論也世人不知以血藥治之專用導氣之藥其痞益甚而復下之氣愈下降必變為中滿鼓脹誤甚矣傷寒痞者從血中來從外之內從血中來無形雜病痞者亦從血中來從內之外有形故無形以苦泄之仲景治痞皆用黃連以瀉心名之為瀉心下之痞也有形以辛散之東垣治痞皆用乾生薑以消痞名之謂消心下之痞也按東垣消痞湯丸自仲景瀉心湯變化出來蓋寒之痞由誤下也得之使表邪乘虛入於心下雜病之痞則所受之邪氣亦蓄於心下因致痞也然有不因下而得之者如中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚土來心下為痞者故古方治痞用黃芩黃連枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘苦溫以補之茯苓澤瀉之鹹淡以滲之隨其病之所在以調之也既痞屬濕土之病惟宜上下分消其濕也如果有內實之證庶可略於疏通如仲景用黃連大黃之例世人苦於痞塞喜行利藥以求速效暫得通快痞若再作益以滋甚是皆不知所謂下多亡陰之意也按仲景傷寒論云心下痞按之濡其脈關上浮者以大黃黃連瀉心湯脈微者用半夏瀉心湯一下之一補之痞有虛實之分當以證脈辨之如心下痞其脈關上浮大便祕者為實也宜小承氣湯主之其脈微大便利者加減補中益氣湯主之有因飲食填塞胸中而作痞者先以鹽湯探吐之後以橘連枳朮丸消導之枳實消痞丸調之有因誤下之後得之者宜加減八物湯養其氣血自愈有因大病後元氣未復而痞者宜加減補中益氣湯主之有中氣虛弱不能轉化精微為痞者宜枳實消痞丸加減補中益氣湯主之有痰積壅滯為痞者宜黃連利膈丸順氣化痰丸祕傳豁痰丸主之有濕熱大甚土來心下為痞者宜黃連消痞丸甚則膈咽不通飲食不入者以瓜蒂散吐之吐後以大消痞丸調之有因七情之傷為痞者宜加減流氣飲順氣消痞丸主之有因飲水過多成痞者宜五苓散送下半夏枳朮丸如稟受充實面蒼骨露氣實之人病痞者宜從仲景大黃黃連瀉心湯法以三黃枳朮丸主之如稟受素弱轉運不能飲食不化而痞者以虛論宜從仲景甘草瀉心湯法以大消痞丸調之如肥人心下痞者乃是濕痰宜黃芩利膈丸去萊蔔子皂角加蒼朮茯苓炒滑石如瘦人心下痞滿者乃是濕熱宜黃連消痞丸如食後感寒飲食不化而痞者宜木香順氣湯加藿香以散之腹滿休稱鼓脹同誤將脹滿一般攻滿從中病形諸外脹外形堅中本空滿與脹不同滿者病在腸胃之間而形見於外也脹者病在腸胃之外皮肉經絡之中外形雖滿中則空虛也滿者有實有虛脹者專主虛治不可攻也大抵腹滿屬太陰證陽熱為邪者則腹滿而咽乾陰寒為邪者則吐食不下自利益甚時腹自痛太陰者脾土也治中央專主腹滿之候病者腹滿按之不痛為虛痛者為實腹滿時減復如故此為虛寒當與溫藥厚朴溫中湯主之腹滿不減減不足言當須下之宜大承氣湯主之方見傷寒病腹滿發熱十日脈浮而數飲食如故宜厚朴七物湯主之如心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食者宜五苓散主之若不吐利者為實宜滾痰丸下之方見痰如因傷食腹滿者宜木香檳榔丸下之後以參苓平胃散調之又木香順氣湯調之少腹緣何滿且堅只因便溺轉行難滿而不瀉成關格婦女宜將蓄血看少腹者下焦所治下焦者當闌門之下主分別水穀其治在臍之下也蓋身半以上同天之氣清陽歸之身半以下同地之氣濁陰歸之清陽出上竅濁陰出下竅當出不出積而為滿在上而滿者氣也在下而滿者物也所謂物者便與溺耳惟婦人則有蓄血之證此少腹病者多實法當下之虛者少腹滿小便不利者宜五苓散去桂加滑石散大便不利者宜當歸承氣湯大小便俱不利者宜八正散主之方見大熱如大小便俱不利者名曰關下竅閉塞氣反上衝吐而不能食者名曰關格之病乃死證也急尋田螺搗爛貼臍下又作豬膽汁導法使大便通則小便亦利矣更當作大承氣湯下之婦人經閉者作蓄血看宜桃仁承氣湯下之更有石瘕腸覃鬼胎三病各從其證立法治之詳見脹門宜桃奴散治滿病經驗諸方加減補中益氣湯治內傷心下痞方見內傷脈緩有痰而痞加半夏黃連各一錢脈弦四肢滿便難而心下痞加黃連五分柴胡七分甘草三分大便祕燥加黃連桃仁泥當歸身少加大黃心下痞悶者加白芍藥黃連心下痞腹脹加枳實木香砂仁各三分厚朴七分天寒少加乾薑或中桂桂心也心下痞覺中寒者加附子炮黃連心下痞嘔逆者加黃連生薑陳皮冬月黃連減半少加藿香葉丁香能食而心下痞加黃連五分枳實三分不能食而心下痞加生薑陳皮食已心下痞另服橘皮枳朮九夫中滿者不食耳不滿者宜食之如自覺滿而外無脹急之形乃痞也非滿也當以甘苦而撐柱之加減八物湯治下多則亡陰而痞者方見虛損本方加升麻柴胡少佐以陳皮枳殼桔梗監之入生薑煎服大消痞丸治一切心下痞及年久不愈者神麯炒甘草炙各二錢豬苓二錢半乾生薑二錢澤瀉厚朴薑汁炒砂仁各三錢半夏洗陳皮去白人參各四錢枳實麵炒五錢黃連陳壁土炒黃芩壁土炒各六錢薑黃白朮各一兩上為細末湯浸蒸餅為丸如梧桐子大每服五十丸至百丸白湯下此半夏瀉心湯加枳朮丸四君子五苓平胃散等劑利濕消痞補虛下同枳實消痞丸治右關脈浮弦心下虛痞惡食懶倦開胃進食乾薑一錢甘草炙麥蘖麵炒白茯苓各二錢白朮二錢半夏曲人參各三錢厚朴薑汁炒四錢黃連枳實麵炒黃各五錢上為細末蒸餅丸如梧桐子大每服七八十丸白湯下黃芩利膈丸除胸中熱利膈上痰生黃芩炒黃芩各一兩半夏黃連各五錢澤瀉五錢南星炮枳殼麵炒黃陳皮去白各三錢白朮二錢白礬一錢小皂角一錢蘿蔔子炒五錢上為細末蒸餅丸如梧桐子大每服五十丸白湯下忌酒濕面魚腥三黃枳朮丸治氣實之人及能食者病心下痞黃芩二兩黃連酒炒一兩大黃煨三錢枳實炒一兩白朮陳皮各五錢半夏洗神麯炒四錢乾薑二錢上為細末蒸餅如緑豆大一倍每服五十丸白湯下橘連枳朮丸治傷食心下痞白朮二兩枳實麵炒陳皮黃連炒各一兩上為細末荷葉水煮粳米粉丸如梧桐子大每服五十丸白湯下祕傳豁痰丸治食積痰熱心下痞陳皮去白四兩山楂肉神麯炒各二兩當歸黃芩白朮各四兩半夏曲黃連白茯苓各一兩半甘草一兩半枳實麵炒五錢上為細末蒸餅丸如梧桐子大每服五十丸淡薑湯送下加減流氣飲治因七情之傷心下痞者陳皮青皮紫蘇葉厚朴薑汁炒枳實川芎甘草人參白朮茯苓半夏洗黃連香附子童便浸上各等分㕮咀生薑三片水煎服順氣消痞丸治七情所傷心下痞滿不思飲食木香五錢益智仁二錢半厚朴薑汁炒草豆蔻二錢半陳皮青皮蒼朮米泔浸茯苓澤瀉乾薑各七錢枳實炒一兩甘草半夏各五錢人參當歸各三錢黃連五錢上為細末蒸餅丸如梧桐子大每服五十丸白湯下木香順氣湯治䐜脹心腹滿悶經曰濁氣在上則生䐜脹此方主之木香益智陳皮草豆蔻各五分蒼朮五分厚朴薑汁炒青皮各四分茯苓澤瀉半夏各六分乾薑三分當歸人參各五分升麻柴胡各一錢吳茱萸三分上㕮咀水一盞半煎一盞去渣溫服厚朴溫中湯治脾胃虛弱心腹脹滿時發時止厚朴薑汁炒陳皮去白乾生薑各一錢茯苓甘草炙木香草豆蔻麵裹煨各五分上㕮咀水煎服厚朴七物湯治腹滿發熱如故厚朴一錢枳實一錢甘草大黃各六分官桂四分上㕮咀姜五片棗一枚水一盞半煎八分溫服小嘔者加半夏八分下利去大黃寒多者加生薑至十片五苓去桂加滑石散治小便閉少腹滿有形者此病在膀胱也五苓散去桂末一兩滑石末一兩上為細末每服二錢用烏桕樹根皮煎湯調下當歸承氣湯治大便閉少腹中滿痛此病在大腸也調胃承氣湯三錢當歸梢一錢半上㕮咀水煎二沸入桃仁泥一錢再煎調檳榔末一錢服桃奴散治婦人或室女月經不通小腹脹滿桃奴桃樹上乾枯雛桃也十二月採用猳鼠糞雄鼠矢也兩頭尖者是玄胡索肉桂香附子五靈脂砂仁桃仁去皮尖各等分上為細末每服三錢黑豆煎酒調下
