body:
  text: 卷之二十一泄瀉泄有五名見難經皆因脾胃濕中成五邪若感令人泄惟有良工識得真按五十七難云泄凡有五其名不同胃泄者飲食不化色黃脾泄者腹脹滿泄注食即吐嘔逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血少腹痛大瘕泄者裡急後重數至圊而不能便莖中痛此五泄之法也其五泄者之病胃小腸大瘕之證屬熱脾大腸之證屬寒其名有五其因每起於脾胃之濕故胃小腸大瘕三泄者為熱濕並宜大承氣湯下之惟大瘕泄再加甘草以有莖中痛也脾大腸二泄者為寒濕並宜理中湯溫之惟脾泄再加陳青皮以腹脹滿也此五泄者統論泄痢之證五邪者出四十九難云有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪也五邪之感則害人臟腑必作泄瀉嘗考內經云春傷於風夏必飧泄又云濕勝則濡泄又云暴注下迫皆屬於熱又云諸病水液澄徹者清冷皆屬於寒是知風寒濕熱皆能令人泄瀉也又傷寒論云陽明病若中寒不能食小便不利此欲作痼瘕必大便初硬後溏所以然者以胃冷水穀不別故也又云陽明少陽合病必下利脈滑而數者有宿食也是知飲食之傷令人脾胃不和亦泄瀉也五邪證治詳見下文風宜發散冷宜溫濕則分消熱則清宿食必從消導散氣虛下陷必提升傷風泄者自汗惡風頭痛腰背痛其脈弦輕則飧泄米穀不化宜神朮散重則下利膿血稠黏宜胃風湯主之氣虛者曲芎丸傷寒泄者腹中切痛喜用熱手熨按利下腥穢完穀不化小便清白身涼不渴不思飲食其脈沉遲或緊宜理中湯如暴下無聲身冷自汗小便自利大便不禁氣滯休息脈微嘔吐急以重藥溫之漿水散是也利不止者桃花丸以理中湯送下傷熱泄者暴注下迫有聲米穀不化小便赤澀煩渴飲水其脈洪數宜用去桂五苓散送下黃連阿膠丸夏月得之宜薷苓湯傷濕泄者水泄注下體重微滿困弱無力四肢不舉不欲飲食其脈沉細宜胃苓湯不止者升麻除濕湯主之傷食泄者心腹脹滿下泄必臭濕氣作酸其脈滑數必先去其積滯之物而復和之去積之藥如丁香脾積丸木香檳榔丸審問其所傷冷熱之物以溯源湯下之慎勿誤也三方並見內傷下後待酸臭去盡以香砂平胃丸和之利不止者以實腸散作丸止之泄久不止胃下陷宜升舉之臨證制方加升麻勝濕之藥無不效也如但滑泄不止腹中不痛者宜補中益氣湯倍白朮加茯苓防風以補而提之如變赤白相雜一夜十餘行腹中痛者宜茯苓湯如裡急窘迫腹中不痛或膿或血宜升麻除濕防風湯治泄三方先理中五苓分利有奇功實腸豆蔻宜虛脫調養參苓白朮同治泄瀉者專以脾胃為主分其寒熱濕治之初用理中湯為主方挾寒者溫服挾暑者冷服其泄必止如不止者水穀不分也治濕不利小便非其治也宜用五苓散為主方挾寒者入生薑煎服挾熱者去桂合益元散同服則利小便而泄自止矣不止者中氣陷下病在下焦不論寒熱並宜實腸丸陳氏肉豆蔻丸主之蓋澀可去脫也泄止後以參苓白朮散補養之作丸尤妙泄而渴者法中求水積腸中瀉不休劫澀妄行成滯下五虛俱見命難留泄瀉不止渴欲飲水者胃中津液不足也宜用錢氏白朮散常與服之若飲水多者名曰水漬入腸中泄瀉亦甚當灸大椎三五壯立已乃瀉其督脈也其治諸藥作丸子效辨疑雲今人用湯藥者多不獲效譬如一窟之水以燥土塞之其水自收反用水澆豈不助其濕者乎泄有寒熱虛實寒泄曰鶩溏熱瀉曰腸垢虛則力乏更衣不及便已泄出不能禁固也實則數至圊而不能便所謂裡急後重者是也劫澀之藥惟虛寒者可以用之若實熱者不可妄用為禍不小如初痛時便以澀藥止之未有不變痢者矣五虛者內經云脈細皮寒氣少泄痢前後飲食不入是謂五虛死其漿粥入胃注止則虛者生脈訣云下利微小即為生脈大洪浮無差日脾胃虛泄若經年莫作尋常泄瀉看先哲有方宜勿失不知其要治應難人皆以泄為脾病而不知腎病有泄也蓋腎開竅於二陰為啟蟄封藏之本腎氣若虛則封藏不固為病泄瀉也宜四神丸五味子散主之又有暴得腎泄者腹痛無定處似痢非痢骨弱面黧腳下時冷宜安腎丸人有脾胃素虛內傷病者或病泄瀉宜益胃湯黃耆補胃湯主之泄瀉經驗諸方神朮散治春傷於風夏必飧泄之證蒼朮一錢羌活四分細辛二分甘草炙三分藁本川芎各七分上㕮咀生薑三片水二盞煎至一盞去渣溫服如欲汗加蔥白三莖胃風湯治風冷乘虛入腸胃米穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血或如魚腦日夜無度久不得愈者人參茯苓川芎當歸白朮白芍藥桂心各等分上㕮咀入粟米小撮煎服腹痛加木香減半曲芎丸治中風濕臟腑滑泄又治飧泄川芎神麯炒白朮附子炮各等分上為細末麵糊為丸梧桐子大每服三五十丸溫米飲下漿水散治暴泄如水周身汗出一身盡冷脈微而弱氣少不能語甚者如吐此為急病半夏湯洗一兩附子炮半兩甘草炙半兩乾薑肉桂各半兩良薑二錢半上為細末每服三五錢漿水二盞煎至一盞和滓熱服甚者三四服微者三服桃花丸治冷泄不止即桃花湯方也朱石脂煅一兩乾薑炮半兩上為細末用粳米粉作丸如梧桐子大每服三四十丸米飲下黃連阿膠丸治熱泄不止黃連三兩真阿膠蛤粉炒茯苓各二兩上為細末以阿膠熬膏搜和二藥末為丸米飲下薷苓湯專治暑月泄瀉黃連厚朴各用薑汁炒扁豆炒香薷豬苓澤瀉白朮茯苓各等分上㕮咀姜三片水二盞煎服胃苓湯暑泄濕泄諸泄皆驗平胃散五苓散二方合加姜三片煎服升陽除濕湯自下而上者引而去之蒼朮一錢柴胡羌活防風升麻神麯炒澤瀉豬苓各五分甘草炙陳皮麥蘖面各三分上㕮咀水二盞煎一盞去渣空心服如胃寒腸鳴加益智仁半夏各五分生薑三片大棗一枚同煎非腸鳴勿用香砂平胃丸消食積補脾胃蒼朮米泔浸炒五兩厚朴酒炒陳皮各三兩甘草香附子鹽水浸透神麯炒砂仁各一兩上為細末荷葉水煮粳米粉為丸如桐子大每服五十丸薑棗湯送下實脾丸治諸泄不止厚朴薑汁炒一兩半肉豆蔻麵裹煨訶子炮去核縮砂橘紅蒼朮米泔水浸炒茯苓去皮各一兩木香半兩甘草炒四錢小紅棗一百枚生薑二兩上為細末用水煮薑棗至干取棗去核搗爛和藥再搗為丸如梧桐子大每服二三十丸米飲食前下加味補中益氣湯方見內傷治泄久胃氣下陷者本方倍白朮加茯苓防風煎服茯苓湯治因傷冷飲水泄瀉注下一夜十餘次變作白痢或變赤白相雜腹中疼痛食減熱燥四肢沉困無力生黃芩一錢半當歸二錢肉桂甘草炙各二分半豬苓茯苓各三分澤瀉五分白芍藥七分半蒼朮生甘草升麻柴胡各一錢上㕮咀水二盞煎一盞稍熱服升麻除濕防風湯治泄后里急後重數至圊而不能便或有白膿或血慎勿利之利之則必致重病及鬱結而不通也又此直舉其陽則陰氣自降矣蒼朮米泔浸四錢防風二錢白朮白芍藥白茯苓各一錢上㕮咀除蒼朮另作片子水二盞半煎至二盞入下四味煎至一盞去渣食前熱服陳氏七味肉豆蔻丸治諸泄瀉不止肉豆蔻麵裹煨訶子炮去核龍骨煅各五分赤石脂醋煅枯白礬各七分半木香縮砂各三錢上為細末麵糊丸如梧桐子大每服五十丸米飲下參苓白朮丸治泄後調理脾胃即參苓白朮散方見內傷上為細末荷葉水煮粳米糊丸如梧桐子大每服五十丸米飲下或棗湯下四神丸治脾胃氣虛清晨溏泄肉豆蔻麵裹煨二兩破故紙炒四兩茴香一兩木香半兩上為細末生薑煮棗肉為丸如梧桐子大每服六七十丸米飲下錢氏白朮散治泄渴不止神效當與服之人參白朮茯苓甘草木香藿香各等分葛根加一倍上㕮咀水煎服以此代湯水飲之良黃耆補胃湯治一日大便三四次溏而不多有時瀉腹中鳴黃耆當歸身柴胡益智仁甘草炙各二錢升麻六分紅花少許上㕮咀食後服五味子散每五更初曉時必溏泄一次此名腎泄五味子一兩吳茱萸細粒綠色者佳二兩上二味同炒香熟為度研為細末每服二錢陳米湯下益胃湯治頭悶勞動則微痛不喜飲食四肢怠惰燥熱氣口不知味腸鳴大便微溏黃色口乾不喜飲冷黃耆半夏洗甘草各二分黃芩柴胡人參白朮益智仁各三分當歸梢升麻各五分陳皮七分蒼朮一錢半上㕮咀水一盞半煎食前通口服安腎丸治腎氣不足膀胱虛冷川烏炮去皮臍肉桂各一兩茯苓白朮石斛酒洗巴戟去心山藥肉蓯蓉酒洗白蒺藜炒去刺川萆薢酒炒破故紙炒小茴香炒各三兩上為細末煉蜜如梧桐子大每服五十丸空心鹽湯下附方治暴泄注下用車前子一兩炒研為細末米飲調服又方治腹痛泄瀉用艾葉車前葉各一握水二盞煎一盞去渣入生薑自然汁煎一沸稍熱服立愈又方白玉丹止泄神效用滑石二兩枯礬一兩共為細末水煮麵糊為丸如皂子大每服一丸米飲下灸法泄久不止中脘氣海天樞灸之效見前霍亂
