body:
  text: 卷之三十三大小二便祕腎竅雙開於二陰溲便祕結屬肝經小便不利須調氣大便難時在血分按難經云下焦如瀆下焦本腎之位也水穀之所出故曰溝瀆也內經云腎開竅於二陰前陰者小便所出也後陰者大便所出也故老人腎虛多小便不禁大便祕之病氣血不足也如或大小便祕者不可強利之利之則腎虛而祕益甚所謂轉下轉祕者是也六味地黃丸調之經又云肝有病則大小便難故風病者多遺尿遺屎之證腎敗故也不可治宜搜風順氣丸主之仲景治脾約病麻仁丸內有羌活治在肝也如腎肝有實熱大小便不利宜利之八正散主之小便不通經云膀胱為州都之官津液藏焉氣化則能出矣此小便不利治在氣也故五苓散專主利小便乃足太陽膀胱經氣藥也丹溪云二陳湯加蒼朮白朮升麻柴胡則大便潤而小便長此升提其氣使清氣升而濁氣降也故古人有治小便不利用吐法此開其上竅通其下竅之法經云升降出入無物不有非智者不足以語此如小便赤澀不利者曰癃此心移熱於小腸小腸移熱於膀胱宜導赤散主之昔東垣先生治一人小便不利用滋陰大補丸而通詳見病機賦圻水縣監生李少華六月病暑大發汗後神昏兩手攣痛小便澀撒尿時大叫以手捏其莖久之滴一二點出甚苦家人皇備後事請豫治之豫語其妻子云無妨此誤汗證也蓋暑傷元氣汗之過多其氣益虛神昏者暑傷心心藏神心惡熱則神昏矣手攣者汗後津傷證也移熱於小腸小腸移熱於膀胱故莖中澀痛者尿不得出也乃用調元湯合生脈散連進六服而安其方用人參黃耆麥冬甘草梢各等分作大劑服大便祕者血病也宜東垣通幽湯潤腸丸主之鄖陽撫治都憲武公病大便難召豫往豫見公性太急乃告曰臺下之疾肝火太甚也經云肝病者大便難宜霽威戒怒以養其肝清心寡欲以養其腎公曰不然吾乃北人與爾南人不同常服枳朮大黃丸甚效豫曰不可服也地有南北之殊人之臟腑虛實相同也如此攻擊只恐轉下轉祕語不合而歸語其幕府曰公不久歸未半年而卒本縣汪玉虹病大便難更數醫服通幽湯潤腸丸皆不效請豫問之豫究其人言微氣弱乃內傷證也診其氣口脈浮大而軟豫語曰此氣不運而血不潤氣血兩虛故也宜極補之彼曰其如腹脹何豫曰不妨只服補中益氣湯倍加當歸吾待便大通而去玉虹半信之連進補中益氣湯五日後大便通矣喜而謝之木香檳榔丸治氣分遇仙丹治血分大便祕也
