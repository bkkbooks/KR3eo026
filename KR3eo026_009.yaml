body:
  text: 卷之九痰病太玄真一化元精魚有涎兮木有津盡去其痰休浪語不知何物潤其身腎為水臟乃受天一至玄之氣以生其中津液謂之真精入心為汗入肝為淚入肺為涕入脾為涎自出為唾是皆後天渣滓之物何莫而非先天太玄之所變化也痰者五液之統名也苟得其養則散於五臟而為液苟失其養則聚於一處而成痰矣然則人身中之有痰猶木之有津魚之有涎所賴滋潤養乎身體者也今之病痰者苦痰之多欲盡去之治痰者不知痰乃身之寶吐之下之欲盡其痰以徇一時之利及其去之不盡其痰轉多攻之不止真精乃竭而死矣籲可痛哉謹按褚澄云天地定位而水位乎中天地通氣而水氣蒸達土潤膏滋云興雨降而百物生人肖天地亦有水焉在上為痰在皮為血在下為精從毛竅出為汗從腹腸出為瀉從瘡口出為水痰盡死精竭死汗枯死瀉極死水從瘡口出不止干即死由是觀之痰不可盡去也明矣痰飲原從水穀生脾能傳化作真精只緣飲食傷脾胃津液不行痰飲成正理論云穀氣入胃脈道乃行水入於經其血乃成人資水穀以養其身脾胃強者受其水穀而變化之水穀之精氣為榮榮者血也悍氣為衛衛者氣也氣血和平榮衛流通何痰飲之有哉惟夫飲食不節起居不時七情內傷六淫外感脾胃失矣所以血不歸經蓄而成飲穀不化氣腐而為痰痰聚脾胃脾胃不運舊谷未盡新谷又增脾胃重傷並其清氣皆成濁敗之物矣清而濁者曰飲濁而濁者曰痰清濁不分積飲亦成痰矣飲者蓄水之名自外而入也痰者腸胃之液自內而生者也五飲為邪症不同痰生百病幾人通飲宜上下分消去痰要扶脾勿盡攻要略云四飲者痰飲懸飲溢飲支飲也又有留飲伏飲謂之四飲六症或云五飲者即伏飲留飲合為一症也五飲症治詳見下文陳無擇云人之有痰飲者由榮衛不清氣血濁敗凝結而成也內七情汩亂臟氣不行鬱而生涎涎結為飲為內所因外則六淫浸胃玄府不通當汗不汗蓄而為飲為外所因或飲食過傷色欲無度運動失宜津液不行聚為痰飲不屬內外因其為病也為喘為咳為嘔為瀉為眩暈嘈雜怔忡寒熱疼痛腫滿攣躄癃閉痞膈如風癇之類皆是也子和云凡人病痰者有五一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰王隱君治痰有五曰風痰寒痰熱痰氣痰味痰夫味痰者兼酒痰食痰乃因飲食酒醪厚味而得之氣痰即陳氏所謂內因七情汩亂而得之風痰寒痰當合作外因六淫之感得之熱痰因其人素有積熱得之濕痰因脾胃虛弱得之諸痰症治詳見下文按原病式云積飲留飲積蓄而不散也水得燥則消散得濕則不消法宜上下分消以去其濕在上則吐之汗之在下則利其大小便也然諸濕皆屬於脾治當補脾胃清中氣則痰自然運下丹溪先生曰中焦有食積與痰而生病者胃氣亦賴所養卒不可便攻攻盡則愈虛而病劇矣痰飲古來從濕治濕能生火火助濕諸痰變動火為邪氣即是火須理氣按痰乃積飲所化故原病式列於太陰濕土之條蓋濕盛則生熱熱盛則生痰痰者乃濕熱相搏火土熏蒸津液不流清濁混雜之所成者也然流行乎一身者氣也氣即是火熱則傷氣變為火邪痰之變動皆火之所為也故治痰者常以理氣清氣為主治其本也或云痰之清白者為寒黃濁為熱殊不知痰之初生也猶是水液故清白而稀薄及其久也漸變為黃濁稠黏之物矣以豫論之痰之走散者火也其結聚者濕也其色之清薄淡白者濕也色黃濁而味惡為酸辣腥臊焦者火熱之所化也經言積飲濕中生金匱推明五症分莫漫多言立綱紀只求胃氣得和平金匱要略云其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲又云病痰飲者當以溫藥和之宜茯苓桂枝白朮甘草湯深師消飲丸主之飲後水流在脅下咳唾引痛謂之懸飲仲景用十棗湯謂治懸飲者法當下之也今以河間控涎丹代之蓋痰在脅下非白芥子不能除也飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲病溢飲者當發其汗宜小青龍湯主之咳逆倚息短氣不得臥其形如腫謂之支飲小青龍湯主之青龍湯服已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕翕如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味子甘草湯治其氣衝沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔復納半夏以去其水水去嘔止其人形腫者加杏仁主之其症應納麻黃以其人遂痹故不納之若逆而納之者必厥所以然者以其人血虛麻黃髮其陽故也若面熱如醉此為胃熱上衝熏其面加大黃以利之心下有支飲其人若冒眩澤瀉湯主之胸滿厚朴大黃湯主之膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈以防己湯主之虛者即愈實者三日復發復與不愈者宜防己去石膏加茯苓芒硝湯主之夫心下有留飲其人背寒冷如冰夫留飲者脅下痛引缺盆胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲宜控涎丹主之膈上病痰滿喘咳嘔吐發則寒熱背痛腰疼目泣自出其人振振身瞤必有伏飲宜小青龍湯主之水在心下堅築短氣惡水不欲飲宜小陷胸湯主之或小半夏茯苓湯水在肺吐涎沫欲飲水宜金沸草散主之水在脾少氣身重宜六君子加蒼朮湯主之水在肝脅下支滿嚏而痛宜小柴胡加牡蠣湯主之水在腎心下悸宜五苓散主之痰多怪症罕曾聞開示詳明王隱君但使滾痰為主治當時立法未能精王隱君論云痰症古今未詳莫知其為病之原或頭風眩目運耳鳴或口眼蠕動眉稜耳輪俱癢或痛或四肢遊風腫硬而似疼非疼或為齒頰癢痛或為牙齒浮而痛癢不一或噫氣吞酸心下嘈雜或痛或噦或咽嗌不利咯之不出咽之不下其痰似墨有如破絮桃膠蜆肉之狀或心下如停冰鐵心氣冷痛或夢寐奇怪之狀或足腕痠軟腰背骨節卒痛或四肢筋骨疼痛難名並無常所乃至手麻臂疼狀若風濕每脊上每日一條如線之寒起者或渾身習習如臥芒刺者或眼黏濕癢口糜舌爛喉痹咽痛或繞項結核狀若瘰癧或胸腹間如有二氣交紐噎塞煩悶有如煙火上衝頭面焙熱或為失志癲狂或中風癱瘓或癆瘵荏苒之疾或風毒腳氣或心下怔忡如畏人捕或喘嗽嘔吐或嘔冷痰緑水黑汁甚為肺癰腸毒便膿攣跛蓋內外為病百般皆痰所致其狀不同難以盡述蓋津液既凝為痰不復周潤三焦故口燥咽乾大小便祕面如枯骨毛髮焦槁婦人則因此不通經脈若能逐出敗痰自然服餌有效余常用滾痰丸一藥以愈諸疾不可勝數矣劉宗厚云謹按痰之為病仲景論四飲六症無擇敘內外三因俱為切當蓋四飲則敘因痰而顯諸症者三因則論其因有所傷而生痰者也惟隱君論人之諸病者悉出於痰此發前人所未論可謂識痰之情狀而得其奧者矣制滾痰丸一方統治斯疾固為簡便較之仲景三因有表裡內外而分汗下溫利之法則疏闊矣況又有虛實寒熱之不同者哉密齊治痰飲之法若禹之行水順其勢而利導之可也在上者吐之在表者汗之在裡者下之若只用滾痰丸一方偏矣滾痰丸因十棗湯神祐丸之太峻而以代之者也如痰飲伏於腸胃之間膠固壅塞飲食不化榮衛不行不以滾痰丸逐而去之則拘矣故曰執中無權猶執一也痰涎蓄聚久成疴若不驅除氣不和客者除之防害主譬如去莠養嘉禾經云客者除之留者去之謂非其固有而有之害也如痰涎敗濁之物原非精津氣血之類一旦有之法當驅逐使之亟去也苟執痰無補法之說不審虛實汗下以寒攻之則為寒中以熱攻之則為熱中應下而吐者則傷其上焦之氣因吐而下者則傷其下焦之血舊痰未除新痰又起矣如謂痰不可盡除偏執專補脾胃之說使痰涎陳腐占住於腸胃之間養寇入室寧非正氣之賊邪非天下之至神不足以語此故良工知之痰在上可吐則吐之重則瓜蒂散輕則用丹溪吐法痰在中下者可下則下之重則十棗湯控涎丹輕則滾痰丸設有可吐可下之症而無可攻之脈則攻補兼行不失先後之序可也痰之可吐者如脈浮當吐痰在膈上當吐膠固稠濁必用吐痰在經絡中非吐不可吐中就有發散之義凡所吐法宜先升提其氣用防風山梔川芎桔梗芽茶生薑之類或就用此藥探吐吐時須先以軟帛勒住腰腹而於不通風之處行之痰之可下者如脈沉實滑大當下心下痞腹滿不減或痛當下大小便不利不可不下枳實瀉痰能沖牆倒壁風化硝瀉老痰咸能軟堅也大黃下痰推陳致新芫花之辛以散飲大戟之苦以瀉水甘遂直達水氣所結之處牽牛之去熱痰也巴豆之去寒痰也易老號斬關奪門之將大宜詳審不可輕用丹溪云痰之可表者汗之可下者利之滯者導之郁者揚之熱者清之寒者溫之偏熱偏寒者反佐而行之挾濕者淡以滲之挾虛者補以養之治法至矣第恨醫者不善處治病者不守禁忌遂使藥助病邪展轉深痼去生遠矣理氣行痰自有方昔賢留下二陳湯能明脈症加參佐安腎扶脾法最良治痰之法理氣為先和胃次之若風若寒若濕若熱之類當各尋其所受之因風則散之寒則溫之濕則滲之熱則清之氣則順之食則消之酒則解之各有其方不可一例求也風痰者因中風得之風傷肝多成癱瘓奇症宜豁痰丸搜風化痰丸主之寒痰者因形寒飲冷則傷肺初則為咳宜橘皮湯參蘇飲久則成骨痹濕痰者因停飲不散濕則傷脾多體重軟弱宜神術丸中和丸加減參苓平胃散熱痰者火盛制金熱傷肺病多煩熱宜清氣化痰丸茯苓丸主之氣痰者因事逆意而得之宜前胡半夏湯三仙丸若有痰成塊結於咽喉吐咯不出者俗呼梅核氣難治四七湯治之或作丹溪加咸能軟堅之味薑汁蜜丸亦可加味二陳湯主之酒痰者因飲酒太過得之初得之宜葛花解酲湯久則宜服清金化痰丸食痰者因飲食太飽得之宿食成積積久成痰宜枳朮化痰九祕傳豁痰丸老痰者年久之痰黃濁稠黏氣味俱惡宜節齊化痰丸凡服治痰之藥無效者當其脾胃虛弱也蓋腎為津液之主脾為轉運之官今痰之不除者由於腎水虛弱不能受臟腑之津液而藏之使津液敗濁而為痰飲宜加味地黃丸主之又由脾虛不能運化精微以成津液停留腸胃之中積而成痰內行臟腑外走經絡也宜參苓白朮丸主之痰在身中隨氣行內留臟腑外行經觀其所止為何病只要良工認得真肝有痰為癱瘓風為偏頭風為眩暈為轉筋為脅下痛為腰痛不可以俯仰為大小便硬為目昧不明眼見物如黑狀為卵腫㿗疝為囊縮或痿厥不起為夢交泄精為陰臊女人為經閉不行小腹腫為漏下白涎腥臭為胸滿嘔逆為善怒目𥅻膽有痰為胸脅痛不能轉側為口苦為善太息為嘔苦汁為頭角痛為頷腫為目鋭眥痛為缺盆中腫痛為腋下腫為寒熱如瘧為結核為瘰癧馬刀挾癭心有痰為善驚為癲癇為怔忡為嗌乾渴而欲飲為心痛為舌腫痛為笑為不語為痰迷如祟小腸有痰為嗌痛頷腫不可回顧為臂痛為耳聾目黃為頰腫為小便淋血為臍下疝痛為腸中瀝瀝有水聲脾有痰為腫為滿為體重或痛不能動搖為腹脹善噫食不下食則嘔為四肢不舉怠惰嗜臥為舌本強痛或煩心為心下急痛為寒瘧為溏泄為黃疸為健忘為頭眩痛胃有痰為灑灑振寒善伸數缺病至惡人與火聞木聲則惕然而驚心動欲閉戶牖而處甚則登高而歌棄衣而走為賁響腹脹為狂瘧濕淫汗出為胃脘當心而痛為鼽血為口喎唇疹為喉痹為大腹為水腫為膝臏腫痛為齒腫痛為跗腫肺有痰為喘為咳為缺盆中痛甚則交兩手而瞀為肺脹而喘上氣逆為胸滿為肩臂痛為小便數而缺遺失無度大腸有痰為齒痛頰腫而喉痹為大便硬為痔為脫肛為便白膿腎有痰為喜唾為喝喝而喘坐而欲起為目䀮䀮然如無所見為善恐惕惕然如人將捕之為腰痛為咽腫嗌乾及痛為腸澼為膝股內後廉痛為痿厥嗜臥足下熱而痛為湧水膀胱有痰為頭痛為腰脊痛為痔為瘧為狂癲為目中淚出為項背腰尻膕腨腳背痛為小便白濁婦人白帶痰在經絡為腫為痛為麻木為癰疽為結核以上臟腑經絡之病於各病門求之苓桂朮甘湯治心下有痰飲胸脅支滿目眩茯苓一錢桂枝白朮各七分半甘草五分水煎服深師消飲丸治停飲胸滿嘔逆腹中水聲不思飲食白朮二兩茯苓半兩枳實炒乾薑各七錢上為細末煉蜜丸梧桐子大每三十丸溫水下十棗湯治懸飲內痛芫花炒甘遂大戟各等分為細末以水一盞半先煮大棗十枚至八分去渣入藥末強人一錢瘦人半錢平旦服之不下更加半錢快下後以糜粥自養控涎丹一名妙應丸凡人忽患胸背手足頸項腰胯隱痛不忍筋骨牽引釣痛時時走移不定乃是痰涎在心膈上下變為此痰或手足冷痹氣脈不通誤認癱瘓非也一名妙應丸甘遂去心紫大戟真白芥子各等分上為細末米飲糊丸梧桐子大曬乾食後臨臥淡薑湯下或熱水下五七丸至十丸小青龍湯治濕熱者當發其汗又治支飲咳逆倚息不得臥麻黃芍藥各二錢細辛乾薑甘草桂枝各一錢半五味子半夏各二錢上作一服水三盞先煎麻黃減半去沫入諸藥煎一盞溫服桂苓甘草五味湯治支飲病服前青龍湯後有氣從小腹上衝胸咽茯苓四錢桂枝四錢炙甘草三錢五味子二錢水二盞煎一盞溫服以治其氣衝如沖氣已下及更咳胸滿者本方去桂加乾薑細辛各三錢治其咳滿如咳滿已止又嘔者加半夏二錢以去其水如水去嘔止形腫者又加杏仁二錢以去其腫如面赤者此胃熱也又加大黃三錢澤瀉湯治心下有支飲其人苦冒眩者澤瀉二錢半白朮一錢水一盞煎七分溫服厚朴大黃湯治支飲胸滿者即小承氣方也漢防己湯治膈間支飲喘滿心下痞堅醫吐下之不愈漢防己三錢半石膏雞蛋大一枚桂枝一錢七分人參三錢半水二盞煎一盞服其人虛者必效如不效者實也去石膏加大黃三錢半微利則愈小陷胸湯治水在心心下堅築短氣惡水不欲飲方見傷寒門小半夏茯苓湯治卒嘔吐心下痞膈間有水眩悸者半夏茯苓生薑各等分每三錢水二盞煎一盞溫服金沸草散治水在肺咳嗽吐涎沫旋覆花前胡荊芥穗各一錢半半夏七分半甘草細辛各三分赤茯苓一錢水一盞姜三片棗一枚煎服六君子加蒼朮湯治水在脾少氣體重四君子二陳合加蒼朮是也小柴胡加牡蠣湯治水在肝脅下痛小柴胡加牡蠣一錢是也五苓散治水在腎心下悸王隱君滾痰丸大黃酒蒸黃芩酒洗各八兩沉香半兩礞石硝煅一兩共極細末水丸梧桐子大每五七十丸量虛實加減清茶下或溫水下瓜蒂散痰飲在膈上宜此吐之瓜蒂炒赤小豆各等分二味各研末和勻水二盅香豉一合作稀粥去渣取三分之一和散一錢頓服之不吐少少又加得吐乃止諸見血虛家不可用丹溪吐法用蘿蔔子半升擂和以漿水一盞去渣少入油與蜜溫服或鮮蝦半斤入漿蔥姜等物料水煮熟先吃蝦後吃汁少時以鵝翎探吐先以桐油浸以皂角水洗曬乾待用豁痰丸治風痰壅盛南星三兩半夏二兩各切大片用濃皂角水浸一宿焙乾為末白附子五靈脂真姜蠶炒去絲北細辛白礬焙各一兩全蠍焙三錢半上為細末皂角漿煮麵糊丸梧桐子大每二三十丸薑湯下搜風化痰丸治風痰槐角子白殭蠶白礬焙陳皮去白人參荊芥穗天麻各一兩硃砂半兩半夏薑汁炒四兩上為末薑汁浸蒸餅丸硃砂為衣每四十丸薑湯下橘皮湯治寒肺胸膈停痰汪洋嘈雜多唾清水半夏一錢白茯苓陳皮各六分細辛青皮桔梗枳殼甘草炙各四分旋覆花人參各三分水二盞姜三片煎一盞食後服溫胃化痰丸治寒脾胸膈不快痰涎不已半夏薑製三兩陳皮乾薑白朮各一兩上為細末薑汁煮糊丸梧桐子大每二十丸薑湯下神術丸治濕痰蒼朮制生油麻半盞水一盞擂碎取漿將肥大膠棗十五個煮取肉杵爛入麻漿和搗入術末搗和丸梧桐子大日曬每五七十丸滾湯下中和丸治濕痰氣熱蒼朮制黃芩半夏洗香附子各等分上為末粥丸梧桐子大每五七十丸薑湯下參苓平胃散治脾胃濕痰胸滿短氣嘔噦噁心噫氣吞酸體重節疼常多自利及五噎八膈痞蒼朮半斤厚朴薑汁炒橘紅各五兩炙甘草白茯苓各二兩人參一兩上為末每服五錢水二盞姜三片棗一枚煎一盞溫服一方用大膠棗煮爛搗和丸如小豆大每五十丸薑湯下清氣化痰丸治熱痰清頭目涼膈半夏湯洗二兩陳皮茯苓各一兩半薄荷葉荊芥穗各五錢黃芩酒炒梔子仁連翹桔梗炙甘草各一兩蒼朮香附子各一兩上為細末薑汁煮麵糊丸梧桐子大每五七十丸食後臨臥溫水下蓋痰因火動氣因郁成故作胸膈痞滿頭目昏眩今用二陳湯以豁痰涼膈散以降火而散風熱香附蒼朮開鬱順氣何痰之不愈哉指迷茯苓丸治中脘停痰臂痛難舉有效半夏四兩茯苓二兩枳殼炒一兩風化硝半兩上為細末蒸餅或神麯薑汁煮糊丸梧桐子大每五十丸薑湯下前胡半夏湯治氣痰北前胡半夏茯苓各三分陳皮木香紫蘇枳殼炒甘草各三分姜三片烏梅少許水煎四七湯治七情四氣鬱結聚痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下並治中脘痞滿痰涎壅盛上氣喘急即七氣湯方見氣門三仙丸又名玉粉丸治中脘滯氣痰涎不利南星半夏各五兩薑汁作曲香附子鹽水浸陳皮各五兩上為細末薑汁糊丸如梧桐子大每四十丸薑湯下加味二陳湯治梅核氣二陳湯加黃芩桔梗枳殼炒真蘇子香附子梔子仁白豆蔻各等分姜引煎丹溪方用瓜蔞仁杏仁真海石桔梗連翹各等分朴硝減半上為末薑汁蜜丸噙化清金化痰丸治上熱酒毒痰火鬱結咯吐痰火之症若內傷久嗽者不可服真青黛瓜蔞霜連翹去心酒洗貝母片芩香附子童便浸真海石蛤粉各一兩風化硝半兩上為細末煉蜜丸如芡實大每一丸噙化清茶咽之枳朮化痰丸消食積化痰涎理脾順氣開鬱寬膈白朮陳皮青皮香附子酒浸炒蘇子各二兩枳實麩炒山楂各一兩神麯麥芽蘿蔔子白茯苓杏仁另研各一兩南星半夏各四兩切片生薑四兩皂角白礬各二兩水煮透焙為末上杏仁以上十二味共為細末入星半末和勻以薑汁竹瀝煮麵糊丸梧桐子大每五七十丸薑湯下祕傳豁痰丸治食積痰熱陳皮四兩山楂肉神麯炒各二兩當歸酒洗黃芩白朮各四兩半夏薑汁浸七日黃連淨白茯苓炙甘草各一兩半枳實二兩半共為細末湯浸蒸餅丸梧桐子大每四五十丸食後薑湯下節齊化痰丸治老痰挾火症亦治酒痰天門冬去心黃芩酒炒真海粉另瓜蔞霜另橘紅各二兩桔梗香附子鹽水浸炒連翹各五錢真青黛另二錢風化硝三錢上為末煉蜜入生薑汁少許和藥杵丸如龍眼大每一丸薑湯下利膈化痰丸治老痰挾濕者南星半夏各一兩薑汁作餅曬乾真海粉瓜蔞霜貝母香附子童便制各半兩上為末用牙皂十四挺捶破水一盞半煮杏仁去皮尖一兩同煮水將干去皂角擂杏仁如泥入藥末搜和再以薑汁浸蒸餅為丸緑豆大青黛為衣每五六十丸薑湯下加味地黃丸治腎虛不能納水水不歸經以成其血而變為痰飲也地黃酒蒸焙末二兩山茱萸肉白茯苓山藥杜仲鹽酒炒另取末巴戟去心淨肉遠志去心小茴香炒各一兩澤瀉肉蓯蓉酒洗焙牡丹皮破故紙炒各七錢上為末煉蜜丸梧桐子大每五十丸空心食前酒下參苓白朮丸治脾胃虛弱不能運化水穀以養榮衛反積為痰飲之症即參苓白朮丸加砂仁以荷葉浸粳米糊丸加減二陳湯治一身之痰無所不至乃治痰之要藥也陳皮一錢半夏二錢白茯苓一錢甘草五分如痰在頭作痛者加川芎藁本升麻柴胡蔓荊細辛薄荷之類如痰在腰胯膝下腫痛加蒼朮黃柏防己木通萆薢木瓜牛膝如痰在胸腹中作痛或痞滿加白朮枳殼桔梗砂仁神麯麥芽如痰在脅下作痛或漉漉有聲加柴胡青皮川芎山梔之類如痰在經絡中或胸背手足臂膊作痛者在上加防風羌活威靈仙下加防己牛膝木通之類冬月加烏附行經絡如痰在中焦作噯氣吞酸嘈雜或嘔清水或胃脘當心而痛加白朮蒼朮神麯麥芽川芎砂仁草蔻枳實豬苓澤瀉黃連吳茱萸梔子仁木香檳榔之類如痰在頸項胸脅之間為結核者加貝母枳殼桔梗連翹玄參龍膽草風痰壅塞送下青州白丸子感寒喘咳痰氣上逆合麻黃湯傷暑生痰合白虎湯傷濕生痰合平胃散傷飲生痰合五苓散傷食生痰送下保和丸因氣生痰合四七湯痰火盛合河間涼膈散氣虛有痰合四君子湯血虛有痰合四物加黃柏知母氣盛痰壅本方送下滾痰丸
