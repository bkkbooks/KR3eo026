body:
  text: 卷之一中風帝坐明堂觀八風喜從正位怕從沖邪虛晝發民多病強弱中間論不同夫八風者八方之風也太乙移宮之日天必應之以風雨是日也黃帝坐於明堂之中以察其災祥之變與岐伯天師從容問答著之於經垂法萬世其見於經者太乙常以冬至之日居葉蟄之宮風從正北方坎位來名曰大剛風立春日移居天留風從東北方艮位來名曰凶風春分日移居倉門風從東方震位來名曰嬰兒風立夏日移居陰洛風從東南方巽位來名曰弱風夏至日移居天宮風從南方離位來名曰大弱風立秋日移居玄委風從西南方坤位來名曰謀風秋分日移居倉果風從西方兌位來名曰剛風立冬日移居新洛風從西北方乾位來名曰坼風故於八節之日因視風所從來而占之風從其所居之正位來為實風主長養萬物如從其沖後來為虛風主殺主害傷人者也其風晝發者民多病夜發者少病民皆睡也強者氣實雖有大風苛毒不能害之弱者氣虛易於感邪故經曰其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名善行數變莫如風正邪衰微引賊攻內外淺深須要辨治分三法是良工經曰風者善行而數變又曰風者百病之長也至其變化乃為他病故曰賊風中風之病多起虛弱之人由外而內由淺而深有中血脈中腑臟之不同按發明云中血脈則口眼喎斜中腑則肢節廢中臟則性命危三治各不同中血脈者病在表宜汗之中腑者病在裡宜下之表裡已和宜養血通氣六經形症見於經便溺如難屬厥陰對症主方求必中勿輕汗下損元真發明云外有六經之形症則從小續命湯如減內有便溺之阻隔則從三化湯通利之又按機要云風本為熱熱勝則風動宜以靜其燥是養血也治須少汗亦宜少下多汗則虛其衛多下則損其榮宜治在經當以大藥養之大秦艽湯是也按內經風論歷陳五臟與胃風之病皆多汗而惡風體若虛羸易中風挾痰挾火與邪通經分五臟須明瞭脈症乖違即不中謹按經文仁齋直指所論五臟與胃風之症與脈各自不同心中風者多汗惡風其症偃臥不能傾側發熱失音診在口其色赤故唇赤者可治若唇上黑白青黃乃心壞為水面目停停時時栗動者死其脈浮而洪宜小續命湯去麻黃乾薑石膏杏仁加白茯苓生地木通黃連麥冬主之肝中風者多汗惡風其症踞坐不能低頭目直視嗌乾脅下痛諸筋攣急頭目瞤動診在目下其色青故青繞兩目連額微青面黃者可治若火勢青黑其目一白者死其脈浮而弦宜小續命湯去麻黃乾薑杏仁加羌活防風黃芩梔仁主之肺中風者多汗惡風其症偃臥時咳喘息胸滿短氣日則瘥暮則甚診在眉上其色白故目下及鼻四圍以至於口色白者可治若色黃乃肺壞為血與循衣摸空者死其脈浮而澀宜小續命湯去桂枝乾薑加黃芩梔子蘇葉主之腎中風者多汗惡風其症踞坐腰脊痛引小腹面悁然浮腫隱曲不得診在肌下其色黑故耳黑者可治若視左右脅有黃點面如土色髮直發黃者死其脈浮而滑小續命湯去石膏杏仁加黃柏細辛附子主之脾中風者多汗惡風其症身體怠惰四肢不欲動不嗜食腹滿皮肉瞤動診在鼻上其色黃故唇黃吐黃汁者可治若手足青且冷目下青者死其脈浮而緩小續命湯去麻黃杏仁石膏加黃耆白芷白芍主之胃中風者頸多汗惡風其症食飲不下膈塞不通腹痞滿張口喘息失衣則䐜脹食寒則泄診形瘦而腹大右關脈弦而緩帶浮宜胃風湯主之火生於木木生風風火原來共一宗治得火時風自散不從標本只從中經曰諸風振掉皆屬肝木蓋在天為風在地為木在人身中則肝應之風之從肝自然之理也自河間先生本諸內經作原病式然後風從肝治其義始明古方用續命排風治之者乃火鬱發之之意也河間用通聖散仲陽用瀉青丸治之乃風淫所勝治以辛涼今之論者乃謂古方之所治者真中風也河間之所治者類中風之病也豈理也哉謹按經云厥陰不從標本從乎中治中者謂少陽相火也膽為少陽相火肝之從火其義甚明風從火治理須明亦有脾虛被木侵濕則生痰與風似莫將中氣作風稱真中風者風自外入也知八風之變從虛而入初得之其邪在表故宜辛甘溫熱之劑以發散之不使傳變深入於裡也金匱續命湯防風羌活湯主之二三日後邪入於裡漸變為熱通聖散主之如脾胃不足肝木乘之為風病者此風自內出者也宜補中益氣湯合建中湯加防風主之如因濕生痰痰生熱熱生風者此即內經土氣之下木氣承之亢則害承乃制之病所謂土極而兼木化者也宜攝生飲子主之痰盛氣實者宜吐稀涎散主之氣虛者不可吐七情五志火相推氣中如風火所為烏藥有方能順氣蠟丸蘇合治顛危經云憂喜悲恐怒不得以其次故令人有大病矣又云百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂勞則氣耗思則氣結此七情之病也五志心之志為喜喜傷心肝之志為怒怒傷肝脾之志為思思傷脾肺之志為憂憂傷肺腎之志為恐恐傷腎此五志之病也七情五志皆不可過氣過而有餘便是火故河間云五志過極皆為火也人有中氣卒倒者目閉口合痰涎壅塞有似中風之狀但不瘈瘲搐掣耳急用蘇合丸灌之待其蘇蘇烏藥順氣散主之四肢痿弱狀如癱莫作風邪一類看病屬肺經多燥熱欲求治法問東垣丹溪云諸痿皆起於肺熱傳入五臟散為諸症其昏惑瘈瘲瞀悶冒昧暴病鬱冒矇昧暴瘖瘈昧皆屬於火四肢不舉舌本強足痿不收痰涎有聲皆屬於土悉是濕熱之病當作諸痿論治若以中風之法治之寧免虛虛之禍乎宜東垣清燥湯健步丸主之見痿病風淫平治以辛涼今古相傳續命湯辛熱過多能助火不如通聖泄青良經曰風淫於內治以辛涼佐以苦甘蓋木之味酸辛勝酸木之氣溫涼勝溫此五行相制之理也古今所録治中風者皆以小續命湯為主有桂附乾薑辛熱之藥雖有黃芩石膏如一杯之水豈能勝車薪之火哉惟云風從汗散初則服之以發散風邪則可如常服之寧不助火為變耶自河間仲陽深得經中之意以通聖散瀉青丸為治火瀉肝之主乃治其本也初中風時發散宜小柴胡湯合桂枝便溺阻隔搜風取調養無如大補奇發明云中風主治各不同外有六經之形症則從小續命加減內有便溺之阻隔宜三化湯外無六經之形症內無便溺之阻隔大秦艽湯羌活愈風湯主之今按機要云治宜少汗謂中風之病有汗惡風續命湯有麻黃不可輕用也亦宜少下謂風乃肝病肝強脾弱三化湯乃仲景小承氣以瀉痞滿實之藥不敢妄用也又不可利小便謂中風有自汗則津液外泄小便自少此東垣有五苓散之禁恐重亡津液也外無六經之形症內無便溺之阻隔斯為無疾人矣風而挾虛理宜補養仲景治風虛腳氣用八味丸略露端緒然秦艽湯愈風湯雖皆有補血之藥而行經散風之劑居其大半將何以養血而益筋骨耶故豫主以小柴胡合桂枝湯以代續命湯者小柴胡乃足厥陰少陽之藥桂枝湯又治中風自汗之症藥也經云肝病者大小便難主搜風順氣丸以代三化湯者所以治風痹之病也以十全大補湯代大秦艽湯愈風湯者取其養血益氣收大補十全之功也中風之脈喜浮虛浮緩而遲病易愈脾脈緩時空費力小虛急數可嗟吁正理論云風則浮虛又云浮脈而緩者為中風要略云脈微而數中風使然診人被風不仁痿痹其脈虛者生緊急疾者死脈訣歌云中風口噤遲浮吉虛小還當命必殂玉函歌云風疾脾緩空費力中風人在四旬逾腎氣始衰榮衛虛肥者多痰知氣弱瘦人多火血無餘發明云凡人年逾四旬氣衰之際多有風疾少壯之時無有也若肥盛者則間有之亦是形患氣衰而然也按內經曰人年四十則腎氣始衰發班面稿加以縱欲則不待四十而腎衰也腎水既衰火寡於畏故風病生焉肥人中風多屬氣虛治宜六君子湯為主加行痰散風利關節之劑恐痰泥經絡也瘦人中風多屬血虛有火宜四物加黃柏知母以滋陰降火為主則風自退也又有肥人血虛瘦人氣虛者當以脈症辨之不可拘泥癱瘓休將左右分皆因血少不榮筋若將痿痹同條貫誤殺閻浮多少人古書云手足不遂者左曰癱謂屬死血也右曰瘓謂屬痰也自豫論之癱瘓總是血枯之病蓋為痰泥經絡遂氣血不行以榮養其筋也癱者為手足木強難舉動也瘓者謂手足軟弱雖能運動而無力也癱者已成廢人不可治也惟瘓者八味地黃丸主之若痿痹之病又不可與癱瘓同論瘓與痿相似瘓則口角流涎語言謇澀痿則無是病但手足軟弱無力也癱與痹相似癱則木強難動痹則遊走疼痛乍作乍止也痿與痹相似痿則不痛而痹痛也治法各見本病惟癱瘓宜大防風湯主之百病無如風最先莫將雜病一般看中間惡症須詳察勿被時人作笑談中風惡症若口開手撤泄血遺尿眼合不開或瞪目直視汗出不流吐沫氣喘聲如鼾睡面緋面黑髮直頭搖手足口鼻清冷口噤喑不能言皆為不治之症治風諸方金匱小續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黃去節桂枝去皮當歸人參石膏乾薑甘草各三兩川芎一兩杏仁四十上九味以水一斗煮取四升每服一升當小汗薄覆脊恁幾坐汗出則愈不汗更服無所禁勿當風此心肺脾腎肝之藥也心中風去麻黃杏仁乾薑石膏加黃連木通生地白茯苓麥冬肝中風去麻黃杏仁乾薑石膏加羌活白芍防風黃芩梔子肺中風去桂枝乾薑加黃芩梔子仁蘇葉知母腎中風去石膏杏仁加細辛熟附子黃柏脾中風去麻黃杏仁石膏加白朮白芍黃耆又一方無當歸石膏乾薑有防風防已黃芩白芍熟附子共十一味名大續命湯薑棗引胃風湯治虛風症不能食腹脹滿食飲不下膈塞不通形瘦腹大惡風頸多汗麻木牙關急搐目內蠕動而腫此因初飲食訖乘風涼而得之白芷一錢二分葛根蒼朮歸身各一錢升麻二錢甘草炙一錢半柴胡藁本羌活黃柏炒草蔻各三分麻黃不去節五分蔓荊子一分薑三棗一煎防風羌活湯治氣虛血虛挾痰者防風羌活枳殼桔梗川芎各六分白芍酒炒一錢甘草炙四分白茯苓七分陳皮半夏湯洗七次白朮荊芥各五分水薑煎無汗而拘急者以此發之服藥後無汗者加麻黃去節一錢蔥白三莖頭痛加白芷細辛各五分血虛無力加生地黃當歸各五分氣虛有汗加黃耆人參各五分口乾有熱加柴胡葛根黃芩各五分四肢惡寒加桂枝一錢風痰加膽星一錢胸中多痰滿悶加竹瀝薑汁搐掣加白天麻殭蠶炒去絲嘴各八分防風通聖散治風熱諸症防風川芎當歸白芍大黃朴硝薄荷連翹麻黃各五分石膏桔梗黃芩各一錢甘草一錢二分白朮梔仁芥穗各三分滑石二錢四分薑三片水煎服如外有六經之形症去黃硝隨六經加引導藥太陽經加羌活藁本陽明經加乾葛升麻少陽加柴胡太陰加白芷少陰加獨活厥陰經加柴胡無汗用麻黃有汗用桂枝痰盛入竹瀝薑汁如內有便溺之阻隔去麻黃白芍加赤芍如外無六經之形症內無便溺之阻隔去麻黃硝黃加人參牛膝以調養氣血此方治痢後鶴膝風良驗搜風順氣丸治腸胃積熱大便結燥小便赤澀此藥先通氣血清熱潤燥通利大小便車前子一兩半白檳榔麻子微炒去殼另研牛膝酒浸山藥各二兩枳殼麩炒防風川獨活各一兩郁李仁去殼另研大黃酒蒸七次各五錢上為極細末梧桐子大每服二十丸溫酒下如覺大腸微動以羊肚肺羹補之膏粱之人大便結燥者常宜服之庶免風祕老人虛祕最宜十全大補湯治氣血俱虛神效四君四物加黃耆肉桂是也薑三片棗一枚煎服瀉青丸治肝火之神方也羌活防風歸身川芎梔仁膽草大黃濕紙煨等分為極細末煉蜜丸如梧桐子大每服三十丸滾白水下補中益氣建中湯治脾土不及肝木乘之以致中風之病即補中益氣湯合小建中湯加防風是也薑三片棗二枚水煎服烏藥順氣散治中風卒倒今人用之以治中風乃先調其氣也烏藥陳皮枳殼桔梗麻黃川芎白芷乾薑各等分甘草減半一方有白殭蠶水二盞薑三片蔥三根煎服攝生飲治一切卒中痰厥初病即宜用之圓白南星濕紙裹煨半夏湯泡七次木香各一錢半辣細辛蒼朮生甘草生石菖蒲各一錢上㕮咀分二服用水一盞半薑七片煎七分乘熱調蘇合丸一丸灌下如無蘇合丸只以竹瀝薑汁亦佳如卒中不省以搐藥吹鼻得嚏可治不嚏者難治搐鼻通天散主之搐鼻通天散治卒中暴死不省川芎細辛藜蘆白芷防風薄荷葉各一錢豬牙皂刺去皮三個上為極細末少許吹鼻中稀涎散治中風涎潮隔塞氣閉不通白礬生二兩豬牙皂去皮弦炙黃四個為極細末每服一二錢溫水下以吐為度大秦艽湯治血虛不能養筋故手足不能運動舌強不能言語宜養血而筋自榮秦艽甘草川芎當歸白芍石膏獨活白茯苓各一線羌活防風生地熟地黃白芷黃芩白朮各五分細辛二分半水煎溫服無時如遇天陰加生薑三片煎心下痞滿加枳實一錢大防風湯治氣血兩虛挾風熱而成癱瘓之神方也又治痢後腳弱不能行者名鶴膝風有效白朮一錢半熟地防風歸身黃耆白芍酒炒杜仲薑汁炒各一錢附子炮去皮川芎各七分半羌活人參牛膝酒洗甘草炙各五分薑棗引調理風邪各有方不如火艾最為良七年痼疾三年艾如覺風來可預防凡治風疾莫如以上發表和中治痰調氣血諸方然此可扶持疾病若要收全功火艾為良也凡風中脈則口眼喎斜宜灸聽會頰車地倉左灸右右灸左各三七壯凡風中腑手足不遂宜灸百會肩髃曲池風市足三里絶骨如覺手足麻木或不仁或痛良久乃已此是中腑之候宜求此六穴灸之凡風中臟氣塞涎出不語昏危者灸百會風池大椎曲池間使足三里絶骨立效如覺心中昏亂神思不怡或手足麻痹此將中臟之候不問是風是氣可速灸此七穴可保無虞如素有風人宜留意此灸法此法能灸猝死凡人風發可強忍怕痛不可灸忽然猝死雖灸無益也
