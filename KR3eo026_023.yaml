body:
  text: 卷之二十三瘧疾寒似懷冰熱在湯發時暴虐苦難當避其鋭氣休針藥待到衰時事必昌瘧者風暑不正之邪也內經有五臟六經之瘧古方有疸寒溫食牝牡之分名須不同一言以盡之曰寒曰熱名曰瘧者其始發也伸缺乃作寒栗鼓顫湯火不能溫腰脊俱痛寒去則內外皆熱冰水不能寒頭痛如破渴欲飲水煩冤懊憹有不可勝之苦故曰瘧也故經言曰方其盛時勿毀必待其衰也事必大昌此言治瘧之法不治其已發為其氣逆也凡用針藥必於瘧未發之前二時或於瘧退之後其氣和而治之病易愈矣瘧疾推來總是痰世人相謂是脾寒五邪感受皆成瘧痰聚中焦脈自弦瘧者內經獨言風諸書言暑丹溪言痰世人皆言脾寒亦皆有見五邪者即難經謂風寒暑濕飲食之邪也人受五邪之氣以致脾胃不和痰聚中脘遂成此疾所謂無痰不成瘧也故先寒後熱者名曰寒瘧先熱後寒者名曰溫瘧但熱而不寒者名曰疸瘧但寒而不熱者名曰牝瘧瘧久而瘦者名曰痰瘧一日一發易治間日一發難愈三日一發者猶難愈也要略云瘧脈自弦弦數者多熱弦遲者多寒弦短者傷食弦滑者多痰弦小緊者宜下浮大者宜吐弦數多熱者清之弦遲多寒者溫之故凡浮弦浮緊浮數者其邪在表宜汗弦實沉實數實者其邪在裡宜下若夫調胃氣利痰水分陰陽行三焦是皆治瘧之大法也瘧脈微則為虛代散則死風瘧因中風得之其證惡風自汗煩躁頭痛其脈弦浮宜小柴胡湯加羌活防風藁本川芎桂以解散風邪其有先熱後寒者名曰溫瘧與風瘧相同熱多寒少者小柴胡湯加葛根知母熱少寒多者小柴胡湯加桂枝暑瘧因中暑熱得之其證得熱不寒煩渴多汗其脈弦洪宜小柴胡合白虎湯或桂苓甘露飲方見痢疾其大熱渴者宜小柴胡湯去半夏加瓜蔞湯濕瘧因冒襲雨濕汗出澡浴得之其證身體重痛肢節煩疼嘔逆脹滿其脈弦細宜柴苓湯或胃苓湯寒多者為寒濕宜五積散熱多者為熱濕宜通聖散去大黃芒硝其有寒多不熱氣弱而泄慘慘振振此名牝瘧因久受陰濕陰盛陽虛陽不能勝陰也宜柴胡桂薑湯減半黃芩倍加半夏寒瘧因傷寒得之其證無汗惡寒攣痛面慘寒多熱少宜桂附二陳湯其脈弦緊當與之發散寒邪也食瘧因飲食不節得之喜啖生冷肥甘之物中脘生痰故為食瘧其證苦飢而不能食食則中滿嘔逆腹痛脈弦滑宜清脾湯或小承氣湯加檳榔下之良或四獸湯下紅丸大有奇功瘧疾初時即截之中間和解最為宜久成老瘧須當補莫厭湯丸自困疲凡治瘧疾初宜發散如上五法數發之後便宜截而除之蓋氣血猶實脾胃尚強邪未深入吐中便有發散之義若謂瘧不可截恐犯中氣逡巡畏縮至於日久榮衛虛弱病邪深入飲食減少中氣益虛治之則難矣所謂瘧不可截者謂不可用砒丹大毒之藥截之也截瘧之方如常山檳榔乃必用之藥也隨其所受五邪之方加而用之吐去痰涎病即瘳矣風瘧用小柴胡湯去人參加青皮常山檳榔暑瘧用白虎湯去石膏加貝母常山檳榔濕瘧用平胃散加草果常山檳榔寒瘧用草果飲加乾薑常山檳榔食瘧用青脾飲加常山檳榔有病瘧者不能知其所受之因只以寒熱多少辨之如寒多熱少者宜常山飲去知母加檳榔或七寶飲及祕方如寒少熱多者宜六物湯截瘧常山飲上初用截法瘧病者截之不退者慎勿再截也宜分晝發夜發寒熱多少和解之和解之方以小柴胡湯二陳湯二方相合為主治隨四時加輔佐藥又看有汗無汗若無汗要有汗以散邪為主帶補若有汗要無汗以正氣為主帶散春宜柴胡二陳湯加川芎白朮葛根夏宜本方加知母黃柏麥門冬夏秋之交本方加蒼朮白朮豬苓澤瀉秋宜本方加知母白芍藥桂枝冬宜本方加乾薑晝發者發於巳而退於申陰中之陽病宜補氣解表柴胡湯倍柴胡人參加白朮川芎葛根陳皮青皮蒼朮入薑棗煎服夜發者發於亥而退於寅為陰中之陰病宜補血疏肝用小柴胡合四物湯加青皮入薑棗煎此上二症皆發於寅申巳亥日者屬厥陰經故用小柴胡湯主治如子午卯酉日時發者少陰瘧也如辰戍丑未日時發者太陰瘧也如隔日發發於晝寒少熱多者此氣分病也宜桂枝石膏湯主之其發於夜寒少熱多者此血分病也宜麻黃黃芩湯主之如有汗者此正氣虛也宜補中益氣湯合小建中湯主之無汗者此邪氣勝也宜柴胡二陳湯加葛根蒼朮紫蘇青皮主之如不能食者宜柴胡二陳湯加白朮草果青皮神麯或養胃湯主之能食胃強者宜柴胡二陳湯去人參加蒼朮青皮紫蘇葉常山草果檳榔烏梅生薑煎服如大熱大渴者小柴胡湯去半夏加麥門冬天花粉知母炒黃柏葛根黃連汗多者再加黃耆生地黃如有痰者胸膈痞滿柴胡二陳湯加枳殼桔梗有大便燥實者宜大柴胡湯加檳榔下之瘧疾調理家祕平瘧養脾丸最效上中用和解法痎瘧老瘧也三日一發者陰經受病也夫瘧得於暑當以汗解或取風汗汗不得出鬱而成痰又復嗜欲縱飲及經試劫藥胃氣大傷其病難愈必以補中益氣湯為主治加以滋陰養血之藥或平瘧養脾丸常常服之以平為期兼服丹溪大補陰丸仍節飲食避風寒遠房室無不愈者瘧久成勞者蓋因其人不善調養耽食悅色無所不至也其補養湯丸宜久服之勿求近功自棄其身以至日漸羸瘦遂成勞瘵之病不可救矣其有久瘧之後腹中有塊者此名瘧母當用丸藥消去之丹溪有鱉甲丸辨疑有鱉甲烏梅丸嚴氏有鱉甲飲子豫家有消癖丸皆經驗之方宜擇而用之如癖不去則瘧終不愈錢氏所謂癖為寒熱者是也上末用補法瘧有諸般以類求瘴嵐溪毒惡涎留陰虛誤治多成瘵癖不消時病不瘳有疫瘧者有瘴瘧者有溪毒瘧者有鬼瘧者種種不同此皆邪毒不正之氣人受之者藏於臟腑之中化為毒涎遂成瘧疾非大吐大下之劑不能治也如以尋常正法治之必無效矣疫瘧者一歲之中有偏勝之氣長幼相似宜先以敗毒散發散之後不已者以大柴胡湯加檳榔下之瘴瘧者近山則有之乃風瘴溪源鬱蒸之氣使然也自嶺以南地方苦炎燥濕不常人多瘴瘧其症血乘上焦病欲來時令人迷困甚則發躁狂妄亦有啞不能言者皆由敗血瘀於心毒涎聚於脾此脾胃實熱所致宜先以辟邪再吐去其痰次以芎神丸下之溪毒有二今江淮之間多有射工蟲伏藏溪中能含沙以射水中人影人不見其形若中其毒轉為寒熱而似瘧鄉人呼為沙病者是也治此者或用苧麻作弓蘸熱水於遍身刮之或以燈心蘸麻油點火焠之或於手十指頭近甲處針刺出血皆能使腠理開通榮衛舒暢而愈此亦發散之義又夏間天地氣交百物生髮濕熱熏蒸百蟲吐毒之時溪澗之中水多不潔人飲之者化為毒涎遂成瘧疾先宜吐之瓜蒂散吐之不盡磨沉香水送下雄黃解毒丸如上諸瘧有成瘧母者宜用芫花消癖丸取之後以養胃湯調之外有陰虛證每日午後惡寒發熱至晚亦得微汗而解脈必虛濡而數瘧脈弦實為辨耳若作瘧疾治之投以發散劫截之劑多致誤人醫者於此當以脈證參驗其虛實而治之毋縱劫截以殺人也宜用小柴胡合四物湯加炒柏知母又有勞瘧者經年不差瘧須小愈微勞不任又復發作也此脾虛證宜用補中益氣湯合小建中湯合鱉甲治之又有七情之傷鬱而成瘧者此脫營失精之病當從痰治以二陳湯為主各隨臟氣加對病之藥然此乃神思間病非針藥之能辨也治瘧經驗諸方加減小柴胡湯治瘧通用方見傷寒門風瘧加羌活防風川芎藁本桂枝太陽瘧同溫瘧加葛根知母石膏陽明瘧同再加白芷暑瘧加白虎湯二方相合不用棗濕瘧合五苓散名柴苓湯寒多者為寒濕宜五積散方見寒門熱多者為熱濕通聖散去大黃芒硝方見風門瘧渴者去半夏加瓜蔞根麥門冬知母晝發者倍柴胡人參加白朮川芎蒼朮葛根陳皮青皮夜發者合四物湯加青皮陰虛發熱似瘧者合四物湯加炒柏知母瘧久無汗者合二陳湯加葛根蒼朮紫蘇葉青皮兼補兼發瘧久不退者合二陳湯去人參加蒼朮青皮紫蘇葉常山草果檳榔烏梅生薑兼補兼截瘴瘧疫瘧合二陳湯加蒼朮川芎葛根知母烏梅生薑加減柴胡二陳湯瘧通用即小柴胡湯方見傷寒二陳湯方見痰病二方相合春加川芎白朮葛根夏加黃連香薷厚朴秋加知母桂枝冬加炒乾姜不能食者加白朮厚朴青皮草果神麯炒胸中痞滿加枳殼桔梗腹中脹加厚朴大腹皮檳榔加減二陳湯治七情瘧方見痰因怒氣傷肝氣鬱所致者曰肝瘧加柴胡川芎青皮香附子黃芩因喜傷心心氣耗散所致者曰心瘧加黃連當歸白芍藥烏梅山梔仁人參白朮因思傷脾氣鬱涎結所致者曰脾瘧加蒼朮厚朴青皮香附子檳榔草果烏梅因憂傷肺氣鬱痰凝所致者曰肺瘧加香附子蘇葉烏梅人參前胡桂枝因失志傷腎所致者名曰腎瘧加知母貝母桂枝加減補中益氣湯治久瘧方見內傷汗多者正氣虛也合小建中湯去柴胡升麻加炒柏知母生地黃芩連勞瘧者小建中湯加鱉甲桂枝石膏湯治隔日發瘧寒少熱多者此氣分受邪也桂枝五錢石膏知母各一兩半黃芩一兩上㕮咀分作三服每服水一盞半煎服此治隔日發者邪氣受深也如寒熱大作不論先後此太陽陽明合病也本方加白芍藥一兩名桂枝芍藥湯若不急治轉入陰經必難愈矣如服藥後寒熱轉大者知太陽陽明少陽合病也本方加柴胡一兩二錢甘草炒人參各一錢半半夏四錢名桂枝黃芩湯分二服此即小柴胡合白虎湯加桂枝也麻黃桂枝湯治隔日瘧夜發者此血分受邪也麻黃去節一兩甘草炙二錢黃芩五錢桂枝二錢桃仁去皮尖三十粒上㕮咀分作三服每服水一盞煎服此發散血中寒風之劑大柴胡湯從卯至午時發者邪在陽分發散之後外邪已罷里邪未盡宜此湯下之方見傷寒後以小柴胡湯以徹其餘邪之氣桃仁承氣湯從酉至子時發者或至寅時知邪氣在血陰分也治與上同宜此微下之方見血病利後宜調製之小柴胡加當歸此上四法皆河間治瘧分日夜氣血之妙法也桂附二陳湯治寒瘧但寒少熱腰疼足冷二陳湯加附子炮肉桂各等分甘草炙減半上㕮咀水一盞半姜三片棗一枚煎服牡蠣湯治瘧多寒者牡蠣煅四錢麻黃去節四錢甘草二錢常山三錢上㕮咀分作二服每服用水二盞先煎麻黃常山去上渣入藥再煎至一盞溫服若吐則勿服後劑清脾湯治食瘧吐嘔痰沫寒熱相停者厚朴制黃芩白朮青皮茯苓半夏洗柴胡草果仁各等分甘草減半上㕮咀水二盞姜三片棗一枚煎服欲截加常山檳榔四獸湯治食瘧和胃消痰即六君子湯加草果各等分甘草炙減半上㕮咀以鹽少許淹頃濕紙厚裹慢火煨香熟每服四錢姜三片棗一枚水一盞煎半盞溫服如里邪甚者用此送下紅丸子紅丸子治食瘧氣滯腹脹三稜煨莪朮煨青皮陳皮各一兩乾薑炮胡椒各六錢上為末水醋煮粳米粉糊為丸如梧桐子大礬紅為衣每五十丸二陳湯四獸湯皆可下養胃湯治食瘧及感寒濕瘧發則多吐者厚朴制蒼朮炒半夏曲各一錢人參茯苓草果藿香各五分橘紅三分甘草炙一分烏梅半個上㕮咀水二盞姜五片煎一盞溫服草果飲治傷生冷冰水瘧此名脾寒半夏白芷良薑青皮川芎甘草炙紫蘇葉各等分上㕮咀水煎服七寶飲截瘧治寒多熱少者常山酒炒一錢半厚朴青皮炙甘草陳皮各五分草果五分檳榔一錢烏梅一個上㕮咀酒水各半盞寒多加酒熱多加水共一盞半煎八分露星夜一宿發日五更冷服忌熱飲食得吐良至午時許食溫粥一方用常山檳榔草果知母各一錢只此四味酒一盞浸一日勿煎臨發時五更服神效或吐或下瘧不復作一方用常山一錢半檳榔一錢丁香五分烏梅一個用好酒一盞浸一宿臨發日五更服之一服便止此祕方也六物湯截瘧治寒少熱多者嫩常山二錢半柴胡檳榔各一錢青皮去白二錢草果仁炙甘草各一錢半上㕮咀分二服每服烏梅二個好酒半盞新水二盞煎一盞如前露一宿臨發日五更冷服禁熱食如法常山飲截瘧治寒熱相停者嫩常山知母草果仁炙甘草各一錢烏梅肉五分良薑六分上㕮咀水酒各半盞桃柳枝各七寸煎七分露服如上法祕傳平瘧養脾丸治諸瘧大人小兒皆可服之神效人參白朮當歸川芎蒼朮厚朴陳皮青皮柴胡黃芩白茯苓豬苓澤瀉常山桂枝草果仁炙甘草鱉甲九肋者醋炙各等分上一十九味各如法制共為細末酒煮神麯糊為丸如梧桐子大每服一錢薑棗煎米飲送下丹溪鱉甲丸治瘧母鱉甲醋炙一兩三稜莪朮各用醋浸煨香附子醋浸青皮紅花桃仁去皮尖另研真海粉神麯炒麥蘖面各五分上為細末醋糊為丸如梧桐子大每服五十丸醋湯送下嚴氏鱉甲飲治瘧母鱉甲醋炙白朮黃耆草果檳榔川芎陳皮白芍藥厚朴甘草炙各等分上㕮咀生薑七片棗二枚烏梅半個水煎服辨疑鱉甲烏梅丸治瘧母久不愈者鱉甲醋炙一片青皮去穰陳皮去白各一兩常山酒炒褐色二兩知母酒炒貝母檳榔各一兩半草果仁八錢人參七錢烏梅肉焙五錢上為細末酒糊丸如梧桐子大每服七十丸酒下忌雞魚羊肉諸血生冷祕傳消痞丸治癖為寒熱大人小兒同三稜莪朮各用醋浸煨軟切陳皮青皮去穰當歸酒洗半夏曲各一兩川芎厚朴薑汁炒黃連各一兩九肋鱉甲醋炙二兩黃芩乾薑炒柴胡官桂昆布各一兩上一十五味為細末酒煮神麯為丸如梧桐子大每服五十丸白湯送下瓜蒂散以吐瘴瘧鬼氣瘧有毒涎在胸膈者瓜蒂赤小豆雄黃各一錢上為細末每服半錢溫薺水調下以吐痰為度辟邪丹治瘴瘧鬼瘧以此截之緑豆四十九粒硃砂小豆大者二粒另研砒信半錢另研雄黑豆四十九粒上為末同入乳鉢內水丸分作三十粒黃丹一錢研為衣每用一丸取向東桃枝七寸研汁將井花水於發日日欲出未出向日吞之截瘧常山飲治疫瘧瘴鬼瘧用此川常山草果檳榔知母生甘草烏梅去核川山甲浸火煨各等分上㕮咀每服水酒各半盞向東桃枝七寸煎八分露星月下一宿臨發日五更面東冷服之以吐去毒涎為度此藥隔夜將渣煎下各以碗乘之露過如服前湯不吐者再服後湯以指探引務令得吐為佳消癖逐水丸治瘴瘧鬼瘧有成瘧母者以此除之芫花炒硃砂水飛各等分上為末煉蜜丸如小豆大每服十丸濃煎棗湯送下下後用養胃湯
