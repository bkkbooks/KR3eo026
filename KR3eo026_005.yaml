body:
  text: 卷之五內傷病五行萬物土為宗脾胃身中理亦同飲食勞傷通四氣越人明著難經中按五行之生非土不成萬物之生非土不載悟真篇云萬物五行皆屬土者是也人以胃氣為本胃為水穀之海飲食入胃而脾受之變化精微輸於六腑以養五臟資生氣血散於經絡流行於皮毛肌肉筋骨之間所謂元氣穀氣營氣清氣生髮上升之氣皆胃氣之別名也故氣有真土有假上假土者地也脾胃也有定位有成名者也真土者升降出入以為生長收藏之用者也苟無是出入廢則神機淪滅升降息則氣力孤危脾胃受傷則榮衛失守諸病生焉按四十九難五邪為病之論如風傷肝暑傷心寒傷肺濕傷腎此四氣之邪傷於外者然也飲食勞倦則傷脾此飢飽勞逸之邪生於內者然也是五邪者有本臟自病者謂之正邪有從前來者為實邪從後來者為虛邪從所勝來者為虛邪從所不勝來者為賊邪一臟五病五五二十五病越人潔古語之詳矣故諸邪之生於外者為外感生於內者為內傷有因外感以成內傷之病者有因內傷之虛以致外感之邪者臨病之工宜明辨之內傷外感兩相因標本良醫辨得真先感後傷宜救本先傷後感治標輕病有外感成內傷者其候有三人病則不能食一也發汗吐下之後二也勞食再復三也有內傷致外感者邪之所湊其氣必虛脾胃不足風寒暑濕之邪由此入矣標本之論有二先病為本後病為標正氣為本邪氣為標或從本治或從標治或標而本之急則治其標也或本而標之緩則救其本也如因外感之後成內傷者此邪氣將盡正氣已傷只養其正則邪自除矣所謂不治先病治後病也如因內傷之虛致外感者以診其急緩之勢其有宜發汗宜吐宜下之症者則如汗吐下之法以攻去其邪然後養其正氣所謂標而本之者是也若雖有汗吐之症而有不可攻者則養其正氣待其可攻而攻之所謂本而標之者是也內傷發熱似傷寒候在人迎氣口間氣口內傷洪緩澀人迎外感數浮堅古人以脈上辨內外傷人迎脈盛於氣口為外傷此外感風寒有餘之邪其病必見於左手寸關之中左手主表故人迎之脈浮洪緊數而有力大於氣口一二倍也氣口脈大於人迎為內傷此飲食不節勞役所傷為不足之病其病必見於右手寸關之中右手主裡故氣口之脈洪數而無力大於人迎一倍甚者則兩倍三倍也此以脈辨者也人之受病內傷者多外傷者間而有之粗工不知往往將元氣不足之症便作外傷有餘之症攻之誤人眾矣其內外傷病症之辨東垣論之詳矣中有一法只於氣少氣盛上辨之於外傷賊邪者必語言高厲而有力內傷裡虛不足之病必氣短氣促懶語其聲微弱而無力至易見也關上浮洪舉有餘按之不足是脾虛胃中宿食多沉滑補瀉從來不可拘愚按內傷之病有虛有實不可一例認為不足之病也觀東垣之書補中益氣枳朮消導之法兩存之意可見矣如遠勞困乏憂思惱怒廢其飲食者此飢渴之傷謂之不足華筵盛撰放飯長飲者此醉飽之傷謂之有餘或因傷食飲食漸少者此有餘中之不足也或因受飢飲食自倍者此不足中之有餘也如是病者必審之故以脈診浮洪而虛者不足之脈也弦滑而實者有餘之脈也補之瀉之必使氣復富貴之人多內傷耽食悅色總為殃形志更將分苦樂東垣有說或遺忘富貴之人耽食悅色多內傷不足之病故曰富家巨室治各異乎貧窮也然富貴之人豈無飢渴男女飲食人之大欲存焉雖貧賤者亦不能免也經云先貴後賤者名曰脫營先富後貧者名曰失精此皆內傷之病原也語內傷者必求其飲食所傷之由可也如形志俱樂者有膏粱情欲之傷形志俱苦者有寒暑飢渴之傷形樂志苦者有深思遠慮之傷形苦志樂者有馳騁放縱之傷所受不同內傷無異東垣之意豈不及此或有之而遺失耳傷寒傳變六經分脾胃如傷兼症明慢把五邪詳脈症從來五臟各相平難經云飲食勞倦則傷脾夫飲食不節則胃病胃病則氣短精神少而生大熱有時而顯火上行獨燎其面經云面熱者足陽明經胃既病則脾無稟受脾為死陰不主時也故亦從而病焉形體勞倦則脾病脾病則怠惰嗜臥四肢不收大便泄瀉脾既病則胃不能行津液故亦從而病焉胃為十二經之海十二經皆稟血氣滋養於身脾受胃之稟行其氣血也脾胃既虛則十二官皆無所稟而病生矣經言至而不至是為不及所不勝者乘之所勝者侮之所生者受病此脾胃病中有肝心肺腎兼見之症也謂之五邪如不能食而肌肉削怠惰嗜臥四肢不收或大便泄瀉右關脈緩而弱當臍有動氣按之牢若痛此脾胃本病脈症見也謂之正邪宜調中益氣湯主之若脈緩病怠惰嗜臥四肢不收此濕也於本方加平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉本方中加小建中湯若脈虛血弱本方加四物湯若脈弱氣短氣不足本方加四君子湯若病或渴或小便不利本方中加五苓散去桂若脾胃本部脈見浮大而散其病或煩躁悶亂或四肢發熱或口苦舌燥咽乾此心與小腸來乘脾胃也從後來者為虛邪經云子虛則補其母當於心與小腸中以補脾胃之根蒂也用甘溫之藥為之主以苦寒之藥為之使以酸味為之佐蓋心苦緩宜食酸以收之心火旺則肺受邪金虛則以酸補之次以甘溫及甘寒之劑於脾中瀉心火之亢盛是治其本也宜補中益氣湯去陳皮當歸升麻柴胡加白芍藥黃連桑白皮主之若心火亢盛乘於脾胃之位脈浮大而數病口苦舌燥咽乾宜三黃白虎湯若脾胃本病脈症中兼見洪大肌熱煩熱面赤而不能食肌肉消一二症此心之脾胃病也宜補脾胃瀉陰火升陽湯主之若榮血大虧陰火熾盛心包與心主血減則心無養致使心亂而煩病名曰俛俛心惑而煩悶不安也宜硃砂安神丸主之如脾胃病本部脈症中兼見弦脈其症或身體沉重走注疼痛或多怒或目病而生內瘴或妄見妄聞夜夢亡人四肢轉筋或生痿痹或生厥或生惡瘡皆肝火挾心火之勢無所畏而妄行來克脾土也此所不勝者乘之謂之賊邪當於脾胃藥中加風藥以瀉之若體重節痛口苦舌乾往來寒熱宜升陽補氣湯主之肝主風脾主濕風濕相搏脈細而弦按之洪緩有力其症腿內及膝股生癰疽者此足太陰厥陰之分宜內托黃耆柴胡湯主之如能食麻木牙關急搐目內蠕瞤此名胃風宜胃風湯主之如風濕相搏腰以下痛或痿弱者宜除風濕羌活湯主之如胃脾病本部脈症中兼見浮澀脈其症咳嗽氣短氣上皮毛不密灑淅惡寒精神少而渴情慘慘而不樂此陽氣不足陰氣有餘此肺受火木之邪而清肅之氣傷乃所生者受病也從前來者名實邪當於本經藥中兼瀉肺之劑及補氣為佐宜參朮調中湯主之如脾胃之虛怠惰嗜臥四肢不收體重節痛口苦舌乾食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也宜升陽益氣湯主之脾胃虛弱必上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩足痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物䀮䀮無所見小便頻數大便難而結秘胃脘當心而痛兩脅痛或急縮臍下周圍如繩束之急甚則如刀刺腹難伸舒胸中閉塞時時嘔噦或有痰嗽口沃白沫舌強腰背髀眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺金為熱所乘而作當先助元氣專補庚辛之不足宜黃耆人參湯主之如風寒汗出肩背痛小便數而欠者風熱乘其肺也當瀉風熱以通氣防風湯主之如小便遺失者肺氣虛也宜安臥養氣禁勞役如黃耆人參補之不食常有熱加黃柏生地黃如脾胃脈症中兼見沉細其症作涎及清涕唾多溺多而惡寒者是也此腎之脾病所不勝反來侮之謂之微邪若土火復之及任督沖之三脈為邪則足不任身足痛不能踐地骨乏無力喜睡兩睪丸冷腹引陰而痛妄聞妄見腰脊背髀皆痛本部病中治有二法治其病者當先於陰分補其陽氣升騰行其陽道而走空竅次加寒水之藥降其陰火黃連黃柏之類是也先補其陽後瀉其陰脾胃俱旺而復於中焦之本位而陽氣平矣宜神聖復氣湯主之如中焦氣弱脾胃受寒飲食不美氣不調和腹中雷鳴大便泄瀉手足厥逆及下焦陽虛臍腹冷痛此亦腎之脾胃病也宜真武湯沉香溫胃丸主之人傷飲食胃先虧勞倦如傷只損脾脾胃兩傷同一體視人肥瘦定安危胃乃脾之剛脾乃胃之柔表裡之謂也飲食不節則胃先病脾無所稟而後病勞役則脾先病不能為胃行氣而胃後病其生病之先後雖異所受邪則一也夫胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行苟飲食失節寒溫不適則脾胃受傷喜怒憂恐勞役過度而損耗元氣既脾胃虛弱元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦胞絡之火元氣之賊也脾胃氣虛則下流於腎肝陰火得以乘其土位故脾症始得氣高而喘身熱而煩其脈洪大而頭痛或渴不止皮膚不任風寒而生寒熱蓋陰火上衝則氣高而喘身煩熱為頭痛為渴而脈洪大脾胃之氣下流穀氣不得升浮是生長之令不行無陽以護榮衛不任風寒乃生寒熱皆脾胃之氣不足所致也上此一節專論飲食之傷胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削即食亦飢也叔和云多食亦飢虛此之謂也東垣五法治脾傷摘要教人只五方脈症若兼他臟病隨時加入補中湯夫胃病則脈緩脾病則脈遲若火乘土位則脈洪緩如脈緩氣急怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉或皮毛枯槁發脫落從黃耆建中湯脈虛而血弱從四物湯或其氣虛弱及血少脈弱從四君子湯或渴或小便不利從五苓散去桂以上五方當於本經中隨所兼見症摘一二味加之假令表虛自汗春夏加黃芩秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉勿加雖氣轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中滿悶此非腹脹乃散不收可加白芍藥收之妙肺氣短促或不定者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景之妙法也腹痛兼發熱加黃芩惡寒或腹中覺寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮大小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓砂仁氣復不能轉有熱者微加黃連心煩亂亦加之小便少者加豬苓澤瀉汗多津液竭於上勿加之是津液還入胃欲自行也不渴而小便閉塞不通加炒黃柏知母小便澀者加炒滑石小便淋澀加澤瀉五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血症用炒黃柏知母以降胃中燥熱竅不利而淋加澤瀉炒滑石只治竅不利者六一散中加木通亦可心臟熱導赤散妙中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者用四君子湯中去茯苓加黃耆以補之如腹中氣不轉更加甘草一半腹中刺痛或周身刺痛或裡急者腹中不覺快是也或虛坐而大便不得者皆血虛也血虛則裡急或血氣虛弱而目睛疼加當歸身頭痛加川芎苦頭痛加細辛此少陰頭痛也發脫落及膝下痛加熟地黃於平昔調理脾胃虛弱於此五藥中加減如五臟症中互顯一二症各對症加藥無不驗然終不能使人完復後或有因而再至者亦由督任沖三脈為邪皆胃氣虛弱之所致也用藥須知法四時軒岐素問理玄微浮沉升降隨元氣寒熱溫涼勿犯之經云大法春宜吐夏宜汗秋宜下冬宜周密所謂春吐者象草木之發生氣之升也夏汗者象草木之蕃秀氣之浮也秋下者象草木之零落氣之降也冬周密者象草木之閉藏氣之沉也經言用溫遠溫用熱遠熱用涼遠涼用寒遠寒故春宜食涼夏宜食寒秋宜食溫冬宜食熱冬不得服白虎夏不得服青龍春夏不得服桂枝者勿犯天時恐翼其勝也如有病又宜用者從權用之不可拘泥中病即止勿過其制也人因飲食不節勞役所傷腹脅滿悶短氣遇春則口無味遇夏發熱發寒飢常如飽不喜食冷宜升陽順氣湯主之夫脾胃不足之症須用升麻柴胡苦平之味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以資春夏之和也又引參耆甘溫之氣味上行充實腠理使陽氣得衛外而為固也長夏濕土客邪火旺可從權治加蒼白朮澤瀉上下分消其濕氣也濕氣大勝主食不消化故食減不知穀味加砂仁以消之復加五味麥冬人參瀉火益肺氣助秋令也此三伏中長夏土旺之時藥也夫脾胃虛弱遇六七月之間河漲淋雨諸物皆潤人汗沾衣身重氣短甚則四肢痿軟行步不進此腎水與膀胱俱竭之狀也當急救之以生脈散除其時令浮熱濕蒸之極蓋肺欲收心苦緩皆酸以收之心火盛則甘以瀉之故人參之甘佐以五味子之酸孫思邈云夏月常服五味子以補五臟是也麥冬之微苦寒能滋水之源於金之位而清肅肺氣又能除火卻金之嗽而斂其痰復微加黃柏之苦寒以為守位滋水之流也脾胃之虛時值秋燥令行濕熱少退體重節痛口苦舌乾食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也宜服益胃湯胃脾虛寒心腹脹滿及秋冬客寒犯胃時作疼痛宜厚朴溫中湯主之戊土已衰不能運化又加客寒聚為滿痛散以辛熱佐以甘苦以淡泄之氣溫胃和痛自止矣冬月之時足太陽寒氣少陰腎水正旺子能令母實手太陰肺實反來侮土火木受邪諸病俱作宜神聖復氣湯注之如秋冬之月胃脈四通為衝脈所逆並脅下少陽脈二道而反上行病名厥逆經曰逆氣上行脈滿去形謂七神昏絕離去其形而死矣其症氣上衝咽不得息而喘息有音不得臥加吳茱萸服之觀厥逆多少而用之如食不下胸中胃土有寒或氣澀滯用青皮陳皮木香三味為定法如初春猶寒宜少加辛熱以補春氣之不足以為風藥之佐益智草豆蔻皆可三陽之月用青皮少陳皮多更加風藥以退其寒夏月益智草蔻宜少用更加黃連秋月加檳榔草蔻砂仁或少加白豆蔻冬月加益智草蔻如腹痛春夏宜用白芍秋冬不可用乃大寒之藥也宜加乾薑大抵治飲食勞倦所得之病乃虛勞也損症也當用溫平甘多辛少之藥治之是其本法也如四時見寒熱或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大寒大熱之處益其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致難治矣發熱平治各有方無非散火與升陽陽邪散火令清解陰火升陽體自涼內傷發熱之病當以脈症辨之如脈浮弦而數其症發熱頭痛項強身痛者此病在表乃陽虛生外寒也病在手太陽丙小腸火宜升陽散火湯若脈洪大而數其症煩熱而渴此病在裡乃陰虛生內熱也病在手少陰丁心火宜瀉陰火升陽湯主之稽古東垣論內傷發明精旨甚精詳補中益氣安神妙飲食成傷別主張內傷之論見於素難發明其旨以開後學者自東垣始也詳見脾胃論內外傷辨內傷不足之病當以甘溫之劑補其中升其陽甘寒以瀉其火則愈勞者溫之損者溫之溫能除大熱忌用苦寒瀉其胃土宜補中益氣湯主之心藏神心惡熱陰火既熾心血內虧致使心亂而煩其神不安病名曰俛俛者心惑而煩悶不寧也宜硃砂安神丸鎮固之經言飲食則傷脾水穀為邪自不齊水蓄不消常作飲食留積聚費推移經云飲食自倍腸胃乃傷此混言之也分而言之飲者水也無形之氣也食者物也有形之血也經云因而大飲則氣逆形寒飲冷則傷肺飲之為病為喘咳為腫滿為水瀉輕則宜發汗利小便使上下分消其濕也如重而蓄積為痰飲為腫滿宜導而去之此治飲之大法也經又云因而飽食筋脈橫解腸癖為痔食傷太陰厥陰氣口大於人迎兩倍三倍食之為病或嘔吐或痞滿或下利腸澼或為癰塊傷之輕者損谷則安其次莫若消導甚則取之尤甚者須分上下寒熱或吐或下以平為期然消導吐下不可太過過則反傷脾胃也蓋先因飲食脾胃自傷又加以藥過則腸胃復傷而氣不運化食愈難消矣漸至羸困醫之咎也病酒之人號曰酲葛花能解醉中人脅痛十棗真奇絕水逆長沙用五苓夫酒者大熱有毒氣味陽乃無形之物也亂性喪德腐脅爛腸酒之為害也大矣若或傷之惟發散汗出則愈此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒癥丸大熱之藥下之又有用牽牛大黃下之是無形元氣受病反下有形陰血誤亦甚矣酒性大熱已傷元氣而復重泄之況亦損腎水真陰及有形陰血俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡七神何依折人長命不然則虛損之病成矣宜葛花解酲湯主之復有服上藥解酲之後兩脅下痛如刀刺者此蓄飲病也蓋酒之氣熱其體則水也解梧湯之發散其氣已盡其水猶存方中須有五苓之藥不能去之宜芫花十棗湯逐去其水則愈矣蓋脅下乃肝之分位肝藏血此因酒熱傷其陰血放下之乃從權之法也人有熱病大渴飲水或暑月勞苦之人汗出多而飲水者水寒傷脾傷肺口燥咽乾煩渴亦甚水入即吐或為泄瀉或腹痛胸滿者此水逆也宜五苓散主之傷食先須問所因食寒食熱悉分明勿傷胃氣為根本吐下從來不可輕食者謂穀肉菜果之物也經云陰之所生本在五味陰之五宮傷在五味穀肉菜果口嗜而欲食之心自裁製勿使過焉過則傷其正矣或有傷於食者必先問其人或因喜食而多食之耶或因飢餓而急食之耶或因人所勉強勸而強食之耶或因病後宜禁之物而誤食之耶如因喜食得之當先益其胃氣胃氣素強損谷自愈消導耗氣之藥不必服也如因飢餓得之當先益其胃氣胃氣復所傷之物自消導矣宜寬中進食養脾丸主之如因勉勸得之宜行消導之劑如曲糵枳朮丸保和丸是也若因病後得之當以補養為主宜參苓白朮散其所傷之物有寒熱之不同所傷之人有強弱之不同主治之法無一定也所謂熱物者如膏粱辛辣厚味之物是也穀肉多有之有寒物者冰水瓜桃生冷之物是也菜果多有之治熱以寒大黃牽牛是也治寒以熱丁香巴豆是也如以熱攻熱以寒攻寒則食物雖去藥毒猶存胃氣重傷禍不旋踵矣故傷熱物者宜三黃枳朮丸小承氣湯甚者木香檳榔丸傷冷物宜香砂養脾湯木香人參生薑枳朮丸甚則丁香脾積丸加味理中丸主之如冷熱不調者備急丸主之食在上焦宜吐之瓜蒂散太峻不可用也有探吐法最妙食在中焦以下則宜下之視人強弱加減丸數以漸取之不可猛浪傷人胃氣強者易愈弱者轉甚以致飲食減少精神困頓醫之誤也脾胃原強被食傷就中攻取亦何妨假如脾弱難消食補養中和穀氣昌傷食之病有二有飲食自倍傷其脾胃者此有餘之症也法宜消之破之吐之下之使陳積去而腸胃之氣行也有脾胃素弱不能消化飲食以致停蓄者此非食傷脾胃乃脾胃不能勝其飲食此不足之症也宜用補脾胃益氣升陽之劑使胃氣漸復穀氣自昌不惟吐下不可用雖消導之劑亦不可多用也宜養脾丸主之易老曾留枳朮丸合宜加減果仙傳保和又是丹溪法只恐時師會不全易老張先生嘗戒不可用峻利食藥食藥下咽未至藥丸施化其標皮之力始開便言空快所傷之物已去更待一兩時辰許藥盡化開其峻利藥必有惰性病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽當時制下一方枳實一兩白朮二兩只以兩味荷葉包飯為丸以白朮味苦甘溫其甘溫補脾胃之元氣其苦味除胃中之濕熱利腰臍間血故先補脾胃之弱過於枳實克化之藥一倍枳實味苦寒泄心下痞悶消化胃中所傷此藥下咽所傷不能即去須待一兩時辰許食則消化是先補其虛而後化其所傷則不峻利矣荷葉者中空外直出於泥而不染其色青象風木之體食物感此氣之化胃氣何由不上升乎更以燒飯和藥與白朮協力滋養穀氣而補令胃厚再不內傷其利溥哉今立加減法於後如老弱之人元氣虛弱飲食不消者本方加陳皮一兩名橘皮枳朮丸如為人所勉強食之本方加神麯麥糵名曲糵枳朮丸如有鬱氣凝滯者本方加木香一兩名木香枳朮丸如因冷食內傷者本方加半夏一兩名半夏枳朮丸如因熱食傷者本方加三黃丸名三黃枳朮丸又名枳實導滯丸東垣先生又有各隨所傷之物以立治法如傷熱面心腹滿悶肢體沉重者宜除濕益氣湯主之如傷豆粉濕面油膩之物者宜白朮丸主之如傷馬乳及牛羊酪水一切冷物者除濕散主之如傷濕熱之物不得施化者枳實導滯丸主之如大病瘥後傷食勞復者枳實梔子大黃湯主之丹溪先生治一切食積宜保和丸主之師傳治一切食傷者加味二陳湯加味枳朮丸加味保和丸加減胃苓丸皆秘方也內傷諸方補中益氣湯加減法甘草炙五分人參升麻柴胡陳皮歸身酒白朮各三分黃耆勞役熱甚者一錢水煎如大汗大泄者津脫也急止之加五味子六枚炒黃柏五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進則再服瀉三里氣以三稜針出血汗不止者於三里穴下二寸上廉穴出血禁酒濕面以手捫之而肌表熱表熱也只服本湯一二服微汗則已非正發汗乃陰陽氣和自然汗出也若更煩亂加人參生陽氣陽旺則能生陰血更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩不止少加生地黃補腎水水旺而心火自除矣如周身有刺痛者皆血滯不足加歸身五分或一錢如精神短少加人參五分五味子二十枚如頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味頭痛有痰沉重倦怠者乃太陰厥頭痛加半夏五分生薑三分如耳鳴目黃頰頷腫頸肩臑肘臂外後臁痛面赤脈洪大者此手太陽丙小腸火病也用羌活一錢防風藁本各七分甘草五分以通其經血加黃芩黃連各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服如嗌痛頷腫脈洪大面赤者加黃芩甘草各三分桔梗七分如口乾嗌乾者加葛根五分升引胃氣上行以潤之如咳嗽者加五味子廿五枚麥冬五分冬加不去根節麻黃五分秋涼亦加春月天溫只加佛耳草款冬花各五分若久病痰嗽肺中伏火去參以防痰嗽增益也如食不下乃胸中胃上有寒或氣澀滯加青皮木香各三分陳皮五分此三味為定法冬加益智草蔻各五分夏少加芩連更加枳實草蔻砂仁白豆蔻各五分春初尤寒少加辛熱之劑補春氣之不足為風藥之佐益智草蔻可也如心下痞滿悶者加芍藥黃連各一錢痞而腹脹加枳實木香砂仁各三分厚朴七分天寒少加乾薑或中桂心下痞覺中寒者加附子黃連各一錢不能食而心下痞加生薑陳皮各一錢能食而心下痞加黃連五分枳實三分脈緩有痰而痞加半夏黃連各一錢脈弦四肢疼便難而心下痞加黃連五分柴胡七分甘草三分如腹中痛加白芍藥五分甘草三分惡寒覺冷痛加中桂五分夏月不惡寒不惡熱者加黃芩甘草各五分白芍一錢以治時熱也在寒涼時加半夏益智草蔻如腹中痛惡寒而脈弦者是木來剋土也以小建中湯主之蓋芍藥味酸於土中瀉木為君如脈沉細腹中痛是水來侮上以理中湯主之乾薑辛熱於土中瀉水為君如脈緩體重節疼腹脹自利水穀不化是濕勝以平胃散主之如脅下痛或脅下縮急俱加柴胡三分甚則五分甘草三分如臍下痛加蒸熟地黃五分如不已乃大寒也加中桂五分硃砂安神丸硃砂另研水飛為衣五錢淨黃連酒洗六錢當歸二錢半生地黃一錢半上為細末湯浸蒸餅為丸如黍米大硃砂為衣每十五或廿津液嚥下或酒水涼水下調中益氣湯夫脈弦洪緩而沉按之中指下時得一澀其症四肢怠惰及肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四時懶倦口失滋味腹難伸舒大小便清利而數或上飲下溲或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血見白膿胸滿短氣膈咽不通或痰嗽稠黏口中沃沫食入反出耳鳴耳聾目中溜火視物昏花胬肉紅絲熱壅頭目不得安臥嗜坐無力不思飲食黃耆一錢人參甘草蒼朮各五分柴胡升麻各三分木香一分橘皮腹中氣不轉運者更加三分水二盞煎一盞食遠待食消化帶熱服令心絕思藥必神效如時燥熱是下元陰火熏蒸發也加生地二分黃柏三分無此不必加如大便虛坐不得或大便了而不了腹中常逼迫血虛血滯也加歸身三分如身體沉重小便數多亦加茯苓黃柏各二分蒼朮一錢澤瀉五分如胃氣不和加湯泡半夏五分姜三片有嗽加生薑生地以製半夏之毒如痰厥頭痛非半夏不能除此足太陰脾所作也小建中湯脈弦腹中痛氣弱自汗或大便泄瀉桂心甘草炙各一錢半白芍三錢生薑一錢大棗一枚飴糖半合另入水煎如汗多不止加黃耆二錢以上四方脾胃本病藥也加減補中益氣湯治四肢發熱煩躁口苦咽乾喘嗽有痰白朮一錢黃耆人參各五分甘草白芍黃連桑白皮各二分痰喘去參加半夏生薑三黃白虎湯治心火亢甚乘於脾胃之位掌中熱目黃嗌乾渴而欲飲黃連一分黃柏生地各五分赤芍知母黃芩各三分甘草二分石膏五分淡竹葉七片水煎瀉陰火升陽湯治肌熱煩悶面赤食少右關脈或緩或數濕熱等症柴胡五分甘草炙黃耆蒼朮羌活各三分半升麻二分半人參黃芩各二分黃連一分半石膏少許秋冬不用食後服食藥之時宜減食宜羹食服藥後禁言一二時辰及酒面大料之類恐濕熱之物復助火邪而愈損元氣也以上三方治心之脾胃之藥升陽補氣湯治胃氣不足脾氣下溜氣短無力不時寒熱早飯罷轉增昏悶要眠臥怠惰四肢不收倦於動作及五心煩熱升麻羌活獨活防風白芍甘草炙澤瀉各三分厚朴制一分半柴胡八分生地五分姜三棗二食遠服內托黃耆柴胡湯治腿內近膝股生癰此足太陰厥陰之分脈細而弦按之洪緩有力黃耆加二錢柴胡一錢羌活五分土瓜根酒製一錢連翹一錢半中桂三分生地黃柏各二分當歸七分半水二酒一煎食前服胃風湯方見中風除風濕羌活湯治腰痛不可俯仰及四肢麻木羌活五分防風蒼朮酒洗黃耆各一錢獨活柴胡各五分升麻七分甘草炙川芎黃柏橘皮藁本各三分水煎食前服臍下痛加熟地黃五分其痛立止如不止大寒也加肉桂二分胸中氣滯加枳實三分脅下氣滯加青皮三分如氣促少氣者去之身有疼痛者濕重者亦濕加去桂五苓散一錢如風濕相搏一身盡痛用羌活防風藁本各五分升麻蒼朮各一錢勿用五苓散謂風藥已能勝濕故別作一服與之如風去勿再服以諸風之藥損人元氣而益其病故也以上四方治肝之脾胃病之藥參朮調中湯瀉熱補氣止嗽定喘黃耆四分人參甘草炙白茯苓各三分五味二十粒白朮三分麥冬地骨皮陳皮各二分桑白皮五分青皮一分水煎早飯後服忌多言語勞役升陽益胃湯治脾胃虛怠惰嗜臥四肢不收時值秋燥令行濕熱少退腿重節痛口乾舌乾飲食無味大便不調小便頻數食不消兼見肺病慘慘不樂面色惡而不和乃陽氣不伸故也此方主之羌活獨活防風各五分以秋旺故以辛溫瀉之柴胡白茯苓渴止不用白朮澤瀉各三分黃耆二分人參半夏甘草炙各二錢黃連一分陳皮四分白芍五分上㕮咀分作二劑服入薑棗水煎早飯後服如小便罷而病加劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也黃耆人參湯治脾胃虛弱遇夏天氣熱盛損傷元氣之病黃耆一錢自汗多更加一錢升麻六分人參橘皮麥冬蒼朮無汗更加五分白朮各五分黃柏酒洗神麯炒各五分歸身酒洗甘草炙各三分五味九枚水煎忌酒濕面大料熱物心下痞悶加黃連二分胃脘當心痛減大寒藥加草蔻仁炒五分脅下痛或縮急加柴胡二分頭中目中溜火加黃連二分川芎三分頭痛目不清利燥熱上壅加蔓荊子川芎各三分藁本生地各五分細辛一分氣短精神如夢寐之間困乏無力加五味子七枚大便澀滯隔一二日不見者致食少食不下此血少血中伏火而不得潤也加歸身生地麻子仁泥各五分桃仁三枚去皮尖另研大便行勿加若大便不快利勿用別藥少加大黃煨五分若又不利者非血結血秘而不通也熱則生風其病人必頭風症單血藥不可加之只於黃耆人參湯中加羌活防風各五分其大便必行矣一服便止胸中氣滯加青皮二分去白陳皮倍之去其邪氣此病本元氣不足當補不當瀉如氣滯太甚或補藥太過病人心下有憂滯鬱結之事加木香砂仁白豆蔻各三分腹痛不惡寒者加白芍藥五分黃芩二分卻減五味通氣防風湯治中風自汗肩背痛小便數而欠者柴胡升麻黃耆各一錢羌活防風橘皮人參甘草各五分藁本三分青皮黃柏各二分白豆蔻仁二分食後服氣盛者宜服面白色脫氣短者勿服以上四方治肺之脾胃病藥神聖復氣湯治氣乘冬足太陽寒氣足少陰腎水子能令母實手太陰脈實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻流濁涕不止或息肉不聞香臭咳嗽痰沫上熱如火下寒如冰頭腦作痛目中流火視物䀮䀮耳鳴耳聾頭並口鼻或惡風寒喜日太陽夜臥不安常覺痰塞膈咽不通口失味兩脅縮息而急牙齒動搖不能嚼物陰汗前陰冷行步欹側起居艱難掌中風寒麻痹大小便數而晝夜多頻而欠氣短喘渴少氣不足以息卒遺矢無度婦人白帶陰戶中痛牽心而痛面如赭色食少大便不調煩心霍亂逆氣裡急而所下色白後出餘氣復不能努或腸中鳴膝下筋急肩髀大痛此皆寒水來復火土之仇也乾薑炮二分半夏酒洗五分柴胡一錢藁本八分防風人參郁李仁另研各五分升麻七分附子炮二分歸身六分羌活一錢甘草八分白葵花去心五朵上十三味銼碎水五盞煎二盞再入黃耆一錢陳皮五分草豆蔻麵裹煨一錢三味在內同煎一盞另放黃柏酒浸枳殼生地各三分以上四味作一分浸細辛二分川芎三分蔓荊子三分以上三味作一分浸上後二分藥預一日各用新汲水半大盞浸一宿卻合作一盞與前煎成正藥合二大盞再上火煎至一大盞去渣空心服宜食肉湯不宜食肉恐助經絡中火邪也大抵腎與膀胱中有寒元氣不足者皆宜服之神驗於月生月滿時隔三日一服如病急不拘時分且又能治咬頰咬唇咬舌舌根強硬等症如神真武湯方見傷寒沉香溫胃丸治中焦氣弱脾胃受寒飲食不美氣不調和臟腑積冷心腹疼大便滑泄腹中雷鳴霍亂吐瀉手足厥逆大便利無度又治下焦陽虛臍腹冷痛沉香甘草炙當歸吳茱萸良薑人參木香白茯苓白朮芍藥各半兩附子炮小茴香炒巴戟酒浸乾薑炮各一兩官桂七分丁香三錢上為細末好醋煎麵糊丸梧桐子大每服五七十丸熟米飲空心下日二服忌一切生冷以上三方治腎之脾胃病之藥厚朴溫中湯治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作疼痛厚朴薑製陳皮各一兩茯苓草豆蔻甘草炙木香各半兩乾薑炮一錢上為粗末每五錢入姜煎食前服滋陰丸治夏熱厥逆其症氣上衝咽不得息而喘息有音不得臥酒黃連酒黃柏酒知母各等分上為細末熱湯丸梧桐子大每服二百丸白湯下空心服仍多飲熱湯服畢少時便以米飲食壓之使不令胃中停留直至下元以瀉衝脈之邪也升陽散火湯治四肢發熱肌熱筋痹熱骨髓中熱發熱如燎捫之烙手此病多因血虛得之內傷兼外感者宜此發之以代麻黃桂枝二湯也甘草二分炙草二分防風二分半升麻葛根獨活白芍羌活人參各五分柴胡八分水煎葛花解酲湯治飲食太過嘔吐痰涎心神煩亂胸膈痞塞手足搖飲食減少小便不利蓮花青皮三分木香五分橘皮人參豬苓白茯苓各一錢半神麯炒黃色乾生薑澤瀉白朮各二錢葛花砂仁白豆蔻仁各五分上為極細末每服三錢白湯下但得微汗酒病去矣此蓋不得已而用之豈可恃賴日日飲酒此方氣味辛辣偶因酒病服之則不損元氣敵酒病也十棗湯治好飲酒胸脅痛者此停飲也芫花醋炒焦二錢半大棗十枚水一盞煎半盞空心肪下清水痛止東垣除濕散方見後五苓散治煩渴飲水過多或食即吐胸中痞滿小便不利方見傷寒寬中進食丸滋形氣美飲食枳實炒神麯炒各四錢木香五分半夏洗七錢人參甘草炙青皮豬苓乾生薑各一錢陳皮白茯苓澤瀉白朮各二錢砂仁一錢半大麥芽炒一兩草豆蔻仁麵裹煨五錢湯浸蒸餅丸桐子大每服三四十丸米湯下參苓白朮散脾胃虛弱飲食不進或嘔吐泄瀉大病後補助脾胃治痢尤妙人參白朮茯苓白扁豆去殼薑汁浸炒山藥各一兩半甘草桔梗薏苡仁蓮肉各一兩上為末每服二錢棗湯下一方有砂仁一兩或用神麯糊丸米飲下痢疾加木香半兩用石蓮子肉為末砂糖調下禁口痢加石菖蒲一兩陳粳米湯下養脾丸養脾進食調理衛氣和暢榮衛兼治肌困傷力者人參麥芽炒神麯炒歸身各七分白朮一兩半蒼朮制陳皮厚朴薑汁炒蓮肉白茯苓山藥各一兩砂仁八錢炙草半兩木香一錢半上十四味各製取末和勻用粳米粉荷葉浸水煮糊為丸如小豆大每服五七十米飲下香砂養胃湯理脾胃進飲食逐寒邪止嘔吐兼治傷冷物陳皮半夏洗厚朴姜炒藿香葉蒼朮炒砂仁各五分甘草炙三分人參四分白茯苓七分水薑棗引此二陳平胃湯加減也以上四方皆補益之劑脾胃強則自消食矣易老枳朮丸治痞消食強胃枳實麩炒一兩白朮二兩上為細末荷葉裹粳米煮爛搗為丸梧桐子大每五十丸多用白湯下按用術本意不取其食速化但久令人胃氣強食不復傷也東垣橘皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞滿即前枳朮丸加陳皮一兩此以下皆東垣立內傷用藥之大法所貴服也曲糵枳朮丸為人所勉強食之以致心腹滿悶不快即前枳朮丸內加炒神麯炒麥芽一兩木香枳朮丸治人有憂思食不消化此藥破滯氣消飲食前枳朮丸內加木香一兩半夏枳朮丸治因冷物內傷即前枳朮丸加半夏湯洗焙一兩木香人參乾薑枳朮丸治傷冷物開胃進食即前枳朮丸內加木香三錢半人參三錢半橘皮四錢乾薑炮一錢半除濕益氣丸治傷濕面心腹痞悶肢體沉重枳實麩炒白朮黃芩各一兩蘿蔔子炒半兩神麯炒一兩紅花三錢上為細末如上法為丸綠豆大每五六十丸白湯下白朮丸治傷豆粉濕面油膩之物白朮半夏湯洗神麯炒枳實炒各三兩陳皮七錢枯白礬三錢上為細末湯浸蒸餅丸綠豆大每五十丸白湯下素食者多用生薑胡椒故加黃芩以瀉之橘半枳朮丸消痰飲治痞悶進食健脾枳實炒二兩白朮四兩陳皮半夏洗各一兩上為末用荷葉煮水攤冷去葉打粳米粉作糊丸米飲下五十丸家傳加味枳朮丸補益脾胃消積進食白朮二兩枳實炒陳皮蒼朮制炒香附神麯炒各一兩砂仁五錢上為末如法荷葉煮米糊丸氣虛者加人參五錢丹溪保和丸治一切飲食所傷胸腹飽悶不安或腹中有食積癖塊多服日漸消散脾胃虛者勿服耗元氣也山楂肉五兩神麯炒半夏洗各三兩陳皮去白白茯苓甘草炒連翹麥芽各一兩上為細末生神麯五兩以上薑汁一小盞煮糊丸如梧桐子大白湯下三五十丸清米飲亦可或加白朮二兩名大安丸健脾胃消食積最妙加味保和丸消痰利氣扶脾胃進飲食山楂神麯炒半夏洗茯苓各三兩白朮五兩香附酒浸厚朴薑汁炒蘿蔔子炒陳皮連翹各二兩蒼朮制炒枳實麩炒淨黃連酒炒黃芩酒炒各二兩為細末薑汁煮蒸餅丸梧桐子大每五十丸食後白湯下丹溪加味二陳湯消痰補脾消食行氣橘紅茯苓各七分甘草炙三分砂仁五分川芎二術各八分半夏洗香附各一錢山楂肉一錢半神麯炒另研七分麥芽麵炒另研五分上除曲芽二末另包餘十味㕮咀水二盅生薑三片棗一枚煎一盅入曲芽末調服家傳加味胃苓丸導飲消食蒼朮制厚朴薑製陳皮白朮豬苓澤瀉香附酒浸炒神麯炒白茯苓各等分炙草減半上末荷葉煮粳米糊丸米飲下以上十四方皆消導之劑東垣三黃枳朮丸治傷肉食濕面辛辣味厚之物填塞胸腹不安黃芩二兩大黃煨神麯炒淨黃連白朮橘皮各一兩枳實炒半兩上為末湯浸蒸餅丸如綠豆大每五十丸白湯下枳實導滯丸治傷濕熱之物不得施化痞悶不安茯苓黃芩白朮黃連各三錢澤瀉二錢大黃一兩枳實炒神麯炒各五錢枳實梔子大黃湯治大病瘥後傷食方見傷寒三稜消積丸治傷生冷硬物不能消化心腹痞悶丁皮益智各三錢陳皮青皮各五錢茴香炒巴豆肉和米炒去米各五錢神麯炒莪朮炮三稜炮各七錢醋糊丸桐子大每十丸至二十食前溫薑湯下備急大黃丸治傷食冷熱不調及心腹諸卒暴痛百病大黃乾薑巴豆肉去皮各一兩上須精擇好藥搗為細末煉蜜丸更搗一千杵為丸如小豆大每三丸大小量之若中惡寒忤心腹脹滿卒痛如刀錐所刺氣急口噤卒死者以冷水苦酒服之須臾未差更與三丸以腹中鳴轉即吐下便愈忌蘆筍豬肉冷水肥膩木香檳榔丸治一切熱積快口寬腸下積利氣黑醜生取頭末二兩大黃三兩木香檳榔淨黃連陳皮枳殼炒莪朮炮黃柏去皮青皮香附各一兩細末水丸桐子大每五十薑湯下秘傳丁香脾積丸治一切冷積丁香去苞木香良薑醋炒各半兩莪朮煨三稜煨青皮各一兩皂莢三大挺燒存性巴豆肉四十丸另研上為細末百草霜三錢同研入巴豆泥同研和勻醋糊丸如小豆大每服二三十丸白湯下如傷食以溯源湯下經驗溯源湯先問曾傷食何物所傷即以所食之物取生韭菜連根葉相停同處作丸放炭火中燒存性研細煎湯下脾積丸子所傷之物即下吐法凡有宿食在胸膈者必須吐之食去即安或自以手指探吐或以鹽湯探吐或以蘿蔔子半盞擂碎以漿水去渣飲之以鵝翎探喉皆妙法也以上八方皆攻取之劑東垣除濕散治傷馬乳並牛乳羊酪水一切冷病神麯炒一兩半夏洗乾薑各二錢甘草炙紅花各一錢茯苓七錢澤瀉車前子炒各半兩上為細末每服三錢白湯食前服附食料養脾法虛弱之人常宜服之綠豆炒二升白扁豆炒二升大黃豆水漬待生作卷曬乾用一升糯米炒一升五合粳米炒一升五合蓮肉二兩大山藥二兩白朮三兩薏苡二兩上如法制磨取和石蜜每日食前用生薑大棗湯調服五錢或以白砂蜜作糕食之空心棗湯下
