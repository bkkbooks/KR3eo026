body:
  text: 卷之三十五醫案略肖敬吾嘉靖丙午科舉人庚戍冬得風疾請醫治之未盡辛亥春右肩膊掣動唇吻隨動請予診之脈浮緩而澀予曰此風邪在太陰經也太陰肺經脈浮而澀肩膊動者肺病也足太陰脾之脈緩唇動者脾病也主方以黃耆蜜炙白芍藥酒炒甘草炙作大劑服之敬吾乃問何以不用治痰治風之藥予曰此奇方之大者緩則治其本也蓋風傷衛肺者衛氣之主也黃耆之甘溫以補肺芍藥味酸曲直作酸酸者甲也甘草味甘稼穡作甘甘者己也甲己化土所以補脾經曰諸風振掉皆屬肝木肝苦急食甘以緩之用甘草肝欲收酸以收之用白芍藥敬吾聞之喜守法調理至夏四月而安黃州府管糧通判胡嘉靖壬子冬署掌羅田縣印素嗜酒十一月望日文廟行香暴得風疾口唇牽動言語蹇澀召予治之診其脈弦緊而滑予告之曰此得之脾虛有痰因寒乃發也公不能言乃索筆書曰我平昔少食但喜飲酒予用二陳湯改半夏為南星加白朮天麻防風一劑而定口能言矣時士夫有薦醫張鵬者倡為酒痰之說欲加瓜蔞予阻之曰瓜蔞性寒脾惡寒方今隆冬用寒遠寒瓜蔞不可加也張弗從予以告公曰服此湯前病若再作勿罪不先說也公亦弗聽延至十七日進藥少頃病果復作更甚公怒以手指全命急治之予曰寒痰正盛非吐不可公索筆書曰此劫法也不可妄用以求霸功予告曰諸風振掉皆屬肝木木鬱達之吐也公首肯之予用二陳加桔梗作湯先以軟帕勒公之腹服湯後以鵝翎探吐之吐去稠痰三碗許其病始定公能言責鵬令去專任全矣予用六君子湯加黃耆桂調理至十二月朔復出治事一婦人年四十餘形黑而瘠性躁急嘉靖庚申五月左腿發內癰潰後起坐予曰瘡口未合當禁風其婦自恃強健不聽忽一日眩僕目劄口喎身反張手足攣曲其家人請予治之予曰此破傷風痓病也乃用桂枝湯加熟附子黃耆防風一劑而病減再服十全大補湯三劑而安嘉靖辛酉年二月朔後大雪平地尺余一婦人病至十三日其家人來求藥告以病狀初頭苦痛至今十日昏睡不醒喉中痰響手足俱冷其身僵直予思此婦人元氣素弱必因遠行而得問之果於初三日冒雪往親戚家歸即病也予曰此寒初中足少陰厥陰二經也默默喜睡者足少陰腎病也頭苦痛厥逆僵直痰響者厥陰肝者也乃以十全大補湯去地黃芍藥加細辛半夏乾薑與三劑去五日後來求謝曰病安矣本縣知縣唐肖峰嘉靖丙寅年二月丁祭後得傷寒醫進九味羌活湯不效又云內傷挾外感進補中益氣湯不效又進柴苓湯去人參其病略減四日復發熱頭苦痛醫欲下之未決始召全治診其脈洪長而弦全告曰公元氣素虛因起太早感寒得之今病在陽明少陽也乃並病也乍熱乍涼者少陽也頭苦痛者陽明也宜服小柴胡合葛根蔥白湯公曰吾平生多痰火病勿用人參全告曰公元氣不足乃虛火也實火宜瀉虛火宜補公勿疑願呈結狀公雖強從心尚恐也一劑而病愈公乃與全斟酌服餌之方公曰吾平日服四物湯加黃柏知母滋陰降火之藥參耆不敢犯也汝當議處一方來全曰病有虛實以脈察之藥有補瀉以脈主之診公之脈弦滑而弱弦者肝脈也公性急躁肝火太旺乃龍雷之火遇木而燔遇水而熾遇金石而銷非若人火可以水滅也經云肝苦急急食甘以緩之又云甘能瀉火故非人參黃耆甘草之甘溫不能制也脈滑為痰弱為虛只因中氣之虛氣不歸元血不歸經氣失其平則為火血失所歸則為痰此公之病源也呈進一方以人參黃耆甘草為主補元氣而瀉火陳皮去白白茯苓以行氣利痰麥門冬以清肺平肝少加黃柏知母以滋腎水使一水可以勝二火也公喜從之在縣三年只服此方嘗笑謂全曰吾當時怕用人參常病痰火今服過人參二斤余矣痰火俱無汝之力也本縣縣丞李天泉嘉靖壬子管造黃冊六月中暑腹痛公有婢妾醫謂病寒進理中湯一劑腹痛止又發熱一身骨節盡痛醫又進十神湯發汗後熱退身不痛矣全適往縣問安公稱病愈全觀其面色帶赤知病未解請診其脈洪滑而數經曰大則病進今發汗後脈猶洪數知病方進公自稱愈未敢言病全退未食頃而病作矣滿腹急痛狀如奔豚上下左右眾手按摩急召全至公大呼曰汝先診脈不言而去知我病也吾在千里之外一介之命懸汝之手幸急救我全告曰無傷乃進建中湯一服而痛定公熟睡越宿方醒公呼全號幸留調理勿亟歸也其日止藥次日又省祭官萬樸善醫來問公疾診脈時且駭且顧公亦疑懼予乃診之謂樸汝怪其脈之促止乎公之心下怔忡故脈如是公即應曰我心下跳亂不寧即命取藥予制一方用人參麥門冬甘草白芍藥生地黃五味獖豬心煮湯煎只一服而心不跳促脈不見矣公曰何其神也全曰心惡熱用熱遠熱向服理中十神皆犯時禁故病復作也樸亦心服公謝帖云吾病正亟煩子調治若燎原之火而沃以清冷之泉信乎醫出於儒令人敬服蘄水縣監生李少華知醫隆慶二年六月得暑病用醫王嘉桂相議服九味羌活湯一劑汗出不解謂藥劑小發汗不透復作大劑服之汗大泄而熱轉甚連進三劑病益亟如癡如狂舌強言語蹇澀手足掣動小便不利莖中痛呻吟以手捏之才下一二滴不能食惟飲水請予往治診其脈微弱而遲人問曰病可治否予曰壞病也人問曰壞病難治予曰醫之過也蓋心惡熱壯火食氣方今盛暑火氣正壯雖云發表不遠熱豈可重發其汗乎心主汗汗之過多則傷心也心藏神如狂如癡者神亂也舌內應乎心汗多則血虛不能榮於舌故舌強不能言也手足掣動者汗多故筋惕肉瞤也渴飲水者汗多津液涸也小便不利者心移熱於小腸小腸移熱於膀胱膀胱者州都之官津液藏焉氣化則能出矣今汗太過則津液少壯火食氣則氣不化故莖中痛而溺不得出也乃制一方用人參以補元氣當歸身生地黃以養心血麥門冬助人參以利竅使溺得行助生地黃以入心安神熟甘草以瀉火止惕生甘草梢以去莖中之痛連服五劑而安本縣監生汪懷江隆慶元年五月中暑復傷食一醫用五積散發其汗熱轉甚又一醫用大柴胡湯以下之熱既不退利又不止且後重請予往治診其脈浮滑而數視其證喜裸體而臥膚燥無汗兩足冷予曰前醫汗之誤汗不出而反增內熱後醫下之輕下未盡而利為挾熱急則治其標乃用黃芩芍藥甘草作湯一服而自利止復診其脈浮滑而數未改也予謂人曰此病屬陽明原無汗證因誤汗而成可汗之證原有下法因輕下而立再下之法或問其故予曰方今盛夏氣熱乃用五積散燥熱之劑陽氣外散陰津內竭陽強陰弱故皮膚乾燥而無汗也當先養其陰以制其陽使陰陽和汗出而表和也然後攻去陳莝以復其陰以制其陽邪去而里和也遂以涼膈散去大黃芒硝加知母石膏淡豉竹葉一服微汗而身潤矣方議下之又請醫至稱是陰虛火動不可下也用四物湯加炒乾姜觸動陽明之火齒縫血出足益冷成陽厥也乃從吾言作涼膈散服之利三行而病痊縣學生員胡應龍嘉靖丙辰年五月初患熱病請萬小竹治之良醫也半月未愈予往問之乃業師胡柳溪之後見其身側向左臥不敢轉動其父近東責其不能調理而病反復也予診其脈弦數知病未退非犯禁忌也次日鼻衄出予密問應龍應龍答曰我病亦向未退或三日或四日則鼻中血出其熱暫退又發熱也我左脅刺痛故側臥不敢動耳我父只聽小竹之言責我不會調理無可奈何死生命也吾思脈弦而數病在厥陰脅痛者足厥陰肝病也鼻衄者手厥陰包絡病也經曰太陽病衄者解病在表也今病熱不以衄解者病在裡也時衄未止小竹用熨法予止之取出梔子一個婦人發同燒存性研末竹管吹入鼻中衄止即乃議治其脅痛小竹主小柴胡湯加枳殼桔梗予曰不如以當歸龍薈丸方作湯飲小竹曰甚妙一劑而脅痛止能轉動矣應龍稱謝曰我側臥不能動今八日矣予再診其脈弦去而浮數予曰當以汗解小竹曰衄家不可發汗予不應近東心服吾之治有法密問吾曰誠可汗否予曰此法在仲景傷寒正理論中而推廣之不與人言也仲景曰病人臟無他病時發熱自汗出而不愈者此衛氣不和也宜桂枝湯主之詳味仲景之意今發熱自衄而不愈者此榮氣不和也夫榮行脈中榮者陰也衛行脈外衛者陽也衛氣不共榮氣諧和則當用桂枝湯以治其陽榮氣不共衛氣和諧則當用黃連解毒湯合白虎湯以治其陰使榮衛和則愈也乃以解毒湯白虎湯二方相合作湯飲之先告曰當以戰汗解勿驚也連進二劑果得戰汗而愈本縣致仕縣丞黃鳳山嘉靖丙午年二月得傷寒病先請省祭官萬黃崖治之良醫也病愈請予治其子病黃崖在座予視鳳山面色猶慘而不明潤謂之曰兄疾未盡也鳳山忙應曰請治吾兒若吾安矣予再謂之曰明日請診之鳳山曰諾次日先請予至診其脈右手氣口脈大且虛兩尺時見一動脈予曰兄之臍下夜至醜寅時有動氣作痛乎鳳山吐舌半餉曰果有之予曰此龍雷之火動於兩腎至陰之中而欲發也當早治之黃崖至診其脈曰平和無病鳳山以予之言中彼之病告之黃崖固執曰病安矣不必多疑予遂辭去至四月病作矣似瘧非瘧食少病漸進五月大發熱口乾舌燥頭苦痛先請黃崖治無效復請予治予謂黃崖曰此內傷病也宜用補中益氣湯為主隨證加減治之先於本方內加炒黃柏知母麥門冬連進五劑口舌滋潤熱少減但頭痛不止本方改白朮為蒼朮加川芎蔓荊子細辛黃柏酒炒一服而減三服而頭痛止復用前方再加五味子服十餘劑予診其脈曰病將退矣當作冒汗鳳山曰昔病已退謂吾有病今病未退謂當退何也予曰以脈知之昔謂有病既驗今謂病將退當信也但冒汗可怖予先說破安爾家人心後作眩暈面黑口噤目閉僵臥手足強硬逆冷六脈俱絕家人謂其死皇皇無計予止之曰此佳兆也須臾大汗出而病愈本縣平湖鄉耆老嘉靖甲辰年二月病傷寒請予治之診其脈弦滑而數問其病發熱頭眩口渴予曰病似兩感無惡寒證乃酒傷寒也答曰果因酒後受寒乃作葛花解酲湯一劑得微汗而稍安過三日後兩脅痛如刀刺亟請予連呼救我畏死之心可哀也請診其脈全曰不必診也此是酒病未盡耳蓋酒性熱而有毒乃無形之氣也其體則水乃有形之物也向得微汗其氣已散其體猶存兩脅刺痛乃停飲也取芫花二兩醋炒焦黑大棗十枚水一盞煎服只一服利下清水而愈陰陽胡松山次子胡龍嘉靖丁未年六月病熱請予與萬小竹同治身壯熱自汗出大渴喜裸體診其脈弦大而虛予制一方小柴胡湯內摘柴胡人參白虎湯內摘知母甘草梔子豉湯內摘淡豆豉共五味子淡竹葉作名三合湯小竹喜曰此方甚妙服一劑而病愈縣學生員董西麓一子十七歲嘉靖乙丑年三月病傷寒請予治診其脈浮大無力問其證無惡寒頭痛但身熱口渴四肢倦怠予曰似白虎湯證而脈虛乃飢渴勞力得之黃耆炙當歸酒洗各一兩作湯服之而愈蘄水縣李養晦乃致仕知縣李桂西侄也嘉靖癸丑年二月患傷寒桂西素習陶節庵書與王醫洪醫同治病者苦右脅痛用節庵法小柴胡湯加枳殼桔梗服之無效病十六日請予往治診其脈沉弦且急予曰經云沉弦水蓄支飲急弦必飲水過多得之乃蓄水證也間曰曾服何方桂西曰向服小柴胡加枳梗不效予曰只用此方再加牡蠣以泄其蓄水也只一服而痛止桂西歎服洪王二醫曰誠不及也本縣生員胡晏乃三溪乳父也年五十嘉靖壬寅四月病傷寒十六日不解其證乍寒時即以衣被厚覆矇頭而臥不勝其寒乍熱時即徹去其衣被裸露其身更用扇不勝其熱一日一夜如此十餘次請醫張勝霄萬小竹皆謂不識其證三溪自知醫亦云不識相議云萬密齋看得書多何不請來治之即遣人請予至語其病狀可怪待診其脈予曰不必診脈此易知也夫惡寒病在表也何以無頭痛證惡熱病在裡也何以無煩渴便溺不利證此病在半表半裡陰陽混亂也故陰氣乘陽則惡寒陽氣乘陰則惡熱宜用小柴胡湯以治其半表半裡之邪梔子豆豉以治其陰陽錯雜之邪三溪顧二醫曰此論是也即合藥服之其日寒熱不再作而愈撫治鄖陽等處右僉都御史孫隆慶元年先任湖廣右布政使八月該入場考試語全曰吾嘗提督陝西學政時因閱考卷得目疾但看招多時則眼珠脹痛今入場如何則可汝用方來全奉命以八珍湯為主去白朮川芎用人參白茯苓甘草炙當歸酒洗白芍藥酒炒生地黃酒洗加麥門冬五味子柏子仁酸棗仁黃連炒減半共十一味呈上公曰何不用菊花蔓荊子全告凡目疾有外生者有內生者由受風熱得之為外生則宜發散故用菊花蔓荊子防風之類所謂火鬱則發之也由久視傷血得之為內生宜以養血為主所謂目得血而能視也公聞之喜及出場語全曰所主方甚妙吾在場中日服一劑雖晝夜看卷目不脹痛亦不生眵淚也遂記錄之本縣致仕州判汪城南內子胡嘉靖癸亥年五十歲八月病傷寒十餘日不大便腹中微痛口乾心煩不得臥請予治之診其脈遲而微弱予曰經云脈遲尚未可攻雖有下症無下脈也乃以小承氣湯去大黃加梔子仁作大劑一服微溏而安廣東高要縣知縣陳瑞野隆慶二年正月朝覲在京都一門子病傷寒其縣典史知醫與之發汗七日後不愈小腹滿痛而呻不敢下時予同本縣知縣唐肖峰在京請治之診其脈兩尺沉弦而急問曰曾渴飲水乎其人答曰甚渴雖飲水渴不止予曰此蓄水似疝證誠不可下乃以五苓散以利其水加川楝子小茴香以止小腹之痛一服其夜洞泄四五行皆清水次日又求治予曰不必再藥水盡泄自止三日後果安蘄水縣庠生李雙溪予親家也隆慶戊辰年五月病熱十七日神昏睡不寧口中喃喃言微氣短大便不通十三日矣有王醫者欲補不可欲攻不敢亟請予治予曰此內傷似外感證也可補不可攻不攻則三焦之氣不行邪熱內甚故神昏且煩多言少氣也乃用補中益氣湯以補其正氣之虛作豬膽汁導法以通其邪氣之實取下結糞如羊矢者二三十枚服補中益氣湯二十帖而安蘄水縣陳正夫予母舅也嘉靖戊申年十月病傷寒九日後胸中痞脹小便少大便不通予聞往問疾時麻城一醫彭姓者在作大柴胡湯下之予察脈證不可下乃內傷病中氣不運故上竅閉而下竅不通也丹溪云二陳湯加蒼朮白朮升麻柴胡則大便潤而小便長與之一服而安英山縣沈天祿嘉靖癸卯年三月病傷寒先請鄭斗門治名醫也汗下後病不解身無大熱不惺惺人來問者但云譫語以餘論之乃錯語也若作知母麻黃湯證非差後昏沉也乃汗下之後元氣未復神識不清可與補中益氣湯去升麻柴胡加麥門冬生地黃熟附子一服而愈斗門嘆曰名下無虛士如此益信鄖陽巡撫孫淮海公嘗有怔忡䐜脹之疾作召全至診之曰臺下脈浮弦滑而急肓之上中有父母又曰上焦如霧蓋血為陰故稱母心肺居鬲肓之上至高處覆冒各臟滋養百脈如彼清霧潤肺太過則傷心血血既虧損真陰不足不能下交於腎此怔忡之疾所由作也全聞臺下曾患肺癰不能宣布諸氣通調水道經曰諸氣膹郁皆屬於肺在上則生䐜脹之疾所由作也故脈浮弦為虛為脹滑為數為火為怔忡考諸經文參以脈候立方用人參知母以養肺之陽當歸麥門冬以養心之陰五味子酸棗仁之酸以收怔忡枳殼桔梗之苦辛以開結消脹黃連山梔仁之苦以降浮散之火而止怔忡以瀉否塞之氣而去䐜脹柏子仁之辛黃柏之苦以滋腎中之陰上交於心炙甘草之甘溫以和合陰陽均調升降則怔忡可止䐜脹可消矣公覽之大悅即取藥制丸
