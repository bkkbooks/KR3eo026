body:
  text: 卷之七氣病人身個個有真陽善養真陽身自強氣失其平生百病猶如烈火毀昆岡人受天地之氣以生曰元氣曰穀氣曰衛氣元氣者腎中之陽也三十六難云命門者諸神精之所舍原氣之所繫男子以藏精女子以系胞者是也若男女交接不時施泄無度則元氣傷矣穀氣者胃中之陽也三十難云人受氣於谷谷入於胃傳與五臟六腑又名胃氣所謂人以胃氣為本者是也若飲食不節起居不時則穀氣傷矣衛氣者周流遊行於身中之陽氣也一難云人一日一夜一萬三千五百息脈行五十度於身晝行陽二十五度夜行陰二十五度者是也故一息不運則機緘窮一毫不續則霄壤判若有風寒暑濕飢飽勞佚之傷則不運不續百病之生自此始也氣在身中豈作邪只因失養一毫差七情內動多傷正四氣乘虛賊入家當其和平之時外護其表復行於里周流一身循環無端出入升降動而有常原出中焦總統於肺曷常病於人也及其七情之交攻五志之間發乖戾失常內不能守外不能衛清濁既混營運漸衰風寒暑濕之邪乘虛而入為生病者是皆邪氣甚而正氣乃病焉七情者謂喜怒憂思悲驚恐可以同論而五志盡之矣四氣者謂風寒暑濕也然風暑屬熱寒濕屬寒而寒熱二氣足以盡之故合上五志寒熱喜怒憂思恐又謂之七氣者是也古人雖有治七情之法未有論其有餘不足及難易之分蓋喜樂恐驚耗散正氣乃不足之症怒憂悲思鬱結邪氣乃有餘之症也五志之變病生於內四氣之變病生於外外常有餘邪氣實也內常不足正氣虛也五志之中喜者少病百脈舒和故也惟怒而氣逆恐而氣奪以至勞而氣耗者為難治也九氣傷人病不同子和至治妙無窮不離所勝相平法用藥權衡在此中經曰百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同也肝之志為怒怒則傷肝悲勝怒心之志為喜喜傷心恐勝喜脾之志為思思則傷脾怒勝思肺之志為憂憂傷肺喜勝憂腎之志為恐恐傷腎思勝恐故曰當更相平者謂以五行相傷之理平之也故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以迫遽死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼忘此之言奪之凡此五者必詭詐譎怪無所不至然後可以動人之耳目易人之視聽若胸中無材器之人亦不能以此五法也此上皆子和論至於治法高者抑之下者舉之寒者熱之熱者寒之驚者平之勞者溫之結者散之緩者收之詳見下文子和云怒氣所至為嘔血為飧泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消疸為肥氣為目暴盲耳暴閉筋縱發於外為疽癰此皆肝病乃怒則氣上之症法宜降之所謂高者抑之也各隨其症治之如胸滿喘促宜蘇子降氣湯喜氣所至為笑不休為毛革焦為肉痛為陽氣不收甚則為狂此言心病喜則氣緩也心苦緩急食酸以收之各隨其症治之假如陽氣不收汗太多者宜黃耆建中湯見內傷悲氣所至為陰縮為筋攣為肌痹為脈痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能舒息為泣則臂麻此皆肺病乃悲則氣消之症法宜補之虛則補其母以參朮調中湯更各隨其症加減治之方見內傷恐氣所至為破䐃脫肉為骨痠痿厥為暴下緑水膽破也為面熱膚急為陰痿為懼而脫頤此皆腎病乃恐則氣下之症法宜用風藥以升提之所謂下者舉之也各隨其症治之如骨痠痿厥宜羌活續命湯驚氣所至為潮涎為目睘為口呿為癡癇為不肖人為僵仆久則為痿痹此心病也錢氏云心主驚乃驚則氣亂之症法宜安神妙香散主之昔人有擊拍門窗使其聲不絶以治因驚而畏響魂氣飛揚者所謂驚者平之也因其不意而急然遇之則驚如使習見習聞則不驚矣勞氣所至為咽嗌病為喘促為嗽血為腰痛骨痿為肺鳴為高骨壞為陰痿為唾血為冥視男為少精女為不月衰甚則憒憒乎若壞都汨汨乎不可止此皆脾病勞則傷脾乃勞則氣耗之症治宜溫補之劑所謂勞者溫之也宜補中益氣湯各隨其症加減治之思氣所至為不眠為嗜臥為昏瞀為中痞為三焦閉塞為咽嗌不利為膽疸嘔苦為筋痿為白淫為便後無氣則恰然如衰此皆脾病乃思則氣結之症法宜散之乃結者散之也視其虛實治之虛則補中益氣湯加減治之實則木香檳榔丸熱氣所至為喘嘔吐酸暴吐下迫小便渾濁淋閉血溢血泄身熱而渴自汗心煩不得眠此皆熱則氣泄之症也熱則寒之各隨其症治之如壯熱渴飲水脈洪大而強者宜人參白虎湯方見傷寒門寒氣所至為上下所出水液澄徹清冷下利清白吐利腥穢食已不飢堅痞腹滿急痛癥瘕㿗疝屈伸不便厥逆禁固此皆寒則氣收之症也法宜寒則熱之各隨其症治之如厥逆禁固病在表也宜麻黃附子細辛湯如上下所出水液清冷病在裡也宜附子理中湯方見傷寒門七情為病發於心治得心平氣自平誰謂氣家無補法齊東野語誤斯民難經云憂愁思慮則傷心凡見喜怒悲恐思之症皆以平心為主蓋心為火臟河間先生謂五志過極皆為火也乃發前人未發之意又如勞者傷於動動便是火驚者駭於心心便屬火二者亦以平心為主理宜卻厚味斷妄想省言語茯苓補心湯半夏瀉心湯主之方見傷寒門丹溪云氣無補法此俗論也如喜樂恐驚耗散正氣怒憂悲思鬱結邪氣結者行之散者益之此治七情之大法也假如七情之傷陰陽不得升降氣道壅滯痰涎結聚心腹痞痛不能飲食者此不可補宜分寒熱以和劑三因七氣湯主之如傷七情又傷飲食以致心腹痞脹不思飲食者輕則木香枳朮丸重則木香檳榔丸方見內傷門假如七情內傷四氣外侵飲食不節房勞致虛脾土之陰受傷轉運之官失職胃雖受谷不能運化為痞為脹者不可不補養之也宜調中益氣湯白朮和胃丸主之假如胸膈痞悶此肺病也經云上焦如霧肺之位也肺乃氤氳清虛之象若霧露然聚而不散則為腹脹故曰諸氣膹郁皆屬於肺謂降令不行也宜紫沉通氣湯蘇子降氣湯分氣紫蘇湯氣為火病術昏昏藥用辛香燥熱群偏信高陽冷生氣不知壯火食元神人身之中內行於臟腑外行於經絡升降往來者氣也經云遊行乎其間者火也氣即是火火即是氣初無二理自其流行而言則謂之氣自其變動而言則謂之火曰氣曰火始分為二故曰少火生氣壯火食氣又曰火者元氣之賊皆因其變動之稱也或因氣動而病生於內者或因氣動而病生於外者或不因氣動而病生於內者或不因氣動而病生於外者各當詳其所受之因有內外之殊隨症主治有寒熱補瀉之別可也俗醫偏信高陽生冷生氣之謬談純用辛香燥熱之藥群聚為治氣病之方蓋不知辛香燥熱之藥皆壯火之劑辛香散氣燥熱傷人真氣耗散所謂壯火食氣者此也丹溪先生論局方用熱藥治諸氣之誤其說甚詳習俗已久相沿而化終莫有能喻者矣然辛香燥熱之劑但可劫滯氣取快於一時以其氣久抑鬱藉此暫行開發之意久而服之乃以火濟火其不夭人性命者幾希堪笑時師用局方指迷七氣作尋常不知五志當分治脈症相參貴審祥時師偏執局方氣作冷治類辛香燥熱之劑稱為祕方傳習通行且言指迷七氣湯製作者其用青皮莪朮官桂益智香附藿香桔梗甘草遂為平和常用通治七情所傷混同一意其餘諸方尤有甚焉者宜以諸藥利害言之枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣木香之行中下焦氣沉香之行滯降真氣香附之快滯氣陳皮之瀉逆氣紫蘇之散表氣厚朴之瀉胃氣檳榔之瀉至高之氣藿香之馨香上行胃氣腦麝之散真氣若此之類姑勿論其助火之害氣實者服之可散可泄正氣虛者寧不反傷其氣乎此局方之不可執也今七情傷氣鬱結不舒痞悶壅滯發為諸病當詳所起之因發於何臟或有餘或不足以脈症辨之隨病用藥庶為得之經曰心藏神神有餘則笑不休神不足則悲因喜傷心喜則氣緩如有餘以珍珠散瀉之不足以生脈散補之方見暑門肝藏血血有餘則怒血不足則恐因怒傷肝怒則氣上如嘔血為有餘則以當歸承氣湯加桃仁瀉之不足以溫膽湯補之脾藏肉而成形形有餘則腹脹大小便不利形不足則四肢不用因思傷脾思則氣結有餘以大承氣湯瀉之不足以調中益氣湯補之善忘以歸脾湯主之肺藏氣氣有餘則喘咳上氣氣不足則利息少氣肺主悲悲則氣消有餘以分氣紫蘇飲瀉之不足以瑞竹堂補氣湯補之腎藏志有餘則腹脹飧泄不足則厥因恐傷腎恐則氣亦有餘為飧泄者氣下陷也以東垣升陽除濕湯補之下者舉之也不足則厥厥者謂逆行上衝也足少陰腎經之脈下行今腎不足故隨衝脈逆行而上衝也所謂逆厥上行滿脈去形者是也宜丹溪左金丸主之脈理玄要云下手脈沉便知是氣沉極則伏澀弱難治故沉而數者心病也沉而弦者肝病也沉而緩者脾病也沉而短者肺病也沉而細者腎病也沉而滑者痰也氣為諸病亦多門隨症還從本病行尋火尋痰施法術莫使新久一般論氣之為病亦多矣各隨其證於本病門求之氣之從火前言已盡氣之從痰其說有二或因七氣鬱結氣滯生涎聚為痰飲或因素有痰飲氣滯不行故治諸氣者不治其火則氣不降不治其痰則氣不行氣火痰湊合而為病則卒暴眩僕為氣中矣然病有新久治有緩急新病之人當用升發消導之劑以二陳湯為主各隨其症加減治之所謂急則治其標也久病之人當用補益調理之劑以四君子湯為主兼平火行痰治之所謂緩則治其本也如痞滿喘咳之類依法治之不得愈者此為腎虛不能攝氣歸元法當補腎宜八味地黃丸或中氣者烏藥順氣散孽子孤臣失勢人志形俱苦損精神婦人病氣知多少開鬱行痰是法程有富貴閒曠之人心平氣和自無憂愁困苦之纍亦無病氣者也惟先貴後賤者謂之脫營先富後貧者謂之失精孤臣孽子形志俱苦者斯有七情四氣之傷婦人女子猶有甚焉以身事人而其性多傲以色悅人而其心多忌少拂其情恚怒悲怨之心作矣若愆期之女失寵之妾寡婦尼姑之流有欲而不得遂思則氣結所謂二陽之病發於心脾是也宜正氣天香散主之以上諸氣之病非平心忍氣者病必不起豈藥石之能為哉蘇子降氣湯治心腹脹滿喘促氣急真蘇子炒半夏各五分炙甘草四分前胡陳皮厚朴各三分桂心二分當歸三分水一盅姜三片煎服羌活續斷湯治脾腎氣虛骨酸痿厥及涉水臥濕傷腎成痹濕流經絡腰膝疼痛腳重行步不順羌活防風細辛白芷牛膝杜仲炒熟地黃秦艽續斷人參當歸白芍茯苓桂心川芎各等分姜三片水煎空心服久冷痛加附子炒熱加黃柏炒妙香散養心氣不足安神麝香少許另研木香山藥茯神黃耆遠志炙草人參桔梗硃砂水飛各等分為細末每二錢食後棗湯下茯苓補心湯治血虛則心虛所謂損其心者益其榮也人參白茯苓陳皮桔梗枳殼前胡川芎生地黃葛根當歸紫蘇半夏木香白芍各等分甘草減半姜三片棗一枚煎服和劑七氣湯治七氣所傷痰涎結聚心腹刺痛不能飲食有寒者可用此寒則氣收宜辛散之甘緩之乃氣虛寒鬱之藥也人參炙草肉桂各三錢半半夏一錢姜三片棗二枚水煎服三因七氣湯治症同前有熱者所謂火鬱則發之也半夏茯苓各一錢厚朴七分半紫蘇五分姜三片棗一枚水煎服白朮和胃丸和中理氣清痰去滯厚朴半夏各二兩白朮一兩二錢陳皮八錢檳榔枳實炒各二錢半木香一錢人參七錢炙草二錢上為末生薑自然汁浸蒸餅丸梧桐子大每服三十丸溫水下紫沉通氣湯治三焦氣滯不能宣通腹脅脹大便澀紫蘇枳殼陳皮茯苓甘草檳榔各五分沉香木香麥門冬黃耆五味子桑白皮乾薑薄荷枳實荊芥穗各三分半水煎服分氣紫蘇飲治腹脅疼痛氣促喘急常服和胃進食五味子桔梗茯苓大腹皮草果桑白皮炙草各等分紫蘇葉減半姜三片入鹽少許水煎食前服珍珠散治心中積熱口乾舌燥恍惚悶亂喜笑不休琥珀珍珠粉天花粉鐵華粉大黃生地硃砂飛馬牙硝寒水石煅各等分上為極細末每服一錢淡竹葉湯下當歸桃仁承氣湯治血滯胸中心下痞滯嘔血桃仁研半兩大黃一兩歸梢七錢半甘草桂芒硝各三錢上㕮咀作二服水盞半姜三片入鹽再煎一沸服溫膽湯治心膽虛怯觸事多驚半夏枳殼白茯苓各五分橘紅七分半炙草青竹茹一塊姜三片棗一枚食前服歸脾湯治思慮過度勞傷心脾健忘怔忡白朮茯神炙耆龍眼肉酸棗仁人參各五分木香二分半炙草二分姜三片棗一枚水煎服瑞竹堂補氣湯治氣虛脈浮而軟怔忡無力自汗炙耆一錢人參炙草各三分麥門冬桔梗炒各五分姜三片水煎服升陽順氣湯治七情所傷及勞役飲食不節滿悶短氣升麻柴胡陳皮各一錢半夏三錢人參三錢黃耆四錢甘草黃柏各五分當歸一錢草蔻二錢半神麯一錢分作四劑每服姜三片煎恐則氣下宜此升陽除濕湯自下而上引而竭之升麻柴胡防風神麯澤瀉豬苓各五分蒼朮一錢陳皮炙草麥蘖各三分薑棗同煎或加益智半夏各五分丹溪左金丸治厥氣上逆及瀉肝火黃連六錢吳茱萸一錢為末粥糊丸溫水下正氣天香散治婦人一切諸氣作痛或上衝湊心胸或攻築脅肋腹中結塊發則刺痛月水因之而不調或眩暈嘔吐往來寒熱無問胎前産後一切氣病並皆治之烏藥兩半香附六兩陳皮紫蘇各七錢半乾薑五錢共為細末每服二錢白湯入鹽少許調下或神麯糊丸如梧桐子大每次五十丸使湯同上胎前加條芩白朮各兩半去乾薑加砂仁五錢産後加當歸川芎各一兩半黑豆煎酒下大抵男子屬陽得病易散女子屬陰遇氣多郁是以男子之氣病者常少女子之氣病者常多故治法曰婦人宜調血以耗其氣男子宜調其氣以養血此之謂也加減二陳湯治一切氣病肝氣有餘加青皮川芎木香香附山梔心氣有餘加條芩黃連香附脾氣有餘加枳實香附蒼朮神麯厚朴山楂肺氣有餘加蘇子枳殼桔梗香附桑白皮腎氣有餘加川楝小茴破故紙香附在上焦胸臆之間而為痞滿刺痛伏梁等症本方合小陷胸湯加木香在中焦而為痞滿急痛者本方合平胃散加木香以平其敦阜之氣大便不利合小承氣微利之在下焦而為奔豚七疝者加青皮官桂山楂梔仁小茴川楝在兩脅攻築作痛者加青皮川芎香附梔仁木香如噫氣吞酸嘈雜加黃連吳茱萸香附如喘促氣急面目浮腫者合五皮湯加紫蘇如腹脹滿者加厚朴枳殼木香檳榔大腹皮蘿蔔子加減四君子湯此氣分正藥也諸氣不足者宜此補之肝氣虛加當歸陳皮生薑心氣虛加生地當歸麥門冬脾氣虛加白芍倍甘草肺氣虛加黃耆五味子麥門冬腎氣虛加熟地黃桂心血虛合四物湯名八物湯有痰合二陳湯名六君子湯八味丸治腎虛不能攝氣歸元淮地酒蒸二兩山藥山萸肉白茯苓澤瀉丹皮附子炮桂心各一兩上為末煉蜜為丸如梧桐子大每五十丸空心食前溫酒下烏藥順氣散治氣卒中昏僕者似中風之狀勿作風治麻黃陳皮烏藥各一錢川芎枳殼白芷桔梗各五分乾薑炮姜三片棗二枚水煎服蘇醒即止勿服
