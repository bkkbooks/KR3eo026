body:
  text: 卷之二十嘔吐吞酸嘈雜足胃陽明氣下行逆行而上食難停有聲有物呼為嘔有物無聲以吐名人身之中足陽明胃脈之氣自上而下足太陰脾脈之氣自下而上上下循環陰陽交接謂之順而無病也故胃氣逆而上則為嘔吐脾氣逆而下則為泄瀉此吐瀉之病脾胃為之總司也胃家有熱難留食胃冷無緣納水漿宿食停痰多痞滿胃虛惡食細消詳胃中有寒者食久即吐喜熱惡寒四肢悽清法當以剛壯溫之宜生薑理中湯甚者加熟附子挾虛者宜東垣丁香安胃湯主之胃中有熱者食入即吐身熱煩躁法當以溫涼解之宜加減小柴胡湯如夏月嘔吐不止者亦從熱治宜五苓散加薑汁主之胃中有宿食者不喜食胸腹脹滿醋悶吞酸吐出有酸燥之氣法宜消食去積宜東垣藿香平胃散或丹溪保和丸主之方見內傷胃中有痰飲者嘔吐痰沫痞滿怔忡法宜消痰逐飲丹溪加味二陳湯及順氣化痰丸方見痰病痰有寒熱宜分治之並用加味二陳湯胃虛者不能飲食聞穀氣則嘔宜補胃和中加味異功散人有酒後嘔吐者此從飲治宜葛花解酲湯主之方見內傷嘔有膿腥不必攻心痛吐水是蛔蟲渴而後嘔為停水祕法能令格拒通金匱云夫嘔家有癰膿不必治嘔膿儘自愈先嘔後渴者此為欲解先渴後嘔者為水停心下此屬飲家宜小半夏茯苓湯主之嘔家多渴胃津液干也欲飲水以自救宜少與之不可多也多則反吐不止謂之逆水宜五苓散主之方見濕門如時常噁心吐清水心胃作痛得食則暫止飢則甚者此胃中有蛔蟲也宜烏梅丸方見寒門檳榔散方見諸蟲門人有胃寒嘔吐不納藥者此陰盛格陽病也家祕加減理中湯一服立止神效諸嘔吞酸名屬熱寒之不去變寒中臨病審詳休執著病人嘈雜理相同吐酸吞酸之病內經謂熱東垣謂寒文若相背而意實相通丹溪謂素問言其本東垣言其末亦辨之未辨者歟蓋諸嘔吐酸明屬於熱酸者肝木之味也世人不知肝欲散宜食辛以散之風淫於內平以辛涼專用芩連梔子謂寒可以治熱也熱之未除中寒已生熱被寒鬱吐酸亦甚東垣之用辛熱者乃火鬱則發之嘔吐酸水者甚則酸水漫其心不任其苦其次則吐出酸水上下酸澀不能相對當問其病之新久何如如初病者用小柴胡湯吞三萸丸如曾因傷生冷硬物得之者加減二陳湯曾因傷酒面膾炙得之者黃連清化丸原有宿食留飲者曲術丸加平胃散性急多怒者青鎮丸如久病者丹溪茱連丸主之凡病吐酸吞酸者宜斷厚味以糲食蔬菜自養則病易安嘈雜之病似飢不飢似痛不痛而有懊憹不自寧之況者是此痰因火動宜消痰降火清氣化痰丸主之方見痰門肥人嘈雜者宜二陳越鞠湯凡嘈雜者並宜三聖丸主之又當忌口節欲未有不安者有氣嘈雜者宜軟石膏丸如嘈雜眩暈者宜白朮半夏天麻湯婦人多此病方見眩暈嘔噦無時有數聲病深見此可憂驚吐而不止成翻胃別作他方膈噎論嘔者有聲有物也噦者有聲無物也又曰乾嘔如平人無時乾嘔者此上焦氣熱上衝宜東垣涼膈散調木香散服此疾惟飲酒之人多有之如有痰者更合二陳湯調木香散如病久深重者不宜有此經曰木陳者葉必落弦絶者聲必嘶病深者聲必噦不可治也如吐食不已者其胃必反見後膈噎類治嘔吐經驗方加減小柴胡湯治熱證嘔吐小柴胡湯方見傷寒加青竹茹多加生薑煎服丁香安胃湯治嘔吐噦因胃虛寒所致丁香半錢黃耆炙二錢人參一錢甘草炙柴胡升麻陳皮當歸身各半錢黃柏一分蒼朮一錢吳茱萸炮一錢草豆蔻一錢上㕮咀作二服每服水一大盞煎七分食前溫服藿香平胃散治內傷飲食填塞太陰嘔吐不已藿香厚朴薑汁炒陳皮各一錢蒼朮一錢半甘草炙三分砂仁研神麯炒各五分上㕮咀生薑三片大棗一枚水一盞半煎八分溫服加味二陳湯治胃中有伏火膈上有稠痰時常胃口作痛及噁心吐清水不快此治熱痰之劑半夏洗一錢半陳皮去白茯苓川芎白朮蒼朮梔子仁炒香附子各一錢黃連薑汁炒牡荊子炒研各一錢半挾虛者加人參一錢上㕮咀作二服每服水二盞薑三片煎一盞稍熱服如胃口痛甚入生薑自然汁一合和勻服又方治停痰氣結而嘔此治寒痰之劑陳皮去白半夏洗各一錢白茯苓六分甘草炙三分砂仁研二合丁香一分生薑六分上㕮咀水煎服加味異功散治胃虛而嘔不喜食人參白朮茯苓各一錢甘草二分陳皮砂仁研藿香各五分神麯炒一錢陳倉米年久者佳一合上㕮咀順流水二大盞煎沸泡伏龍肝擂細攪渾放冷澄清取一盞加薑三片棗一枚入藥煎服小半夏茯苓湯治停水嘔吐半夏洗二錢半茯苓一錢半上㕮咀水二盞半煎一盞生薑二錢半研取自然汁入藥煎沸服檳榔散治吐蟲而嘔黑錫炒成灰檳榔末各等分共為細末每服一錢米飲調服苦楝根湯尤妙家祕加減理中湯治寒吐陰盛格陽不納藥者用理中湯加熟附一劑共五錢水二盞煎至一盞去渣入童便獖豬膽汁各半杯煎一二沸服之神效三萸丸上可治吞酸下可治自利用六一散一料吳茱萸制一兩共為末搗飯為丸服加減二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷硬物脾胃不和時吐清水半夏洗陳皮各二錢半茯苓一錢半甘草七分半丁香五分上㕮咀生薑三片水煎服黃連清痰丸治傷熱物吐酸者黃連一兩陳皮半兩半夏一兩半吳茱萸炮一錢桃仁研二十四枚上為末神麯糊為丸緑豆大每服百丸薑湯下曲術丸治中脘宿食留飲酸哲心痛吐清水神麯炒三兩蒼朮米泔浸一兩半陳皮去白砂仁各一兩上為細末別取神麯薑汁煮糊為丸如梧桐子大每服七十丸薑湯下加味平胃散治吞酸因食鬱所致用生料平胃散加炒神麯炒麥芽薑棗同煎青鎮丸治肝熱吐酸柴胡去蘆二兩黃芩七錢半半夏人參甘草各五錢真青黛另研二錢半上為細末薑汁浸蒸餅為丸如梧桐子大每服五十丸薑湯下丹溪茱連丸治吐酸吞酸黃連一兩半吳茱萸炮焙一兩陳皮蒼朮米泔浸桔梗黃芩與上黃連各用陳壁土炒茯苓各一兩上為細末神麯糊丸如緑豆大每服二三十丸時時唾津下二陳越鞠湯治肥人嘈雜用二陳湯少加蒼朮白朮山梔仁炒生薑少加撫芎煎服三聖丸治嘈雜神效白朮四兩黃連五錢橘紅一兩上為細末神麯糊丸如緑豆大每服五十丸唾津下或薑湯下軟石膏丸治噯氣嘈雜南星炮半夏洗軟石膏煅香附子童便浸透梔子仁炒各等分上為細末粥丸如梧桐子大每服五十丸薑湯下木香散能降諸逆氣用木香檳榔二味各等分為極細末入煎藥中調服
