body:
  text: 卷之十二虛損五臟成傷各有因難經指示甚分明若人知禍能知避那有膏肓二鬼侵四十九難云憂愁思慮則傷心形寒飲冷則傷肺恚怒氣上逆而不下則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎是正經自病也此言五臟受病之初其幾甚微病久成虛虛久成勞針藥莫療遂成傳屍之症矣是五傷者人皆知之苟能知禍而不犯其傷則心靜氣和矣何疾之憂哉古人謂病不可治者皆曰病入膏肓見左傳晉侯事病化為鬼入於膏之上肓之下針藥之所不能及也五傷之病皆生於心惟腎與脾二臟之傷為難治也仁齋云夫人所以根本此性命者氣與血也若男若女氣血均有獨不能保而有之終日役役神倦力疲飢飽越常喜怒失節形寒飲冷縱欲恣情遂使五臟氣血俱虛此五勞之所從始也六極七傷類焉故心家虛則便濁汗多肝家虛則筋攣目眩腎家虛則腰痛泄精肺家虛則咳嗽烘熱脾胃虛則嘔吐不食日漸痿黃或乃胃熱消穀飲食雖多亦不生肌肉而轉瘦瘁矣前是數症其間大抵心下引脅俱疼蓋滯血不消新血無以養之也食色人皆有此心貪迷曾有幾惺惺諱言有病求良藥病到相傳日益深食色性也耽食悅色之心人皆有之邵子詩云爽口物多終致病快心事過必為殃甚言食色之害也中古以來知道者鮮矣以酒為漿以妄為常務快其心而不知真陰之暗損也夫腎者元氣之根也腎以色傷則水不勝火火病生焉脾胃者穀氣之本也脾以食傷則水穀不化痰病生焉俗稱虛損為痰火病者是也其症咳嗽發熱咯血吐痰白濁白淫遺精盜汗或心神恍惚夢與鬼交婦人則經閉不通日漸尪羸已成勞極之候夫病起者始多隱諱不以告人人或問者則變色厲言不喜人之言及此病也直至發熱不休形體瘦甚脈微色變然後求醫雖盧扁復生莫能救其萬一也或有妄信師巫祈禳求福或有醫不擇良妄進湯藥如是死者皆自誤耳如有房勞過度先從腎起初得之兩脛痠疼腰背拘急行立腳弱飲食減少兩耳得颼真似風聲夜臥遺精陰汗痿弱腎既病矣次傳於心夜臥心驚或多恐悸心懸乏氣汲汲欲盡夢見先亡有時盜汗飲食無味口內生瘡心中煩熱惟欲臥日輕夜重兩頰口舌唇間悉見赤紋如塗胭脂又時手足五心煩熱心次傳於肺咳嗽氣急喘促臥則猶甚口鼻乾燥不聞香臭或有聞時微覺腐朽物氣有時惡憤憤欲吐肌膚枯燥時或疼痛或如蟲行干皮細起狀若麩片肺次傳於肝兩目䀮䀮面無血色常欲顰升眉眼視不遠目常乾澀又時赤痛或復睛黃朝暮昏憒及欲閤眼及欲睡臥常睡不著肝次傳於脾兩脅虛脹食不消化有時瀉痢水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光潤或時上氣撐肩喘息利赤黑汁先見此症者不可治也如有飲食不節先從脾起者初得之不喜飲食飲食無味怠惰嗜臥寒熱如瘧腹脹或痛唇吻乾燥面色萎黃日漸羸瘦脾既病矣次傳於腎足脛痠疼腰背拘急遺精白濁面色黧黑耳輪焦枯婦人為經閉腎次傳於心心中驚悸怔忡無時盜汗自汗心煩熱悶口舌生瘡咯血面赤咽乾耳聾心次傳於肺咳嗽喘促衄血嗽血皮膚枯燥鼻塞聲沉時唾痰沫面白色脫肺傳肝脅痛目赤面青頰赤多怒虛陽不斂夢與鬼交甚則卵縮筋急或筋緩不能支持手足厥逆病至於此不可治也五損傳來症不同七傳到底數終窮三元正氣隨風去惡氣流連化作蟲十四難云至脈從下上損脈從上下也一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死曹氏曰損病不過三飲食不為肌膚者死至病不過三飲食不為肌膚者亦死按此以損至之脈論陰虛陽虛之症乃本臟之自病也至者數脈也自六至而上以至十二至皆陽盛陰虛之脈陰氣先絕故腎先病至皮聚毛落死者孤陽不能存也損者遲脈也自三至而下以至兩息一至皆陰盛陽虛之脈陽氣先絕故肺先病至骨痿不能起於床者死孤陰不能獨立也病機論云虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛故損自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損自下而上治之宜以苦酸鹹過於脾則不可治也自上而損者一損損於肺皮聚而毛落二損損於心血脈虛者不能榮於臟腑婦人月水不通三損損於胃飲食不為肌膚自下損者一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克論曰心肺損而心蔽腎肝損而形痿谷不能消而脾損感此病者皆損之病也漸漬之深皆虛勞之疾也按此以寒熱之感論陰虛陽虛之症乃本臟之虛因於外感得之者寒則傷脾故自上而下至胃而止胃者諸陽之本也陽過極則死熱則傷腎故自下而上至脾而止脾為孤陰陰過極則死此上下以五臟之位言此論損病俱至脾胃死者論穀氣絕也故曰全谷則昌絕谷則亡自上而下者肺損而皮聚毛落者死益氣可也宜四君子湯肺損而皮聚毛落心損而血脈虛少婦人月水不調宜益氣和血八物湯心肺損及胃損飲食不為肌膚宜益氣和血調飲食十全散主之自下而上者腎損骨痿不能起於床宜益精金剛丸腎肝損骨痿不能起於床筋緩不能收持宜益精緩中也宜牛膝丸腎肝損及脾損穀不化宜益精緩中消穀煨腎丸主之劉宗厚云人稟沖和之氣而生身有三曰元精曰元氣曰元神謂之三元者有本身中之真精真氣真脈也夫精乃臟之真液非血榮之比故曰天癸氣乃臟腑之大經為動靜之主故曰神機脈為天真痿和之氣經謂其名有三曰命之本氣之神形之道其機運升降皆隨氣而動因血而榮精氣資始相生不失以養一身為人之司命形質之體用也至若精不足則氣失資化氣不足則血失所榮血不足則氣無所附天真散亂則氣血精神無所稟命矣是以相生長養之道精化氣生神而皆稟乎身中臟腑之真也滑氏云勞者虛勞也是因髓虛之人房勞過損酒怒多端氣虛血耗諸疾蜂生致使陰陽失序寒熱自生久虛久熱變為骨蒸久則成勞久勞成疰疰者住也此勞蟲變化之自始也凡蟲為蠱以血成而氣養之蓋氣血和平則為正氣至於乖亂即為疰氣皆熱毒鬱積之久憂緣之所致變生諸般奇怪之狀種種不同不離於五行變化之理也如勞傷於肝膽者肝膽屬木則為毛蟲勞傷於心者心屬火則為羽蟲勞傷於脾胃者脾胃屬土則為杲蟲勞傷於肺者肺屬金則為介蟲勞傷於腎者腎屬水則為鱗蟲此論勞蟲變化之大略也詳下文治損從來有立方人身只以谷為強粗工一律稱痰火喜用寒涼胃氣傷難經云然治損之法奈何損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精損其肺者益其氣肺主氣氣者陽也肺氣通於天必用輕清升浮之劑然後可以補肺之虛而益其氣也如四君子益氣之藥也皮聚毛落者宜用之然肺損者宜參朮調中湯主之方見內傷損其脾者調其飲食適其寒溫脾胃者穀氣之本也飢則傷脾飽則傷胃脾喜溫而惡寒胃喜清而惡熱故補其脾胃者四氣俱備五味相濟宜參苓白朮散補中益氣湯益胃湯主之損其心者調其榮衛心主血脈榮行脈里衛行脈外血為榮氣為衛故損其心者宜雙和湯八物湯十全大補湯神不足者宜人參養榮丸天王補心丹主之損其肝者緩其中肝主筋故肝損則筋緩不能自收持宜加味虎潛丸如夢鬼交者宜桂枝加龍骨牡蠣湯主之損其腎者益其精腎藏精精不足者補之以味謂味之厚者降沉之劑也宜六味地黃丸腎氣丸丹溪滋陰大補丸主之治法大要潮熱者不可過用寒涼秘結者不可驟與疏泄喘咳者不可妄施發散咯血者不可錯認以為熱尤不可用局方辛燥之劑但以滋養陰血為上調平臟氣次之又當以益胃之藥佐之蓋人以穀氣為本所謂精氣血由穀氣而生也古人以五味五穀五藥養其病者厥旨深矣如失血之後益胃升陽湯茯苓補心湯皆扶胃氣之意也丹溪治腎虛者以四物為主加黃柏知母五味麥門冬澤瀉杜仲肉桂之類煎入童便韭汁竹瀝服治心虛者以前方去澤瀉杜仲肉桂加茯神胡黃連蓮心遠志菖蒲硃砂之類治肺虛者以四物湯加沙參麥冬五味知母貝母桔梗桑皮地骨皮款冬花紫菀馬兜鈴百合百部之類煎入童便竹瀝薑汁韭汁服治肝虛者四物湯加竹茹膽草柴胡黃芩青皮竹葉之類治脾虛者四君子湯加酒白芍蓮肉薏苡仁山藥豬苓澤瀉扁豆之類益水之主制陽光便是滋陰降火方真水上升真火降不離真土作提綱經云益水之主以制陽光水之主腎也腎水強則火有所畏而自伏矣所謂滋水之主即滋陰也以制陽光即制火也初無二說粗工不知分而為二以滋陰作養血而四物為主治以降火作黃柏知母芩連梔子之類失其旨矣內經明言諸寒之而熱者取之陰所謂求其屬以衰之謂向服寒涼之藥而熱反甚者由於腎水之不足也故補肝腎之水則火自衰如復用諸寒之藥則熱當早退不必又另求其屬以衰之法也腎水者真水也謂之陰精心火者真火也謂之陽精腎水上升心火下降心腎交而成既濟之功又由於脾胃為之提綱也蓋胃為戊土脾為己土謂之真土而坎中有戊離中有己此天地造化之秘非明道者不足以語此六味地黃丸丹溪大補陰丸主之欲補真精味苦辛形衰調養必甘溫未聞偏熱偏寒藥治得殘軀度幾齡經云精不足補之以味形不足者溫之以氣此治虛損之法也蓋人身之中氣為陽血為陰天食人以五氣氣為陽地食人以五味味為陰五氣補氣五味補血各從其類也一藥之中有味有氣合氣味而服之乃成劑也然氣味有厚薄分陰分陽以為升降浮沉之用故氣之薄者為陽中之陽升也浮也而補氣者以之味之厚者陰中之陰降也沉也而補血者以之此制方之大旨也腎主精精之不足腎之虛也欲益其精者宜補腎為主補腎者以苦堅之以辛潤之以地黃補之宜六味地黃丸丹溪滋陰大補丸主之按經云精不足者補之以味陰也補精以味求其本也然味乃如谷肉菜果出於天賦自然沖和之味故有養人補陰之功非醯醬烹飪調和偏厚之味出於人為者也經云陰之所生本在五味非天賦之味乎陰之五宮傷在五味非人為之味乎善攝生者不可謂味以補精而遂恣於口腹以自速其禍也脾主谷之多寡脾之厚薄形之肥瘦以之形者謂皮肉血脈筋骨也形肥則有餘消瘦則不足形之不足脾之虛也故滋其形者以補脾為主補脾之劑如仲景小建中湯東垣補中益氣湯局方參苓白朮之類經云形不足者溫之以氣溫養也溫存以養使氣自充氣充則形完矣局方悉以辛熱藥佐輔豈理也哉氣虛補氣理分明血弱還從血里尋氣血虛生中外熱勿將實熱一般評人之一身氣為衛血為榮氣血充實榮衛流行則為無病人矣如氣虛則形衰血虛則精竭形衰精竭此虛損之病所由生也古人立法治氣虛者用四君子血虛用四物湯氣血俱虛用八物湯所謂形不足者溫之以氣精不足者補之以味也粗工不知氣虛補氣血虛補血之理凡有損病稱為痰火專以補血為主謂丹溪之法不用參耆病人遇之者死相繼愚孰甚焉是皆王節庵之言誤之也血不歸經變作痰氣從火化不歸元分明痰火從虛起補得真元病自痊難經云氣以呴之血以濡之故灌溉乎身者血也血不歸經則凝聚而成痰流行乎身者氣也氣不歸原則散越而成火痰火氣血之變也苟求其故皆氣血之虛所致耳治此病者氣虛以四君子血虛以四物挾痰者二陳挾火者黃柏知母二冬之類或六味地黃無不效者腎若藏精痰自除水能制火火自無金還平木脾斯健脾氣生生可復初丹溪云主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易於動心動則相火隨之水不交會亦暗流而滲漏矣夫火炎水涸則肺金益衰肺金衰則肝木寡於畏反來侮肺而乘其脾土矣即越人所謂東方實西方虛者是也宜六味地黃丸主之此越人補北方以瀉南方之法使腎水漸升心火漸降則肺金清肅之令行得以平其肝木也肝木平則脾土無克賊之害穀氣自生穀氣生則精足精足則元氣斯充矣潮熱當分汗有無參詳氣血屬何虛莫將龍火同凡火誤犯寒涼穀氣疏男子血虛有汗潮熱者以人參養榮湯氣虛有汗潮熱者以補中益氣湯血虛無汗潮熱者以茯苓補心湯女子血虛有汗潮熱者以八物湯氣虛無汗潮熱者以人參柴胡散血虛無汗潮熱者以茯苓補心湯氣血兩虛而潮熱者有汗以十全大補湯無汗以五積散其咳血者以人參五味子散其骨蒸者以五蒸湯清骨散知母散以上治虛勞發熱之聖方也郭氏神真會者稀崔公灸法亦稱奇追蟲自有神仙訣秘密微言說與伊治癆瘵者郭先生之十藥神書崔公之灸四花穴法及遇仙穴法皆治勞瘵之秘訣也人鮮有用之徒執滋陰降火之方故所活者百無一二也其取癆蟲方如鬼哭飲子天靈蓋散將軍丸神授散皆異人所傳者不可輕泄也損病生來自不同知其所起是良工病人若有傳屍者脈症乖違勿與攻劉宗厚云有因病致虛者如得寒暑飲食後或久病所致之類是也有因虛致損者如病後形瘁羸弱癆瘵之類是也大抵因病致虛則為輕蓋病勢尚淺元氣未虛也至病初愈而妄勞或復飲食勞倦或房勞七情六慾陽痿陰弱如致羸憊皆因虛致損則為重病勢已深元氣已索故也此當分治如因病致虛勞者宜從丹溪東垣之法治之因虛致損者又當於二先生之論擴而充之可也密齋按勞損之病皆生於虛善保其身者未有至於其極也虛而重虛成真損矣盧扁更生不能治也病者有傳不可輕視此宿業之病非方術之能移也當脈症決之如脈得大弦數者難治其症大肉陷下大骨高起形削氣乏趺腫溏泄面赤喘急厥氣上行身重骨痛骨痿咽喉腫痛聲啞耳干面黧斷不可治相傳屍疰病如瘟刼數連綿定滅門慢說追蟲有靈藥只愁病極枉勞神夫骨蒸殗殜復連屍疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳屍其變二十二種或三十六種或九十九種蓋由一人得病傳染子孫親姻族屬乃至滅門盡族故人皆畏之叫為宿業治療之法大抵以保養精血為先去蟲次之欲去其蟲者微覺有病即依取蟲方藥趁早服之拔去其根或依膏肓四花灸法或用香草浴法或訪高士講求調息服氣守中之法遠女色絕妄想節飲食避寒暑積以歲月未有不愈者也若待病成元氣已壞衰乃服取蟲之劑而犯虛虛之戒蟲未得去命先殞矣仁齋云瘵蟲食人骨髓血枯精竭不救者多人能平時愛護元氣保養精血瘵不可得而傳惟夫縱欲多淫苦不自覺精血內耗邪氣外乘是不特男子有傷婦人亦不免矣然而氣虛腹餒最不可入癆瘵者之門弔喪問疾衣服器用之中皆能乘虛而染觸染病日久莫不化而為蟲自古及今愈此病者十不一得也勞損諸方四君子湯治肺損而皮聚毛落益氣可也白朮人參甘草茯苓各等分水煎八物湯治心肺虛損皮聚而毛落血脈虛損婦人月水愆期宜益氣和血也四物四君合水煎服加耆十全散治心肺損及胃飲食不為肌膚宜益氣和榮調胃前八物湯加炙耆桂枝換茯神加薑棗水煎金剛丸治腎損骨痿不能起於床宜益氣萆薢杜仲炒去絲肉蓯蓉酒浸菟絲子酒浸各等分共為末酒煮豬腰子為丸每服五七十丸空心酒下牛膝丸治腎肝損骨痿不能起於床筋緩不能收持宜益精緩中即金剛丸加牛膝防風白蒺藜各等分桂枝減半上末酒煮豬腰子搗和丸梧桐子大每空心酒下五七十丸煨腎丸治腎肝損及脾損穀不化宜益精緩中消穀即上牛膝丸加葫蘆巴炒破故紙炒各等分桂減半上和劑服鉺如上酒煮豬腰子丸如腰不起者甚效雙和散補血益氣五勞六極七傷通用黃耆川芎當歸地黃各一錢官桂炙草各七分半白芍二錢半薑棗煎人參養榮丸治男婦氣血兩虛精神短少脾胃不足形體羸瘦白朮炙耆白芍遠志甘草水煮各一兩半當歸山藥熟地黃五味人參各二兩白茯苓二兩山萸肉生地黃各五錢陳皮洗八錢上為細末用鴨一隻取血入蜜煉和藥為丸梧桐子大每八十鹽湯下寒月鹽酒下咳嗽加麥冬貝母紫菀冬花各一兩熱加黃柏知母各一兩遺精帶濁加牡蠣一兩龍骨五錢吐衄血腥加丹皮赤芍各二兩天王補心丹寧心保神固精壯力強志令人不忘清三焦化痰涎去煩熱除驚悸療咽乾育養心神地黃白茯苓人參遠志玄參石菖蒲桔梗柏子仁天冬丹皮酸棗仁炒麥冬炙草山藥五味茯神歸身杜仲薑汁炒去絲各等分上各取末和勻煉蜜丸如彈子大每一兩分作十丸金箔為衣每一丸燈心棗湯下食後臨臥服八物定志丸補益心神安定魂魄去邪熱治痰人參兩半石菖蒲遠志去心茯苓茯神各一兩硃砂水飛一錢麥門冬白朮各半兩牛黃二錢另研如無以膽星代之上為末煉蜜丸如梧桐子大米飲下五十丸無時平補鎮心丹治心血不足時或怔忡夜多異夢如墜層崖常服安心腎益榮衛白茯苓五味子車前子茯神桂心麥冬各一兩二錢半遠志甘草水煮一兩半去心天冬山藥薑汁蒸地黃酒蒸各一兩半酸棗仁去殼炒二錢半人參半兩龍齒二兩半硃砂水飛半兩為衣上為末煉蜜丸如梧桐子大每二十空心米飲溫酒下經驗遠志養心丹治心虛手扼生地酒洗遠志去心當歸炙草各一兩半柏子仁酸棗仁各三兩川芎人參各一兩茯神七錢半夏曲膽星硃砂水飛為衣各半兩麝香二錢另石菖蒲六錢琥珀三錢另金箔十二個上末湯浸蒸餅丸綠豆大每四五十丸唾津嚥下參苓白朮散治勞虛胃弱飲食不進人參白茯苓白朮甘草山藥各三兩扁豆炒一兩半砂仁桔梗炒蓮肉薏苡仁炒各一兩為末每二錢薑棗湯下益胃湯治脾虛弱不喜飲食四肢怠惰燥熱氣短口不知味腸鳴大便微溏黃色頭悶動勞則微痛口乾不喜食冷黃耆五分甘草二分黃芩三分當歸五分蒼朮一錢半陳皮升麻各五分柴胡人參白朮各三分益智三分半夏二分水煎食前稍熱服加味虎潛丸治腎肝虛損骨痿不能起於床筋緩不能收持能補諸虛不足腰體疼痛行步無力壯元陽滋腎水人參黃耆炙白芍酒炒黃柏鹽酒炒當歸山藥各一兩鎖陽酥炙枸杞虎脛骨酥炙龜板酥炙菟絲子酒浸蒸杜仲薑汁炒破故紙炒五味各七錢半牛膝二兩地黃四兩上為細末煉蜜和豬脊髓搗和丸梧桐子大每五六十丸溫酒或姜鹽水下一方有知母酒炒一兩白茯苓七錢半桂枝加龍骨牡蠣湯治六脈芤動微緊男子失精女子夢交桂枝白芍各三錢炙草二錢龍骨牡蠣各三錢薑棗引腎氣丸治陽盛陰虛脾腎不足房室虛損形瘦無力面多青黃而無常色宜此養血益腎熟地黃一斤川薑冬一兩夏半兩秋七錢半五味子半斤上為末棗肉丸如梧桐子大每一百丸至二百丸食前米飲或酒下丹溪滋陰大補丸損其腎者益其精此方主之牛膝山藥各兩半杜仲如上制巴戟去心山萸去核五味子肉蓯蓉酒浸洗新瓦上焙白茯苓茴香遠志各一兩石菖蒲枸杞子各五錢熟地黃二兩上為細末紅棗肉和煉蜜搗勻丸如梧桐子大每七十淡鹽湯或酒空心下凡腎肝損者骨痿不能起床宜服此以益其精筋緩不能收持宜服前虎潛丸以緩其中此二藥者相間服之所謂補陰和陽生血益精潤肌膚強筋骨性味清而不寒溫而不熱非達造化之精微者未足以議於斯也益胃升陽湯失血之後宜服此方以理胃氣柴胡升麻各二分半炙草歸身陳皮各五分人參炒曲各七分半黃耆一錢白朮一錢半生黃芩二分水煎六味地黃丸治腎經虛損久新憔悴盜汗發熱五臟齊損瘦弱虛煩骨蒸痿弱失血等症經云益水之主以制陽光者是也懷山藥山萸肉各四兩白茯苓三兩澤瀉去毛丹皮各二兩地黃蒸半斤上末煉蜜丸梧桐子大每五十丸空心白湯下丹溪大補陰丸降陰火補腎水黃柏鹽酒炒知母去毛酒拌炒各四兩熟地黃敗龜板酥炙各六兩上為細末豬脊髓和煉蜜丸梧桐子大每五十空心姜鹽湯下小建中湯形不足者溫之以氣此方主之桂枝炙草各三錢白芍六錢大棗二枚生薑二錢膠糖一合上㕮咀分作二服作膠糖用水一盞半煎七分去渣入膠飴再煎一沸溫服一方有黃耆名黃耆建中湯人參養榮湯治男婦血虛短氣痿弱有汗潮熱之症人參白朮白茯苓甘草當歸黃耆白芍地黃肉桂遠志陳五味各等分水煎姜引補中益氣湯治氣虛有汗潮熱人參柴胡散治氣虛無汗潮熱人參白茯苓白朮半夏柴胡乾葛白芍當歸甘草減半用薑棗煎服無時茯苓補心湯治血虛無汗潮熱方見血病逍遙散治氣血兩虛無汗潮熱柴胡茯苓白朮白芍當歸各一錢甘草薄荷各五分姜三片棗一枚煎知母散治男婦心肺虛熱煩躁有汗炙草炙耆白芍黃芩白茯苓麥冬生地人參桔梗知母淡竹葉各等分水煎姜三片浮小麥一撮清骨散治男婦骨蒸勞熱此藥最能刼熱生地人參防風熟地赤茯苓銀柴胡薄荷葉秦艽胡黃連各等分姜三片水煎五蒸湯治男婦諸虛骨蒸煩熱炙草減半人參黃芩知母生地葛根石膏麥門冬粳米各等分淡竹葉水二盅入小麥一撮煎一盅半入藥煎米熟服實熱加黃連黃柏山梔虛熱加柴胡秦艽丹皮人參五味子散治虛勞潮熱咳嗽紅痰人參五味十粒桑白皮蜜炒白朮炙耆柴胡白茯苓地骨皮地黃當歸前胡陳皮甘草枳殼桔梗各等分水二盅姜三片煩渴加烏梅半個有熱加知母青蒿各七分郭可久先生治癆瘵十方丹溪心法附錄甲字號十灰散乙字號花蕊石散丙字號獨參湯丁字號保和湯戊字號保真湯己字號太平丸庚字號沉香消丸辛字號潤肺膏壬字號白鳳膏癸字號補髓丹又名十珍丸知悌先生四花六穴治一應虛勞發熱尪羸等症灸之立愈真濟世之妙法也擇取火日灸之其取穴法在師指示見青囊雜纂膏肓俞二穴遇仙灸二穴謂之腰眼穴肺俞二穴腎俞二穴取癆蟲方鬼哭飲子天靈蓋散二方見青囊雜纂夫取蟲之方必用天靈蓋者鬼氣也伏而未起故令淹纏得枯骸枕骨治之鬼氣飛越不復附人於是乎瘥神授丸治傳屍癆疰最殺癆蟲有效瘵有數蟲如蜈蚣如小蛇如蝦蟆如鳥尾如亂絲如爛面如蒼蠅如壁蚰蟲上紫下白形銳足細而有口或如白蟻孔竅中皆出此皆癆瘵根毒若傳至三人則如人形如鬼狀在人腹中出食三日還宿五日欲取之者待其歸宿無覺可也真川椒擇色紅而大者去合口並子以棉紙二層托之於新瓦上炒令汗出取頓地上砂盆蓋冷灰布四圍約一時許研細末隨時用粳米飲搗爛為丸梧桐子大服之庶得藥味鮮每服三四十丸食前鹽湯下常服滿一斤瘵病自愈昔有人服之日久取下瘵蟲如小蛇狀即瘥服藥後永禁莧菜牛馬肉將軍丸治傳屍癆瘵先取癸亥日亥時令病人解去下衣直身平立以墨點記腰上兩傍陷處謂之腰眼穴然後上床合面臥正應甲子日子時每穴七壯灸畢至寅時服此藥此乃異人傳授累有驗錦紋大黃酒蒸焙二兩貫眾檳榔雷丸鱉甲九肋醋炙牙皂去皮醋炙桃仁去皮尖炒各一兩白蕪荑半兩安息香去石麝香一錢另研上取杵搗爛和滋陰大補丸人參固本丸杵勻為丸如梧桐子大每服五十溫酒下或將河車放竹籠中綿紙糊封慢火焙乾者終不及新研者之尤佳也近來丹溪附余中有方其熟地黃用茯苓砂仁煮之者必不可聽蓋地黃得酒良本草明白無比丸專治勞瘵傳屍症紫河車一具焙乾龍膽草甘草各二錢鱉甲九肋者炙半兩桔梗大黃酒拌蒸胡黃連苦參黃柏知母貝母人中白各二錢半生犀末莪朮硝石各一錢半辰砂水飛一兩敗鼓皮心醋炙黃二錢半共末蜜丸梧桐子大每二十加至三十溫酒下丹溪人參膏專治虛損補元氣人參不拘多少切細量入水於銀石器內慢火煎如稠餳瓷器盛之每服二匙白湯調服秘傳當歸膏治五勞七傷諸虛勞極脾胃虛弱養血和中滋陰抑陽當歸酒洗一兩一錢生地一斤熟地黃三兩薏苡米粉同炒八兩白茯苓十二兩白朮一斤蓮肉四兩山藥五兩人參四兩甘草三兩枸杞一斤四兩貝母三兩骨皮四兩麥冬五兩五味一兩琥珀一錢三分白芍米粉炒一斤上銼細和足水一斤微火煎之如干再加水十斤如此四次濾去渣取汁文武火熬之待減去三分每斤加煉熟淨蜜四兩春五兩夏六兩共熬成膏每服三匙白湯化下吐血加丹皮二兩骨蒸加青蒿汁童便各二碗
