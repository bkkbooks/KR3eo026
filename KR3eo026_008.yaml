body:
  text: 卷之八血病氣屬陽兮血屬陰內居臟腑外流經血常附氣同升降五十周身晝夜行經曰陽者衛外而為固也陰者中之守也陽者衛氣陰者榮血也榮衛之行一日一夜常五十度於身周而復始如環無端謹按經云榮者水穀之精也和調五臟灑陳六腑乃能入於脈也源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步髒得之而能液腑得之而能氣是以出入升降濡潤宣通者皆血之使然也難經云氣以詬之血以濡之互相為用不可須臾離也故陰附乎陽血常隨氣而行苟無是氣則血不能自動無以濡潤乎一身也陽依乎陰氣常隨血而守苟無是血則氣無所羈束不能衛外而為固矣此陰陽氣血互為其根而神機之不息歟腎水真陰血化源坎中自有伏陽潛陰常不足陽常勝勿使龍雷動九泉腎屬水乃天一至真之氣於卦為坎易繫辭云坎為血卦謂水為血之化源也在男子則為精女子則為血皆曰天癸天癸者謂此癸水天之所生者也故曰真陰經曰人年四十陰氣自半而起居衰矣又曰男子六十四而精絶女子四十九而經斷精血之屬陰也明矣然坎雖屬陰其中有陽故納戊戊與癸合化而為火是也藏於命門之中謂之相火經云一水不勝二火謂君火相火也此丹溪所以著陽常有餘陰常不足之論蓋欲養此真陰以制陽火不可自損其陰反為火所勝也相火者龍雷之火伏於至陰之下不可使之動如陰虛則火動其病之生不可勝言矣氣行血動貴和平順則循經逆妄行逆氣沸騰都是火火為血病狀難名夫人身之血賴氣以行氣升則升氣降則降氣順則血和循經而行不失其常氣逆則血乖反其常而妄行也所謂逆氣者非真陽之氣也由於客氣之感真邪混雜氣亦亂矣所謂失血者非真陰之血也由於邪氣之搏擊並其真血失之矣故其所生之病妄行至上則吐衄衰涸於外則虛勞妄反於下則便紅積熱膀胱則癃閉溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血變紫黑熱勝於陰發為瘡瘍濕勝於血則為痛癢癮疹皮膚則為冷痹蓄之在上則人善忘蓄之在下則人如狂墮擊跌僕則瘀惡內凝氣滯聚積則為癥瘕症狀百出難以名言也揆厥所由非人失養之故歟所謂人之失養者如喜怒不節起居不時飲食自倍房勞過度以致陰火沸騰血從火動蓄之則為蓄血失之則為失血之症血蓄於內者瘀則易治干則難治血走於外者從下流者為順其治易從上溢者為逆其治難蓄血之病以行血為主宜桃仁承氣湯抵當丸主之失血之病以犀角地黃湯為主分上下加減血蓄皆因邪熱居出而不止即成虛法宜四物湯為主益胃升陽病自愈按成無己傷寒明理論云血菀於上而吐血者謂之薄厥流於下而瘀者謂之蓄血此由太陽隨經瘀熱在裡血為熱所搏結而不行蓄於下焦之所致小腹當硬滿小便自利或如狂或善忘或屎黑色皆蓄血症也下血乃愈宜桃仁承氣湯抵當丸之類失血妄行者熱也古今通用犀角湯四生丸十灰散者蓋血得熱則妄行得冷則凝見黑則止也凡用血藥不可單行單止單用寒涼藥褚澄云飲溲溺則百不一死服寒涼則百不丆生血雖陰類運用者其陽和乎治血病者必求血屬之藥河間先生以四物湯為主治隨症輔佐謂之六合湯夫川芎血中氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之液也當歸分三治血中主藥也通肝經性味辛溫全用能活血各歸其經也芍藥陰分藥也通脾經性味酸寒能活血治虛腹痛也若失血太多氣虛血弱又當從長沙血虛以人參補之之法陽旺則生陰血也宜東垣升陽益胃湯主之若求輔佐之藥於四物中加用者如桃仁紅花蘇木血竭丹皮者血滯所宜蒲黃阿膠地榆百草霜棕櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉鎖陽牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液之物血燥所宜乾薑官桂血寒所宜生地黃苦參血熱所宜血因火動損其陰視所從來各有因或補或攻有真訣莫輕至寶示非人東垣曰傷寒家衄血者仲景言不可發汗蓋為脈微也若脈浮緊者麻黃湯浮緩者桂枝湯脈已微者二藥俱不可用宜黃芩芍藥湯主之雜病見血多責其熱如衄血出於肺以犀角升麻梔子黃芩芍藥生地黃紫參丹參阿膠之類主之咯唾血者出於腎以二冬二母桔梗百部當歸黃柏遠志熟地黃之類主之痰涎血者出於脾葛根黃耆黃連芍藥當歸甘草沉香之類主之嘔吐血出於胃也實者犀角地黃湯主之虛者小建中加黃連主之諸失血症詳見下文鼻為肺竅上通天真息清陽出入關衄衊鼽腥都是熱補陰降火立時痊衄血出於肺鼻者肺之竅也或因外感風寒當與發散而不發散使陽氣不得舒伸鬱而為熱風寒初中於皮毛肺先受之故衄也宜麻黃人參芍藥湯主之或因嗜酒喜啖炙煿辛燥之物或因誤服熱藥以致熱聚於裡而衄者宜四物湯合東垣涼膈散主之不止者用止衄法如鼻中無故血點滴出者其血紫黑乃火極而兼水化也衊血如鼻中常有結涕中有瘀血其氣腥者謂之鼽血此酒毒並宜龍腦雞蘇丸主之上清丸亦可如衄久不止失血太多成虛病者茯苓補心湯主之方見氣門恚怒氣逆必傷肝飲食勞傷胃熱傳載血上行從火治陰虛火動治應難吐血者因火載血上行逆於口也與衄血者同屬火論經云怒則氣逆甚則嘔血此血即肝之所藏者人怒則火起於肝血隨火上故暴吐血宜四物合三黃瀉心湯主之又飲酒之人暴吐血者此血從胃中來也宜藕汁散吞葛花丸或無故大吐血者宜四物湯吞四生丸效或因積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心者及飲食房勞墜跌擊撲者以致榮血流積胸膈間滿則吐溢血盡則止積之日久如前再吐此有瘀血窠囊在內乃內損之症非妄行也非平心氣和之人戒暴怒淡滋味絶妄想者甚難調理惟用輪回酒吞血鬱越鞠丸但覺胸中滿痛寒熱如瘧此血欲動也急用桃仁承氣湯入韭汁生薑自然汁逐去其血勿使再吐也又有虛弱之人陰虛火動者宜涼榮湯主之大抵吐血之症久則成勞宜郭可久治勞之法見後癆瘵門凡吐血不止用三稜針刺氣衝穴立止咳嗽連綿氣上奔血隨氣上幾憂驚急須補肺清心火咳久成癆腎病深咳血者出於肺也肺主氣心主熱熱則傷肺故咳不已而有血也宜以清金降火為主茯苓補心湯雞蘇散天麥門冬湯如咳久不止只三兩聲痰中帶血者此腎咳嗽也不可治血隨咯唾腎中來莫將尋常失血猜惟有滋陰能降火痰中血線病堪哀咯唾血者出於腎也宜丹溪滋陰降火湯主之或有肺破咯唾有濃血者阿膠散主之脾主痰涎帶血紅血流胃脘與脾通化痰補胃無多訣若是咽傷治不同脾主涎痰涎雜血出於脾也宜六君子湯加當歸白芍黃連主之若一向咯唾痰中有血久而不已咽痛聲啞者不治又有因咳不轉咯傷咽門出血者只用甘桔加半夏湯細細呷之汗為心液出玄關汗血皆因心火炎寒氣閉藏成脈脹不逢國手豈能痊心之液為汗肺主皮毛皮毛之間有汗孔曰玄關心主血肺主氣血以榮於內氣以衛於外如心火熱甚肺不能制則榮強衛弱而血從汗孔出也名曰肌衄宜當歸六黃湯主之外用男胎髮燒灰盒之立效如毛竅之中節次血出少間不出即皮脹如鼓口鼻眼目皆脹合名脈脹此肺受寒邪汗孔閉密汗不得泄衛強榮弱宜麻黃六合湯主之便血腸風腸內平腹疼臟毒認分明血來遠近分先後忽爾如崩屬結陰腸胃不虛邪氣無從而入惟人坐臥風濕醉飽房勞生冷停寒酒面積熱以致榮血失道滲入腸間而大便下血此腸風臟毒之所由作也挾熱下血清而色鮮腹中不痛挾冷下血血濁黯腹中有痛清則為腸風加減四物湯或槐花散主之濁則為臟毒宜四物合小烏沉湯加炒乾姜主之久而不止者此胃氣下陷也宜升陽和血湯主之下血先便後血者此遠血也從小腸而來宜四物湯加木通茱萸炒黃連以瀉小腸之火如先血後便者此近血也從大腸而來宜四物湯加檳榔枳實槐花條芩以瀉大腸之火金匱要略治遠血以伏龍肝散近血以赤小豆當歸散經曰結陰者便血一升再結二升三結三升又邪在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行無所稟令滲入腸間故便血也其脈弦細而微遲其症面色青黃不澤心下痞惡冷物口乾時有煩躁不得安臥手足稍冷宜平胃地榆湯主之更灸中脘氣海三里下焦結熱在膀胱邪火熏蒸手太陽二症皆令人溺血通仙試驗有奇方如小便血自溺孔中出澀數作痛或雜溺而出者此從膀胱中來也宜四物合五苓散主之以瀉膀胱之火如不已小薊飲子神效如小便出血不痛者此心熱移於小腸血從精孔中出宜四物合導赤散更加黃連山梔條芩以瀉小腸之火不已者當歸承氣湯利之如溺血久不止血虛者宜四物合牛膝膏主之齒屬陽明怕熱侵血從齒出意沉吟舌間出血真奇怪此病原來熱在心上關齒屬足陽明胃經下關齒屬手陽明大腸經血從齒縫出者曰牙宣此陽明積熱症也宜服清胃湯外以姜鹽炒香附子炒黑色為末擦止妙不止者或牙齒痛出血者以調胃承氣湯蜜丸服之人有舌上出血不止者此心熱也宜洗心散方見火門外以蒲黃末擦之失血之人脈自芤脈如洪數不勝愁澀微血少成虛損滑小遲沉病可調脈經曰脈芤為失血澀為少血吐血唾血脈滑小弱者生實大者死諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治正氣復也脈訣云鼻衄吐血沉細宜忽然浮大即傾危失血後脈虛者宜益胃升陽湯及人參飲子主之婦人天癸以時行滿瀉愆期病在身滿則閉經為蓄血瀉為崩漏失同名婦人之病與男子不同男子之血宜靜不宜動婦人之血有動有靜常以三十日為期衝脈滿任脈氣足然後動而下故名月水過此以後則又靜而不行矣假如常靜而不動乃經閉也經云滿而不瀉者是矣謂之蓄血宜四物合桃仁承氣湯如常動而不靜為崩為漏經云瀉而不滿者是也謂之失血宜三黃補血湯加人參炙甘草主之桃仁承氣湯治蓄血桃仁五錢大黃一兩甘草二錢朴硝二錢分作二服姜三片煎抵當丸治蓄血大黃五錢水蛭石灰炒五錢虻蟲去足翅三錢桃仁二錢另研上四味各取藥末和勻煉蜜丸梧桐子大每十丸四物湯下犀角地黃湯治鬱熱不解逼血妄行為諸失血之症犀角生地黃丹皮白芍各等分肝經鬱熱為嘔血加歸梢川芎梔子仁酒大黃心經鬱熱加酒黃連生甘草麥門冬脾經鬱熱為痰涎血加石膏山梔甘草肺經鬱熱為衄血為咳血加酒芩衄加梔仁咳加桑白皮地骨皮腎經鬱熱為唾血加黃柏知母膽經鬱熱為嘔血加酒芩赤茯苓小腸鬱熱為溺血加木通甘草梢胃經鬱熱為吐血為咯血加桔梗枳殼前胡吐血更加調胃承氣湯大腸鬱熱為便血加枳殼槐花黃芩黃柏膀胱鬱熱為溺血加豬苓澤瀉赤茯苓滑石車前子瘀血死血加桃仁紅花韭汁血不止加藕節小薊根百草霜四生丸治衄血吐血陽乘於陰血熱妄行生荷葉生艾葉生柏葉生地黃各等分上各取新嫩者爛研丸如雞子大每一丸水煎服或童便下四物湯凡見血症皆是陽盛陰虛君相二火亢甚煎迫其血而出諸竅也有蓄者亦火食其氣故氣衰不能行其血血亦被火燥而乾結也宜以此湯為主治乃血分之正藥也川芎芍藥赤者行血白者補血地黃生行熟補當歸酒洗常服加知母黃柏補陰降火所謂壯水之主以制陽光肝經蓄血為脅下痛加香附青皮梔子酒大黃桂枝芍藥失血為嘔血加梔子仁炒黑酒大黃入童便以降之心經蓄血為心痛加五靈脂生蒲黃乳香沒藥失血為血出諸竅蓋心生血屬火加三黃瀉心湯脾經蓄血為脹合桃仁承氣湯以瀉之失血為痰涎血合二陳湯加瓜蔞仁枳實生薑汁肺經蓄血為癰膿加桔梗枳殼貝母失血為咳血加二冬阿膠為衄血合涼膈散腎經蓄血為臍下痛加川楝子小茴香破故紙失血為唾血加黃柏梔子仁皆鹽酒炒更加肉桂少許以瀉腎火胃經蓄血為胃脘當心而痛加山梔酒炒最能清胃脘之血桃仁泥入韭汁薑汁少許同服甚者合桃仁承氣湯失血為吐血合四生丸同煎大腸蓄血為屎黑善忘合桃仁承氣湯失血為便血合槐花散膀胱蓄血為狂合桃仁承氣湯不效合抵當丸同煎失血為溺血合五苓散煎調元散凡諸失血加本方合四生丸同煎入童便甚佳血出太多以致虛暈者加人參一倍益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之義故先理氣人身之內谷為寶也即補中益氣湯方見內傷加神麯一錢半生黃芩水煎服麻黃人參芍藥湯又名麻黃桂枝湯治風寒在表郁遏裡熱火邪不得舒伸故血出於口鼻宜此主之脈微弱可服麻黃黃耆白芍炙草各一錢桂枝當歸各五分人參二分麥門冬三分五味子五分水一盞半先煮麻黃令沸放余藥煎臨臥服三黃補血湯治六脈洪大按之空虛必面赤善驚上熱乃手少陰心脈也此氣盛多而亡血以甘寒鎮墜之劑大瀉其氣以墜氣浮以甘辛溫微苦峻補其血黃耆當歸柴胡各一錢熟地黃川芎各一錢半白芍生甘草各二錢丹皮升麻各五分分二服每水二盅煎一盅稍熱服如兩寸脈芤血在上焦或衄或吐只用犀角地黃湯龍腦雞蘇丸清上膈解酒毒除邪熱並治咳血唾血衄血吐血諸淋下血胃熱口臭肺熱喉腥脾疸口甜膽疸口苦並皆治之柴胡二兩麥門冬二兩炙黃耆一兩真阿膠蛤粉炒二兩生地黃末六兩蒲黃微炒薄荷葉九兩炙甘草一兩五錢人參二兩木通三兩上除生地黃別研末柴胡木通二味用湯半升煎沸浸一二宿去渣其汁別放外其諸藥研篩細末別收卻用白蜜二斤如法煉成卻入生地黃末不住手攪又入木通柴胡汁慢火熬成和藥末杵丸如豌豆大每服五十丸麥門冬湯下上清丸見火門止衄法東垣云鼻血久不止素有熱而暴作者諸藥無驗神法以大綿紙一張作八摺或十摺於冷水浸濕置頂中以熱尉斗尉之至一重或二重紙干立止如衄血去多面黃眼多眵手麻木者宜黃耆芍藥湯主之葛根羌活各五分白芍升麻各一錢炙甘草黃耆各三錢水二盞煎一盞食後服又方白芷山梔不拘多少燒存性為細末吹鼻其血即止又方取新嫩車前草洗淨杵取自然汁約半碗入白蜜二三茶匙攪勻放重湯中溫熱令病人徐徐呷之日服二次神效病者要養性此藥亦治溺血四物三黃瀉心湯治暴吐血四物湯加黃芩黃連大黃俱用酒製作湯服之藕汁散治吐衄不止生藕汁生地黃汁大薊汁各三合生蜜半匙上件藥汁調和令勻每服一小盅不拘時服葛花丸治飲酒過多蘊熱胸膈以致吐血衄血葛花二兩黃連四兩上為末以大黃熬膏子丸梧桐子大每服百丸白湯下丹溪血鬱越鞠丸治瘀血桃仁去皮尖另研香附子童便浸紅花川芎山梔炒各等分上為細末神麯糊為丸梧桐子大每五十丸桃仁湯下輪回酒治吐血衄血墜跌擊僕金刃傷血無不效者取十二歲童子無欲心者絶其烹調鹹酸之味令其潔淨多與米飲以助水道常淡滋味又恐溺薄無力亦當與淡肉汁食之凡溲溺時剪頭除尾以磁器收之每小盅以生薑自然汁一二點攪勻徐徐飲之如冷則以重湯頓服此童便降火滋陰又能消瘀血止吐衄諸血無不應效一名溲一名還元湯先賢有言凡諸失血服寒涼百無一生服童便者百無一死涼榮湯治吐衄諸血黃柏知母麥門冬白芍蒲黃甘草生地黃歸梢扁柏葉炒各等分每服九錢水煎服雞蘇散治勞傷肺經咳嗽有血雞蘇即薄荷葉也黃耆生地黃阿膠白茅根貝母各一錢麥門冬蒲黃炒桔梗生甘草各五分水煎天麥二冬散治咳血神效二冬二母桔梗甘草阿膠生地黃桑白皮蜜真蘇子炒各等分黃連炒減半每服五錢水一盞煎八分入阿膠再煎一服丹溪滋陰降火湯治咯唾有血二冬二母桔梗黃柏酒炒熟地黃遠志各等分乾薑炒黑少許水煎阿膠散治肺破嗽血咯唾血出人參白茯苓生地黃天門冬五味子各五分阿膠珠白芨末各一錢上除白芨另研細末用水一盞入蜜二大匙糯米百粒姜三片煎七分去渣入白芨末服加減六君子湯治痰涎血即四君子二陳湯相合加當歸白芍黃連是也甘桔加半夏湯治咽傷咯唾有血即甘桔湯加半夏是也方見瘟疫門麻黃六合湯治脈脹病即四物湯加麻黃生薑是也加減四物湯治腸風下血側柏生地當歸川芎各八分枳殼荊芥穗槐花炙甘草各四分地榆條芩防風各六分烏梅一個水二盞姜三片煎空心服槐花散治腸風臟毒下血神效槐花炒側柏葉炒荊芥穗枳殼炒各等分為細末每服二錢空心米飲下或酸煮麵糊丸梧桐子大每五十丸空心食前酒下四物合小烏沉湯治臟毒下血烏藥一兩香附醋製二兩甘草二錢半共為末每一錢煎四物湯調服升陽和血湯治腸澼下血另作一派其唧唧然出者有力遠射四散如篩腸中作痛陳皮二分蒲黃當歸蒼朮秦艽肉桂各三分生地黃丹皮生甘草各二分升麻七分炙甘草黃耆各一錢水二盞煎空心服治糞後血謂之遠血四物湯四錢加木通黃連萸炒各一錢水煎治糞前血謂之近血四物湯四錢加條芩酒炒槐花炒枳實麩炒檳榔各八分水煎平胃地榆湯治結陰便血白朮陳皮茯苓厚朴葛根各五分地榆七分乾薑炒黑五分當歸炒神麯白芍人參益智各三分蒼朮制升麻附子炮各一錢上㕮咀水二盞姜三片棗二枚煎空心服四物五苓散治小腸淋血即四物用赤芍生地黃合五苓散去桂是也小薊飲子治溺血神效山梔炒炙甘草各七分生地黃一錢一分小薊根蒲黃炒滑石木通淡竹葉藕節水煎四物導赤散治溺血不痛者四物用生地黃赤芍合導赤散加條芩山梔是也當歸承氣湯即大承氣湯是也牛膝膏用川牛膝一斤切細以新汲水五大盞煎耗其四入麝香少許收用人參飲子治失血之後脾胃虛弱氣促氣弱精神短少六脈無力人參五分炙黃耆白芍炙甘草各一錢麥門冬當歸各三分五味子五個加熟地黃一錢姜三片棗二枚水煎生脈散加減方也夫血者神氣也血盛則形盛而脈實血衰則形衰而脈弱持之則存失之則亡甚矣血之不可不養也常以飲食日滋取汁變化故失血之人當以補脾胃為本如東垣之補中益氣湯雙和散仲景之炙甘草湯小建中湯皆要藥也炙甘草湯治虛勞不足脈結浮者炙甘草二錢桂枝生薑各一錢半麥門冬一合柏子仁一合人參真阿膠各一錢大棗二枚生地黃三錢分三劑水煎雙和散補血益氣治虛勞少力黃耆當歸川芎熟地黃各一錢官桂炙甘草各七分半白芍二錢半上作二服水二盞姜三片棗一枚煎服大病之後虛勞氣乏者以此調治
