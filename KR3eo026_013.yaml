body:
  text: 卷之十三腰痛腰痛之脈必沉弦審症先從指下看此是人身大關節久將成痿損長年劉三點云腰痛之脈皆沉而弦沉弦而緊者為寒沉弦而緩者為風沉弦而濡細者為濕沉弦而實者為閃肭丹溪云腰痛脈必沉而弦沉為滯弦為痛澀者是瘀血滑者伏者是痰大者是腎虛也戴氏云疼之不已為腎虛也日輕夜重者是瘀血也遇天陰及坐久而發者是濕也大抵腰痛之病有風寒濕熱之邪瘀血濕痰挫閃之因種種不同原其所由未必不是腎虛得之經云邪之所湊其氣必虛是也治法虛者補之杜仲黃柏肉桂當歸五味子菟絲子天門冬熟地黃之類風者散之麻黃防風羌活獨活之類挫閃者行之當歸蘇木乳香沒藥桃仁紅花之類瘀血者逐之大黃牽牛水蛭虻蟲之類濕痰流注者消導之蒼朮川芎白芷橘紅半夏茯苓之類各宜類推而治之也經云腰者腎之府轉搖不能腎將敗矣故腰者上為身之所載下為足之所附乃人之大關節也苟忍痛異差而不知蚤治治不擇醫醫不識病實實虛虛痛久不愈則成痿矣難經云損於腎者骨痿不能起於床喪無日矣古方腰痛有三因曾似東垣論得真腎若受傷推不足客邪外入審何經陳無擇云六經腰痛皆外因大抵太陽少陰多中寒少陽厥陰多中風陽明太陰多中濕以類推之此屬外因虛羸不足面目黧黑遠行久立力不能勝蓋失志傷腎所為也腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫鬱怒傷肝所為也肌肉濡漬痹而不仁飲食不化腸胃脹滿閃墜腰脅憂思傷脾所為也此屬內因因作勞汗出衣里冷濕久久得之為腎著之病因於墜墮惡血流滯及房勞疲力耗竭精氣致腰疼痛屬不內外因東垣云足之三陽從頭走足足之三陰從足入腹經所過處皆能為痛治之者當審其何經所過分野循其空穴而刺之審其寒熱而藥之經云足太陽脈令人腰痛引項脊尻骨如熏狀刺其郤中委中穴少陽令人腰痛如針刺其皮循循然不可以俯仰不可以顧刺少陽成骨之湍出血成骨謂膝外近下胻骨上端兩起骨相對間能容指者是也銅人無此穴陽明令人腰痛不可以顧顧如有見者善悲刺三里刺胻上足少陰令人腰痛痛引脊內廉刺內踝上覆溜穴太陰經云散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺膝前骨肉分間地機穴厥陰令人腰痛腰中如張弓弩弦刺腨踵魚腹之外蠡溝穴治腰痛諸方獨活寄生湯治腎虛臥冷濕當風所得此足少陰厥陰二經腰痛藥也寄生難得真者獨活多用土當歸代之故辨疑改用羌活續斷湯用之多驗也方見濕門此治風濕腰痛牛膝酒治傷風毒腰痛牛膝羌活地骨皮杜仲炒川芎海桐皮甘草各一兩五加皮薏苡仁各二兩生地黃十兩上㕮咀絹袋裹藥入無灰酒內浸冬七日夏三五日每服一杯日用三四服常令酒氣不絶東垣川芎肉掛湯治冬月露臥感寒濕腰痛用此代針羌活一錢半柴胡肉桂桃仁歸尾蒼朮炙草川芎各一錢獨活炒曲各五分防風漢防己酒製各三分上作一服如酒三碗煎一碗食前暖處服之此足三陰三陽藥也兼瘀血麻黃蒼朮湯治寒濕所客身體沉重腰痛面色痿黃蒼朮二錢麻黃澤瀉白茯苓炒曲陳皮各一錢杏仁十個桂枝草豆蔻半夏豬苓各五分黃耆二分炙草二錢作一服水煎食前服此足太陽少陰二經藥也兼痰五積散治感寒濕脾胃氣閉腰痛兼清痰流注經絡方見寒蒼朮復煎散治寒濕相合腦後痛惡寒項筋脊骨強肩背膝眼痛腰痛膝臏痛無力行步沉重紅花一分黃柏三分柴胡藁本澤瀉白朮升麻各五分羌活一錢蒼朮四兩另切上㕮咀先以蒼朮一味用水三大盞煎二盞去渣入煎藥復煎至一盞空心稍熱服取微汗為效忌酒麴摩腰膏治寒濕腰痛附子尖烏頭尖南星各二錢半硃砂乾薑各一錢雄黃樟腦丁香各一錢半麝香五分上為末煉蜜丸龍眼大每用一丸生薑汁化開如厚粥狀置掌中烘熱摩腰上冷盡黏著肉再用烘軟帛縛定腰熱如火間三日用一丸妙或加吳萸桂枝東垣拈痛湯治濕熱為病肩背沉重肢節腰胯疼痛胸膈不利防風知母酒洗黃柏生澤瀉豬苓當歸各六分白朮四分人參苦參酒洗升麻葛根蒼朮各五分黃芩酒洗茵陳酒炒炙草羌活各八分作一服水二盞煎一盞服此治濕熱腰痛足痛之聖藥也東垣獨活湯治因勞役濕熱自甚腰痛如折沉重如山羌活防風獨活大黃煨肉桂澤瀉各三錢炙草二錢當歸連翹各五錢黃柏酒製防己各一兩桃仁三十分五服每服酒水各七分煎空心熱服丹溪滋陰大補丸加味虎潛丸二方治腎虛腰痛甚妙方見虛損補腎丸治腎虛因房勞而腰痛者黃柏鹽酒拌瓦上炒知母去皮毛酒拌濕炒各二兩敗龜板酥炙四兩杜仲薑汁拌炒斷絲枸杞子五味子各七錢半上為細末入豬脊髓和煉蜜丸如梧桐子大每五十食前四物湯杜仲水煎送下青娥丸治虛損腰痛神效杜仲如上制一斤破故紙炒八兩胡桃肉三十去皮研膏上將上二味各製為末和勻煉蜜少許同膏杵丸梧桐大每五十鹽湯薑湯任下一方蒜四兩搗爛以酒濾汁打糊為丸補骨脂丸治腎虛及寒濕一切腰痛川萆薢四兩分四制童便米泔鹽湯酒各浸一宿曬乾杜仲如上制四兩破故紙炒香三兩胡桃肉去皮另研如泥四兩上前三味為末不犯鐵器入胡桃肉以木杵杵千餘下煉蜜丸如梧桐子大每五十空心溫酒下乾物壓之此青娥丸變法也三因立安丸治五種腰痛常服溫養腎元壯健腰腳破故紙炒木瓜各一兩半川萆薢二兩牛膝酒洗焙杜仲如上制川續斷各一兩上為細末煉蜜丸如梧桐子大每五十空心溫酒下上三方相同煨腎丸治腎虛腰痛神效杜仲如上制肉蓯蓉酒洗巴戟天取肉破故紙炒小茴炒去沙土青鹽煅各一兩共為末每二錢用獖豬腰子一對竹刀劈開每個裝藥一錢綿紙包放火中煨熟服溫酒咽下經驗羌活桃仁湯治墜墮挫閃氣血凝滯攻刺腰痛神效玄胡索桃仁去皮尖杜仲炒紅花牛膝破故紙炒蒼朮炒歸尾羌活官桂小茴香炒各等分水一盞酒半盞煎八分調乳香末少許同服復元通氣散治跌僕損傷或負重銼閃致氣滯血凝腰痛不可忍舶上茴香炒穿山甲煻火煨胖木香各一兩半白醜炙草陳皮去白各一兩玄胡索一兩當歸兩半乳香沒藥各一錢上為細末每服二錢熱酒調下病在上食後服病在下食前服地龍散治腰脊痛或打僕損傷或從高墜下惡血在太陽經令人腰脊痛或髀股脛腨中痛不可忍歸尾二分中桂乾地龍各四分麻黃五分蘇木六分獨活甘草各八分羌活一錢二分桃仁六枚去皮尖研泥上㕮咀水二盞煎一盞溫服金匱云腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之白朮甘草各一兩乾薑茯苓各四兩上㕮咀分三服每服水三碗煎碗半溫服盡此三服腰中即溫針灸法委中一穴主瘀血痛用三稜針出血大效人中一穴治腰曲不能伸者針之即愈腎俞二穴宜灸治腎虛腰痛神效散治腰痛不能轉側透明雄黃松縣黃丹各一錢馬牙硝三錢共研為極細末令病人仰臥用銀簪取藥點眼大角須少許緩緩二三次少頃復舊其效如神神應散治腰痛纍用驗杜仲如上制破故紙炒各一兩木香一錢上為末每服二錢空心溫酒下二三服效上二方出青囊雜纂
