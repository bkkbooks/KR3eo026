body:
  text: 卷之二十五脹滿脹病須明寒熱因勿將新久混同論李朱立法從中治默契軒岐萬古心按脹病靈樞經論五臟六腑之脹及水脹膚脹鼓脹之狀又諸書所謂鼓脹水脹氣脹血脹之病名雖不同其實則一也蓋靈樞之論語其病之所標也諸書之論語其病之所起本也脹之為病在於臟腑之外排臟腑而郭胸脅脹皮膚故名曰脹未有不生於氣血水穀者也東垣謂寒丹溪謂熱各有所本或謂用丹溪之法活人者多東垣之方不敢採用此執一之論未足以語醫之神也東垣曰調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣虛弱不能運化精微而制水穀聚而不散而成脹滿經云腹滿䐜脹支脅結膈下厥上結過在太陰陽明乃寒濕鬱遏也脈經所謂胃中寒則脹滿者是也全按經云太陰所至為中滿又云諸濕腫滿皆屬脾上夫脾乃陰中之太陰同濕上之化脾濕有餘腹滿水穀不化陽主運化陰主長養今陰濕有餘陽熱不足不能運化精微使水穀之氣蓄而成中滿之證此東垣之論所以主於寒也丹溪云七情內傷六淫外感飲食不節房勞致虛脾土之陰受傷轉輸之官失職胃雖受谷不能運化故陰陽不交清濁相混隧道壅塞鬱而為熱熱留為濕濕熱相生遂成脹滿經云鼓脹者是也以其外雖堅滿中空無物有似於鼓其病膠固難以治療又名曰蠱若蟲侵蝕之義全按經云諸腹脹大鼓之如鼓皆屬於熱夫胃為水穀之所聚也脾不能腐熟變化蓄積於中鬱而為熱熱則生濕遂成脹滿之證此丹溪之論所以主於熱也合而觀之曰寒曰熱皆謂脾胃之虛不能轉化而致也曰寒者乃濕土之體自病也曰熱者乃濕之用為病也故其所制之方皆自仲景瀉心湯變化來專以補脾為主以辛散之以苦瀉之以淡滲之未嘗異也經曰諸腹脹大皆屬於熱又曰中滿者泄之於內此皆論有餘之邪乃病之初起者也如感風寒之邪傳入於裡寒變為熱作胃實痞滿燥實堅之證宜以承氣湯下之或傷酒濕面及味厚之物膏粱之人或食已便臥濕熱之氣不得施化致令腹脹者亦是熱脹宜下之經云下之則脹已者是也故病人有大實大滿大小便祕者皆宜從權以寒熱藥下之也經曰中滿者泄之於內非專謂下之也如以辛散之以苦泄之以淡滲之所謂上下分消以去其濕皆泄之也脈經曰胃中寒則脹滿此論內傷不足之邪乃久病也寒者非寒冷之寒乃陰虛之義故用朮參以補脾為君蒼朮茯苓陳皮為臣黃芩麥門冬為使以制肝木少加厚朴以消腹脹氣不運加木香氣下陷加升麻柴胡提之血虛加四物湯有痰加半夏經云寒因寒用者是也病脹久脾胃虛者雖有大小便不利之證乃氣不運血不潤也當大補氣血為主慎不可用下藥也陽熱為邪者則身體為熱脹滿咽乾陰寒為邪者則吐不下食脹滿而自利朝寬暮急者為血虛暮寬朝急者為氣虛朝暮俱急者為氣血俱虛腹中常脹外實內傷按之不陷者為實脹法當以溫藥和之實者從仲景大小陷胸湯丸治之虛者從瀉心湯方治之錢氏論虛實腹脹實則不因吐瀉久病之後脹而喘急悶亂更有痰有熱及有宿食不化而脹者宜服大黃丸治熱白餅子治痰紫霜丸治食下之更詳認大小便如俱不通先利小便後利大便虛則久病吐瀉後其脈微細脾主目胞腮虛腫手足冷當先服塌氣丸後服異功散益黃散和中丸此已上論寒熱實虛之法也河間云論諸蠱脹者有二若從胃則旦食而不能暮食且則不脹暮則脹治以雞矢醴酒調服若從水則濡泄者是也治當開鬼門潔淨府也開鬼門者謂發汗也潔淨府者利小便也四病虛實脈中求浮大為祥沉小憂腹實腹堅當議下虛宜用補固中州經云其脈大堅以澀者脹也關上脈浮則內脹遲而滑者脹脈盛而緊者脹脹脈浮大者易治虛小者難治水病腹大如鼓脈實者生虛者死洪大者生微細者死中惡腹大四肢滿脈大而緩者生浮而緊者死陰陽愆伏榮衛凝滯三焦不能宣行脾胃不能傳布脹滿之所由生也曰谷脹曰水脹曰氣脹曰血脹謂之四病或寒或熱或虛或實又不可以無別也若久病羸乏卒病脹滿喘息不得與夫臍心突起或下利頻數百方調治未見一愈者矣谷脹者因失飢傷飽痞悶得酸旦則陰消陽長穀氣易行故能飲食暮則陰長陽消穀氣難化故不能食是謂谷脹初起者宜服沉香交泰丸凡大實大滿大小便祕者木香檳榔丸方見內傷病久者不可再下宜廣荗潰堅湯以漸消之水脹者因脾土受濕不能制水水漬於腸胃而溢於體膚漉漉有聲怔忡喘息是為水脹初起之時宜去其水葶藶木香散久則宜補其脾土以制其水中滿分消丸主之氣脹者因七情鬱結氣道壅隔上不得降下不得升身體大而四肢瘦削是為氣腫脹病初得之宜紫蘇子行其滯氣病久者宜廣茙潰堅湯消之血脹者因病熱煩躁漱水不欲咽下迷亡驚狂痛悶嘔惡虛汗血逆小便多大便黑此傷寒蓄血證也宜服桃仁承氣湯即愈婦人經水不行者多成此證是為血脹初得之宜服加味抵當丸破之不可多服久則以人參芎歸加香附子湯行之如因怒傷肝肝克脾脾氣不勝必脹於胃名曰勝克怒乘肺肺氣不傳必脹於大腸名曰乘克宜平肝飲子主之如曾因積聚症塊久而不愈成脹者宜消其積塊則腹脹自平中滿分消湯以漸消之此病非心平氣和人能守禁者難愈也凡病蠱脹者多喘宜人參定喘湯主之如時脹時喘汗出厥逆者不治凡病蠱脹或遍身盡腫者或黃腫者並宜服祕傳諸蠱保命丹及河間祕方如因中惡毒之物腹脹大者急進三花神佑丸取之今之為醫者喜用疏利之藥急於獲效苦於脹滿喜行利藥以求通快殊不知寬得一二日腹脹愈甚真氣已傷去死不遠矣吾今疏利之方不敢取用者恐誤人也寧以拙守不習巧攻當用胃苓丸為主方隨氣血虛實痰熱加輔佐藥活人頗多治脹諸方中滿分消湯治中滿寒脹寒疝大小便不通四肢厥冷食入反吐心痞奔豚益智半夏洗茯苓木香升麻各三分吳茱萸酒洗草豆蔻炒黃耆各五分澤瀉川烏炮人參青皮當歸生薑麻黃柴胡黃連蓽澄茄乾薑黃柏各四分上㕮咀水二盞薑三片棗一枚煎一盞溫服此治寒脹之劑中滿分消丸治中滿鼓脹水氣脹大熱脹氣脹白朮人參甘草炙薑黃豬苓各一錢黃芩炒黃連炒枳實炒半夏洗各五錢乾生薑白茯苓砂仁各二錢澤瀉陳皮各三錢厚朴薑汁炒一兩知母去毛炒四錢上為細末蒸餅為丸如梧桐子大每百丸焙熱白湯下寒因熱用故焙熱也此治熱脹之劑廣荗潰堅湯治中滿腹脹內有積聚堅如石令人坐臥不安大小便澀滯上喘氣促而色痿黃通身浮腫厚朴制黃芩草豆蔻煨益智仁當歸酒洗各二分半黃連三分半夏洗三分半蓬朮煨紅花升麻甘草炙柴胡澤瀉陳皮神麯炒青皮吳茱萸湯泡去苦水各一錢半上㕮咀分作二服每服水二盞薑三片煎一盞溫服家傳胃苓丸治腫脹驗方方見吐泄章腹脹加枳實半夏木香青皮人參當歸黃連黃芩為末蒸餅丸如梧桐子大每服五十丸薑湯送下水腫合五皮散入生薑煎服沉香交泰丸治濁氣在上干擾清陽之氣菀而不伸以為䐜脹及宿食停滯為谷脹者沉香白朮當歸各三錢厚朴制半兩枳實炒青皮陳皮白茯苓澤瀉木香吳茱萸酒洗各二錢大黃酒煨一兩上為細末蒸餅為丸如梧桐子大每服五十丸加至七十丸白湯下按濁氣在上則生䐜脹有二方木香順氣湯治虛痞此治實痞葶藶木香散治濕熱內外甚水腫腹脹此藥下水濕消腫脹葶藶子茯苓豬苓白朮各二錢半木香五分澤瀉木通甘草各五錢桔梗二錢滑石三兩上為細末每服三錢白湯調下此五苓益元加木香木通葶藶也紫蘇湯治憂慮過度致傷脾肺心腹脹滿喘促又治腸鳴氣走漉漉有聲大小便不利脈虛而緊澀真蘇子一錢研白朮二錢人參一錢大腹皮酒洗草果仁半夏洗厚朴薑製木香炙甘草陳皮去白桔梗枳殼炒各五分上㕮咀薑三片棗一枚水煎溫服加味抵當丸治血脹三稜煨莪朮煨乾漆炒煙盡牛膝酒洗琥珀虻蟲糯米炒肉桂水蛭石灰炒桃仁泥大黃煨各等分上為細末用生地黃自然汁和米醋調勻為丸如梧桐子大每服十丸空心童便送下五日進一服以血下為度間服四物湯人參芎歸加香附子湯治血脹當歸半夏洗各七分半川芎一錢蓬朮煨木香香附子醋浸砂仁烏藥甘草炙各五分人參辣桂五靈炒各二分半上㕮咀入紫蘇四葉生薑五片棗三枚水煎食前服平肝飲子治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭暈嘔逆脈來浮弦防風桂心枳殼炒赤芍藥桔梗炒各一錢甘草炙木香人參檳榔當歸酒洗川芎陳皮各五分加青皮五分上㕮咀作二服每服水一盞薑三片煎服人參定喘湯治蠱脹有喘人參一兩陳皮去白甘草各五錢杏仁去皮尖炒一兩另研木香三錢上為末每服三錢食遠濃煎蘇葉湯調服三服喘即止祕傳諸蠱保命丹皂礬一斤肉蓯蓉三兩二味入罐內火煅盡煙香附子一斤大麥蘖一斤半炒紅棗一斤煮熟去核搗膏為丸上前四味共為細末棗膏杵和丸如梧桐子大每服二十丸好酒送下日三服又方制過緑礬二兩平胃散四兩棗肉為丸米飲下五七丸又方制過緑礬二兩五苓散四兩酒糊為丸米飲下二方相間服木香塌氣丸治中焦腹脹此錢氏塌氣加減也蘿蔔子炒陳皮去白各三兩胡椒草豆蔻煨木香青皮各二錢蠍梢去毒二錢半上為細末水糊為丸如梧桐子大每服三十丸米飲下三花神祐丸此藥猛峻非中蠱毒者不敢輕用甘遂芫花醋炒大戟各五錢黑醜一兩取頭末大黃一兩真輕粉一錢另包不研上為細末同輕粉拌勻滴水為丸如小豆大每服五丸溫水下以取下惡涎為度未盡再加二丸已盡勿再服附劉河間治腫三法初服白茯苓湯白茯苓澤瀉各二錢郁李仁二錢上㕮咀作一服水二大盞煎至一半常服無時從少至多服或煎得澄清入生薑自然汁在內和麵或作粥飲作常食五七日後覺脹下再中服白朮散中服白朮散白朮澤瀉各半兩上為細末每服三錢茯苓湯調下或丸亦可服三十丸末治之法服黃耆建中湯方見虛損以調養之平復後忌房室豬魚鹽面
