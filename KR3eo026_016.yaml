body:
  text: 卷之十六疝氣附小腸氣疝本肝經病受寒膀胱與腎絕無干小腸疝氣雖相似爭奈庸流一例看內經云肝脈大急沉皆為疝則疝病皆屬肝經與腎絕無相干子和云諸疝皆屬肝經粗工不識因立謬名或曰膀胱或曰腎氣或曰小腸氣夫膀胱水府專司滲泄小腸水道專主通流腎主少陰總統二水人之小溲自胃入小腸滲入膀胱膀胱者脬囊也氣化則水出莖端此常道及其為疝乃屬足厥陰肝經蓋環陰器而上入小腹者足厥陰肝經也夫肝腎皆屬於下與任沖督相附然靈樞經言足厥陰肝病則言遺溺癃閉狐疝其腎與膀胱小腸三經則不言疝是受之處乃肝之部分也且男子宗筋為束骨之會也而肝主筋睪者囊中之丸雖主外腎非厥陰環而引之與玉莖無由伸縮在女子則為篡戶其內外為二其一曰廷孔其二曰窈漏此是厥陰與衝任腎之所會也靈樞又言足厥陰之別名曰蠡溝去內踝五寸別走少陽循脛上睪其病氣逆睪腫卒疝乃知諸疝屬於厥陰可以無疑以脈考之素問論六疝皆以滑為疝雖見他於臟中皆言風疝也足厥陰肝經之氣也且夫遺溺閉癃陰痿脬癉精漏白淫皆男子疝也不可妄言腎冷血涸不月月罷上不月經不行也下月罷經行之後也腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕若年少得之不問男女皆無子故隱僻委曲之事了不幹脬腎小腸之用乃足厥陰肝經之職原病式云㿗疝小腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫也經言丈夫㿗疝謂陰器連少腹急痛也言婦人小腹腫皆肝足厥陰之脈也經注云寒氣聚而為疝又云熱為疝瘕以脈辨之愚按經云大沉急為疝又云滑為疝寒則脈緊沉急為寒熱則脈滑沉滑為熱以此別之丹溪云疝氣者睪丸連小腹急痛也有痛在睪丸者有痛在五樞穴邊者皆足厥陰之經也或腫或痛自素問而下皆以為寒蓋寒主收引經絡得寒則收而不行所以作痛也然有履冰涉水終身不病疝者無熱故也大抵此病始於濕熱在經郁久不散又被外寒所乘不得疏通所以作疝若只作寒論恐為未備腎與膀胱屬水寒小腸經絡與肝連厥陰論治當從火宜下宜溫有秘傳血因寒冱則為瘕氣因寒聚則為疝曰疝曰瘕皆寒病也臟腑之中惟腎與膀胱為寒水故諸寒收引皆腎膀胱之病也手太陽小腸之脈與足厥陰之脈相通於衝任之間故謂疝為肝病者語其本也曰腎氣曰膀胱者語其標也曰小腸者語其病之連屬也名雖不同其治則一也肝膽原來從火治肝之作疝有熱有寒仲景傷寒論於厥陰肝經病或下之或溫之未嘗有定法也故治疝之方有用烏附吳茱萸之類以溫之者有用巴豆牽牛芫花之類以下之者所謂治無定法應變而施藥不執方合宜而用素因濕熱伏經中體或虛時寒氣衝濕則腫腎寒則痛須知劫藥有奇功大抵疝病若非房勞所致即是遠行辛苦涉水履冰血氣得寒而凝滯於小腸膀胱之分或濕熱乘虛而流入於足厥陰之經古方一以為寒惟我丹溪先生獨斷為濕熱此發古人之所未發者也夫熱鬱於中而寒乘於外宜其有非常之痛故治法宜驅逐本經之濕熱消導下焦之瘀血而以寒因熱用之法立方處治而邪易伏病易退也或問厥陰經鬱積濕熱何由而致乎丹溪曰大勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肝積之既久濕氣便盛濁液凝聚併入血隧流於厥陰厥陰屬木繫於肝肝者將軍之官其性急速火性又暴為寒所乘宜其痛之太甚也有以烏頭梔子作湯服其效亦捷後用此方隨形證加減與之無不驗者蓋濕熱因寒鬱而作用梔子以降濕熱烏頭以破寒鬱況二物乃下焦之藥而烏頭為梔子所引其性急速不容胃中停留也劫藥神效用烏頭梔子炒研細順流水入薑汁調服如按之不痛者屬虛須加肉桂以薑汁丸服其方梔子炒川烏炮肉桂三味為細末薑汁拌糊為丸如梧桐子大每服四五十丸順流水煎滾送下劫疝痛效又治疝方用橘核炒桃仁研梔子炒吳茱萸炒川烏炮上㕮咀長流水煎服又寶鑑蒺藜湯治陰疝疼痛用蒺藜炒去刺附子炮梔子炒各半兩為末每服三錢長流水煎服此上三方皆從劫疝古方中變化加減也又治諸疝定痛速效用橘核梔子仁山楂吳茱萸各炒濕盛者加荔枝核炒為末丸散或用長流水調末空心服一二錢一方有川楝子又方用桃仁十四枚橘核十四枚瓦上炒山梔子九枚去殼吳茱萸七粒山楂子十四枚並炒為末生薑一指大擂碎和藥末以順流水一盞蕩起煎數沸利渣服又有挾虛而發者其脈沉緊而虛豁無力其痛亦輕但重墜牽引耳必以參朮為君佐以疏導之藥如川楝子茴香枳實山楂梔子之類其濕熱又當分多少而治濕則腫多㿗疝是也用蒼朮南星白芷山楂半夏川芎枳實神麯入姜順流水煎服或為末神麯糊為丸服名守效丸㿗疝初起痛者用海石香附二味為末薑汁調服凡㿗疝非痛斷房事與厚味不可以藥凡治疝須先灸大敦穴三壯乃足厥陰經也以上並丹溪法七疝諸名出難經其中形狀子和分或嫌治法專攻下虛實良工頗用心按難經云任脈之為病其內常結男子為七疝夫所謂七疝者寒水筋血氣狐㿗七者是也子和論七疝病源至為詳悉但其主治可以攻下之法為主治不能使人無疑耳當先視其人之虛實病之淺深而施治焉可也張子和云寒疝者其狀囊冷結硬如石陰莖不舉或控睪丸而痛得之於坐臥濕地或寒月涉水或值雨雪或坐臥磚石或風冷處使內過房宜以溫劑下之久而無子按寒疝初得之宜金匱烏頭煎兼表證者烏頭桂枝湯三因蔥白散主之病久實則瀉之秘傳加味茱萸內消丸虛則補之宜茱萸內消丸東垣丁香楝實丸主之血疝者其狀如黃瓜在小腹兩旁橫骨兩紋約中俗名便癰得於重感春夏大燠勞於使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之按血疝初得之宜雙解湯以下之後用四聖散以托之水疝者其狀腎囊腫痛陰汗時出或囊腫狀如水晶或囊癢而搔出黃水或小腹按之作水聲得於飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水冷令人為卒疝宜以逐水之劑下之按水疝初得之宜辨疑加味五苓散或五苓散煎湯吞四神丸主之病久者實則瀉之宜茴香楝實丸虛則補之宜安腎丸奪命丹主之筋疝者其狀陰莖腫脹或潰而為膿裡急筋縮或莖中作痛痛極則癢或挺縱不收或出白物如精隨溲而下得之於房室勞傷或邪術所使宜以降心火之劑下之按筋疝初得之邪氣正實宜導赤散送下導水丸以瀉之久則氣虛宜蒼朮難名丹以收斂之或清心蓮子飲方見淋濁氣疝者其狀上連腎腧下及陰囊多得於號哭忿怒則氣鬱而脹號哭忿怒罷即氣散者是也有用針出氣而愈者針有得失宜以散氣之劑下之小兒多有此疾俗名偏墜得之於父已年老或年少多病陰痿精怯強力入房因而有子此胎病也其症難治惟築賓穴有灸之而愈者按氣疝初得之宜復元通氣散下之後以加減木香流氣飲以漸消之狐疝者其狀如仰瓦臥則入小腹行立則出小腹入囊中以手按之則有聲故云其大如瓜其聲如蛙狐則晝出穴而溺夜入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鉤鈴者是也宜以逐氣流經之劑下之按狐疝宜用復元通氣散下之後用金匱蜘蛛散作丸加味五苓散作湯送之大抵此病難治㿗疝者其症陰囊腫垂下如升斗不癢不痛者是也得之於地氣卑濕所生故江淮之間多有此疾宜以去濕之劑下之按㿗疝必不可下初服朮附散後附加味守效丸更灸章門二穴女子陰戶凸出雖亦㿗疝之類俗名茄病謂其下垂如茄狀也乃熱則不禁固之病不可認為虛寒而治以溫熱之劑宜以苦堅之甘緩之升而舉之可也此病難治宜東垣補肝湯及橘核丸主之灸氣海穴以上七疝丹溪通用二陳湯主治故治疝之方丹溪居多又如治食積與瘀血成痛者或陽明經濕熱傳入太陽小腹結核痛者或㿗疝腰痛者諸方與前治疝方大同小異今除古今方專用燥熱之藥者恐非久病鬱熱之人所用宜也姑舍之如五苓散之通治諸疝金匱之當歸生薑羊肉湯以治痛連兩脅直指之川楝丸金鈴散以治㿗疝辨疑之荔枝散青囊之四聖散蟠蔥散以治疝皆奇方也予之家傳加味芎歸湯以治諸疝屢用屢驗如脾腎素虛者宜補腎丸主之小腸氣與疝相如語症雖殊治不殊更有腎肝諸異症疑從濕熱一般除小腸氣者小腹痛控睪引腰脊上衝心痛而不腫者是也甲乙經云邪在小腸也謂寒邪始客於小腸因經絡並於厥陰故下控引睪丸而痛雖亦如疝然只言小腸氣所以古人治法並與疝同自有所兼之症殊不知痛引腰脊者此有表症也宜鹽煎散只引睪而痛者宜金鈴子散如痛上衝心者宜加味失笑散如小腹中有形如卵上下來去痛不可忍者宜葫蘆巴丸有表者加味香蘇散妙陰臊陰癢陰汗之病男女有之皆濕熱所為也並用龍膽瀉肝湯柴胡勝濕湯主之陰汗濕癢爬搔成瘡者先以吳茱萸或大腹皮蜂房煎湯洗之拭乾用爐甘石散滲之又方用糯草將皂角入草內燒煙燻之十餘遍即愈又方用豬尿胞火炙令熟空心吃鹽酒啖又方治陰囊潰爛者以野紫蘇葉火炙軟包貼甚良又方莖潰爛宜服當歸龍薈丸陰臭者宜先刺行間二穴後針少衝二穴並瀉之治疝諸方丹溪加減二陳湯丸治七疝多用熱藥而獲效者即內經從治之法耳須用寒涼之藥監製之不可純用大熱之劑加烏頭附子之類令人久服多服必變劇不可治矣但以本方加枳實橘核梔仁並炒長流水煎入薑汁食前熱辣飲之後有加減法瘀血作痛者加玄胡索桃仁泥滯氣作痛者加木香茴香楝實青皮如六脈沉細手足厥冷者加附子乾薑肉桂以佐之如睪丸痛甚者加荔枝炒乳香沒藥為細末入湯內調服如木腎腫大如升斗者去甘草加海藻昆布荔枝炒茴香炒川楝子共為末作丸服又方治食積與瘀血成痛者用梔子枳實桃仁吳茱萸各炒山楂等分為末順流水入薑汁作湯調服又方治陽明經受濕熱傳入太陽惡寒發熱小腹連毛髮結核悶痛不可忍者用梔仁桃仁枳核各炒山楂等分為末於砂缽內入薑汁用順流水蕩起煎熱服辨疑加味五苓散予考小腸多氣少血之經心氣鬱結則腑受邪肝氣一盛則子亦盛矣故二氣攻入小腸膀胱而痛者但手捫之可忍殊不知皮膜漸寬其氣愈熾服藥不能避忌年遠根深蒂固斯難治矣予每用五苓散加行氣之藥獲效者多故治小便出邪之法知者鮮矣五苓散加茴香橘核各炒川楝子木通檳榔丹溪治肥人腫疝作痛發熱惡寒者五苓散加茴香煎服如神元戎治疝氣卒痛小便澀者五苓散加川楝子為末米飲調服青囊治偏墜五苓散去桂加牽牛吳茱萸湯泡炒如脹加枳殼炒痛加八角茴香等分煎服金匱烏頭煎治寒疝繞臍痛若發則自汗出手足逆冷其脈沉弦烏頭大者五枚炮去皮上㕮咀以水三升煮取一升去烏頭入蜜二升煎令水氣盡取二升強人服七合弱人服五合不瘥明日再服不可一日頓服其寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當者以桂枝湯方見傷寒煎成五合解開烏頭煎五合共一升名烏頭桂枝湯初服二合不治即服三合又不治復加至五合其治者如醉狀得吐者為中病當歸生薑羊肉湯治寒疝腹中痛及脅痛裡急者當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一升再加水五升煮取三升二合痛而加嘔者加陳皮二兩白朮一兩三因蔥白散治一切冷痛疝痛疼川芎當歸枳殼炒官桂青皮乾薑厚朴炒茴香炒茯苓白芍川楝子麥蘖炒神麯炒三稜煨木香莪朮煨熟地黃人參各等分每服五錢蔥白二寸水煎鹽少許空心服東垣丁香楝實丸治男子七疝痛不可忍婦人瘕聚帶下皆任脈所主陰經也乃腎肝受病故治同法當歸附子炮茴香炒川楝子各二兩上㕮咀用好無灰酒三升同煮干為度焙乾作細末每藥末一兩入丁香木香各半錢玄胡索五錢全蠍十三個共為細末與前藥末和勻酒糊為丸如梧桐子大每服三十丸加一二百丸空心溫酒下茱萸內消丸治腎經虛弱膀胱為邪氣所搏致成寒疝陰㿗偏大山茱萸去核陳皮吳茱萸炒馬蘭花木香肉桂川楝子去核舶上茴香炒青皮破故紙炒各等分上為末酒糊丸如梧桐子大每服五十丸空心溫酒下加味茱萸內消丸治腎虛為邪所襲留伏作痛陰㿗偏大或生濕瘡出膿水吳茱萸半酒半醋浸一宿焙乾舶上茴香鹽炒山茱萸去核馬蘭花醋洗焙川楝子取肉官桂玄胡索略炒黑牽牛炒取頭末橘紅青皮海藻洗去咸石㕣各一兩桃仁浸去皮尖白蒺藜炒去粗木香各半兩上為末酒面稀糊為丸如梧桐子大每服四十丸食前溫酒鹽湯下四神丸治腎冷水疝脹痛吳茱萸用酒醋浸同上制大香附杵淨各一兩蓽澄茄木香各半兩上為末粳糊丸梧桐大每服七十丸用五苓散入連根蔥白一寸燈蕊七莖煎湯下茴香楝實丸治水疝痛不可忍及小腸氣痛川楝子炒茴香炒山茱萸去核食茱萸炒青皮吳茱萸炒陳皮芫花醋炒減半馬蘭花各等分上為末醋糊丸如梧桐子大每服三十丸空心溫酒下奪命丹治水疝腎腫硬日漸長陰間濕癢抓成瘡者吳茱萸四制用酒醋鹽湯童便各浸一宿一斤澤瀉焙乾二兩上為細末酒糊為丸如梧桐子大每服五十丸空心鹽湯下安腎丸治腎虛不足膀胱虛冷致成水疝川烏炒辣桂各二兩茯苓石斛酒炒白朮白蒺藜炒去刺巴戟肉蓯蓉酒洗焙萆薢山藥破故紙炒桃仁炒去皮尖各六兩上為細末煉蜜丸如梧桐子大每服五七十丸空心鹽湯下蒼朮難名丹治無陽氣衰脾精不禁或出白物如精隨便而下蒼朮擦去粗皮一斤米泔浸一夜焙乾舶上茴香炒川楝肉各三兩川烏炮破故紙炒白茯苓龍骨另研各二兩上為細末酒糊丸如梧桐子大硃砂為衣每服五十丸空心鹽湯下導水丸治濕熱內郁發為筋疝大黃黃芩條實者各二兩牽牛頭末白滑石各四兩上為細末水丸如梧桐子大每服四五十丸用導赤散木通生地黃甘草梢子等分煎湯送下雙解湯治血疝內蘊熱氣外挾寒邪精血交滯腫結疼痛辣桂川大黃生白芍藥澤瀉牽牛炒取頭末桃仁去皮炒各等分甘草節減半各㕮咀為末每服五錢姜五片食前煎服日兩服先小便快熱從小便出後大便利皆是稠毒四聖散治血疝便毒及腸癰神效生黃瓜蔞去皮一枚粉草末四錢沒藥末三錢乳香末一錢上件用好紅酒二大碗慢火煎至一盞分作兩服兩日服盡大便順導惡物妙若干瓜蔞則用兩枚復元通氣湯治氣疝作痛舶上茴香炒穿山甲蛤粉炒胖木香各一兩半玄胡索白醜頭末炙草陳皮去白各一兩乳香末當歸一兩半沒藥末各半兩上為細末每服二錢空心熱酒調下加減木香流氣飲治氣疝不消木香青皮不去穰香附醋浸白芷甘草減半陳皮莪朮煨三稜煨川楝肉茴香炒枳實炒山楂肉半夏茯苓蘇葉檳榔白朮肉桂木通厚朴炒川芎當歸石菖蒲大腹皮各等分共為細末每服一二錢食前溫酒調服日三服清膈丸治因濕熱氣滯黃芩黃連炒各五錢香附二兩半蒼朮制二兩上為細末新取紅熟瓜蔞去皮和子搗爛和藥丸如綠豆大每服三五十丸白湯下金匱蜘蛛散治陰狐疝氣偏有大小時上時下大蜘蛛炙焦十四枚辣桂半兩上為細末米飲和服八分日再服蜜丸亦可丹溪治疝方名朮附湯治㿗疝一名木腎蒼朮香附各鹽炒黃柏酒炒以上為君青皮去白玄胡索益智桃仁以上為臣茴香鹽炒附子炮炙草以上為使上㕮咀每服五錢順流水煎服加味守效丸治㿗疝要藥不痛者此丹溪方法也南星山楂蒼朮各二兩白芷半夏制枳實炒神麯炒各一兩海藻半兩昆布半兩玄明粉吳茱萸加青皮荔枝核各一兩上為末別取神麯糊丸空心酒下經驗馬蘭花丸治七疝㿗氣及婦人陰㿗墜下小兒偏墜皆效馬蘭花酒炒川楝肉橘核海藻海帶昆布三味各用鹽酒炒桃仁去皮各一兩木通厚朴制枳實炒肉桂玄胡索木香檳榔各半兩脈沉細手足逆冷者加川烏炮各五錢上為細末酒糊丸如梧桐子大每服五七十丸或酒或姜鹽湯下橘核丸治男子木腎婦人陰㿗橘核炒南星炮半夏洗黃柏酒炒蒼朮鹽炒山楂肉白芷神麯炒滑石昆布吳茱萸酒醋分浸各等分婦人加當歸川芎上為末酒糊丸如梧桐子大空心鹽湯下五七十丸東垣補肝湯治男子前陰如水女子陰㿗皆腎肝虛也黃耆七分人參葛根白茯苓各三分升麻四分柴胡羌活當歸身黃柏炒連翹澤瀉蒼朮炒炒曲知母防風陳皮各二分豬苓四分炙草半錢上㕮咀水二盞煎一盞空心稍熱服加味香蘇散治小腸氣腎核脹痛蒼朮香附陳皮川楝肉各二錢甘草五分蘇葉一錢半作一服酒水各一盞連須蔥白五根煎服五葉湯治疝痛立效椒葉枇杷葉野紫蘇葉蒼耳葉桃葉水晶蒲上五味不拘多少煎湯浴洗川楝丸治外腎脹大麻木痛硬及小腸氣偏墜等症川楝子四十九粒不蛀者分七制取肉一分茴香二錢半同炒留茴一分破故紙二錢同炒留故紙一分黑醜二錢半同炒留醜一分鹽一錢同炒留鹽一分斑貓十四個同炒去貓一分巴豆十四個兩斷同炒去豆又一分川蘿蔔子二錢半同炒去蘿蔔不用舶上茴香炒半兩木香辣桂各二錢半上川楝子並所留藥與後三味各為細末酒調稀糊為丸梧桐子大每服三十丸食前鹽酒下積日計功金鈴子即川楝子散治膀胱小腸氣外腎腫痛大川楝子用湯浸去皮七個切作薄片以巴豆三十五去皮每粒作兩三段夾炒候巴豆色焦去巴不用舶上茴香等分木香減半共為細末每服二錢酒水各半碗連根蔥白二寸煎汁食前調下荔枝散治疝氣陰核腫大痛不可忍荔枝核十四枚新者燒存性沉香木香青鹽炒八角茴香炒食鹽炒各一錢川楝肉小茴香炒各二錢上為細末酒調服二錢一服痛住甚妙蟠蔥散即五苓散去桂加黑醜桔梗車前子是也治疝氣效補腎湯治脾腎俱虛疝氣入腹小腹絞痛胸隔痞塞人參茯苓黃耆附子炮白朮各一錢沉香四分木瓜一錢五分羌活五分炙草川芎各二分紫蘇三分水二盞姜三片棗二枚煎一盅食前服家傳芎歸湯治諸疝神效川芎當歸尾青皮不去穰木香山楂山梔仁炒木通川楝子小茴香豬苓澤瀉各等分上㕮咀用流水煎空心服鹽煎散治小腸氣吊腹中成陣刺痛痛引腰脊益智仁白芷乾薑炮茴香炒烏藥甘草炙香附各一錢檳榔麻黃去節川芎枳殼炒各五分青皮上分作二服每服入鹽少許水煎食前服加味失笑散治小腸氣痛上衝心者五靈脂蒲黃隔紙炒加玄胡索各等分上為細末每服二錢酒水各半盞煎七分食前服胡蘆巴丸治小腸氣蟠腸氣奔豚疝氣偏墜陰腫小便有形如卵上下來去痛不可忍或絞結繞臍攻刺嘔吐者胡蘆巴炒川楝子蒸去皮核焙各四錢川烏炮去皮臍巴戟肉各一錢半茴香炒三錢吳茱萸半酒半醋浸一宿焙二錢半牽牛炒取頭末二錢上為細末酒面稀糊丸如梧桐子大每二十丸空心溫酒下龍膽瀉肝湯治陰部時復濕癢及臊臭柴胡澤瀉各一錢車前子木通各五分生地黃當歸尾龍膽草各五分上㕮咀水三大盞煎至一盞去粗空心宿食消盡帶熱服更以美膳壓之柴胡勝濕湯治外腎冷兩髀樞陰痿陰濕癢臊臭生甘草酒黃柏各一錢柴胡當歸尾龍膽草麻黃根羌活茯苓漢防己各五分紅花少許五味子三粒升麻澤瀉各七分半上作一服水三盞煎至一盞去粗食前服忌酒雞面房事爐甘石散治陰汗濕汗及陰莖陰囊潰爛爐甘石綠色者煅一兩真蛤粉黃連五倍子各半兩上為末先以蜂房大腹皮煎湯溫洗後拭乾上藥
