body:
  text: 卷之十八哮喘哮為惡候古今傳宿疾綿延卻不嫌五虎蘇沉能解急未聞有藥可除根哮以聲名喘以息急言夫喘促喉中如水雞聲者謂之哮氣促而連屬不能以息者謂之喘哮為咽痰喘為暴病治之各不同也人素有哮喘者遇天寒暄不常則發發則連綿不已宜蘇沉九寶湯最捷藥也又經驗祕方可選用之忌用信砒恐致殺人人之病喘者須審其受病之因如因於風寒外感者宜五虎湯麻黃瀉白散主之如因水氣乘肺而喘者宜郁李仁丸主之如痰盛者宜千緡湯丹溪治痰喘方主之因於肺熱者宜寶鑑加減瀉白散河間葶藶大棗瀉肺湯虛者宜五味子湯主之人有大病不得瘥一朝加喘者不治故汗出發潤喘者為肺絶身汗如油喘者為命絶直視譫語喘滿者死諸有篤病正氣欲絶之時邪氣盛行多壅逆而為喘然則喘之危惡又豈可以尋常目之上氣喘呼痰有聲四肢冷逆汗浸淫脈浮遲滑人生也澀數微虛命必傾經曰諸逆衝上皆屬於火上氣喘呼痰鳴有聲火炎上之象也手足逆冷汗出膚寒者火極而兼水化也以脈決之其脈浮滑而遲者吉數疾微澀者凶治喘經驗方蘇沉九寶湯治老人小兒素有哮喘遇寒喧不常發則連綿不已咳嗽哮吼夜不得臥桑白皮蜜炒薄荷葉大腹皮紫蘇葉甘草炙麻黃去節官桂陳皮去白杏仁去皮尖各等分上㕮咀水一盞半薑三片烏梅半個煎八分食後臨臥溫服經驗祕方治遠年哮喘桑樹內蠹蟲糞一升炒蘿蔔子半升炒甘草生三兩杏仁半升不去皮尖炒另研共為極細末湯浸蒸餅為丸如梧桐子大每服五七十丸淡薑湯送下又方用苧麻根和沙糖煮爛時時咀嚼咽下永絶病根神效五虎湯治喘急痰氣麻黃七分杏仁去皮尖二錢甘草四分細茶炒八分白石膏一錢半上㕮咀水煎服麻黃瀉白散治大人小兒風寒傷肺喘急咳嗽桑白皮地骨皮各一錢甘草麻黃杏仁各半錢上㕮咀加薑三片水煎服神效寶鑑加減瀉白散治上氣喘促口乾煩熱咽膈不利桑白皮一錢地骨皮細黃芩陳皮去白青皮去白桔梗甘草各五分上㕮咀水煎食後服郁李仁丸治水氣乘肺氣逆而喘葶藶如上制郁李仁去殼炒真蘇子炒杏仁去皮尖陳皮去白防己赤茯苓各等分上為末煉蜜丸如梧桐子大每服三四十丸食後生薑紫蘇湯下千緡湯治痰喘不能臥人扶而坐一服即安半夏七枚湯泡七次甘草炙一寸生薑一指牙皂一寸上㕮咀作一服水煎丹溪治痰喘方南星炮一兩半夏洗七次二兩二味研末薑汁作曲杏仁去皮尖瓜蔞子去殼各研取霜香附子童便浸陳皮去白皂角燒存性蘿蔔子蒸各半兩上為末神麯糊為丸每服六七十丸薑湯下五味子湯治肺虛而喘五味子五十枚麥門冬去心杏仁去皮尖人參陳皮去白生薑各一線大棗三枚上㕮咀作二服每服水二盞煎一盞食後溫服河間葶藶大棗瀉肺湯治肺脹胸滿上氣喘急葶藶子不拘多少炒為末煉蜜丸如彈子大上以水三盞大棗十枚煎二盞去棗入葶藶丸一丸再煎至一盞溫服灸法璇璣一穴氣海一穴足三里二穴
