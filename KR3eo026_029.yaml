body:
  text: 卷之二十九頭痛頭風頭眩嘗稽頭痛古諸方未有東垣法盡詳蘭室祕藏開鎖鑰得其門入任弛張東垣云太陽頭痛脈浮緊惡風寒川芎羌活獨活麻黃之類為主少陽頭痛脈弦細往來寒熱柴胡為主陽明頭痛身熱目疼鼻乾發熱惡熱其脈浮大而長升麻湯或石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩以蒼朮半夏南星為主少陰頭痛三陰三陽經不流行而足寒氣逆為寒熱其脈沉細麻黃附子細辛湯為主厥陰頭痛頂痛或吐涎沫厥冷其脈沉緩吳茱萸湯為主諸血虛頭痛當歸川芎為主諸氣虛頭痛人參黃耆為主為主者主治也兼是何證以佐使藥佐之此立方之大法也氣血俱虛頭痛者於調中益氣湯中少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯厥逆頭痛藥也如濕氣在頭者以苦吐之凡頭痛者木也風則溫也故頭痛皆以風藥治之高巔之上惟風可到故味之薄者乃陰中之陽自地升天者也有真頭痛甚則腦盡痛手足寒至節者死不治此經中所謂厥頭痛也厥者逆也逆壅而衝於頭也痛引腦巔陷至泥丸宮故名真頭痛非藥之能治夕發旦死旦發夕死真氣絶也按頭痛之證有自外而生者知風寒暑濕之邪則依東垣分六經之類而治於外也有自內而生者如氣血痰飲之動則依東垣治氣虛血虛痰厥之類以調其內而治於外也更以脈辨之脈訣舉要云頭痛陽弦浮風緊寒風熱洪數濕細而堅氣虛頭痛雖弦必澀痰厥則滑腎厥則堅實又脈訣云頭痛短澀應須死浮滑風痰病易除又參以諸賢之論其法大備傷寒頭痛有仲景法諸經氣滯亦作頭痛宜分經理氣處治夫風從上受之邪從外入客於經絡為頭痛者宜川芎茶調散徹清膏主之有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛宜羌活附子湯主之有風濕熱頭痛者宜東垣青空膏丹溪方主之濕氣在上以苦吐之此霧露清邪之氣中於上竅也宜搐鼻瓜蒂散子和云頭痛不止乃三陽受病也宜元戎湯主之真痰厥頭痛者頭苦痛如裂眼黑頭旋噁心煩悶目不敢開如在風雲中此是太陰痰厥頭痛也宜半夏白朮天麻湯主之有氣血俱虛頭痛者宜加味調中益氣湯主之有勞役下虛之人似傷寒發熱汗出兩太陽痛甚此相火自下衝上也宜補中益氣湯加川芎當歸甚者加知母黃柏蔓荊子細辛有年高氣弱之人清氣不能上升頭目昏悶本無表邪因誤汗之清陽之氣愈虛故苦頭痛惡風不喜飲食氣短脈弱弦細而微宜升陽氣順氣和中湯主之偏正頭風作宿疴久而不已屬痰多不分所屬論虛實檢盡方書沒奈何病初得之只是頭痛久而不已則成頭風頭風之病有偏有正正頭痛者屬足太陽經偏頭痛者或眉眶骨痛或額上痛皆屬少陽經多主於痰丹溪云偏頭風在右屬痰屬熱痰用蒼朮半夏熱用製片黃芩在左屬風及血風用荊芥薄荷血虛用芎歸芍藥酒黃柏諸家不分所屬故藥多不效少陽偏頭痛者多大便祕或可下之虛者氣與血也實者痰也凡偏正頭疼年深不愈者宜常服玉壺丸以治其痰靈砂丹以治其熱此因其未至而防之也病發之時宜青空膏川芎散外用搐鼻散藥如上清散救苦散此因其至而攻之也頭痛少愈病在右者用二陳湯加蒼朮酒炒芩連川芎病在左者用四物湯加荊芥薄荷酒黃柏此因其至而送之也更灸百會風池俠溪有熱厥頭痛者雖冬天大寒常喜寒風吹之頭痛即愈略來暖處或見煙火其痛復作宜清上瀉火湯羌活湯久頭痛病略感風寒便發冬月須重綿厚帕包裹此屬鬱熱本熱而標寒世人不知用辛溫解散之藥暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疏故風寒易入外寒微解內熱固閉逆而為痛辛熱之藥雖能開通閉逆散其標之寒邪然以熱濟熱病本益深惡寒愈甚矣婦人多有此病當瀉火涼血為主而佐以辛溫散表之劑以從治之法治之則本可除而病可愈矣宜常服靈砂丹眉稜骨痛屬風熱與痰丹溪有方或選奇湯有頭痛連眼痛此風熱上攻也宜菊花茶調散上清散眼黑頭旋總是虛挾痰挾火中風如勿從標治專從本氣血平和病自除眩者眼黑也運者頭旋也痰在上火在下火炎上而動其痰故眼生黑花頭旋神昏甚則顛臥有如中風之狀此皆虛慎勿用辛發之藥誤作風治必致殺人治宜補虛為主如肥白之人濕痰滯於上陰火起於下是以痰挾虛火上衝頭目正氣不能制敵故忽然眼黑生花若坐舟車而旋轉也甚而至於卒倒無所知者有之丹溪所謂無痰不作收者是也宜加味六君子湯主之如氣虛甚而挾痰者以四君子湯為主倍蜜炙黃耆加半夏橘紅去白少加川芎荊芥穗以清利頭目如曾有痰盛而挾氣虛者以二陳湯為主加蜜炙黃耆人參白朮或少加熟附子以補其虛入薑汁竹瀝以行其痰如黑瘦之人軀體薄弱真水虧缺或房勞過度相火上炎亦有眩運者此火也治宜滋陰降火安神湯主之如體瘦血虛而痰火兼盛者宜四物湯合二陳湯加酒片芩薄荷葉入竹瀝薑汁童便以清痰降火如無痰證只見風虛者宜四物湯為君少加防風荊芥秦艽羌活如有內傷之人氣虛眩暈目不敢開兀兀欲吐如在風雲之中此痰涎作眩運也宜治痰為主半夏白朮天麻湯主之如淫欲過度腎家不能納氣歸元使諸氣逆奔而上此眩運出於氣虛也當以補腎為主八味地黃丸主之或固真丹如吐衄崩漏肝家不能收攝榮氣使諸血失道妄行此眩運生於血虛也當以補肝為主川芎散加當歸生地黃主之如因汗多亡陽下多亡陰而至眩暈者亦宜補中益氣湯合小建中湯或十全大補湯以補其氣血為主又傷寒太陽病先下之不愈復發汗此表裡俱虛其人因致冒家汗出自愈又新産婦人有冒者乃血虛而厥厥而必冒冒家欲解必大汗出由此觀之眩冒為虛可知矣若少陰病下利不止而頭眩時時自冒者必死謂虛極而脫也有因風火所動者宜清上降火防風通聖散方見中風門有因風寒所傷者宜溫經補虛附子理中湯加細辛方見中寒門有因暑熱所中者宜清暑益氣湯方見中暑門有因冒雨中濕者宜和中散嚴氏芎術湯有因七情感動痰涎壅盛者宜開痰導滯此中氣病也宜烏藥順氣散重則吐下吐以稀涎散下以控涎丹方見痰飲門又蘇青丸大效有眩運不可當者以大黃酒炒為末酒拌炒二次清茶調下急則治其標也頭痛風眩諸方川芎茶調散治諸風上攻頭目昏痛鼻塞聲重薄荷四兩荊芥穗川芎各二兩羌活白芷甘草炙各一兩細辛半兩防風二錢半上為末每服二錢食後濃煎茶湯調下徹青膏蔓荊子細辛各一錢薄荷葉川芎各三錢生甘草炙甘草各五錢藁本一兩上為細末每服二錢食後清茶下羌活附子湯治冬月大寒犯腦令人腦痛齒亦痛名曰腦風麻黃不去節黑附子防風白芷黃柏白殭蠶各二分羌活蒼朮各五分升麻二分佛耳草三分無寒嗽去之黃耆一分甘草二分上㕮咀水煎服清空膏治偏正頭痛年深久不愈者善療風濕熱頭痛上壅頭目及腦痛不止者除血虛頭痛不治川芎五錢柴胡七錢黃連酒炒防風去蘆羌活各一兩炙甘草一兩半片黃芩切片酒拌濕一半炒乾一半曬乾三兩上為細末每服二錢放盞內入濃茶少許調如膏臨臥抹口內少用白湯送下如頭苦痛每服加細辛末二分如太陰脈緩有痰名痰厥頭痛減羌活防風川芎甘草加半夏曲一兩半如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍此少陽經頭痛也如發熱惡熱而渴此陽明頭痛只服白虎湯加白芷立愈丹溪方治風濕熱頭痛神效片芩酒拌炒一兩蒼朮羌活防風各五錢蒼耳子三錢細辛二錢上為細末以生薑三片搗碎和藥末三錢搗勻清茶調下又方酒片芩五錢蒼朮半夏曲各二錢半羌活蒼耳子生甘草酒黃連川芎各一錢半上為細末服法同上又方治頭風熱痛不可忍者小川芎一兩白芷半兩細芽茶三錢荊芥穗四錢薄荷葉二錢半片黃芩酒拌濕炒再拌再炒如此三次不可令焦三兩上為細末每服二錢清茶調下搐鼻瓜蒂散治偏頭痛久不愈服藥及灸針不效者此濕氣在頭也用瓜蒂一味為末少許吹鼻中滴水徐徐出一晝夜濕盡痛止為度元戎治三陽頭痛方羌活防風升麻葛根白芷石膏柴胡川芎芍藥細辛荊芥穗蔥白要連須各等分上㕮咀每服五錢水二盞煎至一盞食後溫服半夏白朮天麻湯治痰厥頭痛眼黑頭旋噁心煩悶氣促上喘無力以言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥此足太陰痰厥頭痛也黃柏一分乾薑二分澤瀉白茯苓天麻黃耆人參蒼朮各三分半神麯白朮各五分橘紅半夏湯洗去皮臍麥芽面各七分半上㕮咀作一服水二盞生薑三片煎至一盞去渣稍熱服加味調中益氣湯治氣血俱虛頭痛其效如神黃柏酒炒陳皮各三分升麻柴胡各四分炙甘草人參去蘆蒼朮各六分蔓荊子三分黃耆一錢川芎六分細辛二分當歸身五分上㕮咀作一服水二盞煎一盞去渣溫服一方無黃柏有木香二分順氣和中湯治年高氣弱清氣不能上升頭目眩悶本無表證因發汗數次清陽之氣愈虛故苦頭痛惡寒不喜飲食氣短脈弱弦細而微宜服以升陽氣黃耆一錢半人參一錢白朮陳皮當歸白芍藥各五分甘草七分升麻柴胡各三分川芎蔓荊子細辛各一分上㕮咀作一服水二盞煎一盞去渣溫服食後服此補中益氣湯加減法也玉壺丸治風濕痰頭痛每發時兩頰青黃眩運目不欲開懶欲言語身重兀兀欲吐數日方愈此厥陰太陰合而為病又名水煮金花丸雄黃一錢南星煨裂半夏湯泡天麻白朮各二錢上為細末薑汁浸蒸餅為丸靈砂丹治風熱鬱結氣血蘊滯頭目昏眩鼻塞聲重及偏正頭痛天麻獨活羌活細辛石膏防風連翹薄荷各一兩荊芥穗川芎芍藥當歸梔子仁黃芩大黃生全蠍去毒炒菊花人參白朮各半兩滑石四兩砂仁二錢半硃砂水飛二兩為衣桔梗寒水石生生甘草各二兩上為細末煉蜜丸每兩作十丸硃砂為衣每服一丸細嚼清茶送下此防風通聖散加減法也東垣川芎散治頭目不清利偏正頭風川芎五錢柴胡七錢羌活防風藁本升麻生甘草各一兩炙甘草生地黃各一兩半酒黃連酒片各二兩炒三次上為細末每服二錢食後清茶湯調下上清散治因風頭痛眉骨眼眶俱痛不可忍者川芎赤芍藥荊芥穗鬱金芒硝薄荷葉各二錢半乳香沒藥各半錢腦子二分半一方無腦子加雄黃五分上為細末每服一字鼻內搐之左搐左右搐右口中噙水救苦散專治傷風傷寒頭目不清川芎藿香葉藜蘆各三錢玄胡索硃砂水飛牡丹皮各二錢雄黃水飛白芷豬牙皂角各四錢上為細末每服一些以竹筒吹入兩鼻內卻飲生蔥熱茶取汗清上瀉火湯治熱厥頭痛川芎荊芥穗各二錢蔓荊子當歸身蒼朮各三分酒黃連生地黃藁本各四分升麻防風各三分半生甘草二分酒黃柏黃耆炙甘草各五分酒黃芩七分酒知母七分羌活八分柴胡一錢細辛三分酒紅花少許共㕮咀作一服水二盞煎一盞去渣食後稍熱服東垣羌活湯治風熱壅盛上攻頭目昏眩炙甘草一分半澤瀉三分白茯苓酒瓜蔞根酒黃柏各四分柴胡五分酒黃芩酒黃連防風羌活各六分上㕮咀作一服水二盞煎一盞食後或臥時服丹溪治眉稜骨痛方屬風熱與痰白芷片芩酒炒如上法上等分為細末每服二錢清茶調下選奇湯治眉骨痛不可忍神效羌活防風各二錢片酒芩一錢冬減半甚者不減甘草一錢夏生冬炒上㕮咀作一服水一盞半煎一盞食後服菊花茶調散治偏正頭痛連眼痛菊花川芎荊芥穗羌活甘草白芷各二錢細辛一錢防風一錢半白殭蠶蟬蛻薄荷葉各半錢上為細末每服二錢食後清茶調服雷頭風病宜服升麻湯升麻湯升麻蒼朮荷葉一個全者妙在此味上為細末每服五錢水一盞煎七分食後溫服芎芷散治陽明頭痛大效又名石膏散川芎白芷石膏各等分為細末每服四錢清茶調下加味六君子湯治氣虛痰盛兼挾風邪眩運不休者四君子湯方見氣門二陳湯方見痰門二方相合加荊芥穗半錢上㕮咀生薑三片大棗一枚水二盞煎至一盞去渣入竹瀝一大匙溫服安神湯治頭痛旋黑生甘草炙甘草各一分防風二分半生地黃酒浸洗柴胡升麻知母酒炒各五分黃柏酒炒羌活各一錢黃耆一錢半上上㕮咀作一服水二盞煎至一盞半加蔓荊子五分川芎三分再煎至一盞去渣臨臥稍熱服八味地黃丸治人色欲過度腎虛眩運者即六味地黃丸方見虛損門加肉桂熟附子各一兩上為細末煉蜜丸如梧桐子大每服十五丸溫酒下固真丹治證同上又補諸虛下元虧損乾山藥炒一兩半人參當歸酒浸黃耆炒杜仲酒拌炒取末黃柏炒白朮補骨脂炒白茯苓牡丹皮山茱萸取肉各一兩澤瀉五味子炒各半兩熟地黃焙四兩共為極細末煉蜜丸如梧桐子大每服八九十丸空心鹽湯下本事川芎散治肝虛血少眩運山茱萸取肉一兩山藥人參小芎藭甘菊花茯神各一兩半加當歸身生地黃各半兩上為細末每服二錢溫酒調下蘇青丸治因氣因痰成眩運者又治中氣等證真蘇合香丸真青州白丸子三十丸全蠍一枚炙為末上三件研和每服一錢用紫蘇橘皮煎湯入薑汁少許調服
