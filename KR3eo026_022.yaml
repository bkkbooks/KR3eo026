body:
  text: 卷之二十二痢疾滯下皆因熱濕成莫將白痢作寒稱河間著論傳千古布在方書著意尋赤白痢疾古人謂之滯下者是也皆屬濕熱之氣如夏秋之間溽暑時行此濕熱之氣生於外感者也恣飲酒酪耽嗜肥甘此濕熱之氣生於內傷者也內外交感乃成痢疾腸鳴腹痛裡急後重泄利頻並膿血稠黏俗云無積不成痢是也痢有赤白者蓋心主血肺主氣白屬肺金此氣受病也所下之物從大腸而來故其色白即難經所謂大腸泄也宜用辛溫之藥以散之加生薑之類赤屬心火此血受病也所下之物從小腸而來故其色赤即難經所謂小腸泄也宜用苦涼之藥以清之如黃連之類赤白相雜氣血俱受病也宜寒熱兼用以和之如香連丸是也世人以赤痢為熱白痢為寒者誤矣原病式論之甚詳當熟玩之河間曰行血則便膿自愈和氣則後重自除又曰後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重藥竭之身冷自汗以熱藥溫之風邪外束宜汗之鶩溏為痢宜溫之又曰在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之此治利之大法也瀉痢須分腎與脾發明精義感丹溪常將脈證分輕重治不乖方號上醫丹溪曰先水瀉而後膿血者此脾傳腎賊邪難愈先膿血而後水泄者此腎傳脾微邪易愈由此言之瀉為脾病痢為腎病也按內經云溲而便膿血知氣行而血止也夫腎開竅於二陰前陰主氣溲澀不利莖中痛者氣受病也後陰主血裡急後重便膿血者血受病也即難經所謂大瘕泄也愚按先瀉後痢裡急後重者胃氣之下陷也膿血交雜者腸垢之下溜也腸胃敗而水穀絶故死先痢後瀉便溺自利者濕熱之氣除也膿血不來者積滯之物盡也腸胃和而水穀通故易愈也病瀉久虛滑不愈者或腹痛或後重多傳變為痢疾宜厚朴枳實湯以防其傳變也蓋胃為戊土腎為癸水瀉變為痢者戊傳癸也陽去入陰陷於陰中而成痢痢變為瀉者癸傳戊也陰來從陽穀氣還胃而將愈此瀉痢先後輕重之別也經云身涼脈細者生身熱脈大者死亦言其大略也假如初得病時元氣未衰穀氣尚強其脈未有不大而滑者惟久病之人脾胃已傷血氣已弱故脈來沉小流連身溫者生脈來浮大弦急身熱者死此邪氣盛也如脈沉微細弱身涼皮寒者此正氣已奪謂之五虛者死凡下痢純血者如塵腐色者如屋漏水者如魚腦髓者作腥臭者大孔開如竹筒者面赤唇硃紅者俱死證也疫痢時行倉廩湯柴苓和解最宜良蕩除積滯惟承氣勿犯巴硇用局方有時疫作痢傳染相似宜推明運氣之勝復以治之所謂勝復者不越六氣之變也四時疫痢宜首用敗毒散加陳皮陳倉米名倉廩湯為主治隨其所勝之氣加減用之其有初病挾外感者發熱惡寒身首俱痛此為表證宜以微汗而解則痢自止如不止者以柴苓湯和之不可遽下遽止也其初得病無外感證只腹痛窘迫者此裡急證也必推蕩之此通因通用之法宜大承氣湯或調胃承氣湯調木香散以下之下後積去則痢自止如不止者宜河間芍藥湯以和之仲景治痢可下者悉用承氣等湯加減下之大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快積行即止局方用砒丹巴硇類聚成丸其氣凶暴其體重滯積氣已行而毒氣未消縱有愈病之功而腸胃清純之氣寧無損傷之患乎故有可下之證者木香檳榔丸最穩治痢先從赤白分腹疼後重細評論於中新久詳虛實合作湯丸補瀉行下痢赤積身熱腹痛裡急後重者宜芍藥湯調天水散下痢白積腹痛裡急後重者宜芍藥湯加陳皮白朮乾薑調服天水散即益元散乃治痢之聖藥也方見暑病大便後下血腹中不痛者謂之濕毒下血黃連湯調天水散大便後下血腹中痛者謂之熱毒下血芍藥黃連湯主之大便下血小便利者加減四物湯主之方見血病又四物柏皮湯熱痢血痢小便不利者宜八正散去瞿麥扁蓄合四物湯或加味三黃解毒丸主之血痢久不止者宜四物湯送下黃連阿膠丸主之方見泄瀉濕熱下痢小便澀少煩渴能食腹痛後重脈洪大而緩者宜桂苓甘露飲送下保和丸二三十粒此丹溪保和丸方見內傷濕多熱少脾胃不和食少腹痛後重夜多利下宜胃苓湯方見泄瀉送下保和丸二三十粒脾胃不和食少腹脹痛後重脈弦緊宜平胃散方見濕病加白朮芍藥官桂葛根茯苓下保和丸下痢血氣太虛腹痛頻並後重不食或産後得此證宜四君子湯方見氣門加當歸陳皮下保和丸二三十粒氣虛而色萎黃或枯白色人疲倦痢頻並腹痛後重不食脈細弱或微汗時出宜黃耆建中湯方見虛損門下保和丸二三十粒丹溪保和丸乃治積滯下利之聖藥也凡病利者用藥轉下之後不可再下重傷胃氣使氣陷下而痢不止也設有腹痛後重之證只用保和丸分赤白調之赤痢以四物湯白痢以四君子湯赤白相雜以八物湯送下兼服香連丸未有不愈者如無腹痛後重之證不可服保和丸痢疾腹痛者有實有虛初下痢者為實宜下之如大承氣湯木香檳榔丸之類不可驟用參朮縱氣虛胃弱皆不可用恐阻住積滯不得去也如轉下消導之後其痢日久而腹痛者皆為虛也宜溫散之補藥小建中湯方見傷寒加當歸青皮薑棗煎服腹痛者以脈別之脈弦滑實大者為實宜下之脈沉遲微弱者為虛宜補之機要云腹痛者和之補之瀉之皆治法也裡急後重有實有虛實者乃濕熱之氣與積滯之物共墜而下也其脈必滑而洪實乃大腸經之氣不得宣通也宜三乙承氣湯方見傷寒調木香散以下之輕者木香檳榔丸通之如曾轉下更不止者保和丸主之有下墜異常積中有紫黑色而又痛甚者此屬死血證宜桃仁承氣下之方見傷寒下痢日久脈沉細弱者此虛也故氣虛則大腸氣降而不能升血虛者虛坐努責者兼升兼補尤當和氣方見內傷宜補中益氣湯倍加歸身尾加白芍生地黃而以桃仁泥佐之氣升血生自安大孔下痢時痛者因熱流於下也宜芍藥湯去大黃桂加炒乾姜即止久而不止再加秦艽餘邪已盡尚更衣補澀湯丸不用疑噤口脫肛俱有法膝臏腫痛足難移如痢已減十之七八穢積已除糟粕未盡而更衣不息者此大腸不行收令故也亦當以澀藥止之用加味白朮芍藥湯送下固腸丸二三十粒此丸性燥澀有去濕實腸之功若滯氣未盡者勿遽用也如久痢體虛氣弱滑泄不止者宜補澀之如參香散真人養臟湯和中飲阿膠梅連丸量其虛實寒熱擇而用之如受病既久氣血俱傷故纏墜而赤白兼下脾胃氣陷或經年者名休息痢宜阿膠梅連丸主之久痢已數月不能起床不食瘦弱之甚者宜加減補中益氣湯下利不止須灸天樞氣海穴見前霍亂痢而能食知胃未病此吉兆也若脾胃濕熱之毒熏蒸清道而上以致胃口閉塞而成噤口之證聞食即吐食不入得谷則昌絶谷則亡痢而不食此凶兆也亦有脾胃虛而不能食者或用石蓮肉通心氣敗毒散之散毒邪山藥之補脾胃果能開胃口而進食乎其毒氣上衝者宜用丹溪方以黃連人參二味煎湯終日呷之如吐則再強飲便得一呷下咽便好又用田螺搗爛盒臍中以引下其熱其脾胃虛者用仁齊法以參苓白朮散加石菖蒲末陳粳米湯調下此方中有蓮肉山藥胸次一開自然思食脫肛證有因努責而出者宜芍藥湯少加酒大黃以瀉其濕熱積滯之氣痢止大便自調肛不復脫矣有因氣虛下陷而脫出者宜用補中益氣湯倍加當歸白芍藥使氣升血生痢自止而肛不出矣其有不收者外用荊芥穗五倍子末朴硝煎湯燻洗輕手按入以帛勒之再灸百會長強穴痢後腳弱漸細者用加味二妙丸以四物湯加陳皮甘草煎湯送下有膝臏腫痛不能行動者宜二防飲陳氏補腎地黃主之治痢經驗諸方河間芍藥湯行血則便膿自愈和氣則後重自除此治痢之神方也白芍藥二錢當歸尾黃芩黃連各一錢大黃七分甘草檳榔末木香末桂心各五分上㕮咀水一盞半煎一盞空心服如病初後重窘迫甚者本方倍加大黃加芒硝一錢如痞滿不宣通加枳實一錢如臟毒下血加黃柏一錢香連丸治下痢膿血赤白相雜裡急後重此治痢之要藥也黃連用吳茱萸一兩各以酒拌濕同炒去萸不用二兩木香不見火四錢八分石蓮肉去殼八錢上為細末醋糊為丸如梧桐子大每服三五十丸陳倉米煮湯送下厚朴枳實散滑瀉久不止者多傳變為痢疾太陰傳少陰是為賊邪以此治之防其傳變也厚朴去皮訶子半生半熟枳實各一兩木香半兩甘草炙三錢黃連大黃各二錢上為末每服三五錢水一盞半煎一盞去渣溫服黃連湯治大便後下血腹中不痛謂之濕毒下血黃連淨當歸各半兩甘草二錢上㕮咀作二服水一盞煎七分食後溫服倉廩湯治時疫痢即敗毒散見前瘟疫加陳皮陳倉米是也風勝者倍甘草加當歸白芍藥防風熱勝者加黃連黃芩黃柏寒勝者加桂枝濕勝者加蒼朮白朮加減小柴胡湯治痢疾初起惡寒發熱身首俱痛此病在表也宜汗之小柴胡湯方見傷寒內去人參大棗加蒼朮川芎陳皮生薑芍藥各等分上㕮咀水二盞煎一盞去渣溫服以微汗為度柴苓湯分利陰陽治痢解熱柴胡黃芩半夏人參豬苓白朮茯苓澤瀉各等分甘草減半上㕮咀水二盞姜三片煎服四物柏皮湯治血痢暴下當歸梢七分赤芍藥川芎各五分黃柏三錢黃連二錢生地黃黃芩各一錢上㕮咀作二服每服水一大盞煎七分去滓調益元散一錢服加味三黃丸治濕熱痢血痢大黃黃連黃芩黃柏枳殼白芍藥當歸滑石甘草白朮桃仁另研泥各等分上為細末神麯糊為丸如梧桐子大每服五十丸白湯下八正合四物湯治血痢小便赤澀者大黃煨木通滑石末車前子山梔仁甘草生當歸梢生地黃赤芍藥各等分上㕮咀水煎服桂苓甘露飲治濕熱下痢小便澀少口渴脈洪大者桂心人參黃耆茯苓白朮甘草葛根澤瀉石膏寒水石各一兩滑石二兩木香一錢上為細末每服三錢水煎和滓服加味白朮芍藥湯治痢後更衣不止者白朮炒白芍藥炒白茯苓各一錢陳皮七分甘草炙五分上㕮咀水二盞煎一盞去滓溫服固腸丸治濕熱下痢大便下血去大腸陳積之後用此燥濕而寬大腸樗根白皮不拘多少洗去土細切略炒上為細末米糊丸如梧桐子大每服三五十丸陳米飲送下加減補中益氣湯治下痢已久不能起床不食瘦弱之甚者白朮白芍各一錢黃耆人參各五分當歸七分粟殼醋炒甘草炙木香白豆蔻升麻各三分陳皮一錢地榆縮砂澤瀉各五分上㕮咀水一盞半煎一盞去滓溫服神效參香散治痢疾日久積滯已盡腹中不痛或微痛不後重窘迫但滑溜不止乃收功之後藥也粟殼去穰蒂醋炙一兩二錢陳皮一兩三錢肉豆蔻麵裹煨四錢白扁豆炒茯苓各四錢木香人參各一錢上為細末每服一錢清米飲調下食遠服祕方和中飲治痢疾不分赤白久近服之無不效者但發熱噤口不食者不可服陳皮白朮茯苓白芍藥各一錢草果仁七分甘草三分陳倉米二錢沙糖三錢粟殼去穰蒂醋炙一錢半烏梅一個上㕮咀生薑三片大棗三枚水二盞煎一盞去渣溫服真人養臟湯治冷熱不調下痢赤白或如膿血後重腹痛人參白朮當歸白芍藥炒甘草炙木香粟殼去穰蒂蜜炙訶子煨肉豆蔻麵裹煨去油肉桂各等分上㕮咀水二盞姜三片棗一枚煎服阿膠梅連丸治下痢無問久新赤白青黑疼痛諸證真阿膠淨草灰炒另研赤茯苓烏梅肉去核炒白芍藥炒黃柏炒黃連炒乾薑炮當歸酒洗曬各等分上為細末入阿膠末研勻水丸如梧桐子大溫米飲下十丸食前連夜五六服忌油膩脂肥諸物加味二妙丸治痢後腳弱漸細小者黃柏酒炒五兩蒼朮泔浸二兩半白芍藥酒炒敗龜板酥炙各二兩上為末粥糊丸如梧桐子大每服五十丸四物湯加陳皮甘草煎湯送下經驗二防飲治痢後不謹感冒寒濕或涉水履霜以致兩足痛痹如刀割虎咬之狀膝臏腫大不能動為鶴膝風此方神效人參白朮黃耆當歸川芎白芍藥熟地黃杜仲薑汁炒萆薢各一錢甘草炙五分防風防己羌活牛膝各七分附子童便浸三日炮去皮臍七分上㕮咀生薑三片大棗二枚水二盞煎一盞去渣空心服陳氏補腎地黃丸治痢後鶴膝風山藥山茱萸去核焙熟地黃酒洗焙各一兩鹿茸酒浸炙牛膝酒洗焙各八錢澤瀉白茯苓牡丹皮各四錢上為細末丸如梧桐子大每服五十丸空心溫酒送下附方如痢疾糟粕未實或食粥稍多或飢甚方食腹中作痛以白朮陳皮二味煎湯和之自安又方三根飲治休息痢年久不愈者服之神效用五倍子木根蒼耳草根樗木根三根洗淨刮取白皮等分切細每服七錢重加生薑三片大棗一枚大黑豆三十六粒糯米四十九粒水二盞煎至一盞去渣溫服福建察院徐頒行痢疾妙方鳳尾草竹林中與井邊者極佳如無即産別地俱可用連根一大握一名雞腳草老倉米一勺老薑帶皮三片系白痢加至五片蔥白連須三根系白痢加至五根上用水三大碗煎至一碗去渣入高燒酒小半盞真蜜三茶匙調和酒蜜與藥味不宜偏勝極和乃可乘熱服一小盞移時再服以一日服盡為度忌酸味及生冷煎炒米麵點心難化等物此藥不分紅白痢久近及泄瀉男婦老幼通治之只消一服其效如神症危者二服有起死回生之功屢試屢驗可廣其傳
