body:
  text: 卷之十一郁病靜坐明窗讀內經治其未病慮何深五行過極皆成郁物性從來順則平經曰聖人不治已病治未病蓋人之病起於微而成於漸積之久則過極而成郁矣聖人有憂之乃因五行之過極者以立治郁之法曰木鬱則達之火鬱則發之土鬱則奪之金鬱則泄之水鬱則折之是五法者皆因其物之順而治之使之自平也木鬱達之王太僕云達謂吐之令其條達也木曰曲直直達升上者木之性也鬱則曲屈失其性之自然矣故順其性而達之達之者使其條達上升也如肝之為病胃脘當心痛上支兩脅膈咽不通食飲不下者宜吐之肝病大小便難小便不通宜吐之上竅開則下竅通矣如東垣謂食塞胸中食為坤土胸為肺分食塞肺分為金與土皆旺於上故肝木生髮之氣伏於地下宜吐之以去其上焦陰土之物木得舒暢其鬱去矣如性急怒氣上逆胸脅或脹火時上炎治以苦寒辛而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及清氣在下為飧泄者以輕揚之劑舉之皆達之之法也火鬱則發之者王太僕云發謂汗之令其發散也火曰炎上炎焰上騰者火之性也鬱則伏藏失其顯揚之性矣故順其性而發之發之者使之發揚銷滅也如腠理外閉邪熱怫鬱者則用辛甘溫熱之劑取汗以散之如麻黃桂枝湯是也有陽厥極深陰氣極弱蓄熱拂鬱寒劑熱劑俱不可投者宜用涼膈解毒以養陰退陽宣散蓄熱得大汗而愈又如龍火鬱甚於內非苦寒降沉之劑可治則用升浮之藥佐以甘溫順其性而從治之使勢窮則止如升陽散火湯是也斯皆發之之法也土鬱奪之者太僕云奪謂下之令無壅凝也土爰稼穡生長萬物者土之性也鬱則壅閉失其稼穡之性矣故因其壅塞而攻取其害土之物如濕土自甚用甘溫之劑以平其敦阜之勢如平胃散是也如邪熱入胃用承氣鹹寒之劑以攻去之如宿食不消胸腹痞脹者用小承氣苦寒之劑以取之如中滿腹脹濕熱內盛其人氣壯實者則攻下之氣虛者則劫奪其勢而使之衰如中滿分消丸是也又如濕熱為痢有非力輕之劑可治者則或攻或卻以致其平凡此法之類皆奪之之法也金鬱泄之者太僕云泄謂滲泄解表利小便也金曰從革變化流通者金之性也鬱則失其從革之性矣故泄之以疏通其氣也如風寒外感鼻塞聲重而咳者則用麻黃湯以汗之如火熱內甚氣上逆而喘咳不寧者則用葶藶丸以泄之如肺金為腎水之原金受火爍其令不行而道路閉塞宜清熱金花丸以利之如肺氣膹郁胸膈痞滿宜小陷胸之劑以疏通之皆泄之之法也水鬱折之者太僕云折謂抑之制其沖逆也水曰潤下水之就下也水之性也鬱則蓄聚奔激失其性之自然矣故抑之禹抑洪水而天下平謂疏之瀹之決之排之順其勢而導之也如蓄水留飲之病以十棗湯治之者決之也中濕之病以五苓散治之上下分消以去其濕者疏之也如腫脹之病必實其脾土者乃修其堤防以捍之也凡此皆折之之法也治病良工貴謹微積微成甚必顛危涓涓不絕翻波浪不折勾萌缺斧錡病之微甚治之有難易也故善治者治皮毛病之微也不善治者治骨髓病之甚也病在臟者難治謂其甚也病在腑者易治謂其微也傳云勾萌不折至用斧柯涓涓不絕流為江河可以論治病之法矣氣成積聚血成癥癥痿結窠囊火焰明宿食不消留作癖濕能主熱氣如蒸丹溪云氣血沖和百病不生一有怫鬱諸病生焉其症有六曰氣鬱曰濕鬱曰熱鬱曰痰鬱曰血鬱曰食鬱錢氏云氣鬱者胸脅疼痛脈沉而澀宜沉香降氣湯為主治加郁藥濕鬱周身走痛或關節疼痛遇陰寒則發脈沉而緩宜平胃散主治熱鬱者瞀悶尿赤脈沉而數宜黃連解毒湯痰鬱者動則喘息寸脈沉而弦滑宜二陳湯為主治血鬱者四肢無力能食便紅脈沉而芤結宜四物湯為主治食鬱者噯酸腹飽不喜飲食脈沉而滑人迎脈平氣口緊盛宜枳朮丸為主夫所謂六郁者氣濕熱痰血食六者是也或七情之抑遏或寒熱之交侵故為元氣怫鬱之候或雨濕之浸淫或酒漿之積聚故為留飲濕鬱之疾又如熱鬱而成痰痰鬱而成癖血鬱而成癥食鬱而成痞滿此必然之理也又氣鬱而濕滯濕滯而成熱熱鬱而成痰痰滯而血不行血滯而食不消化此六者皆相因而為病也並宜六郁湯越鞠丸升發二陳湯主之病留不去方成郁治郁有方名越鞠輔佐各隨本病加一言蔽之中氣足諸郁治方並以越鞠丸為主治各隨六郁加以輔佐之藥氣鬱以香附蒼朮川芎為主青皮木香為佐濕鬱以蒼朮白芷川芎茯苓為主豬苓澤瀉為佐熱鬱以梔子青黛香附蒼朮川芎為主芩連為佐痰鬱以海石香附南星瓜蔞為主皂角枯白礬為佐血鬱以桃仁紅花青黛香附川芎為主丹皮玄胡為佐食鬱以蒼朮香附山楂神麯為主枳實厚朴為佐諸郁藥春加防風夏加苦參秋冬加吳茱萸治郁之法當以補脾胃為主順氣次之去郁又次之蓋人以胃氣為本胃氣強則氣血流通氣血流通則鬱自去矣此內經於五郁之下注云以調其氣也謂之氣者即中氣也補脾胃錢氏異功散主之治郁真傳勿妄攻調和榮衛使流通若教胃氣常為主默奪潛消郁莫容經云邪之所湊其氣必虛留而不去其病則實大抵六郁之病皆緣脾胃虛弱得之夫中氣不足得此六郁之病復用治郁之法則中氣亦虛鬱滯益甚為不治之症矣故逋仙立教以易老枳朮丸加越鞠丸滑氏云氣血食積痰飲一有留滯於其間脈必因之而止絕矣但當求其有神何害之有夫所謂有神者即經所謂有中氣也越鞠丸能解諸郁之要藥也神麯炒香附童便浸蒼朮制川芎梔子炒各等分為細末水丸綠豆大每五六十丸溫水下六郁湯解諸郁陳皮一錢半夏蒼朮川芎各一錢半梔仁炒赤茯苓各七分香附二錢炙草砂仁各五分水煎姜三片引氣鬱加木香檳榔烏藥紫蘇乾薑倍香附砂仁濕鬱加白朮豬苓澤瀉倍蒼朮熱鬱加黃連倍梔子連翹痰鬱加南星枳殼小皂莢血鬱加桃仁紅花丹皮食鬱加山楂神麯麥蘖沉香降氣丸治氣鬱病沉香一錢二分另砂仁三錢炙草二錢半香附一兩半川芎半兩木香二錢另檳榔半兩真蘇子三錢上為末神麯水煮為丸綠豆大每服五十鹽湯下勝濕平胃散治濕鬱病平胃散一料四兩加羌活防己炒黃柏各半兩薄荷一兩為末每二錢酒調服清熱金花丸治熱鬱病黃連解毒湯四兩加酒大黃香附各一兩青黛五錢為衣共為末薑汁煮神麯丸綠豆大每五十白湯下逐血四物湯治血鬱病四物湯一劑加香附一錢紅花五分桃仁泥一錢半水煎加味枳朮丸治食鬱病即麴櫱枳朮丸見內傷加陳皮山楂蒼朮香附各一兩加本方為丸錢氏異功散補脾胃治諸郁人參白朮白茯苓陳皮蒼朮香附川芎神麯等分炙草減半為末每二錢升發二陳湯治痰鬱火邪在下焦大小便不利此藥能大便潤而小便長陳皮川芎茯苓各二錢半夏一錢半升麻防風甘草柴胡各五分水姜煎服家傳枳朮越鞠丸補中解鬱白朮二兩枳實炒蒼朮香附鹽酒浸川芎神麯炒陳皮各一兩上為細末如本方為丸梧桐子大每五十白湯下
