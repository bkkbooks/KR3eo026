body:
  text: 卷之二中寒陰寒殺氣物遭傷卒犯為災惡敢當莫使腎經先受病變生諸症要提防寒者至陰殺厲之氣也天地之氣陽主生長陰主殺伐故木受之而毀折火受之而滅明土受之而堅結水受之而合凝其為物之害者莫有甚於寒也人以腎為根本惟腎則受寒為寒則傷腎腎氣一虛寒邪易犯其為病也急痛拘攣戰掉強直昏迷厥冷口禁失音此中寒也無汗惡寒頭痛面慘發熱拘急手足微寒此傷寒也霍亂轉筋洞泄下痢乾嘔吐逆積飲停痰此寒邪入於腸胃也若為咳嗽為疝瘕為腳氣為泄漏為遺精為痰瘧為諸痛莫非寒邪之所為也人惟腎氣不充疏於謹護非特霜凝水沍之時雖當溫暑之月當風取涼臥地受冷受其寒邪之氣亦與真寒同矣寒病因分中與傷使人臨病費消詳陰經自受為真中傷自陽經治在陽按丹溪云曰中曰傷未聞有議其異同者因思有即病有不即病中寒則倉卒感受其病即發而暴傷寒之人因其舊有鬱熱風寒外來肌腠自密發而為熱其初也用麻黃桂枝此專發表而安以病體不甚虛也中寒之人一身受邪難分經絡無熱可發溫補自解此胃氣之大虛也此朱先生之論也以豫論之傷即中也無即病不即病之分自邪客之曰中如矢之中於人也自人受之曰傷如傷矢之云也大抵邪之所中其氣皆虛或中於陽則陽受傷中於陰則陰受傷中寒之病乃真中陰經之病故宜溫補傷寒之病乃中陽經之病故宜發散如仲景論太陽經病有四逆湯少陰經病有麻黃附子細辛湯則傷寒亦有溫補中寒亦有發散者管見如是請詳之寒中陰經急用溫理中加附效如神房勞陰毒宜薑附寒濕還從五積尋中寒之病本因腎虛或受風寒或食寒涼得之內外皆陰陽氣不守遂發寒病身重眼睛疼身體倦怠而甚熱四肢厥逆額上及身背冷汗不止或多煩渴精神恍惚如有所失二三日間或可起行診之則六脈沉細而疾尺部短小寸口或無若服涼藥則渴轉甚燥轉急惟補虛溫中可也宜附子理中湯主之若有惡寒症宜麻黃附子細辛湯如因房勞之後得之其症沉重四肢逆冷腹痛轉甚爪甲面色青黑六脈俱沉尺脈伏此陰毒也急於氣海關元二穴灸之宜薑附湯主之以手足暖為度如因入水及久坐濕地得之此寒濕之病也宜五積散主之凡陰毒若不急救則死肝為風木自生寒濕土脾嫌冷氣干中下二焦有寒積細詳脈證作湯丸如診得兩尺之脈弦而緊此寒在下焦肝受病也其症小腹急痛奔豚疝氣宜元戎苦楝丸主之如診得兩關脈遲而緊此寒在中焦脾胃受病也其症腹中痛嘔逆不食宜附子理中湯有表症者養胃湯主之附子理中湯治中寒嘔吐虛弱人參白朮乾薑炒熟附子各七分炙草三分半水煎薑三片引麻黃附子細辛湯治少陰病發熱脈沉者麻黃去節二錢細辛熟附子各一錢水一盞半先煎麻黃一盞去上沫入藥煎六分服薑附湯治中寒厥冷強直失音口噤吐沫或陰盛發躁熟附乾薑炮各等分水煎生料五積散治感冒寒濕之氣頭疼身痛項強拘急惡寒嘔吐或有腹痛蒼朮制二錢半桔梗一錢二分陳皮去白麻黃去節枳殼麵炒各六分厚朴薑炒乾薑炒各四分白芷川芎甘草炙各三分半夏洗二分白茯苓肉桂白芍當歸各三分薑蔥引元戎苦楝丸治下焦有寒小腹急痛奔豚疝痛川楝肉小茴炒附子各一兩三味酒煮乾再焙玄胡索五錢全蠍炒十八個丁香十八個為細末酒糊丸如梧桐子大每服五十食前當歸湯下養胃湯治外感寒邪內傷生冷蒼朮炒厚朴薑汁半夏曲各一錢人參茯苓草果仁藿香各五分陳皮七分半甘草炙三分半分二服每服加桂五分薑七片烏梅半個煎服傷寒風寒初起太陽經飲食如傷取太陰誰謂傷寒只傳足三因無病作何因經曰犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟故傷於風寒者則自足太陽膀胱始太陽者為諸陽主氣也仲景因之而作傷寒論傷於飲食者則自足太陰脾經始五臟之氣二日陽明受之三日少陽肅之四日太陰受之五日少陰受之六日厥陰受之此內經熱論之文也脾胃論云脾胃不足此至而不至是為不及也火亢盛乘於脾土之位此不至而至是為太過也肝木妄行此所不勝者乘之也肺經受邪此所生者受病也腎水反來侮土此所勝者侮之也亦內經之文也故傷寒之病有傳經症脾胃之病有兼見症也經曰風寒在下肝木主風屬足厥陰腎水主寒屬足少陰足太陽膀胱者胃之腑也諸陽之所屬也故風寒之感足太陽膀胱經先受之膀胱傳足陽明胃胃傳足少陽膽膽傳足太陰脾脾傳足少陰腎腎傳足厥陰肝此之謂傳足不傳手也又按仲景云無奇經則無傷寒緣奇經皆附足六經不附手六經寒邪傷足經者為有奇經也況外感風寒則腎肝之病內傷生冷則脾胃之病皆屬於足又何説耶或云傷寒病冬月得之太陽膀胱經為首次至足厥陰肝經為尾此病為傷北方與東方足之六經皆在東北之方又云足之六經五行俱足手之六經二金四火是皆牽合之説風為陽寒為陰衛為陽榮為陰風之傷衛寒之傷榮各從其類也傷寒之病始於太陽者太陽寒水其氣同也中風之病亦始於太陽者足厥陰肝經之脈與太陽膀胱經之脈會於顛其氣通也經只言傷寒而仲景兼風言者風亦寒也其言始於太陽者乃舉其大略耳其實三陽三陰之經邪之所湊皆為病首按仲景傷寒論陽明病若能食名中風此陽明初得之病非自太陽傳來者也又云血弱氣盡腠理開邪氣因入與正氣相搏云云小柴胡湯主之此少陽之自受病也太陽病脈浮者可發汗宜桂枝湯此太陰之自受病也少陰病始得之反發熱脈沉者麻黃附子細辛湯此少陰之自受病也手足厥寒脈細欲絶者當歸四逆湯主之此厥陰之自受病也由此觀之三陰三陽各有自受之病非皆自太陽傳也明矣惟有傷寒不易談六經傳變症多端法分三百六十七笑煞時師妄用鈐經曰一日太陽受之頭項痛腰脊強二日陽明受之身熱目痛鼻乾而不得臥三日少陽受之胸脅痛而耳聾往來寒熱而口為之苦四日太陰受之腹滿而嗌乾自利五日少陰受之口燥舌乾而渴六日厥陰受之煩滿而囊縮此六經相傳之次序也東垣曰太陽者巨陽也為諸陽之首膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰循經傳為發汗不徹利小便便邪不盡透入於裡也太陽傳少陽膽木者名曰越經傳為原受病脈浮宜汗當用麻黃而不用之故也太陽傳少陰腎水者名曰表裡傳為表病急當發汗而反下所以傳也太陽傳太陰脾土者名曰誤下傳為受病脈緩有汗當用桂枝湯而反下之所致也當腹痛四肢沉重太陽傳厥陰肝木者為三陰不至於首惟厥陰與督脈上行與太陽相接名曰循經得度傳也其太陽傳變居多者足太陽膀胱之經行於背背者五臟六腑之俞太陽之脈行之四通八達初感邪氣乘虛而入故傳也有始終只在本經不傳者有傳過一經而不再傳者有自入其腑不傳者有傳入胃而不傳者有七日不解為過經者有二七不解為過經者有兩感有合病有並病有誤服藥而致變者症非一端不可拘泥但憑其脈與外症治之此活法也傷寒鈐法好事者為之也後世信之誤人多矣豫初喜其書取而讀之亦未覺其繆也及研精乎軒岐之旨紬繹乎仲景之書始和其繆蓋天以六氣為節地以五行為制以之紀年則三十年為一周而觀其勝負之變以之步時則六氣為一周而分其主客之令其所論者皆風寒暑濕燥火之氣雨暘寒暑之變昆蟲草木之化病機色脈之應非為傷寒立説也今為鈐法者以病日為司天以人命求病原則一人之身平生只有二經之病何其謬也乃計日以傳經歸號以主治則尤謬之甚也惟汗瘥棺墓之説庶幾近理病之瘥甚多有不中其三百六十七法一百一十三方之數又豈能盡傷寒之變哉傷寒兩感病堪嗟並病傳來作一家合病傷寒多吐利莫將異説混長沙經曰兩感於寒者病一日則太陽與少陰俱病則頭痛口乾而渴頭痛太陽邪甚於表口乾而渴則少陰邪盛於裡也二日則陽明與太陰俱病則腹滿身熱不欲食譫言身熱譫言為陽明邪盛於表不欲食腹滿為太陰邪盛於裡也三日則少陽與厥陰俱病則耳聾囊縮而厥耳聾為少陽邪盛於表囊縮而厥為厥陰邪盛於裡此三陰三陽五臟六腑俱病榮衛不行五臟不通則死矣仲景論兩感為必死之症而復以治有先後發表攻裡之説抑不忍坐待其死也活人書云先救其里以四逆湯後救其表以桂枝湯此乃治下利身疼痛之法以治兩感之症則腹痛囊縮譫語之邪何由得去其六日而死者雖云大數亦醫殺之也然仲景所謂發表者葛根麻黃是也所謂攻裡者調胃承氣是也惟王海藏之論庶為得之王海藏云兩感於寒者不治一日太陽與少陰俱病太陽者腑也自背俞而入人所共知少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入下於腎也又云天之邪氣感則害人五臟以是內外兩感臟腑俱病欲表之則有里欲下之則有表表裡不能一治故死矣然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶或可治治之而不愈者有矣未有不治而生者也嘗立一方以治此病間有生者名曰解利兩感神方大羌活湯趙思貞曰合病者二陽經或三陽經同受病病之不傳者也並病者一陽經先病又過一經病之傳者也且如太陽陽明並病一症若並而未盡是傳未過猶有表症仲景所謂太陽症不罷面色赤陽氣拂鬱在表不得越煩躁短氣是也猶當汗之以各半湯若傳之已盡是為傳過仲景所謂太陽症罷潮熱手足汗出大便硬而譫語者是也法當下之以承氣湯太陽少陽並病其症頭項強痛眩悶如結胸心下痞便硬當刺大椎肝俞肺俞詳見傷寒摘錦明理論曰太陽與陽明合病有三症其下利者與葛根湯其不下利但嘔者湯中加半夏其胸滿而喘者宜麻黃湯太陽與少陽合病自下利者與黃芩湯嘔加半夏生薑陽明與少陽合病必下利其脈弦者為負負者死木剋土也脈滑而數者有宿食也以大承氣湯下之三陽合病腹滿身重口不仁面垢譫語遺尿白虎湯常苦傷寒法浩繁只憑脈症最為先浮沉表裡分虛實攻補如珠自轉旋人有恆言傷寒為大病者謂其傳變叵測也時師執汗下之法謂傷寒不難治以彪視虎未遇真虎也如遇變症汗之不除下之不除其術敗矣蓋病在表其脈必浮病在裡其脈必沉實則攻之謂發汗吐下也虛則補之謂溫之也法無一定應病而施如珠走盤活潑潑地謂之良工脈浮而緩有汗者謂之中風宜桂枝湯主之脈浮而緊無汗者謂之傷寒宜麻黃湯主之脈浮頭項痛腰脊強病在太陽有汗桂枝湯無汗麻黃湯脈長身熱鼻乾目疼不得臥病在陽明如脈長大而浮有上症而惡寒者病在經宜解肌升麻葛根湯主之如脈長而大不惡寒大熱大渴自汗者病入里未實宜白虎湯如長而沉實潮熱自汗渴譫語大便硬者病在腑宜下之謂胃承氣湯脈弦胸脅滿痛耳聾來往寒熱者病在少陽小柴胡湯下之脈沉細咽乾腹滿自利如脈沉細而強疾者為實宜桂枝加大黃湯如沉細而遲弱者為虛寒宜理中湯主之脈微細口燥舌乾而渴此傳經之邪熱也宜大承氣湯下之脈微緩而沉煩滿囊縮病在厥陰此傳經之邪熱也宜下之脈陰陽寸尺也俱盛重感於寒而緊澀變為溫瘧陰陽緊盛傷寒之脈也脈陽浮而滑陰濡而弱更遇於風變為風溫陽脈浮滑陰脈濡弱皆風也脈陽洪數陰實大太過溫熱兩合變為溫毒洪數實大皆熱脈也脈陽濡弱陰弦緊更遇溫氣名曰溫疫病發熱脈沉細表得太陽名曰痓病病太陽關節疼痛而煩脈沉細名曰濕痹病太陽身熱疼痛脈微弱弦芤名曰中暍若發汗已身灼然熱脈陰陽俱浮名曰風溫脈沉細而疾身涼四肢冷煩躁不欲飲水狂悶名曰陽厥傷寒熱盛脈浮大者生沉細者死汗下之後沉小者生浮大者死表屬三陽里屬陰陰陽脈症要分明若拘日數為繩墨邪未能除反壞真三陽經病多表症宜汗之三陰經病多里症宜下之此千古不易之定法也經云未滿三日者可汗而已其滿三日者可泄而已此語其大略也傷寒賦云一日二日發表而散三日四日和解而痊至五六日方可議下人皆誦之殊不知病三日後即有可下者七八日後猶有可汗之症若拘日數則有當汗下而不汗下不可汗下而汗下之者為害深矣此當以脈症論之如脈浮有惡風寒之症者雖七八日宜與汗之如脈沉其症惡熱煩渴便溺不通雖三四日宜即下之如脈不浮不沉只洪數者其症不惡寒不大便硬此在半表半裡不可汗下宜和解之治分三法合宜施初汗中和末下之勿犯天時傷胃氣汗之宜早不宜遲初病在表則汗之中在半表半裡則和解之在裡則下之以脈症辨之合宜而施説見上文汗之宜麻黃湯桂枝湯葛根湯和解宜小柴胡湯白虎湯東垣涼膈散下之宜大小調胃承氣湯經云用熱遠熱用寒遠寒故春不得服青龍秋不得服白虎恐犯時禁也又曰發表不遠熱攻裡不遠寒謂藥以攻邪有是病即有是藥如盛夏之時設有可汗之症雖桂枝麻黃不嫌於並進隆冬之時設有可下之症大黃芒硝亦可以合飲中病即止勿過其劑可也正理論云凡人有疾不知即治隱忍冀瘥蓋傷之邪初在皮毛次入血脈不急汗之則邪氣深入所以汗之宜早也若已入里必待胃實而後下之故不厭遲恐傷胃氣也痞結斑黃各有因或因汗下或傳經若能臨病加詳審匕勺下咽起困沉傷寒病如痞如結胸二症有未經下而得之者此傳經之邪也從小柴胡湯加減治之痞加桔梗枳殼結胸加大小陷胸湯主之如曾下後得之者此下之逆也痞用瀉心湯結胸用陷胸湯主之又如發斑發黃之症有因汗而得之者此汗之逆也斑宜升麻湯黃宜茵陳湯主之然斑有二症因於外感者謂之陽斑其色如錦文因於內傷者謂之陰斑其色微紅詳見斑疹內黃有二症因於熱者其色明因於濕者其色黯詳見黃疸表邪未罷不宜攻病入里時汗不中汗下不應為大逆與人增病是粗工病在表者法宜汗之假如惡風寒者此表邪未罷也誤下之則表邪乘虛入里為痞為結胸為挾熱而利病在裡者法宜下之假如不惡寒而惡熱口渴飲水大便已硬此裡實也誤汗之則熱畜積益甚為斑為黃是名為逆醫之誤也因其所逆而治之痞宜瀉心湯結胸宜大小陷胸湯挾熱而利宜黃芩芍藥湯發狂譫語宜大承氣湯發斑宜升麻湯發黃宜茵陳湯又如病雖入里其脈遲者不可下亦不可汗也下之則亡陰洞泄不止小建中湯主之汗之則亡陽筋惕肉瞤真武湯主之以寒攻熱熱攻寒寒熱乖違病可憐何事六經多變例長沙祕訣在師傳陽病多熱治以寒涼陰病多寒治以溫熱雖良工不能廢其繩墨也今傷熱病之在表者宜用辛涼之藥以和之乃以桂枝麻黃之辛甘溫熱之劑此火鬱則發之所謂發表不遠熱也及其傳入陽經不用溫劑而用大黃芒硝苦鹹寒藥此傳經之邪寒變為熱所謂攻裡不遠寒大熱之氣寒以取之也傳到陽明不一般在經在腑不同看在經尚有相傳症入腑之時病不傳陽明者足陽明胃也初太陽病當與汗之或失汗或汗不解必傳陽明陽明有二症一在經身熱鼻乾不得臥者是也此名傳經病不已復傳足少陽膽經也一在腑所謂胃實者是也病入腑則不再傳矣入腑之論有二如三陽在經之邪皆能入胃胃為水穀之海無所不受故也自太陽經入胃腑者謂之太陽陽明自陽明本經病自入胃腑者謂之正陽陽明自少陽傳入胃腑者謂之少陽陽明三陽明皆胃實之症三一承氣湯隨症用之又如三陽在經之邪自入其腑者亦謂之入腑故太陽經病自入膀胱腑者為小便不利為蓄血如狂之症陽明病自入胃與大腸腑者為大便硬為蓄血喜忘之症惟少陽經不入膽腑謂膽無出入乃清淨之腑也如此陽邪裡實之症皆宜下之若誤服桂枝湯者必死所謂桂枝下咽陽盛則斃三陽本經之病亦有入胃府者太陰入胃則腹痛自利理中湯主之少陰病入胃腹痛自利桃花湯主之厥陰入胃吐蛔者謂之蛔厥烏梅丸主之如此陰邪裡虛之症誤服承氣湯者死所謂承氣入胃陰甚乃亡大抵陽邪入胃則多大便陰邪入胃則多吐利六經受病被邪傷表裡調和各有方開得長沙無縫鎖得門而入又升堂傷寒傳經之病在三陽經則多表症三陰經則多里症據仲景之病論不如是之示人以不廣也今據其論中所著三陽三陰之症各有表裡者太陽經病有汗桂枝湯無汗麻黃湯傷風見寒傷寒見風大青龍湯表有水者小青龍湯皆表藥也小便不利者五苓散蓄血如狂者抵當湯皆里藥也以桃仁承氣湯代之陽明經病升麻葛根湯皆表藥也白虎湯大小調胃承氣湯桃仁承氣湯皆里藥也少陽經無表裡小柴胡湯如表症多柴胡加桂湯里症多大柴胡湯太陰經病桂枝湯表藥也理中湯里藥也少陰經病麻黃附子細辛湯麻黃附子甘草湯皆表藥也四逆湯薑附湯真武湯皆里藥也厥陰經病當歸四逆湯當歸四逆加吳茱萸生薑湯皆表藥也烏梅湯四逆湯皆里藥也長沙著論治傷寒汗用辛甘下苦鹹此法古今終不變莫將羌活雜真詮辛甘發散為陽桂枝之辛麻黃之甘所以開發腠理驅逐風寒也鹹苦下泄為陰芒硝之咸大黃之苦所以攻堅瀉實蕩滌腸胃也仲景著傷寒論於太陽病因有惡風惡寒之症知其在表故用桂枝湯治中風有汗者此風淫所勝以辛散之也麻黃湯治傷寒無汗者此寒淫所勝治以甘熱也若無惡風寒之症則不輕用矣於陽明經因有胃實痞滿燥實堅之症知其在裡故用承氣湯枳實以瀉痞厚朴以瀉滿大黃以瀉實芒硝以潤燥軟堅也若無胃實之症則不敢用矣或謂仲景之方乃治冬時中而即病者傷寒之法非治溫暑之月傷寒之法也殊不知春夏之時病者如有惡風寒之症麻黃桂枝皆可用之所謂發表不遠熱也若病不惡風寒雖秋冬之時麻黃桂枝亦在所禁況春夏乎但謂麻黃桂枝不用於溫暑之病則可謂不當用於溫暑之月則不可或謂春不服青龍秋不服白虎此亦語其常耳設有青龍白虎之症可以他藥代之乎經云太陽病發熱而渴不惡寒者溫病也是知發熱惡寒者為傷寒不惡寒者為溫病其症固不同矣或不論症泥於春夏不得服麻黃之説而以羌活沖和湯代之殊不知麻黃桂枝二湯乃太陽經表藥也今九味羌活湯羌活防風湯太陽經藥也如蒼朮除足太陽之濕川芎治足厥陰之頭疼細辛治足少陰之頭痛白芷治足陽明經之頭痛生地黃治手少陰之熱黃芩治手太陽之熱六經同治表裡並主乃治溫病表裡俱熱之劑以治太陽一經在表之症可乎世人不知此義以治有惡風寒之症變為大病此吾之所以無取於節庵也如謂用熱遠熱麻黃桂枝誠春夏之所禁也可以羌活湯代之用寒遠寒設使小雪之後有可下之症者芒硝大黃亦在所禁不知何方以代之也噫執中無權猶執一也故曰盡信書不如無書四時正氣豈傷人休若虛時客氣侵總把傷寒作綱領因時立法取和平春風溫夏火熱秋濕涼冬冷寒此四時至令之正氣所以生長收藏為萬物之終始也豈為厄哉或未至而至或至而不至氣失其平則為疾矣人有體虛者感之春傷於風則為中風病夏傷於暑則為中暑病秋傷於濕則為中濕病冬傷於寒則為中寒病此皆當其時而即病也如不即病與冬傷於寒者春必病溫春傷於風者夏必飧泄夏傷於暑者秋必痎瘧秋傷於濕者冬必為咳嗽此皆伏氣之病信與當時即病者不可同治法矣然以傷寒總名之者非以寒為肅殺之氣舉其重以見其輕歟抑欲人據治傷寒之法以為例耶因時制方隨症用藥必使病已必使氣和斯得之矣壞病傷寒以法求更兼復易有緣由補中益氣為張本榮衛調和病自瘳太陽病曾經發汗吐下溫針虛其正氣病仍不解者謂之壞病言為醫所壞也審觀脈證知犯何逆而治之逆者隨其逆而救之經云本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆如太陽發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此發汗之逆也又奔豚有二症其一由誤發汗所致用茯苓甘草大棗湯主之其一由誤用燒針令其汗出而致者治以桂枝加桂湯更以桂二兩灸其針處核上各一壯者是也經云病發於陽而反下之熱入內作結胸發於陰而反下之因作痞此下之逆也經云太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽病當惡寒發熱關上脈細數者以醫吐之過也此為小逆經曰病熱少愈食肉則復多食則遺此其禁也傷寒新差人強與穀肉食之脾胃氣尚弱不能消穀故令發熱此食復也熱之微者損谷自愈如有痞滿而熱甚者小承氣湯主之傷寒瘥後氣血未平餘熱未盡早則動勞病者名曰勞復謂之勞者非但強力勞動持重遠行也凡言語思慮勞神梳洗勞力則生熱而復病也宜小柴胡湯梔子豆豉以解之若頭痛四肢疼者此因勞而感於風寒也宜葛根加蔥豉湯以發之經日飲食勞倦則傷脾故傷寒賦云勞食再復病名內傷宜於補中益氣湯求之又云諸食皆復飲酒則危諸勞皆復御女則死甚矣女勞之不可治也陰陽易病者如男子病新瘥餘邪未盡而婦人與之交婦人因得病者謂之陽易婦人病新瘥餘邪未盡而男子與之交因而得病者謂之陰易名曰易者以陰陽相感氣候相傳如交易也亦由其人正氣本虛故相傳染也然女犯男得病者易治男犯女得病者治之稍遲則無及矣仲景以燒褌襠散治之小便得利陰頭微腫者愈如男子大病後強合陰陽內動其精外勞其形而復病者此名女勞復非易病也其症身體重少氣小腹急痛或囊縮熱上衝胸頭重不欲舉眼中生花膝脛拘攣治之少緩必舌出數寸而死宜韭根豭鼠糞湯調燒褌散主之差後緣何熱不除非易非復只因虛仍將脈症加詳審惟有柴胡湯可居傷寒解後常有微熱不除虛羸少氣氣逆欲吐者其脈亦虛竹葉石膏湯主之傷寒解後精神恍惚言語錯亂有似邪祟之狀或潮熱頰赤或寒熱似瘧以脈辨之人迎脈浮弦者此表邪未盡也宜知母麻黃湯氣口脈浮大者此正氣虛也宜補中益氣湯加熟附子主之傷寒發汗吐下後不解如寒無寒如熱無熱意欲食腹不能食常默欲臥不能臥欲行不能行欲食或有美時或有不欲聞食臭時口苦小便赤諸藥不能治得藥則劇吐利如有神靈身形如和其脈微數每溺時頭痛者六十日愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈此名百合病謂百脈一宗悉致其病也宜百合湯隨發汗吐下後加減治之傷寒厥逆病邪深厥有陰陽仔細分陽厥大承四逆散陰宜薑附急溫經逆者手足不溫也厥者手足冷也逆微而厥皆邪氣深入之症也有陽厥有陰厥陽厥者傳邪之病先在陽經則手足熱傳入陰經則以漸而逆厥矣所謂熱深厥亦深熱微厥亦微乃火極而兼水化者名曰陽厥陰厥者直中陰經之病陰盛陽微手足者諸陽之本故得病即厥逆也名曰陰厥陽厥之厥先熱後冷不至肘膝陰厥之厥初病即冷手足如冰上連肘膝以此別之陽厥者輕則四逆散重則大承氣湯陰厥者急用薑附湯四逆湯以溫其經甚者灸關元穴及氣海陰陽二毒最難醫莫與傷寒一例推若得老師真口訣免交七日致傾危陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治宜升麻葛根湯主之陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治宜天雄散主之寶貴之人多內傷勿輕汗下比尋常汗之傷氣下傷血病不可為空自忙傷寒之用汗下定法也惟富貴之人平日多有內傷之症再感風寒此為內傷挾外感症宜補中益氣湯為主治隨六經之法加減如外感重者須以汗解宜升麻散火湯主之如三四日間不宜前藥則以小柴胡湯驗症加減或合五苓散五六日不大便者小柴胡湯去人參半夏合小承氣服之甚者三乙承氣主之怯弱人不可下者內服補中益氣湯外用膽導法甚妙七八日過經不解只以小柴胡湯合梔子豆豉湯治之傷害新瘥後因勞食再復者只以補中益氣湯多服取效傷於食者兼服枳朮丸發汗升麻散火湯柴苓和解最為良下宜膽導兼三乙此是家傳祕密方此治內傷挾外感之法也初行解表用升麻散火湯加蔥豉以汗之此方比九味羌活湯尤捷隨經加減中有柴苓湯為和解之劑熱甚者小柴胡合涼膈散湯極甚者小柴胡合白虎湯如有裡實之症輕者膽導法重者三乙承氣湯主之飲酒成傷號曰酲葛花能解醉中人飲留胸脅成他症十棗芫花飲自行此在內傷中此治酒客傷寒之病也切不可用桂枝湯令人傷肺吐唾膿血宜葛花解酲主之其熱即除二三日後胸脅痛者此留飲也蓋酒之毒氣也因汗而散酒之質水也留而不去故為胸脅之病芫花十棗湯主之酒客傷寒熱似蒸勿將麻桂汗之云葛花解毒令微汗涼膈和中天水並此治酒客傷寒之法也飲酒之人先有裡熱重感於寒與濕暑之病同故不可用桂枝也宜葛花解酲湯令其微汗而愈不解者用東垣涼膈散合天水散合散之病入於裡有下症者宜用調胃承氣湯主之內傷飲食外傷寒兩熱相蒸脈滑弦表解內消原有法藿香正氣大承兼此治夾食傷寒之法也人有內傷外感風寒發者名曰夾食傷寒如有吐瀉又名霍亂當外解其表內消其食藿香正氣散主之汗之不解即與下之大承氣湯運行力乏汗淋漓急就陰涼解脫衣或向寒泉漫洗浴傷寒同病不同醫此言辛苦之人卒感寒濕之病也遠人疲憊經血淖溢陽氣發泄或當風取涼或入水洗浴卒感寒濕之氣使腠理閉密氣滯血凝以成熱氣病宜急汗之因於風寒者麻黃桂枝各半湯因於濕者五積散主之長沙熱論著成文暑病河間又發明又至東垣內傷論丹溪論火主滋陰昔張長沙取內經熱論之文著傷寒正理論此法之祖也王叔和編次成書成無己為之注釋理明意盡後世宗之至劉河間出謂長沙之法以治冬月之傷寒如若溫暑之月有熱病者麻桂辛甘溫熱之劑似不可用乃著暑論以辛甘寒涼之劑為主治李東垣謂熱者如有外感風寒之症有飲食勞倦所傷之症外感之症有餘之病也以發汗吐下之內傷之症不足之病也可以汗吐下之乎乃舉補中益氣湯甘溫之劑專為治內傷之法朱丹溪後論發熱之病有自外生者外感之病是也有自內生者不但飲食勞倦之傷而已又有房勞之人陰虛發熱之病乃著陽有餘陰不足之論專以滋陰為主由此觀之張主風寒劉主暑熱李主脾胃朱主腎虛熱病之治無餘蘊矣豈相矛盾耶治傷寒者精通四家之書庶幾得之治傷寒諸方麻黃湯治太陽症頭及身體痛惡寒發熱而喘麻黃去根節二錢桂枝一錢三分甘草六分杏仁十個作一服水一盞半先煎麻黃一沸掠去上沫卻下余藥煎八分去渣溫服取汗如夏月去桂加石膏二錢知母一錢名知母麻黃石膏湯如太陽發熱無汗惡寒漸變為剛痓者本方如赤芍藥六分葛根一錢豆豉二錢入蔥白煎傷寒大下後脈沉遲尺脈不至咽喉不利唾膿血厥逆吐利不止者雖曰難治本方去杏仁加升麻當歸知母黃芩葳蕤各五分石膏白朮芍藥天冬茯苓乾薑各七分次第取微汗而愈即病少陰經脈沉反發熱初得之本方去桂杏仁甘草加細辛一錢二分附子一錢名麻黃附子細辛湯此汗劑之重者也前少陰病得之二三日本方去桂杏仁倍甘草加附子一錢名麻黃附子甘草湯得微汗而愈此汗劑之輕者也如傷寒中濕身體痛身目俱黃本方去桂加連翹一錢樗白皮赤小豆各二錢入葛根湯如太陽與陽明合病無汗惡風身體肌肉俱痛自利葛根一錢半桂枝甘草芍藥各七分半麻黃一錢薑三棗二取汗如太陽與陽明合病不下利但嘔者本方加半夏五分如見陽明本經正病頭目痛鼻乾無汗肌肉疼痛本方去麻黃桂枝加升麻一錢五分倍芍藥取微汗名升麻葛根湯乃陽明經表藥如太陽病誤下之協熱利不止本方去麻黃桂枝芍藥加黃連黃芩各三分甘草只用二分名葛根黃連黃芩湯如風溫脈浮身重汗出本方加石膏龍膽大青葳蕤各半錢名葛根龍膽湯如疫癘春感溫發熱而渴不惡寒本方加黃芩六分名葛根解熱湯不問已汗未汗頭痛肌熱者本方去麻黃甘草桂枝加知母川芎各六分入生薑蔥白同煎名葛根蔥白湯如溫毒發班心煩嘔逆本方去桂芍藥加橘紅杏仁知母黃芩各六分名葛根陳皮湯用生薑大棗煎如風濕相搏一身盡痛本方去桂加薏苡仁一錢得微汗解桂枝湯治太陽經中風發熱自汗鼻鳴乾嘔桂枝二錢半芍藥一錢半甘草作一服薑三片棗二枚水盞半煎一盞溫服春末及夏至前本方加黃芩一錢名桂枝黃芩湯夏至後加知母一錢石膏二錢或加升麻五分若病人素虛寒者不用加減如小便數者其素飲酒人不喜甘者切不可行桂枝也如太陽發熱無汗惡寒脈微弱者本方加麻黃石膏等分名桂枝二越婢一湯如服桂枝形似瘧日再發或身癢而汗不出者得汗必解本方加麻黃一錢半杏仁十個名桂枝麻黃各半湯如太陽病脈浮腹痛本方芍藥再加一錢入飴糖一匙名小建中湯如傷寒發汗後身痛脈遲弱本方加黃耆一錢入飴糖一匙名黃耆建中湯如汗後身痛脈沉本方中加人參一錢如發汗過多心下悸而欲按者本方去芍藥薑棗煎服如太陽病下之太早成協熱利不止心下痞表裡不解本方去芍藥加白朮人參乾薑各一錢如關脈沉實大便祕而腹痛者此屬太陰本方加大黃一錢半芍藥再加一錢減甘草五分名桂枝大黃湯如傷風項背強有汗不惡風而變為柔痓者本方加乾葛一錢如太陽汗多成柔痓者本方加葛根桂枝芍藥各五分瓜蔞根甘草各一錢名桂枝瓜蔞乾葛湯如風溫身痛脈浮虛弱多汗本方加附子半錢大青龍湯治傷寒見風或傷風見寒太陽無汗脈浮緊者可服脈弱汗自出不可服誤服之亡陽麻黃五錢桂枝甘草炙各一錢半杏仁去皮尖七個石膏三錢上㕮咀薑三片棗二枚水二盞先煎麻黃如上法納諸藥煎一鍾去滓服如一服得汗即止未汗再服一二劑得汗為度如太陽無汗惡風煩躁夏月本方加黃芩二錢小青龍湯治太陽表症未解心下有水氣乾嘔發熱而咳麻黃芍藥二錢細辛乾薑甘草桂枝各一錢五分五味半夏各二錢水煎麻黃如上法溫服連進三服如表症未解而渴者去半夏加瓜蔞根一錢微利者加芫花如龍眼大炒赤色太陽汗後飲水多咳而喘者去麻黃加杏仁泥一錢水寒相搏咳逆不止去麻黃加附子一錢小便不利者去麻黃加茯苓一錢半小柴胡湯治傷寒四五日往來寒熱胸滿脅痛心煩喜嘔邪在少陽經也柴胡二錢半黃芩人參各一錢甘草五分半夏八分薑三片棗二枚煎服二次如胸中煩不嘔去半夏加瓜蔞根二錢渴者去半夏再加人參五分瓜蔞實一錢腹中痛去黃芩加芍藥二錢如小便難腹滿本方加茯苓一錢如嘔而發熱胸脅滿小便難本方去黃芩加茯苓一錢半如飲水過多成水結胸去大棗加牡蠣一錢半如未經下後胸中滿者此傳經之邪也本方加枳殼桔梗各一錢如下後胸中滿者此因下之太早邪氣乘虛而入也本方合小陷胸湯服之如神如飲水過多脅下痛者本方加桔梗枳殼各一錢牡蠣末二錢如往來寒熱咳嗽胸脅痛者本方加五味乾薑各五分去人參如身熱欲近衣不渴者本方去人參加桂枝五分如發熱而渴不惡寒而咳者加五味子五分如痞而胸脅滿脹本方加乾薑五分牡蠣一錢如往來寒熱胸脅小便不利嘔而不渴者去人參半夏加桂枝乾薑牡蠣各六分瓜蔞根一錢如傷寒七八日下之胸滿小便不利譫語驚狂自汗亡陽起臥不安一身盡痛本方加龍骨桂枝鉛丹茯苓牡蠣各半錢大黃七分如風溫汗後身熱胸中煩悶有動氣者本方加桂枝半錢芍藥一錢大柴胡湯治傷寒裡實大便難猶有表症者柴胡四錢黃芩芍藥各二錢半半夏二錢枳實一錢半大黃二錢上㕮咀薑三片棗二枚煎服以利為度未利再投一服大承氣湯治胃實譫語五六日不大便腹滿煩渴並少陰病舌乾口燥日晡發熱脈沉實者大黃七錢五分厚朴枳實各一兩朴硝半合作一服水二盞先煎枳朴二物取一盞去滓入大黃再煎一盞去滓入硝煎一二沸溫服以利為度此下之重者有痞滿煩實堅用之勿輕與也小承氣湯六七日不大便腹脹滿悶病在陽明無表症汗後不惡寒潮熱狂言而喘者大黃七錢厚朴枳實各三錢作一服水二盞去滓溫服以利為度未利再投一服此下之輕者只有痞滿實未至於燥堅也凡有可下之症未可便投大承氣先以小承氣與之如得利先硬後溏者此裡熱未甚所謂不轉矢氣也慎勿再下之為逆也若得利只有一行結糞來再不行或只有清水來即止此謂之轉矢氣也內有燥屎宜作大承氣湯與之以大便溏為邪盡如中風人有便難者本方加羌活二錢名三化湯調胃承氣湯治太陽陽明不惡寒反惡熱大便祕結譫語而嘔日晡潮熱者大黃六錢半甘草三錢芒硝一合上作一服水二碗先煎前二味至一碗去渣入硝再煎一沸溫服此亦下之輕者治有燥實堅而無痞滿之病也三乙承氣湯大黃芒硝厚朴枳實各一錢半甘草一錢上作一服水一盞生薑三片煎七分熱服桃仁承氣湯表症已罷小腹急大便黑小便不利為瘀血症此藥主之以代抵當湯大黃三錢桃仁去皮尖研十個桂心芒硝各一錢半甘草一錢先煎四味水一盞半煎一盞入硝再煎一二沸溫服血盡為度白虎湯治陽明經汗後脈洪大而渴及虛煩中暍等症知母六錢甘草二錢石膏一兩二錢粳米五勺上作一服水二盞以米熟為度如口燥煩渴或發赤斑加人參一錢名化斑湯如秋感熱之疫癘或陽明下後大便不固熱不退者或濕溫症熱不退而大便溏者本方加蒼朮六錢添水煎名白虎加蒼朮湯如傷寒下後自汗虛熱不已本方加蒼朮人參各一錢服之如神汗止身涼此通仙之法也理中湯治太陰病傷寒自利不渴寒多而嘔腹痛下利鴨溏蛔厥霍亂人參白朮甘草炙乾薑炮二錢半上作一服水煎溫服腎氣動者去白朮加肉桂三錢吐多者加生薑二錢去白朮下多者倍白朮人參添水煎悸氣小便不利加茯苓二錢渴者加白朮二錢五分腹痛者加人參一錢半寒者加乾薑一錢五分腹滿下利加附子如腹痛下利脈沉遲而微者本方加炮附子二錢名附子理中湯如傷冷中寒脈弱氣虛變為陰黃本方加茵陳二錢名理中加茵陳湯如霍亂轉筋本方加石膏半兩名理中加石膏湯如痞而胃寒或霍亂吐瀉不渴或胸滿未成結胸者或厥陰飢不能食即吐蛔者以本方為細末煉蜜丸名理中丸如霍亂吐瀉本方加木瓜藿香各一錢如傷寒蛔厥本方如烏梅三個如傷食結胸理中丸方加茯苓各等分枳實減半四逆湯治即病太陰傷寒自利不渴及寒中三陰症脈沉細而遲身體痛者附子去皮作八片生用一枚甘草炙六錢乾薑五錢分作二服每服用水二盞煎一錢去滓溫服取小汗愈真武湯治病及少陰傷寒脈沉細身體痛或汗後亡陽筋惕肉瞤少陰腹滿小便不利茯苓芍藥附子炮去皮生薑各三錢白朮二錢上作一服水二盞煎一盞溫服咳者加五味乾薑細辛各一錢小便利去茯苓下利者去芍藥加乾薑二錢嘔者去附子倍生薑五苓散治傷寒中暍煩躁小便不利而渴或霍亂吐利不止澤瀉一兩半白朮赤茯苓豬苓各一兩肉桂五錢上為細末每服三錢白湯或清米飲下或片薑煎飲熱甚去桂加黃芩此太陽里之下藥也太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下使邪從膀胱出也其症腎燥膀胱熱小便不利此藥主之小便利者不宜服如太陽病熱而渴小便難亦宜服之當服不服則谷消水去形亡必發黃此太陽入本失下也如表裡未解神昏妄語如見鬼狀加硃砂末一錢和勻服之如頭汗出欲發黃及疫癘秋感熱發黃本方加五苓末一兩半加茵陳末一兩水飲調服或濃煎茵陳湯調五苓散服名茵陳五苓散如傷寒三四日間往來寒熱自利者邪入太陰而少陽經猶在也本方合小柴胡湯名柴苓湯薑棗煎服以分利其陰陽也薑附湯治下後復發汗晝不得眠無表症而脈微者乾薑五錢附子生用一枚作一服水二盞煎一盞頓服如下利厥逆脈不至者加甘草五錢倍乾薑添水煎如面赤者加蔥白九莖名通白湯咽痛加桔梗利止脈不出加人參三錢名通脈四逆湯吐利止汗出而厥四肢拘急脈欲絶本方煎成正藥加豬膽汁半合攪勻分毒服其脈即起少陰症或腹痛泄利下重本方加芍藥二錢半小陷胸湯陽症傷寒病在陽下之太早變為結胸胸中作痛痞滿者謂之小結胸如胸中大痛手不可近者謂之大結胸此方加減治之黃連一錢半半夏二錢六分瓜蔞連殼二錢半枳實一錢半上作一服先煎黃連瓜蔞取一盞去渣入諸藥煎七分溫服未解再投一服此治小結胸之方也如大結胸煎成本湯入甘遂末二分同服半夏瀉心湯治傷寒病在陰下之太早心下滿而硬痛者此為結胸也但滿而不痛者此為痞宜此主之若傳經之邪只用小柴胡湯加枳殼桔梗主之此因下後故經云柴胡不中與也半夏泡黃芩乾薑人參甘草炙各三錢黃連一錢大棗二枚上作一服水三盞煎一盞半去渣再煎一半溫服未解再服如傷寒汗後胃中不和心下痞硬乾嘔食臭脅下有咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利加茯苓五分腹中痛加熟附子五分瀉利者先以水二盞煮薤白至一盞去渣以散入湯中煎至六分溫服梔子豉湯治吐下後心中懊憹無奈或大下後身熱不去心中痛結肥梔子十四枚香豉半兩水二盞先煎梔子至一盅入豉同煎至七分溫服得吐為度病人舊有溏者不可服如傷寒瘥後勞復發熱者本方加枳實大者三枚煎服覆令微似汗名枳實梔子豉湯按梔子豉湯則應吐劑此云覆令微似汗出者以其熱聚於上者苦則吐之熱散於表者苦則發之也如復病有宿食者枳實方中加大黃如博奕子大者五六枚當歸四逆湯治即病厥陰傷寒手足厥冷脈細欲絶者當歸桂枝白芍細辛各二錢甘草炙木通各三錢水二盞棗三枚煎一盞去滓溫服補中益氣湯治有內傷挾外感者方見後內傷中隨六經見症加減如見太陽經症有汗為中風本方加桂枝防風羌活川芎無汗為傷寒本方去黃耆白朮加麻黃蒼朮羌活川芎咳加蘇葉去黃耆如見陽明經症加半夏黃芩倍柴胡胸中痞悶加枳殼桔梗如見寒中太陰經症去柴胡升麻加桂枝乾薑炮如見寒中少陰經症本方去升麻柴胡加細辛熟附子如見寒中厥陰經病去升麻柴胡加吳茱萸如頭痛甚者本方加川芎白芷藁本細辛蔥白如遍身痛者本方加羌活蒼朮酒炒黃柏如渴者本方加葛根天花粉如小便不利加豬苓澤泄心下痞悶去黃耆人參白朮升麻加枳殼桔梗黃連半夏升麻散火湯治有內傷人病外感應外散者宜之方見內傷大羌活湯此解利兩感神方也防風羌活獨活防己黃芩黃連蒼朮白朮甘草炙細辛各三錢知母川芎生地黃各一錢水二盞煎一盞半熱服未解再服三四劑取愈小建中湯黃耆建中湯二方俱見於桂枝湯中黃芩湯治太陽與少陽合病及腸垢協熱下利黃芩三錢甘草生三錢炙二錢白芍二錢大棗二枚水煎服嘔加半夏二錢生薑二錢東垣涼膈散治傷寒餘熱不解玄參升麻湯方見斑疹化斑湯方見前白虎湯下茵陳湯治傷寒熱甚發黃山茵陳二兩大黃五錢大梔子十枚水二盞煎一盞溫服以利下加皂角汁為佳桃花湯治少陰下利膿血及濕毒下利赤石脂四錢八分一半全用一半為末糯米三勺乾薑三分水一盞煮米令熟去渣赤石脂末日三服已愈勿服烏梅丸治厥陰蛔厥肥烏梅去核三個細辛桂枝人參黃柏各六分黃連二錢六分乾薑一錢蜀椒炒去汗當歸各四分上為細末以苦酒浸烏梅一宿去核蒸之杵成泥和藥放石臼中再杵與煉蜜同搗丸如梧桐子大食後服十丸日三服稍加至二十丸忌生冷油膩葛根蔥豉湯治勞復作熱旦至晚則腰背痛頭項強重葛根二錢芍藥生薑各一錢半豆豉蔥白各一勺半水二盞入豉煎八分溫服薤根豭鼠矢湯二十一粒為末矢頭堅硬者是也水三盞米煎薤根為一盞米去渣入鼠矢末再煎至一盞溫服連進三劑更入燒褌襠末調服覆取黏汗為度更灸大敦穴知母麻黃湯治傷寒瘥後十餘日或半月中不醒醒常昏沉似失精神言語錯謬有似鬼祟或朝夕潮熱頰赤或有寒熱如瘧狀乃發汗不盡餘毒邪氣猶在心包絡間所致宜此主之知母一兩半麻黃一兩芍藥黃芩甘草桂枝各一兩半水一盞先煎麻黃數沸去上沫入前諸藥煎二盞半去渣每服一盞作三次服覆令微汗如心煩欲水當少與之令胃中和則愈百合地黃湯治百合病不經吐下發汗病形如初者百合劈七枚生地黃汁五合以水洗百合漬一宿去白沫與水更以泉水二盞煎取一盞去渣入地黃汁煎一盞溫服中病勿更服大便當如漆如發汗者本方去生地黃汁加知母三兩先漬煮百合如上法取一盞別以泉水二盞煎知母取一盞去渣合之再煎一盞半溫服名百合知母湯如下之後者本方去生地黃汁加滑石三兩碎代赭石如彈丸大者一枚碎如上法取百合汁一盞去渣合煎至一盞半溫服名曰百合滑石代赭湯如吐之後者本方去地黃汁加雞子一枚先煎百合如上法取一盞去渣納雞子黃攪勻煎五分溫服名百合雞子湯如變寒熱者本方去地黃用百合炙一兩滑石二兩共為末每服一錢日三服當微利止後寒熱即除名百合滑石散瓜蔞牡蠣散治百合病渴不瘥者瓜蔞根牡蠣各等分為末每服一錢米飲下日三服升麻湯治陽毒傷寒赤斑出狂言吐膿血升麻二錢犀角屑射干黃芩人參生甘草各一錢上㕮咀水二盅煎一盅服天雄散治陰毒傷寒身重背強腹痛咽喉不利毒氣攻心心下堅短氣嘔逆唇青面赤四肢厥逆其脈沉細而厥天雄炮去皮一兩麻黃當歸白朮半夏各半兩蜀椒一兩肉桂厚朴各一兩陳皮二錢上為末每服五錢入薑棗煎服取汗竹葉石膏湯治陽明汗多而渴及衄而渴欲飲水水入即吐又瘥後熱不退而渴石膏二兩八錢一字麥門冬去心一兩半人參甘草各三錢一字半夏四錢半一字竹葉二兩粳米一合上㕮咀水二升半煎一升半去渣入粳米再煎米熟湯成去米入生薑自然汁三匙再煎一服神效葛根解酲湯方見內傷黃連解毒湯方見疫病桂枝麻黃各半湯見前桂枝湯下藿香正氣散治夾食傷寒及霍亂吐瀉大腹皮酒洗曬乾紫蘇帶莖葉藿香白芷各六分茯苓六分厚朴薑汁炒陳皮去白白朮苦梗半夏各四分甘草炙二分水煎薑三片棗二枚溫服上傷寒方見仲景正理論不能盡述姑述當用經驗者
