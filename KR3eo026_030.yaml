body:
  text: 卷之三十心痛即胃脘痛也附脾疼胸痹心為君主豈容邪若是真心痛不佳胃脘與心其位近錯呼痛處是心家心者君主之官五臟之系皆屬於心乃一身之主宰十一官之所聽令者也故主安則安主危則危豈邪氣之可犯乎設使心經果為大寒之所觸瘀血痰飲之所沖則其痛掣背脹脅胸煩咽乾兩目赤黃手足俱青至節謂之真心痛乃邪氣傷其君也旦發夕死夕發旦死或因他臟之邪有客邪乘於心者是則心之別脈屬焉非本經自病也如陳無擇所論諸經諸俞諸腑涉邪所致者是也按病機云心痛與背相引如有物從觸其心身傴僂者腎心痛也先刺京骨崑崙不已刺合谷心痛腹脹胸滿不食心痛甚者胃心痛也刺大都太白心痛如錐刺乃脾心痛也刺然谷太谿心痛色蒼然如死狀終日不得休息乃肝心痛也刺行間太衝心痛臥若從心上起動作痛益甚其色不變者肺心痛也刺魚際太淵以上心痛皆因他臟氣不平所致亦非本臟自病也故各刺其經之穴宜通氣行無所凝滯則痛止矣胃之上口名曰賁門賁門與心相連故經云胃脘當心而痛時人未知此義見其痛在心所乃呼為心痛也其在當心而痛者有三病曰胃脘痛曰脾疼曰胸痹當各求之胃脘疼者腹脹當心而痛上支兩脅膈咽不通脾疼者心下急痛食則嘔腹脹善噫胸痹者喘息咳唾胸背痛金匱云陽微陰弦即胸痹而痛所以然者責其虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也心痛曾聞九種名緣何治例未能明不知新久分虛實冷熱無方法並行所謂九種心痛者曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛雖有九種之名治例未立惟金匱有九痛丸一方總治九種心痛恐未嘆然丹溪云凡心膈之痛雖分久新心痛即胃脘痛若明知身犯寒氣口得寒物而病於初得之時當用溫散溫利之藥若病久則成郁矣鬱則成熱河間所謂久痛無寒暴痛非熱者是矣草豆蔻性溫能行滯氣利膈上痰若胃脘果因寒而作痛用之如鼓應桴若濕痰鬱結成痛者服之多效而以熱鬱而痛者宜以涼藥監製之如芩連梔子之類其效尤速治久痛者用山梔子大者七枚或九枚炒焦黑用水一盞煎七分入生薑自然汁二三匙令辣熱飲之立止如劫止之後復發者前藥必不效玄明粉一匕白湯調下立止如痛時手不可按者此實痛也宜吐之利之吐用梔子豆豉湯利用大陷胸湯以物按而痛定者屬虛以二陳湯加炒乾薑末和之而愈不可用人參白朮蓋諸痛不可補氣故也經曰若調寒熱之逆冷熱必行故治胃脘痛者草豆蔻山梔子不可缺也如胃脘痛甚諸藥不效者宜連服六一湯此治久病寒因熱用方也如氣自腰腹間攻心痛不可忍腹中冷自汗如洗手足冷者宜三因倉卒散此治新病寒因熱用方也心痛初因寒所生久而變熱又非寒食痰氣血別求責痛止須知調理難經曰寒氣客於背俞之脈其俞注於心故相引而痛背痛徹心心痛徹背宜烏頭赤石脂丸方可治腎心痛河間云有寒厥心痛者手足逆而痛身冷汗出便溺清利或大便利而不渴氣微力弱急以朮附湯溫之有急心痛者宜落盞湯此可治肝心痛有客寒犯心胃大痛不可忍者宜東垣麻黃豆蔻丸此治身受寒氣口食寒物初病者宜溫散之方也有因食生冷寒物停留胃中作痛者宜丁香脾積丸此溫利之藥也胃為脾之腑木鬱之發為病胃脘常先而痛此腑先病也甚而致於兩脅痛則連及於臟矣古方名為脾痛者是也其有身受寒氣口食寒物胃先痛而脾後痛者宜燒脾散和劑抽刀散皆可用也有服寒藥多致脾胃虛弱胃痛者宜溫胃湯主之方見內傷以上皆治寒痛方也河間云有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗出知為熱也其脈浮大而洪當灸太谿崑崙四穴謂表裡俱瀉之灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也丹溪云古方多用山梔子為君熱藥為之嚮導則邪易服病易退有熱實心痛者宜小陷胸湯甚者手不可近大陷胸湯主之方見傷寒門有熱氣心作痛者宜生地黃膏以上治熱痛方心膈大痛攻作腰背發厥嘔吐諸藥不效者就吐中以鵝翎探之出痰碗許而痛即止凡因痰因食積而痛服藥不止並宜吐之痰飲心痛用海石佐以香附米以川芎山梔子煎湯入生薑汁調服如無藥處以鹽置刀頭燒紅淬入水中乘熱飲之吐痰而愈胃中若有流飲清痰作痛腹中漉漉有聲及手足寒痛或腰脊膝脅抽掣作痛者用小胃丹或控涎丹漸漸服之徹去病根即止如痰積只胃脘痛不至甚者宜白螺殼丸主之胸痹喘息咳唾不得臥心痛徹背者瓜蔞薤白半夏湯主之以上並治痰痛方河間云大實心中痛者因氣而食卒然發痛大便或秘久而注悶心胸高起按之愈痛不能飲食急以煮黃丸利之利後以藁本湯去其邪也有因食多食煎燒餅熱面之類以致熱鬱於內胃脘當心而痛者黃連六一湯主之有酒積食積茶積肉積清痰在胃脘當心而痛者宜加味枳朮丸大效以上皆治食積痛方也丹溪云有平日喜好熱物致死血留於胃口而痛作者宜桃仁承氣湯下之有死血留於胃脘作痛者宜玄桂丸主之有氣滯不行攻刺心腹痛連胸脅及婦人血氣刺痛並宜家秘祛痛散婦人多心痛者宜勝金散婦人血入心脾經發作痛尤有甚於諸痛也宜河間四物倍加芎歸湯調服沒藥散以上皆治血痛方也丹溪云用黃荊子炒焦為末上可治心痛下可治白帶此治風痛方也脈經云諸蟲痛者如心腹痛者懊憹發腫聚往來上下行痛有休作心腹中熱喜渴涎出面色乍青乍白乍赤嘔吐清水者蛔咬也以手按緊而堅持無令得移以針刺之久持之蟲不動乃出針也此法難用蟲痛者必面上有白斑能食時作時止宜二陳湯加苦楝根煎服或檳榔散集效丸俱用苦楝根皮煎湯下金匱云腹中痛其脈當沉若弦反洪大故有蛔蟲也如服毒藥不止者宜甘草粉蜜湯下詳見蟲病此以上治蟲痛方也東垣草豆蔻丸寒熱心痛俱獲奇功久病鬱熱者不可多服以加味枳朮丸代之如心下痛者用二陳湯合小陷胸湯磨木香水少許和服如神丹溪云中宮有食積與痰而作痛者胃氣亦賴所養卒不便攻雖日數多不食不死若痛方止即吃物病必復作勿歸咎於醫也必須再服三五服藥後以漸而少食方可獲安矣又云若病安之後縱恣口腹不改前非病必再作難治也心痛脈浮大弦長者死沉細微者生心痛諸方東垣草豆蔻丸治客寒犯胃作痛或因濕熱鬱結作痛亦可劫去止又治氣弱心痛亦妙此治胃脘痛之要藥也草豆蔻麵煨一兩橘紅人參白殭蠶炒益智仁吳茱萸湯泡焙乾黃耆各八錢生甘草炙甘草青皮當歸身各六錢澤瀉小便多者減半半夏各一兩桃仁去皮尖七十個另研泥麥芽麵炒一兩半神麯炒微黃柴胡脈不弦者減半薑黃各四錢上為細末入桃仁泥和勻再研湯浸蒸餅為丸如梧桐子大每服三十丸白湯送下久病者加土炒芩連各一兩加味枳朮丸治清痰食積酒積肉積茶積在胃脘當心而痛又痞滿噁心嘈雜噯氣吞酸嘔吐脾疼等症其效如神痛久成郁有熱者以此代草豆蔻丸白朮二兩枳實麩炒蒼朮米泔浸焙豬苓麥芽面炒黃色神麯炒黃半夏曲各一兩澤瀉去毛茯苓白螺螄殼洗去土煅黃連陳壁土炒去土各七錢砂仁草豆蔻煨黃芩陳壁土炒去土青皮去白萊菔子炒乾生薑各五錢陳皮去白香附子童便浸杵碎焙乾瓜蔞霜另厚朴薑汁炒檳榔各三錢木香甘草各二錢吞酸加茱萸湯泡焙寒月五錢暑月減半久病虛加人參五錢時吐清水加炒滑石一兩牡蠣煅五錢上為細末新荷葉水煮粳米粉為丸如梧桐子大每服七十丸多至一百丸清米飲下丹溪白螺螄殼丸治痰飲積胃脘痛白螺螄殼牆上年久者佳煅滑石炒蒼朮香附子童便浸山梔子南星煨烈各一兩枳殼麩炒青皮半夏曲木香砂仁各五錢春加川芎夏加黃連秋冬加吳茱萸各五錢上為細末用生薑汁浸蒸餅為丸如綠豆大每服五十丸薑湯下丹溪玄桂丸治死血留胃脘當心作痛效玄胡索一兩半滑石紅花桂心紅曲各五錢桃仁三十個另研泥上為細末湯浸蒸餅為丸如綠豆大每服五十丸薑湯下黃連六一湯治因多食熱面之類以致胃脘當心而痛或嘔吐不已漸成反胃黃連六錢甘草炙一錢上㕮咀作一服水一大盞煎七分去渣溫服如不止者必有死血也用桃仁承氣湯下去其血立效方見傷寒門連附六一湯治胃脘痛甚諸藥不效者黃連六錢附子炮去皮臍一錢生薑三片大棗二枚上㕮咀作一服水一盞半煎至一盞去渣稍熱服倉卒飲治氣自腰腹間攻心痛不可忍腹中冰冷自汗如洗手足厥山梔子大者四十九枚連殼捶碎炒焦附子一枚炮去皮臍上為細末每服二錢酒一盞煎八分溫服東垣麻黃豆蔻丸治客寒犯胃心頭大痛不可忍而初得病者宜服之麻黃不去節木香青皮紅花厚朴薑汁炒各二錢蘇木三分蓽澄茄四分半夏洗升麻麥蘖麵炒砂仁黃耆陳皮去白白朮柴胡炙甘草吳茱萸泡當歸身各五分益智仁六分神麯炒一錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸細嚼白湯下家傳秘結祛痛散治諸般心氣疼痛氣滯不行攻刺心腹痛連胸脅小腸吊疝及婦人血氣刺痛立有神效青皮去白五靈脂研飛去沙土川楝子肉穿山甲土炒拌各二錢良薑香油炒玄胡索沒藥各一錢五分沉香一錢八角茴香二錢檳榔一錢五分木香一錢二分砂仁少許上㕮咀為粗末用木鱉去殼一錢二分七片同藥炒至香焦去木鱉不用研為細末每服一錢加鹽一星用酒或滾水調下落盞湯治急心痛陳皮香附子良薑吳茱萸石菖蒲上等分㕮咀水煎先用碗一個入香油三五點在內小盞蓋之將藥淋下勿開盞熱服大效和劑抽刀散治脾胃積冷中滿疼痛川白姜銼入巴豆一錢二分半同炒至巴豆黑色去巴豆不用五兩良薑銼五兩入斑蝥二十五個同炒至斑蝥黑色去斑蝥不用石菖蒲不見火五兩半糯米炒黃六兩二錢半上為細末每服二錢空心溫酒調下燒脾散治飲啖生冷果菜停留中焦心脾冷痛乾薑炮厚朴薑汁炒草果仁砂仁甘草炙神麯炒麥蘖炒良薑炒陳皮各等分上為細末每服三錢炒熱鹽湯點服不拘時烏頭赤石脂丸治心痛徹背背痛徹心蜀椒炒赤石脂各半兩烏頭炮附子炮乾薑炮各二錢半上為末煉蜜丸如梧桐子大每服一丸食後湯下日三服不愈漸加丸數朮附湯治寒厥暴痛甘草炙一錢白朮四錢附子炮一錢半上㕮咀分作二服入薑棗同煎金鈴子散治熱厥心痛或發或止久不愈者金鈴子肉玄胡索各一兩上為末每服二錢酒調下煮黃丸治大實心痛雄黃研水飛一兩巴豆去油五錢研細上二味相和再研白麵二兩相和再研滴水丸如梧桐子大每服時先煎漿水四五沸下藥二十四丸再煎一二十沸撈入冷漿澄冷一時服二丸一日二十四丸加至微利為度用浸藥水送下得利後止服藁本湯以散其毒藁本半兩蒼朮一兩上㕮咀分作二服水二盞煎一盞溫服河間四物湯倍芎歸湯治婦人產後敗血聚於胸中作痛者四物湯倍加當歸川芎加紅花玄胡索與本方等分煎服調下沒藥散虻蟲去翅足水蛭炒沒藥各一錢桃仁泥十四個上為細末與桃仁泥和勻前藥調服血下痛止只服前藥勝金散治心下有血急痛桂心玄胡索五靈脂蒲黃各等分上為細末每服三錢用水一盞當歸一錢酒三分同煎七分調服生地黃膏治熱氣乘心作痛石菖蒲一兩半北前胡赤茯苓各七錢半上為細末用蜜一盞生地黃汁一盞夾研為膏每服彈子大丸紫蘇煎湯食後調下金匱甘草粉蜜湯治蟲齧心痛毒藥不止者用甘草二兩銼細水三升煮取二升去渣又入粳米粉一兩蜜四兩攪勻再煮如薄粥溫服一升瘥即止小胃丹上可取胸膈之痰下可利腸胃之痰胃虛食少者不可用甘遂麵裹煨大戟長流水煮一時曬乾芫花醋拌炒勿焦各二兩大黃酒拌濕紙裹煨熟焙乾又以酒炒一兩半黃柏炒褐色二兩共為細末粥丸麻子大每服十丸溫湯下
