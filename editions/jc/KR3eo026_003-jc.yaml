body:
  text: 卷之三中暑小滿交來相火行天時到此熱如蒸恆言壯火能消氣豈識強陽傷弱陰按素問運氣小滿後六十日為三之氣少陽相火司令天時至此火熱大行流金爍石其氣如蒸又以天地升降之理推之四月純陽之月陽氣盡出於地謂之盛陽夏至之後一陰始生其氣甚弱陽強陰弱水不勝火腎虛也火刑于金肺虛也心象離而中虛熱則氣緩而不收心虛也是知暑熱之病乃陰陽俱虛之所致也脈虛身熱暑邪侵弦細芤遲脈可憑此是陰陽俱不足真人生脈妙通神經云脈盛身熱得之傷寒病虛身熱得之傷暑此傷寒傷暑之別也傷暑之脈弦細芤遲皆虛也愚謂弦細者氣虛也芤遲者血虛也難經云熱則傷氣故氣消而脈虛脈即血也未有氣虛而脈不虛者也蓋腎主精膀胱主津液皆血之源也謂之真陰又名天一至真之氣易繫辭云坎為血卦其義精矣然金者水之母也腎與膀胱之化源肺大腸實主之夏月火旺金被火刑故腎之癸水絕於午膀胱之水則絕於巳而真陰之化源絕矣孫真人立生脈散令人夏月服之謂四月建巳丙火旺而辛金死五月建午丁火旺而庚金敗故用生脈以瀉丙丁之火補庚辛之金使壬癸水之化源潛滋暗長於泉源之化也夏月身中有伏陰食寒飲水論調神冷傷脾胃能生病每到秋來瘧痢成天地之化陽盛則陰虛陰盛則陽虛故子月一陽生至巳月則六陽之氣盛矣當是之時草木暢茂昆蟲豉舞天之陽氣盡出於地之上也人之腹屬坤卦坤為地身中之陽浮於肌表散於皮毛經云夏氣在經絡長夏氣在肌肉陽盛於表則腹中之陰亦虛也世言夏月伏陰在內者非謂一陰初生伏而不見其氣則虛乎此陰字非陰冷之說乃陰虛之義調神論云夏宜食寒孟子曰夏日則飲水此因時制宜養生之道也若拘此說而寒泉瓜果生冷一切不禁則脾胃反傷當時即病者為腹痛為霍亂吐瀉如不即病至秋為瘧為痢調神之理當如是乎予解之曰夏宜食寒者君子養生之道勿多食者恐傷脾胃之和也夏不宜服辛熱者良工守時之禁其服溫藥者救其中氣之傷也路上行人雨汗流農夫烈日運犁鋤棲遲堂榭揮輕扇受病曾分苦樂無人有形苦者形樂者形苦者病生於外形樂者病生於內其受病一也潔古云靜而得之者為中暑形樂病也動而得之者為中熱形苦病也按東垣曰暑熱之時無病之人或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室之陰寒所遏使周身陽氣不得伸越多以大順散熱藥主之者是也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗太泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之傷暑傷寒法自差河間著論擬長沙治分三法須詳審勿使真陰被火邪治暑之法清熱益氣養陰勿使邪火為元氣之賊也宜分表裡治之如有頭痛惡寒之症為病在表宜雙解散去硝黃加香薷發散之最佳如泄瀉嘔吐煩渴飲水為半表半裡宜六和湯薷苓湯合天水散清之若表已解裡熱甚者隨症解之渴甚者白虎湯甘露飲心煩不得安者黃連解毒合梔子豉湯小便不利者五苓散去桂加車前子主之大便硬者河間涼膈散主之或人平生素虛及老人傷暑脈微下利渴而喜溫或厥逆不省人事者竹葉百膏湯加熟附子半個冷服如壯熱汗多不止者白虎湯加人參蒼朮各一錢服之汗止熱退身涼暑傷元氣有陽陰陽受香薷合五苓若是陰虛宜益氣平人生脈莫嫌頻動而得之者為熱病為陽症無惡寒吐利表裡症者宜五苓散合香薷飲靜而得之者為暑病為陰症不問有表裡症並宜清暑益氣湯若平人無病者宜常服生脈散待熱湯飲之東垣云夏月服生脈散加黃耆甘草服令人氣力湧出辛苦奔馳受熱傷宜將脈症細消詳氣虛白虎如神效血若虛時補血湯奔馳勞役之人有傷熱者其症肌熱躁熱目赤面紅煩渴引飲晝夜不息所謂症似白虎者是也宜以脈辨之其脈洪大而長按之有力者真白虎症也宜人參白虎湯主之若脈洪大而虛重按全無此脈血虛症也誤服白虎湯必死宜當歸補血湯主之暑病人參白虎湯東垣益氣是仙方六和吐利能專治煩渴無如甘露良此治暑病之大法也陽受之者宜人參白虎湯加蒼朮主之陰受之者宜東垣清暑益氣湯主之霍亂吐瀉者六和湯主之煩渴不止者甘露飲主之暑風卒倒不須惶移就陰涼灌蒜湯春末夏初人少氣陰虛注夏有奇方凡人夏月沖斥道路或於田野中務農作勞或肥白氣虛之人不能抵當暑熱忽然暈倒地其氣將絕名曰暑鳳如在日中即當移病者於陰處切不可與冷水飲並臥濕地取大蒜嚼爛和溫湯灌之如無大蒜只將溫湯灌之或童便灌及用布蘸熱湯熨臍並氣海或掘路中熱土作窩於臍中令人尿之俟其蘇甦如不醒急灸氣海穴以復其元氣醒後以琥珀丸獨參湯調元湯辰砂五苓散治之若以冷水灌之及以冷水漬之即死凡人於春末夏初頭痛腳軟食少體熱忽瘦者此屬陰虛元氣不足名曰注夏宜補中益氣湯去柴胡升麻加炒柏白芍藥挾痰者加半夏茯苓或常服生脈散加黃耆甘草炒柏清暑益氣湯治長夏濕熱大盛人感之多四肢困倦精神短少懶於動作胸滿氣促肢節煩痛或氣高而短身熱而煩心下痞滿小便黃而數大便溏而頻或瀉黃或糜或如泔色或渴或不渴不思飲食自汗體重或汗少者黃耆蒼朮制升麻各一錢人參白朮神麯炒陳皮澤瀉各五分甘草炙酒柏麥冬當歸各五分五味九粒葛根青皮各二分水煎大溫食遠服二次益元微治中暑身熱煩渴小便不利此藥能滲濕分利水道實大腸化熱毒行積滯逐凝血補脾胃降火之要藥滑石水飛六兩甘草微炒取末一兩為末少加蜜冷水調下任意如發汗蔥白豆豉湯調服雙解散治傷寒溫暑熱病在表頭痛身熱肢體痛邪熱有餘即防風通聖散去硝黃益元散二方相合加香薷薑蔥為引生脈散夏月服以補元氣人參麥冬五味水煎無時服香薷飲治一切暑熱腹痛霍亂吐利煩心香薷陳者佳三錢厚朴薑汁炒扁豆各一錢半水煎冷服薷苓湯香薷飲五苓散二方合也水煎服甘露飲治伏暑大渴即五苓散加減也白茯苓澤瀉甘草寒水石石膏各二兩白朮桂枝豬苓各一兩半滑石四兩脈虛加人參一兩共末每服三錢白湯或新汲水薑湯尤妙蒼朮白虎湯即人參白虎湯加蒼朮當歸補血湯治身熱而渴目赤面紅症似白虎其脈洪大而虛此病得之肌困勞倦黃耆一兩當歸酒洗二錢水二盞煎一盞食遠服六和湯治暑身熱霍亂吐瀉人參杏仁去皮尖微炒甘草炒半夏曲砂仁各五分茯苓藿香木瓜扁豆炒各一錢香薷二錢厚朴薑汁炒一錢半水煎姜五片溫服涼膈散黃連解毒湯見疫病竹葉石膏湯見傷寒
