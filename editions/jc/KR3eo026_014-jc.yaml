body:
  text: 卷之十四腳氣腳氣古人名厥緩發時其症類傷寒病原所受須憑脈入腎攻心治較難古無腳氣之說內經名厥兩漢間名緩風宋齊之間謂之腳氣或云病生於脾內經曰傷於濕者下先受之蓋脾主四肢足居於下而多受其濕濕鬱成熱熱濕相搏其病作矣或云病生腎難經曰久坐濕地強力入水則傷腎腎司於下腳者腎之外候也夫人為嗜欲所戕若不自覺腎氣內虛水濕外侵不為腳氣者鮮矣然婦人亦病腳氣者必因血海虛弱七情傷損遂成斯疾今婦人病此者多則知婦人以血海虛得之與男子腎虛類矣男女用藥固無異但兼以治憂恚藥無不效也曰脾曰腎雖不同其生於濕則一也愚謂病生於外者則從足少陰太陽經以辛溫發散之病生於內者則從足太陰陽明經以苦溫寒疏通之腳氣之發先從氣衝穴隱核痛起及兩足脛紅腫或壯熱頭痛或身體拘急或百節痠疼或小腹不仁以致胸滿喘息煩悶怔忡昏瞶譫妄大渴引飲嘔噦痰涎見食即吐大小便閉澀皆其候也其惡寒發熱狀類傷寒但卒然腳氣為異耳或一旬或半年復作如故漸漸而致於足脛微腫大如瓜瓠者成痼疾矣其脈弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛堅牢者實結則因氣散則因憂緊則因怒細則因悲大抵因於四氣者兼浮因於七情者兼沉不可不知其症自汗走注為風勝無汗攣急掣痛為寒勝腫滿重著為濕勝煩渴熱瞀為暑勝四氣兼中者但推其多者為勝分其表裡以施治也腳氣入心則恍惚謬妄嘔吐食不入眠臥不安左寸脈乍大乍小或乍有乍無者死入腎則腰腳重小便不通呻吟目與額皆黑氣上衝胸而喘左尺絕者死得病須分南北方六經治例各推詳不宜用補並淋洗疏導無如刺灸良孫真人云四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣跣足當風取涼皆成腳氣若暑月久坐久立濕冷之地者則濕熱之氣蒸入經絡疾發必熱而四肢痠疼煩悶若冬月久坐久立濕冷之地者則濕冷之氣上入經絡病發則四肢酷冷轉筋世有勤工力學之士久坐久立於濕地冷氣乘入經絡不覺成病也若欲使之不成病者初覺則灸所覺處二三十壯則愈不復發矣夏月得之者宜服東垣當歸拈痛湯及健步丸冬月得之者宜服生料五積散加木瓜及安腎丸勤工力學之士得之者分冷熱二症不出上四方也南方卑濕霧露所聚之地其民腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此由氣血衰竭受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣混混則痹痹則虛弱故令痹弱也名曰腳氣治之多以灸焫為佳以導引濕氣外出及飲醪醴以通經散邪所制之方寒藥少熱藥多用麻黃川烏薑附之屬經云濕淫於內以苦發之麻黃苦溫發之者也川烏辛熱走而不能守通行經絡薑附辛甘大熱助陽退陰亦散清濕之邪病之初起宜發散之如越婢湯金匱烏頭湯之類以灸焫者即上所謂初覺則灸所覺處二三十壯者是也飲以醪醴者青囊秘傳藥酒方病愈住服又江東嶺南春夏之交山川蒸菀風濕毒氣為甚足或感之遂成瘴毒腳氣其候則腳先屈弱漸至痹疼脛微腫小腹不仁頭痛煩心痰壅逆晡作寒熱便溲不通甚者攻心而勢迫治之誠不可緩病之初起先服加味敗毒散以解之後服丹溪紫蘇飲以盡其餘毒北方者其地高陵居風寒水冽其俗飲潼酪而肉食凡飲潼酪者以飲多速飲為能經云因而大飲則氣逆又云食入於陰長氣於陽今乃反行陰道是為逆也夫乳酪醇酒濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能呴故下注於足脛積久而成腫滿疼痛此飲食下流之所致也經云谷入多而氣少濕居下也況潼酪醇酒之濕熱甚於谷者乎治法宜以蒼朮白朮之類治其濕知母黃柏條芩之類去其熱當歸芍藥地黃之類調其血木香檳榔之類行其氣羌活獨活利關節而散風濕兼用木通防己川牛膝之類引藥下行以消腫去濕也經云濕淫所勝治以苦溫為君以苦辛發之透關節勝濕為佐以苦寒泄之流濕清熱為臣故東垣本此立當歸拈痛湯方以治濕熱之病其效捷於影響也病之初起宜先服東垣導滯以導之後用當歸拈痛湯以徹其邪病根除腫退則住服如飲食太過濕熱下流之病南方之人尤多治如前法南北二方症治其法詳盡又審足之三陰三陽是何經絡所起以引用藥為主治復審四氣中何氣客之治以佐使之藥四氣者風寒暑濕也如四氣流注於足太陽經宜服麻黃左經湯刺崑崙如四氣流注於足少陽經宜服半夏左經湯刺陽陵泉如四氣流注於足陽明經宜服大黃左經湯刺上下巨虛如四氣流注於足三陽宜服大料神秘左經湯刺絕骨又加味敗毒散古無足三陰方今竊取其意以補之亦大料神秘左經湯中變法治也如四氣流注於足太陰經宜服桂枝左經湯刺公孫如四氣流注於足少陰經宜服附子左經湯灸湧泉穴如四氣流注於足厥陰經宜服羌活左經湯刺曲泉如四氣流注於足三陰經宜服換腿丸灸三陰交活人書云凡腳氣服補藥及用湯洗渫者皆醫之大禁也蓋腳之治法以疏利毒氣為先蓋慮乎氣實而死矣所謂疏利者或病自外生如四氣之流注則發散以疏利之使毒氣之從汗解也或病自內生者如飲食之流注則攻下以疏利之使毒氣之從內解也或表裡之邪俱盛者則發表攻裡以雙解之所謂法無一定應變而施也腳氣之疾自古皆尚疏下為痰壅故也然不可太過太過則損傷脾胃使營運之氣不能上行反下注為腳氣也又不可不及不及則使氣壅不得消散留而成痼也熏薰洗之法實有發散之意謂不可者乃因外感濕氣乘虛襲入為腫痛者發也非為內受濕氣注下腫痛而言也蓋濕氣不能外達宜淋藥開導泄去其邪也古方洗藥用導氣除濕湯用威靈仙防風荊芥地骨皮歸尾升麻芍藥蒴藋等分煎水熱淋洗無時又方用杉木橘葉不拘多少煎水洗之神效又方防風荊芥金銀花車前草豬蹄殼桃柳枝透骨草各一兩煎湯先熏後洗兼服五積散以治寒濕腳氣累效又方治腳氣衝心用礬石以漿水一斗五升煎三五沸浸腳良針經云有道以來有道以去治之多以針灸為佳以導引濕氣外出也夫腳氣實為壅疾氣滯血聚紅腫疼痛宜用砭石去其惡血以泄其氣然後以藥治之或用三稜針刺其足六經之穴以泄之或用三稜燒紅於初起之核上刺去惡血甚良灸法見上苦樂之人受病時女人腳氣似男兒不思早治能調理腫大如瓜行步遲腳氣生於濕也有風濕有寒濕有熱濕富家貴族治合異乎貧窮者苦樂之分也貧賤之人沖冒四氣而得之者病多外感宜從左經湯五積散之類治之富貴之人饜足酒肉而得之者病多內傷宜從東垣拈痛湯丹溪紫蘇飲治之婦人有病腳氣者其苦與樂治同男子但兼以治憂恚藥如消風除濕湯木瓜散之類病腳氣者如飲食不清心下痞悶宜東垣開結導引丸如腳氣衝心宜四物湯加炒柏或金匱八味丸及灸湧泉穴又方用檳榔一味為末每服三錢紫蘇七葉連梗桔皮一全個不去白姜五片童尿煎去渣調服如腳氣入腹攻心嘔悶宜木香飲又方用木瓜銼細新水煎服止嘔神效又陰陽交錯清濁不分中滿喘急嘔吐者宜紫蘇子湯如腳氣上衝頭目昏眩喘急者宜烏藥平氣湯如腳氣痰多者二陳湯加檳榔枳殼蘇葉入姜煎服如腳氣大便秘澀者宜追風毒銼散有腳氣人宜常服二十四味輕腳丸如氣血虛發則痛不可忍者宜獨活湯吞活血應痛丸如腳氣遊走轉上腰腿而痛者宜慈濟丸如腳氣發作兩足腫大痛不可忍者宜杉木節飲流氣飲三和散之類有腳氣人足脛腫大如瓜瓠者宜河間除濕丹神芎導水丸木香檳榔丸之類初起之腫乃氣血之壅也發則腫病過則消矣此當用流氣飲審在何經屬何氣加減服之以防再發及灸三里三陰交如病久而浮腫者此氣血之敗化為水也乃成痼疾終難平復如除濕導水之藥恐不可用徒損胃氣必有後災但微腫者宜木香檳榔丸隨所用之煎劑吞一二十丸以行其壅無傷也外臺秘要第一忌嗔嗔則心煩煩則腳氣發又禁大語語則傷肺肺傷亦發動又不得露足當風入水以冷水洗足兩腳脛尤不宜冷雖暑月當須著布褲令兩脛溫暖微汗大佳依此將息氣漸薄損每至寅丑日割手足甲割少侵肉去氣夏時腠理開不宜當風睡睡覺令人按摩勿令邪氣稽留數勞動關節常令通暢此並養生之要拒風邪之法也尋常有力每食後行三五百步疲倦便止腳中惡氣隨即下散雖浮腫氣不能上也發明云第一凡酒及潼酪勿使過度過則損傷脾胃下注於足脛跗腫遂成腳氣第二欲不可縱嗜欲則腳氣發凡飲食之後宜緩行如上法經云逸者行之又云脾病者忌溫食飽食濕地濡衣腳氣諸方東垣羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便瘦阻隔先以此藥導之後用當歸拈痛湯以徹其邪羌活獨活各一錢二分漢防己歸尾各七分枳實炒五分大黃酒煨二錢四分上㕮咀作一服水盞半煎一盞空心溫服當歸拈痛湯治濕熱腳氣為病肢節煩疼肩背沉重胸脅不利兼遍身疼痛下注足脛腫痛腳膝生瘡赤腫及裡外生瘡膿水不幹或癢或痛並宜服之羌活一錢人參苦參酒洗升麻葛根蒼朮各四分黃芩酒炒炙草茵陳酒炒各一錢歸身防風知母酒洗豬苓澤瀉白朮各五分作一服水二盅煎一盅空心服臨臥再進服丹溪紫蘇飲治一切濕熱腳氣紫蘇黃柏鹽酒拌炒白芍木瓜澤瀉木通防己檳榔蒼朮枳殼炙草香附羌活痛加木香腫甚加大腹皮發熱加黃連大黃上㕮咀水煎服痛除腫退則住服此與健步丸同服健步丸蒼朮歸尾各一兩生地陳皮各一兩半白芍一兩半牛膝五錢吳萸炒大腹子二錢條芩酒炒五錢桂心一錢上為細末湯浸蒸餅丸如梧桐子每服一百白朮木通湯食前下消風除濕湯治風濕腳氣累驗蘇葉檳榔香附陳皮白芷桔梗五加皮牡丹皮木瓜各三錢分作四服水二盞姜三片花椒二十粒燈心二十莖煎一盞空心熱服微汗佳秘傳藥酒方治男子婦人風濕相搏腰膝疼痛或因坐臥濕地雨露所襲遍身骨節疼痛風濕腳氣並皆治之白芷桔梗芍藥麻黃去節川芎茯苓肉桂半夏防己各一兩甘草兩陳皮厚朴薑汁炒枳殼炒當歸木瓜獨活檳榔各一兩半川牛膝烏藥杜仲酒炒焦各一兩蒼朮制四兩加五加皮四兩上㕮咀以絹袋盛之用無灰好酒三斗將藥袋懸胎於壇內蜜封固壇口鍋內煮之一時久取起埋土中一日夜去火毒再三日後去藥隨量飲之渣曬乾為末酒糊丸如梧桐子大每服七八十丸空心溫酒下金匱烏頭湯治寒濕腳氣疼痛不可屈伸又治足少陰寒濕病麻黃芍藥黃耆各三兩炙草一兩四味合一處川烏五枚㕮咀以蜜二升煎取一升去川烏渣前四味以水三升煮取一升半去渣內蜜在內攪勻更煎之至七合不止盡服之越婢湯治腳氣風濕又治足太陰風濕病麻黃去節一錢半石膏二錢白朮一錢熟附子炙甘草各五分上㕮咀水一盞半姜五片棗一枚煎八分食前服羌活續斷湯以代獨活寄生湯治風症腳氣最除風毒消惡血又治足厥陰經風濕病加陳皮方見濕類腰痛下五積散治寒濕流注兩足痠疼有痰氣者用之尤宜又治足三陰經寒濕病加木瓜方見寒類加味敗毒散治足三陽經受熱毒氣流注腳踝上焮赤腫痛寒熱如瘧有汗惡風或無汗惡寒又治瘴毒腳氣羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎蒼朮大黃各等分每半兩入姜煎安腎丸以代八味丸治腎虛寒濕腳氣川烏炮去皮臍桂心各四兩茯苓白朮石斛酒炒白蒺藜炒去刺巴戟取肉山藥桃仁去皮尖炒肉蓯蓉酒洗焙川萆薢破故紙炒各十二兩上為末煉蜜丸如梧桐子大每服五十丸鹽湯空心服麻黃左經湯治風寒暑濕四氣流注足太陽經腰足攣痹關節重痛憎寒發熱無汗惡寒頭痛眩暈或自汗惡風麻黃去節葛根細辛減半白朮泔浸茯苓防己桂心羌活炙草防風各等分㕮咀水煎姜三片棗一枚空心服無汗去桂白朮加杏仁蒼朮澤瀉有汗去麻黃加芍藥等分半夏左經湯治四氣流注足少陽經寒熱往來腰脅疼痛頭目眩暈嘔吐不食半夏洗葛根細辛減半白朮麥冬柴胡茯苓桂心乾薑炮防風黃芩小草炙甘草各等分上㕮咀每服五錢水一盞姜三片棗一枚空心服熱悶加竹瀝喘急加杏仁桑白皮大黃左經湯治四氣流注足陽明經兩腳赤腫痛不可行大小便秘惡聞食臭喘滿自汗細辛減半茯苓羌活大黃酒煨炙草前胡枳實炒厚朴薑汁炒黃芩杏仁去皮尖另研各等分㕮咀每服五錢水煎薑棗引腹痛加白芍秘結加阿膠喘急加桑白皮蘇子小便澀少加澤瀉四肢瘡瘍浸淫加升麻大料神秘左經湯治四氣流注足三陽經腰足拘攣大小便秘澀喘滿煩悶並皆治之半夏葛根細辛減半麻黃去節小草麥冬乾薑厚朴制茯苓防己枳殼炒炙草桂心羌活防風柴胡黃芩各等分每五錢薑棗引空心服自汗加牡蠣白朮去麻黃黃腫加澤瀉木通熱甚無汗去桂加橘皮前胡升麻腹痛或痢去黃芩加芍藥訶子大便秘加大黃竹瀝喘滿加杏仁桑白皮紫蘇並等分新加桂枝左經湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利腹脹滿食不化桂枝厚朴炒枳殼炒防風白朮蒼朮陳皮半夏洗炙草茯苓神麯炒各等分每服五錢薑棗引空心服嘔吐加木瓜腫甚加大腹皮新加附子左經湯治四氣流注於足少陰經腳氣入腹腹脹疼痛上氣喘急此腎經虛寒所致也此症最急以腎乘心水剋火死不旋踵熟附乾薑炮麻黃去節細辛炙草白茯苓白朮桂心澤瀉五味子各等分上㕮咀每服五錢水一盞薑棗引腳氣衝心加炒黃柏更加附子末津調捏作餅子貼湧泉二穴上以艾炷多灸以泄引其熱下行新加羌活左經湯治四氣流注足厥陰經手足拘攣半身不遂痰涎吐沫轉筋腰膝痛大小便難羌活防風當歸川芎白朮乾薑炮半夏柴胡牛膝木瓜防己桂心各等分每服五錢薑棗引吐涎沫加吳萸炒大便秘加桃仁泥當歸小便秘加木通並等分換腿丸治足三陰經為四氣所乘發為攣痹緩縱上攻胸脅肩背下注腳膝疼痛足心發熱行步艱難薏苡仁南星炮石楠葉石斛酒炒檳榔萆薢川牛膝羌活防風木瓜各四兩黃耆蜜炙當歸天麻續斷各一兩蒼朮制川芎各一兩半共為細末酒糊為丸如梧桐子大每服五十食前陳皮湯下東垣開結導引丸治腳氣飲食不消心下痞悶白朮陳皮澤瀉茯苓神麯炒麥蘖炒半夏各一兩枳實炒巴豆霜各二錢五分青皮乾薑炒各五錢上為末湯浸蒸餅為丸如梧桐子大每服五十丸白湯下二十四味輕腳丸腳氣通用當歸川芎萆薢鹽水煮乾杜仲薑汁炒羌活石楠葉薏苡仁檳榔細辛防風枳殼炒五加皮續斷酒洗蒼朮米泔浸鹽炒獨活木瓜牛膝各一兩威靈仙木香海桐皮麻黃去節五靈脂各七錢半乳香沒藥各五錢另研上為末酒浸雪糕為丸如梧桐子大每服五十丸食前木瓜湯下二十四味流氣飲腳氣通用臨時加減陳皮青皮蘇葉厚朴制香附炒炙草各四兩木瓜二兩大腹皮丁皮檳榔木香草果辣桂莪朮煨藿香葉各一兩半麥冬人參白朮赤茯苓石菖蒲白芷半夏枳殼炒各一兩上為末每服四錢姜四片棗二枚水煎三和散腳氣通用大腹皮蘇葉沉香木瓜羌活各一錢白朮川芎陳皮炙草檳榔濕紙煨各七分半上㕮咀分作二服每服加茯苓五分水煎服入薑棗木瓜散同木瓜散即上方無沉香白朮川芎檳榔諸藥等分木瓜加一倍以上四方病腳氣者擇而用之獨活湯治腎風冷腳氣痠疼及久痢登廁風冷入於腸胃以致兩腳細小成鼓槌風而痢又不止用此及下藥皆效羌活麻黃去節熟附子生乾薑川芎牛膝白芍茯苓黃耆炙人參杜仲薑汁炒炙草辣桂當歸白朮木香各等分上㕮咀每服三錢水一盞姜五片棗二枚煎七分吞活血應痛丸活血應痛丸蒼朮炒六兩香附七兩草烏炮去皮臍三十四個威靈仙二兩陳皮五兩半黑狗脊燎去毛四兩沒藥一兩另研上為末酒面稀糊丸如梧桐子大每服二十丸獨活湯下靈濟丸治腳氣遊走兩足轉上腰腿疼痛不能轉側木瓜二兩川烏炮去皮臍黃耆炙白蒺藜炒當歸防風萆薢牛膝烏藥各一兩赤小豆炒茴香炒地龍去土白膠香另研五靈脂各七錢半為細末酒面稀糊為丸如梧桐子大每三四十丸紫蘇煎湯下紫蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律蘇子微炒半夏各一錢一分前胡厚朴制炙草當歸各五分桂心陳皮各五分上㕮咀姜五片棗二枚煎服經驗杉木節飲治腳氣發作惡寒發熱兩足腫大心煩重死杉木節四兩檳榔七枚大腹皮酒洗一兩青橘葉作一服順流水三升煎一升分作三服一日服盡如大便通利黃水其病除根未愈過數日再服一劑河間導水丸治腳氣胕腫疼痛或發熱惡寒濕熱太甚者大黃酒煨黃芩各二兩黑醜頭末滑石末各四兩上為末滴水為丸如梧桐子大每病甚時服四五十丸溫水下以利為度未發時常服一二十丸一日三服陳皮湯或津嚥下除濕丹治諸濕病腰膝腫痛足脛浮腫筋脈勁急津液凝澀便溺不利等症檳榔甘遂威靈仙赤芍澤瀉葶藶子各三兩乳香另沒藥另各一兩黑醜頭末半兩大戟炒三兩陳皮四兩上為細末麵糊為丸如梧桐子大每五十丸溫水下以利為度
