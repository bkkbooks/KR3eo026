body:
  text: 卷之六瘟疫天行時病似傷寒大小相傳病一般火濕為邪人不識伏藏鬼氣禍連綿有一歲之中眾人病一般者此天行時病也名曰瘟疫疫氣之發大則流行天下次則一方次則一鄉次則偏著一家皆相染易無問大小病狀相似悉由氣轉郁發有勝有復遷正退位之所致也故治疫病者不明運氣以施治法雖智者不能措手況庸劣之士乎大抵疫病專屬火濕雖似傷寒不可作傷寒正治而大汗大下也誤汗之則為斑為黃誤下之則為痞滿泄痢膿血之症宜從少陽陽明二經之藥以為主治之法少陽屬火陽明屬濕所謂治其本也少陽小柴胡湯陽明升麻葛根湯是也天有五星地有五行人身中之五臟應之五疫之鬼其五者之變化乎曾有病疫死者遊魂不散隨氣往來乘人之虛而中之致有夭亡曰屍疰曰伏連曰殗殜皆此類也惡毒常存汗泄中不知迴避便相沖邪從口鼻如侵入氣亂神危造化窮病疫之人所出之汗所出之便溺無非惡毒之氣或有觸犯者從鼻而入上至腦中流入諸經之中令人染病矣大儺逐疫見於經疫鬼常隨厲氣行欲避妖氛有真訣念頭忽動混邪淫按禮記月令季冬之月命有司大儺季春之月命國儺儺之事在周官則方相氏掌之所以逐疫也蓋季冬之月日在虛危二宿中有四司墳墓之氣季春之月日在胃昴二宿中有太稜積屍之氣厲鬼隨之而行恐其將來為災故儺以禳除之也夫周公孔子大聖人也周公作周禮有方相氏掌於天官孔子於鄉人儺必朝服立於阼階然則疫鬼之事理或有之懾生慎疾者不可不知避也按素問遺篇云欲將入於疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作玄水次想黃氣自脾而出存於中央化作會城一座吾身其中五氣護之次想頭上如北斗之煌煌然後可入疫室蓋人之身中太乙帝君在頭曰泥丸總神也以統乎一身無英君在左以統三魄白元君在右以統七魄能存其神避其毒氣則神光自聚邪不可干也若五神失守即神光不聚圓光亦缺非但屍鬼之侵一切邪虛乘虛而害之矣以上論存神守正以避惡毒之氣凡入疫室飲食之物不可便咽先出火氣呵之次出水氣吹之坐臥之處不可便就以氣吹之以袖拂之常以雞鳴時存心念四海神名三七遍東海神阿明南海神祝融西海神巨東北海神禺強每入病人家存心念三遍口勿誦自然神藏煞沒不敢矣此言布氣誦咒以驅逐疫厲之氣凡瘟疫之家自生臭穢之氣所謂傷寒無種氣味相傳者是也當取光明雄黃不拘多少細研以筆濃點鼻孔內兩傍陷中則疫氣不能入雖與病人同床亦不相染也五更洗面後及臨臥點之設若鼻中聞其氣即便以紙紐入鼻中嚏出之為準不爾邪氣上入泥丸宮遂百脈成斯病也以雄黃點之則自不聞其氣並避諸惡怪夢神良或用香油抹其鼻竅或把扇在手常向前扇之使穢氣散去也或常飲醇酒一二杯以壯神氣或帶闢瘟殺鬼丸務成子螢火丸或常取蒼朮口中嚼之自然惡毒之氣不相染著也此言用藥以解瘟癘之氣疫癘之病乃天地之害氣也天地有斯害氣還以天地所生之物以防備之蓋天食人以五氣地食人以五味合氣味而服之可以祛邪可以解毒古有預防疫病之方不可不知也雖人命遭逢時有否泰知而防之庶幾其有免者矣素問遺篇云一法於春分之日用遠志去心以水煮之日未出時面東飲二盞吐之則疫疾不生矣一法於穀雨日後用川芎蒼朮白芷藁本零陵香各等分煎湯三浴之以泄其汗汗出臭者無疫也或用摩風膏常摩其身一法用五瘟丹服之或丹溪加味三黃丸其素有內傷虛弱之人宜補中益氣湯隨時令加減服之使正氣常強則邪氣不能侵矣此以上皆論預解疫病之法其在疫家常正其心妄念勿興恭敬謹慎如對大賓敬疫神也美色豔妝視如不見歌謳笑謔聽如不聞美酒香餐勿先下箸堆金積王目如浮雲行住坐臥勿近臭穢言語呼喧厲色高聲見怪莫怪聞驚莫驚妄誕莫答禱祀必欽請事斯語疫病不侵五疫還從五臟分龐公名義豈無憑若人識得中間意解毒毋令毒入深按龐安常云春三月行青筋牽病夏三月行赤脈㩌病秋三月行白氣貍病冬三月行黑骨瘟病四季月各餘十八日行黃肉隨病命名取義必有憑據惜乎夏冬四季有症無方又按素問運氣遺篇云木疫名曰風疫火疫土疫金疫一名殺疫水疫一名寒疫由此二說觀之五疫者天地之厲氣人或中各隨臟氣以為病也如風先入肝肝主筋其色青其病強直肢節疼痛重急筋縮故曰青筋牽即木鬱也熱先入心心主血脈其色赤其病身熱自汗煩躁驚悸甚則血溢故曰赤脈㩌即火鬱也濕入脾脾主肉其色黃其病體重跗腫偏痹不隨甚則結核起於項側故曰黃肉隨即土疫也濕先入肺肺主氣其色白其病上氣喘嗽故曰白氣貍即金疫也寒先入腎腎主骨其色黑其病咽痛厥逆不利故曰黑骨瘟即水疫也五疫之病在於泄汗及下取之各隨其症以施治也詳見下一嚏能令毒氣清香蘇敗毒可驅瘟十神羌活並雙解神術三黃汗劑輕惡毒之氣自鼻入經云五氣入鼻藏於心肺未病之人不知迴避之法或生疑懼之心邪即中之先入腦令人昏悶急用搐鼻法嚏而去之此奇方救苦散主之不知用此則成病矣邪氣之中人者入腦之後一日在皮毛則肺受之二日在血脈則心受之肺受之則灑淅惡寒心受之則煩熱而渴其病在表宜以汗解香蘇散人參敗毒散主之如春三月風行於天其氣宜溫清反勝之肝木受邪人有病者宜九味羌活湯主之風溫自病葳蕤湯主之如夏三月火行於天其氣宜熱寒反勝之心火受邪人有病者宜雙解散主之火熱自病三黃石膏湯主之如長夏濕行於天風反勝之脾土受邪人有病者羌活勝濕湯主之濕氣自病大無神術湯主之如秋三月清行於天其氣宜涼火反勝之肺金受邪人有病者三黃石膏湯主之清氣自病宜參蘇飲主之如冬三月寒行於天其氣宜寒熱反勝之腎水受邪人有病者十神湯主之寒氣自病宜麻黃湯主之凡疫病初得一二日之間即如上法因時隨病加減治之以得汗而解汗之不解毒邪深合用柴胡及葛根涼膈黃連梔子豉臨時加減只滋陰疫病依前法治一二汗之不解不可再汗也宜用少陽經藥小柴胡湯陽明經藥升麻葛根湯為主治看所中陰陽經絡脈症加減和解之殊為切當萬舉萬全也如病三四日不解其人寒熱往來頭眩脅下滿心煩乾嘔口苦咽乾耳聾此邪在少陽一經也宜小柴胡合東垣涼膈散天水散主之如三四日不解其人頭痛身熱鼻乾不得眠渴飲水此邪在陽明一經也宜升麻葛根湯合白虎湯主之如三四日不解少陽與陽明病兼見者宜小柴胡升麻葛根合而服之如只少陽症小便不利大便瀉者宜小柴胡合五苓散主之看寒熱多少熱多寒少者去桂留苓寒多熱少者去苓留桂小便不利加天水散如少陽病少陽明病多寒少渴欲飲水者宜小柴胡湯去半夏合白虎梔子豉湯主之如陽明病多少陽症少面赤頭痛大熱而渴宜葛根湯加石膏蔥白豆豉合小柴湯去半夏加瓜蔞根主之如少陽或陽明經病不必悉見但見一二症大熱無汗者宜小柴胡合葛根梔子豉湯以微汗解其有汗者宜小柴胡合黃連解毒湯和之如只大熱大渴不止者宜人參白虎湯合天水散和之如大便秘者宜河間涼膈散合黃連解毒湯微利之如大熱大渴自汗不止者宜白虎加人參蒼朮湯主之病過六日勢將危要把其人脈症推合補合攻休怠忽更防厲氣易他人疫病二三日體熱腹滿頭痛飲食如故脈直而疾八日死疫病四五日頭痛腹滿而吐脈來細而強十二日死疫病八九日頭身不痛目不赤色不變而反利脈來牒牒按之不鼓手時大心下堅十七日死疫病汗不出出不至足者死厥逆汗自出脈堅強急者生虛軟者死凡疫病下利腹中痛甚者死疫病五六日後或汗或下其熱不解者其勢已危須憑脈症辨之如發狂譫語大便結者宜急下之三乙承氣合黃連解毒湯主之如只大便硬結無發狂譫語者宜大柴胡湯合涼膈散利之結甚作膽導法如胸膈滿痛者宜小柴胡合小陷胸湯主之如不止本方去甘草入甘遂末三分服之神效疫病發黃此危症也宜五苓散去桂加茵陳合梔子豉湯主之如不退者河間涼膈散去朴硝加茵陳合天水散以小便如皂角汁佳疫病發斑此危症也宜升麻葛根湯合人參白虎湯主之如不退人參白虎湯合黃連解毒加玄參大青主之疫病自利不止者宜五苓散去桂加阿膠合天水散主之如不止宜四君子湯合五苓散去桂有腹痛加白芍藥疫病發狂不識人大便秘者大柴胡湯加當歸生地黃主之疫病衄血者為欲解或不解者宜涼膈散合四物湯主之疫病渴不止者宜人參白虎湯加生地黃天花粉主之疫病心煩不得臥者宜黃連解毒湯合梔子豉湯主之疫病腹滿大便不通者三乙承氣湯利之後以小柴胡湯主之春夏人多病大頭秋來瘧痢不勝愁喉風赤瞎相傳染自各臨時以法求天行時病不但傷寒為疫癘也如大頭瘟瘧疾痢疾咽喉腫痛火眼之類亦有相傳染者多致殺人各隨病以法治之經云春氣者病在頭俞在頸項陽氣升也故大頭之病春夏之氣主之此即龐氏所謂黃肉隨病乃土疫也其氣蘊為結核起於頸之側布毒熱於分肉之中上散於髮際下貫顳顬隱隱而熱腫不相斷離宜服玄參寒水石湯灸脾之二俞皮肉之腫處則須刺破敷貼所謂血實則決之無不愈矣敷貼拔毒散主之劉河間云大頭病是陽明邪熱太甚資少陽相火而為之也多在少陽或在陽明或傳太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛治法當先緩而後急先緩者謂邪氣在上又自外而之內者若用重劑急下則過其病所上熱未除中寒復生必傷人命當視其病少陽為邪出於耳之前後陽明為邪首大腫緩藥緩服黃芩黃連甘草湯主之後急者謂緩藥已瀉邪入於內當急治之前方內加鼠黏子芒硝以微利之東垣云身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫耳宜普濟消毒飲子主之丹溪云大頭病乃濕熱在高巔之上不宜用降藥此以上治大頭病之法也經云夏傷於暑秋髮痎瘧此時行之正病也當從暑病小柴胡合白虎加桂枝湯主之如時行寒瘧大小相似者此厲氣之瘧也宜人參敗毒散加常山主之此以上治時行瘧疾之法也如時行疫痢大小相似者初得之有惡風寒頭痛腰痛熱之症為病在表宜發之人參敗毒散加陳倉米主之如五六日以後無惡寒之症但發熱作渴腹中痛者為病在裡宜大承氣合黃連解毒湯下之此治時行痢疾之法也龐氏云伏氣之氣古方謂之腎傷寒謂非時有暴寒中人伏毒於少陰經始衰不病旬日乃發熱微弱法當咽痛似傷次必下利勿用寒涼之劑宜半夏散桔梗湯主之如時行喉痹此火疫為邪也宜加味甘桔湯主之外以楊氏一字散搐其鼻更刺少商二穴丹溪云蝦蟆瘟屬風熱其症頷下腫腮腫宜防風通聖散加減用之或小柴胡加防風羌活荊芥薄荷桔梗外用敷藥星烏散如時行火眼大小相染謂之赤瞎亦火疫也宜救苦湯主之治瘟疫諸方人參敗毒散治瘟疫四時通用羌活獨活柴胡前胡川芎桔梗枳殼人參白茯苓各等分甘草減半水煎姜引神授香蘇散治四時瘟疫記云昔城中大疫有白髮老人教一富家人合藥施城中病者皆愈其後疫鬼作人問其富人家富人以實告鬼相顧曰此老教三人矣遂稽顙而退又前元時江西泰和縣瘟疫大作有醫者視病中夜而歸忽遇神人騎馬導從而來醫知非人拜伏於地神至前叱云汝何人也答曰某醫人也神曰汝今醫病用何藥術答云隨病冷熱輕重用藥治之神曰不然只一類用香蘇散好醫如其言試之皆效香附子炒去皮紫蘇各四兩陳皮甘草各一兩上銼為粗末每服三錢水一盞煎七分去渣熱服不拘時日三服戒食葷腥酒肉無不應效十神湯治時令不正之氣瘟疫大行川芎甘草麻黃去根節紫蘇葉葛根升麻白芷赤芍陳皮香附各一錢生薑三片連須蔥白三個水二盞煎一盞熱服取汗胸滿氣實加枳殼一錢黃連解毒湯治疫病大熱不止乾嘔煩熱渴錯語呻吟不得安臥淨黃連一錢黃芩黃柏山梔仁各二錢上㕮咀水一盞半煎一盞溫服九味羌活湯治瘟疫初感一二日間服之取汗其效如神羌活防風蒼朮生地黃川芎白芷黃芩甘草各一錢細辛五分水三盞煎一盞半分二服若急汗熱服緩汗溫服即河間羌活散無白芷用白朮乃解利之神方也大無神朮散治四時瘟疫頭痛項強憎寒壯熱身痛又主山嵐瘴氣妙劑也陳皮二錢蒼朮厚朴香附各一錢甘草一錢半藿香上㕮咀生薑三片大棗一枚水二盞煎一盞溫服本方無香附有石菖蒲如解利當去藿香加紫蘇一錢一方正氣散加石菖蒲三黃石膏湯治瘟疫病三焦積熱脈洪數譫語不顧體狂叫欲走晝夜喘息不休或經汗下後不解衄血發狂或身目俱黃石膏二錢黃芩黃連黃柏各一錢淡豆豉半合麻黃二錢梔子五枚上㕮咀水二盞煎至一盞二分去渣溫服連進三五劑效雙解散小柴胡湯大柴胡湯三乙承氣湯白虎湯梔子豉湯並見傷寒東垣涼膈散治瘟疫火熱不解又治傷寒餘熱不退及六經火連翹一錢甘草生一錢半山梔仁薄荷末黃芩桔梗淡竹葉各五分水一盞半煎一盞溫服日服三劑熱退即止此即河間桔梗散方也河間涼膈散即前方無桔梗有大黃五分朴硝二分五釐葳蕤湯治春月風瘟病冬溫通用葳蕤二錢半石膏三錢半麻黃白薇羌活杏仁甘草川芎木香各五分葛根一錢半水三盞煎一盞溫服升麻葛根湯五苓散小陷胸湯並見傷寒天暑散見暑門羌活勝濕湯見濕門黃芩黃連甘草湯治大頭瘟病黃芩酒炒黃連酒炒生甘草各等分上㕮咀每服三錢水一盞煎七分徐徐呷之不住服或劑畢未退再用大黃煨黍黏子各等分水煎去渣入芒硝等分再煎亦徐徐呷之無令飲食在前得微利及腫消只服前三味以和之如不退依前法次第服之得大利邪氣即止前方內宜用各本經藥少陽行經小柴胡湯陽明行經升麻葛根湯太陽行經加羌活防風荊芥陽明渴加石膏少陽渴加栝蔞根普濟消毒飲子昔太和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫甚目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治不效漸至危篤東垣制方治之活者甚眾人皆曰天方謂神仙所制也黃芩酒炒五錢黃連酒炒五錢人參三錢生甘草陳皮去白玄參各二錢升麻七分白殭蠶炒七分柴胡五分桔梗三分連翹去心板藍根即窩藍馬勃鼠黏子炒各一錢上為細末半用蜜丸噙化半用防風川芎薄荷當歸身細切五錢水二盞煎一盞調藥時時稍熱服之如大便秘加酒蒸大黃一錢以微利之腫熱甚者以砭針利之玄參寒水石湯治大頭病不退羚羊角大青各五錢玄參二兩升麻七分半寒水石一兩二錢半射干七分半芒硝七分半水四升煎一升半入硝化分三四服時時呷之五瘟丹預解疫毒之神方也一名代天宣化丸又解疹痘毒甘草不拘多少立冬日取青竹截筒一頭留節納甘草於內以木塞筒口置廁缸中浸之至冬至前三日取出曬乾用甲巳年為君黃芩乙庚年為君黃蘖丙辛年為君山梔丁壬年為君黃連戊癸年為君香附童便浸炒使蒼朮米泔水浸炒紫蘇佐陳皮佐雄黃水飛硃砂水飛上前五味當以其年為君者一味倍用四味為臣減半其後六味為佐者又減臣數之半於冬至日至誠各製為末和令勻惟硃砂雄黃以半為藥留半為衣大人丸如桐子大小兒如黍米大每服五十丸空心食遠面東服新汲水煎熱下日三服取雪水杵丸如無取龍泉水佳丹溪加味三黃丸預解疫毒大黃酒蒸黃芩酒炒黃連酒炒人參桔梗蒼朮制防風白滑石香附子如上制人中黃如上制甘草是也上等分為細末水煮神麯糊為丸每服五十丸氣虛者四君子湯下血虛者四物湯下痰多者二陳湯下救苦散專治傷風傷寒頭目不清如被疫氣所侵之人少覺頭昏腦悶急取嚏之毒氣隨散永無染著真仙方也括曰芎藿藜蘆三雄芷皂角四玄胡牡丹皮硃砂為伴侶一點透玄門起死回生路有人知此術永無傷寒苦川芎藿香藜蘆各三錢牡丹皮去心玄胡硃砂水飛各二錢雄黃水飛白芷牙皂各四錢上為細末每用一些先噙水在口中以竹筒吹兩鼻嚏出清涕佳畜類受瘟者吹之即無染矣闢瘟殺鬼丸熏百鬼惡氣雄黃雌黃各三兩羚羊角虎頭骨各七兩龍骨鱉甲鯪鯉甲蝟皮各二兩樗雞十五枚如無以芫青五十枚代之川芎禹餘糧二兩真珠東門上雄雞頭一枚上為細末以蠟二十兩熔為丸如梧桐子大每正旦大門口燒一丸或自帶一丸男左女右弔喪問疾無妨務成子螢火丸主闢疾病惡氣百鬼虎狼蛇蚖蜂蠆射工諸毒螢火蟲鬼箭削取皮羽白蒺藜各一兩羚羊角煅灶灰各一兩半雄黃雌黃各三兩礬灰燒二兩鐵槌柄入鐵處截斷燒焦上為細末以雞子黃丹雞冠一具搗和為丸如杏仁作三個絳囊盛五丸帶男左女右臂勿離身若在家常掛戶上拔毒散敷貼耳前後紅腫甚效生綠豆不拘多少磨為極細末醋調敷干以醋潤之白虎加桂枝湯治暑瘧白虎湯加桂枝是也未發前二時服半夏散治腎傷寒咽喉痛半夏桂枝甘草上為末每服三錢水一盞半煎七分溫服少少呷之加味甘桔湯治大毒流行咽痛喉痹桔梗甘草升麻連翹防風牛蒡子黃芩酒炒各一錢水煎入薄荷三葉煎八分食後細細呷之楊氏一字散治時行纏喉風漸入咽塞水穀不下牙關緊急不省人事者雄黃水洗蠍梢白枯礬藜蘆牙皂炙焦各等分為細末每用一豆大納鼻內搐之立效救苦湯治赤瞎腫痛桂枝連翹紅花細辛歸尾甘草各五錢蒼朮龍膽草各七分羌活黃芩麻黃柴胡防風藁本黃柏黃連生地黃知母各一錢芍藥二錢水煎食後服
