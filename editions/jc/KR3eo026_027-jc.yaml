body:
  text: 卷之二十七積聚積當有處聚無常癥有明徵瘕假眶四病所生俱是積身中氣血各遭傷按難經云氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成積者陰氣也其發有常處其痛不離其部云云聚者陽氣也其始發無根本上下無所留止云云故以是別知積聚也又要略云積者臟病也終不移聚者腑病也發作有時輾轉痛積為可治䅽氣者脅下痛按之則愈復發為䅽氣原病式云癥者腹中堅硬按之應手瘕者中雖硬而忽聚勿散無有常處故其病未及癥也經曰腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣或外中於寒內傷於憂怒則氣上逆氣上逆則六腧不通溫氣不行凝血蘊裹不散津液凝滿滲著不去而成積矣全按積者停蓄之謂乃病之總名也故曰積曰聚曰癥曰瘕通謂之積然難經云積者氣之所積聚者氣之所聚則積聚者氣病也針經云與血相搏則併合凝聚不得散而成積凝血蘊裹滲著不去而成積則癥瘕者血病也予竊有說焉人身之中氣附於血血依於氣氣行則血行血止則氣止其病不相離也積者五臟所生發有常處痛不離其部血之病也故忽散忽聚無其常是聚與瘕同一病矣但發無根本為氣聚中雖硬而聚無常為血瘕也陳無擇謂癥瘕屬肝部積聚屬肺部蓋以肝肺分氣血耳而劉宗厚云不必拘也其有五積六聚七癥八癥之說者積生於五臟故曰五積生於六腑故曰六聚七癥八瘕之名經論亦不詳出雖有蚊蛇鱉肉發蝨米等七證初非定名偶因食物所中留聚不散假血而成自有活性也五積推明出難經癥瘕氣血食痰成仙師治法無多字毒藥攻邪勿過分五積者謂心肝脾肺腎五臟之積也見五十六難肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲而不已宜肥氣丸主之今之瘧母亦肥氣之類也心之積名曰伏梁起臍上大如臂上至心下久不愈令人病心煩宜伏梁丸主之以熱藥散之則益甚以火灸之則彌聚子和云伏梁有二名同而實異不可不詳焉其一上下左右皆有根在腸之外有大膿血此伏梁義同腸癰其二體髀股胻皆腫環臍而痛是即風根不可動動則水溺澀之病作此言不可動謂不可大下非謂全不可下恐病去而有害也見內經脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚宜痞氣丸主之金匱云氣分心下堅大如盤邊如旋杯水飲所作與痞氣相似子和云痞氣者舉世皆言寒則痞內經以為濕則痞雖因飲冷而得其實陽氣為濕所蓄以熱攻之則不散以寒攻之則濕去而寒退矣肺之積名曰息賁在右脅下覆大如杯久不愈令人灑淅寒熱喘咳肺壅宜息賁丸主之子和云息賁舊說喘息賁而上行也予謂賁者賁門也息賁是息氣於賁門而不散也腎之積名曰奔豚發於小腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣宜奔豚丸主之若六聚之物在腑屬陽而無形治之亦無定法也並宜散聚湯大七氣湯選而用之更各隨六腑之氣加減為妙癥者堅也瘕者假也假物而成形丹溪云氣不能作塊成聚塊乃有形之物乃痰與死血食積耳積塊在中為痰飲在左為血積在右為食積積塊不可專用下藥徒損其氣病亦不去當消導之大法咸以軟之堅以削之以行氣開痰為主塊去後須大補有積塊堅硬如石形如杯盤大中滿腹脹令人坐臥不安者先服廣荗潰堅湯數服之後中滿減半止有積塊未消再服半夏厚朴湯服此二帖之後前證又減一半卻於前藥中加減服之此東垣之法也其有積塊而無中滿者只以消塊為主宜溫白丸主之凡婦人腹中有塊多屬死血宜廣木香香附桃仁丸有孕者禁服宜白香附桃仁丸如有死血食積痰飲成塊在兩脅動作雷鳴嘈雜眩運身熱時作時止者宜黃連香附桃仁丸此丹溪法也如食積成塊者宜阿魏膠丸以白朮三錢陳皮茯苓各一錢作湯使痰積用清痰丸食積用保和丸酒積用東垣草豆蔻丸氣積熱積木香檳榔丸食積冷積感應丸按丹溪先生分痰積在中血積在左食積在右之論亦語其大略如此蓋脾胃在中主痰涎肝在左主血肺在右主氣與食也大抵積塊者皆因一物為之根而血涎裹之乃成形如杯如盤按之堅硬也食積敗血脾胃有之痰涎之積左右皆有之也只論其所在之部心上腎下肝左肺右脾中如動氣之類則可謂中是痰屬脾左是敗血屬肝右是食積屬肺似太拘矣經云大積大聚乃可攻也衰其半而止又云大毒治病十去其六常毒治病十去其七小毒治病十去其八固宜常制矣夫大積大聚乃可攻之非積聚則未可攻也十去六七即衰其半矣止者不可復攻也多毒之藥以破積聚毒有大小大毒之性烈其為傷也多小毒之性和其為傷也少毒藥之攻積聚因其勢大不得已而用之也既衰其半大勢已去即止者恐傷正氣也聖人之慮深矣凡攻其積塊者以辛散之以苦泄之以咸軟之以堅削之未有不愈者也治積須明急緩攻不知中治豈良工積之所在當憑脈毒劑無令群隊同積之初起也甚微不知早治留聚而成癥矣其癥既成以毒攻之治之急也不多服者急中之緩也及其久也養正勝邪治之緩也待其氣強而後攻之緩中之急也或急或緩約之於中良工之勝也嘗考針經論痰血相搏併合成積難經論臟氣傳受及子和論七情為郁皆元氣自病不繫傷諸飲食致者當先調理不可妄下故所集五臟積方消導法宜用之若傷諸飲食致者及停痰蓄血成者元氣未病初非下之削之不可然治之不早元氣日減邪氣日增方用下藥而能獲安者實僥倖焉若是者則宜先補後攻可也若積鬱在身形氣未減飲食如常者則削之下之方應變而施以漸除之衰其大半可也否則失機後時而不救者多矣然有除之未盡元氣未復而使內縱口味恣七情病不復起者未之有也金匱云診脈大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少陽腹尺中積在氣衝脈出在左積在左脈出右積在右脈病出積在中央各以其部處之脈經云肺積脈浮而毛按之辟易心積脈洪而芤上下無常處肝積脈弦而細腎積脈沉而急諸積非毒藥不得去也大毒之藥可以單行小毒之藥可以二三味並行俱用所畏者以監製之故毒藥以群隊攻之則傷其正氣監製之藥以群隊用之則不成其破積之功此古人制方所以善少而惡多也養正攻邪各有方毒能破積少為良假如陳莝難推去盪滌消融貴倒倉潔古云養正積自除譬如滿座皆君子縱有一小人自無容地而去令其真氣實胃氣強積自消矣且夫養正者非謂飲食起居之間也蓋積既成矣形漸瘁矣必用調養使榮衛充實而積自除如有堅而不去者方可亟下之此先補後攻期於邪去正復而後已然除之不以漸則必有顛覆之患矣養正方如消積正元散白朮和胃丸加味枳朮丸選而用之許學士云大抵治積或以所惡者攻之或以所喜者誘之則易愈如阿魏硇砂治肉積神麯麥芽治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也故諸積治法肉積宜阿魏丸酒積宜草豆蔻丸血積宜抵當丸氣積宜檳榔木香丸水積宜三花神佑丸涎積宜白餅子食積宜脾積丸須要認得分明是何積聚各從其類用藥去之亦要看其元氣虛實或猛劑攻取或寬劑養正可也丹溪之治積塊宜攻者內服千金硝石丸外用琥珀膏貼之如欲兼補兼攻者青囊雜纂方仙傳黑靈丹是也人有恚怒太過積熱蘊隆以致郁痰凝結滯礙於咽喉之間咯之不出吞之不下如梅核之狀謂之梅核氣亦氣塊之類金匱所謂咽中如有炙郁者是也宜三因七氣湯開鬱二陳湯主之丹溪云人之七情厚味停痰瘀血反相糾纏日積月深鬱結成聚甚者如桃核之穰諸般奇形之蟲成於中形於外發為瘓為癆瘵為蠱脹為癩疾為無名奇病宜行倒倉法蓋脾胃者倉廩之官五味出焉大腸者傳送之官變化出焉小腸者受盛之官化物出焉今詳此法名為倒倉謂傾倒倉廩之陳腐也積聚久則形質成依附腸胃回薄曲折之處以為棲泊之窠臼阻凝氣血津液熏蒸燔灼成病自非刳腸剖骨之妙可以銖兩丸散所能窺犯其藩牆戶牖乎今肉液之散溢腸胃受之其回薄曲折之處浸灌流行有如泛漲其浮梗陳推逐蕩順流而去不可停留在表者因吐而汗其清道者自吐而湧濁道者自泄而去凡屬滯礙一洗而盡矣其方得於西域之至人凡人中年後行一二行抑卻疾養壽之一助乎治積聚諸方肥氣丸治肝之積在左脅下者此下五者皆東垣法也厚朴薑汁炒五錢黃連七錢柴胡一兩川椒炒四錢巴豆霜五分乾薑炮五分川烏炮去皮二分皂角去皮弦炙茯苓各一錢半昆布酒洗廣木炮人參二錢半甘草炙三錢上除茯苓皂角巴豆霜另研末外諸藥共為極細末和勻煉蜜丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從二丸起加服之周而復始積減大半勿服以下製藥為丸服法皆如此方伏梁丸治心下之積起臍上至心下黃連一兩半厚朴制人參各五錢黃芩三錢桂枝丹參炒茯神各一錢乾薑炮川烏炮巴豆霜石菖蒲各五分紅豆蔻二分上除巴豆霜外共為細末和勻煉蜜丸如梧桐子大淡黃連湯服如上法痞氣丸治脾之積在胃脘大如覆盤厚朴制四錢黃連八錢吳茱萸三錢黃芩一兩白茯苓人參澤瀉各一錢川烏炮五分川椒炒五分茵陳酒洗乾薑泡砂仁各一錢半白朮二分巴豆四分桂枝四分上除巴豆茯苓另研外共為細末煉蜜丸如梧桐子大服如上法淡甘草湯下息賁丸治肺氣之積在右脅下大如覆杯厚朴制八錢黃連炒一錢三分乾薑炮白茯苓川椒炒去汁紫菀各一錢半川烏炮桔梗白豆蔻陳皮去白三稜炮天門冬桂心人參各一錢青皮五分巴豆霜四分上除茯苓巴豆霜另研外共為細末和勻煉蜜丸如梧桐子大服如上法淡薑湯下以上四方秋冬加厚朴減黃連四分之一奔豚丸治腎之積發於小腹上至心下若奔豚狀厚朴制七分黃連五錢白茯苓澤瀉菖蒲各二錢川烏炮丁香各五分川楝子酒炒煮三錢玄胡索一錢半全蠍附子獨活各一錢肉桂二分巴豆霜四分上除巴豆霜茯苓另研外共為細末和勻煉蜜丸如梧桐子大淡鹽湯下服如上法散聚湯治凡氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏檳榔當歸各四分陳皮桂心杏仁去皮尖另研各一錢茯苓一錢甘草炮附子炮川芎各五分枳殼麵炒厚朴制吳茱萸湯炮去核焙一錢半大黃酒拌濕蒸或五分或一錢上㕮咀生薑三片水二盞煎一盞溫服若是大便利者去大黃濟生大七氣湯治病證同上益智仁陳皮三稜莪朮香附子各等分藿香葉肉桂青皮甘草炙各減半上㕮咀水煎服廣茙潰堅湯方見鼓膈治腹中脹潞內有積塊堅硬如石令人坐臥不安宜先服之二服之後中滿減半止有積塊未消宜服半夏厚朴湯紅花蘇木各半兩木香青皮各一分吳茱萸乾生薑黃連各二分肉桂蒼朮白茯苓澤瀉柴胡去蘆生黃芩陳皮草豆蔻生甘草各三分當歸梢豬苓三稜煨升麻各四分神麯炒六分厚朴制八分半夏泡一錢桃七枚去皮尖研如泥昆布酒洗渴加乾葛上㕮咀作一服水三盞煎一盞稍熱服服此二帖之後前證又減一半卻於前藥中加減服之溫白丸治心腹絞痛久瘕癖塊大如杯碗十種水病八種痞塞九種心痛紫菀吳茱萸菖蒲厚朴制柴胡桔梗皂角去皮弦炙乾白茯苓黃連川椒炒乾薑炮巴豆去心膜油中桂人參各半兩川烏炮二錢半上除巴豆另研外共為細末和勻煉蜜丸如梧桐子大每服三十丸生薑湯下廣木香附桃仁丸專治腹中積塊惟婦人多此病海石三稜莪朮香附子以上俱用醋煮炒乾紅花桃仁去皮尖五靈脂各等分上為細末蒸餅丸如梧桐子大每服五十丸白湯下又方用黃蜀葵花根煎湯入人參白朮陳皮甘草梢牛膝煎成膏入研細桃仁泥玄明粉各少許熱飲之二服當見塊下黃連香附桃仁丸治食積痰飲血塊在兩脅動作雷鳴嘈雜眩運身熱黃連一兩用吳茱萸半兩同炒去茱萸一兩用益智仁同炒去益智一兩半萊菔子炒一兩半川芎山梔仁三稜莪朮二味醋煮麥芽炒神麯炒桃仁去皮尖各五錢香附子童便浸焙乾山楂肉各一兩上為細末蒸餅丸如梧桐子大每服五十丸薑湯下香附桃仁丸治婦人血塊如盤有孕難服峻藥香附子醋煮四兩桃仁去皮尖一兩海石醋煮二兩白朮一兩上為細末神麯為丸服白湯下溫中丸治食積與黃腫又可借為制肝燥脾之藥陳皮蒼朮厚朴三稜莪朮青皮各五兩香附一斤甘草針砂醋炒紅各二兩上為末醋糊丸空心服姜鹽湯下午後酒下忌犬肉果菜東垣草豆蔻丸治酒積或傷寒冷物胃脘痛咽嗝不通草豆蔻煨白朮各一兩大麥蘖炒神麯炒黃芩半夏各半兩枳實炒二兩陳皮青皮各二錢乾生薑一錢炒鹽半錢上為極細末蒸餅丸如綠豆大每服百丸白湯下阿魏丸治肉積黃連六錢半糖毬子一兩連翹半兩阿魏醋煮作糊一兩上為末用阿魏糊為丸如梧桐子大每服二三十丸白湯下感應丸治食積化宿滯黑沉香木香檀香丁香陳皮青皮香附子黃連砂仁半夏三稜煨莪朮煨各一兩以上共為細末肥烏梅一百枚巴豆肥白者去皮膜心三百粒上用瓷器一隻盛巴豆以烏梅肉蓋之卻用米醋浸過與梅肉一半於瓶上蒸至極熟以巴豆肉紅色為度卻擂二件如泥用米飲和前藥搗千餘下丸如蘿蔔子大每服十丸白湯下消積正元散養正則積自除白朮炒茯苓陳皮去白青皮砂仁麥芽炒山楂子甘草香附末海粉神麯炒枳實炒玄胡索各五分上㕮咀水二盞姜三片煎服上焦火鬱加酒炒芩連下焦火伏加酒炒知柏冷氣作痛加沉香木香各五分加味枳朮丸專補脾胃消積滯白朮土炒二兩枳實麵炒大麥芽炒陳皮去白山楂肉香附炒各一兩砂仁五錢上為細末荷葉水煮粳米粉為丸如梧桐子大每服五十丸米飲下白朮和胃和中順氣消瘕去積厚朴薑汁炒半夏曲各一兩白朮一兩半陳皮八錢枳實麵炒檳榔各一錢半木香一錢人參甘草炙各三錢上為末薑汁浸蒸餅為丸如梧桐子大每服三十丸白湯下食遠服千金硝石丸止可磨塊不令人困須量虛實用之硝石六兩大黃末八兩另人參甘草各三兩研上為細末以三年陳米醋三升分作三次置瓷器中以竹片作準每下一升作一刻三升共作三刻放火上熬先下大黃末不住手攪使微沸待盡一刻乃下諸藥又盡一刻微火熬使可丸如雞子黃大每服一丸白湯化下或丸如梧桐子大每服三五十丸服後下如雞肝或如米泔赤黑色等物乃效下後忌風冷宜軟粥將息琥珀膏貼積丸用大黃朴硝各一兩為末以大蒜搗膏貼之又三聖膏用未化石灰半斤為末瓦上炒微紅提出候熱稍減入大黃末一兩炒熱仍提出入桂心末五錢略炒以米醋熬成膏厚攤烘熱貼之倒倉法用肥嫩黃牯肉二三十斤切成小片去筋膜長流水煮糜爛以布濾去渣滓取淨汁再入鍋中熳火熬至琥珀色則成劑矣令病者預先斷欲食淡前二日勿食晚飯設密室明亮而不通風處行之置穢桶及木瓦盆貯吐下之物一瓷盆盛所出之溺令病者入室以汁飲一杯少時又飲一杯積數十杯寒月則沸湯溫而飲之任其吐利病在上者欲其吐多病在下者欲其利多病在中者及在上覆在下者欲其吐利俱多全在活法而為之緩急多寡也令所出之物必盡病根乃止吐利後必渴甚不得與湯以所出之溺飲之名輪迴酒非惟可以止渴抑且可以盪滌余垢行後倦腹覺飢先與稠米飲次與淡稀粥三日方可與小菜漸次與略厚粥淡飲調養半月或一月自覺精神煥發形體輕健沉疴悉能痊矣其後須忌牛肉數年夫倒倉全籍自飲輪迴酒以驅逐余垢迎接調勻新布榮衛使臟腑肓膜生意敷暢有脫胎換骨之功也多嫌其穢因致中輟而功虧一簣若非明物理通造化者其肯視為良醞美味乎按倒倉法惟有大積大聚伏於腸胃之中而不得去者可以行之勝用巴豆牽牛硇砂阿魏芫花甘遂猛峻之藥非有食積不可輕試也或謂丹溪先生嘗用此以治癆瘵吐血之證恐非先生之言或記者之誤也其有氣血虛損及反胃膈噎蠱脹勞瘵大風等疾及肥白氣虛之人一切證候脈虛弱軟無力者決不可輕試自招怨謗也
