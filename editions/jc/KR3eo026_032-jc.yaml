body:
  text: 卷之三十二脅痛原來脅痛屬肝經治例曾聞左右分右脅痛多推氣散枳芎左畔局方行經云肝病者兩脅下痛引小腹令人善怒脈經云脈雙弦者肝氣有餘兩脅作痛由此觀之脅痛為肝病者明矣但所因有不同耳金匱云飲後水流在脅下咳唾引痛謂之懸飲此痰飲之流注為痛也脈經云肝脈搏堅而長色不清當病墜墮若搏因血在脅下令人喘逆此死血之為痛也又云䅽氣者脅下痛按之則愈復發為䅽氣此食積之氣為痛外有傷寒發寒熱而痛者屬足少陽膽足厥陰肝二經病也治以小柴胡湯無有不效者局方分左右治之右脅痛以推氣散左脅痛以枳芎散今緣此立法通以小柴胡湯為主各隨左右調服本方肝實當歸龍薈丸清痰流注控涎丹桃仁抵當能行血虛實因人勿浪言丹溪云脅痛者屬肝木氣實有死血有痰流注肝木氣實者因怒氣大逆肝氣鬱甚謀慮不決風中於肝皆木氣大實故火盛肝氣急也宜用小柴胡湯加蒼朮川芎青皮當歸痛甚者肝火盛也宜當歸龍薈丸薑汁下是瀉肝火之要藥也或用左金丸煎小柴胡湯送下丹溪活套治木氣實者用小柴胡湯加青皮川芎白芍藥龍膽草甚者煎成正藥入真青黛麝香痰流滾者因痰飲流注於厥陰之經亦能使脅下痛病則咳嗽氣急引脅下痛金匱治懸飲證用十棗湯果有清痰流注痛甚者宜控涎丹主之蓋痰在脅下者非白芥子不能達丹溪治濕痰流注脅內作痛或加味二陳湯或用加味小柴胡湯其有咳嗽脅痛者用加減二陳四物湯以疏肝氣夫死血者因惡血停留於肝居於脅下而痛病則痛甚不可按也宜下之用桃仁承氣湯或四物湯送下抵當丸丹溪治瘀血作痛者或用加味小柴胡合四物湯或用破血湯左脅痛甚者即是肝盛木氣實也宜當歸龍薈丸主之右脅痛者即是痰與食積也宜加減異香散主之肥白人氣虛發寒熱而脅下痛者宜補中益氣湯以參耆補氣多用柴胡甘草加黃芩以退熱木香青皮以調氣瘦弱人寒熱脅痛而多怒者必有瘀血宜小柴胡湯去人參加桃仁紅花青皮川芎大黃以行之性急多怒之人時常腹脅作痛者用小柴胡湯加川芎香附青皮煎服甚不止者以煎藥送下當歸龍薈丸其效甚速氣弱之人脅下痛脈細緊或弦多從勞役怒氣得之用八物湯加木香青皮桂心甚效八物湯方見虛損門脅痛胃脘痛惟婦人多有之以憂思忿怒之氣素蓄於中發則上衝被濕痰死血阻滯其氣不得條達故治婦人者必以行氣開鬱為主兼以破血散火之劑為佐用香附子蒼朮川芎為君青皮木香吳茱萸炒黃連作丸服之脅痛諸方當歸龍薈丸因內有濕熱兩脅痛甚伐肝木之氣肝實宜之當歸龍膽草梔子仁大黃酒濕煻火煨黃連蘆薈青黛各半兩木香一錢半麝香五分另研加柴胡川芎青皮各五錢上為細末瀉肝火用神麯丸治脅痛用煉蜜丸如梧桐子大每服二十丸生薑湯下左金丸瀉肝火行濕為熱甚之反佐黃連六錢吳茱萸一錢上為細末湯浸蒸餅為丸如綠豆大每服三五十丸淡薑湯下推氣散治右脅痛脹滿不食枳殼炒桂心片子薑黃各半兩炙甘草一錢半上為細末每服二錢薑棗湯調下酒亦可枳芎散治左脅痛不可忍者枳實炒川芎各半兩炙甘草一錢半上為細末每服二錢薑棗煎湯調下酒亦可加味二陳湯治濕痰流注脅內作痛二陳湯方見痰飲加南星蒼朮川芎姜水煎服加減二陳合四物湯治咳嗽引脅下痛二陳湯四物湯二方相合去地黃加南星青皮香附真青黛入薑汁服加味小柴胡湯治痰流注者小柴胡湯方見傷寒門倍半夏加陳皮南星蒼朮茯苓川芎薑棗煎服加味小柴胡合四物湯治瘀血作痛者小柴胡湯四物湯二方相合加桃仁紅花乳香沒藥煎服破血湯破血行氣治死血作痛之證桃仁去皮尖研紅花酒洗川芎香附童便浸青皮各等分上㕮咀水煎服加味異香散治右脅下痛屬痰與食積者莪朮炮益智仁三稜炮甘草各一錢青皮去穰陳皮各五分石蓮肉厚朴薑汁炒各二分食積脈弦按之痛益甚加神麯麥蘖各炒山楂肉蒼朮香附各五分痰積脈滑按之痛不甚加半夏曲南星茯苓蒼朮香附各五分上㕮咀生薑三片棗一枚白鹽少許水一盞半煎一盞去渣溫服
