body:
  text: 卷之十火病水為精氣火為神水火陰陽各半勻及至真陰日衰耗火邪欻起自焚身金丹歌云涕唾精津氣血液七般神物總皆陰吾嘗考之內經云腎為水臟受五臟六腑之精而藏之在本臟為精入心為血入肝與膽為液入肺為涕入脾為涎唾入胃與大小腸膀胱為津難經云命門者元氣之所也故曰腎生氣由此觀之則七般神物之生腎也可知矣又考之周子太極圖云形既生矣神發智矣則神者陽之動也以二氣言則曰陰陽以五行言則曰水火以人身中言則曰心腎人受天地陰陽五行之氣以生一陰一陽水火平等未嘗有太過不及也自形生神發之後精太用則竭神太役則勞真陰之物以漸衰耗此陰之所以不及其初而見其不足陰不足則陽有餘矣一身之中惟火獨存老苦病死非火之害歟火有真邪不一般莫將邪火作真看真陰原是生身本邪火常從生後生丹溪云太極動而生陽靜而生陰陽變陰合而生水火木金土各一其性惟火有二曰君火曰相火火內陰而外陽主乎動者也故凡動皆屬火以名而言形氣相生配於五行故謂之君以位而言生於虛無守位稟命因動而見故謂之相天主生物固恆於動人有此生亦恆於動其所以恆於動者皆相火之所為也見於天者為雷則木之氣出於海者為龍則水之氣也具於人者寄於肝腎二部肝屬木腎屬水也膽者肝之腑心包絡者腎之配三焦以焦言而下焦司肝腎之分皆陰而在下者也天非此火不能生物人非此火不能有生愚按運氣天分六氣下主乎地地列五行上應乎天者火亦有二曰少陰君火曰少陽相火君火者靜而守位故不主歲而相火代之相火者行君火之令者也所以流行變化生長萬物者皆相火主之也在人之身心為君火膽與三焦為相火故經云十一臟皆取決於膽又曰火遊行乎其間可見心為君主其位至尊而膽與三焦則皆稟受而行者火雖有二其實一也自其寂然不動者則曰君火其感而遂通者則相火之謂焉滑伯仁曰華佗云三焦者相火也相火之相譬如丞相之相也善政之導輔佐周身維持綱紀交接元陽以為一身之統領使百脈舒和上焦曰膻中之屬宣行氣血中焦曰中脘之緣腐熟水穀下焦曰膀胱之所下溲便精溺無形而有用焉故曰三焦蓋三焦者為諸陽升降之方呼吸發源之所三元有道九竅流通神志相關命脈相繼周身有倚氣血無偏治化宣和是無虞矣此以上皆敘真火之主劉宗厚云火之為病其害甚大其變甚速其勢甚彰其症甚異何者蓋能熏灼焚焰飛走狂越銷鑠於物莫能御之遊行乎三焦虛實之兩途曰君火者猶人火也曰相火者猶龍火也火性不妄動能不違於道常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動其可得乎故凡動者皆屬火化火亦妄行元氣交傷勢不兩立偏勝則病移害他經事非細故動之極也病則死矣經所謂一水不勝二火之火出於天造君相之化又有陰陽臟腑之火根於五志之內六慾七情激之其火隨起蓋大怒則火起於肝暴喜則火起於心醉飽則火起於胃房勞則火起於腎悲哀動中火起於肺心為君主自焚則死矣此敘邪火之害二火難言一水勝水中真火火真陰順之水火常相濟逆則元陽被賊侵經言一水不勝二火勢不兩立自吾觀之一水二火陰陽之分數也火多水少陽道常饒陰道常乏也水之勝火五行之正理也有不能勝者豈水之罪哉故以卦言之坎肩屬水坎外陰內陽水中之真火也離屬心火離外陽而內陰火中之真水也一水一火互為其根以六氣言之少陰君火手少陰心火足少陰腎水腎之配心火中有水也以五臟言之五臟各一惟腎有二左為腎屬水右為命門屬火左右相對水中有火也心包絡之從心三焦之從腎水火相蕩陰陽相對初無彼此之分水升而上火降而下以成既濟之功蓋心曰帝君腎曰帝后君後常為一身之主而神臟形臟皆聽命焉經所謂主明則下安以此養生則壽者是也如神太勞則傷心精太泄則傷腎君失其職故相火僭妄專主之權五官六賊之火莫不倚相火之勢乘其所勝侮所不勝其所生者受病也此水之所以不能勝火而火為元氣之賊也經所謂主不明則十二官危使道閉塞而不通形乃大傷者是已邪火常生妄動中聖人主靜制其沖下愚不識蒼天氣一妄能招百病攻按周子太極圖論云形既生矣神發智矣形者形臟也神者五神臟也所謂君火相火者是已五性感動而善惡分萬事出矣善者真火也所謂既濟者也惡者邪火也即水所不能勝者也聖人定之以中正仁義而主靜立人極焉是以上古聖人知其人生而靜天之性無有不善也感於物而動善惡分矣於是教人主靜之法勿使妄動之火暗長於幾微之間故曰君子修之吉小人悖之凶也經云蒼天之氣清靜則志意治蒼天之氣即元氣也志意者即君相二火也非主靜之功則蒼天清靜之氣何以能常清常靜而不為志意所亂耶經云上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉後入房以欲竭其精以耗散其真不知持滿不知御神務快其心耽於逸樂起居無節故半百而衰也丹溪云周子曰聖人定之以中正仁義而主靜朱子曰必使道心常為一身之主而人心每聽命焉此善處乎火者人心聽命於道心而火能主之以靜彼五火將寂然不動而相火者惟有裨補造化而為生生不息之運用矣何賊之有火邪為病狀難名怪症奇形未慣經熟讀河間原病式令人心目自開明原病式云諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓癰疽癢疹瘤氣結核吐下霍亂瞀郁脹腫鼻塞鼽衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄衊血汗此皆少陰君火之熱乃真心小腸之所為也諸病瞀瘈暴暗冒昧躁擾狂越罵詈驚駭胕腫疼痠氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目眛不明暴注瞤瘈暴病暴死此少陽相火之熱乃心包絡三焦之氣所為也人有痰火從腳起入腹者此虛極也蓋火起於九泉之下也此病十不救一治宜四物湯加降火藥如黃柏知母之類外用附子末津調貼腳心湧泉穴以引火下行人有胃脈四道為衝脈所逆並脅下少陽脈一道而反上行病名曰厥逆經曰逆氣上行滿脈去形謂七神昏絕離去其形而死矣其症氣上衝咽不得息而喘息有音不得臥此病隨四時為治法春夏宜以酒黃連酒柏酒知母秋冬宜以吳茱萸加入所主之方左金丸主之丹溪云考諸內經少陽病為瘈瘲太陽病為眩僕少陰病瞀暴瘖鬱冒不知人非諸熱瞀瘈之屬火者乎少陽病惡寒鼓慄膽病振寒少陰病灑淅振寒振慄厥陰病灑淅振寒非諸振鼓慄如喪神守之屬火者乎少陽病嘔逆厥氣上行膀胱病沖頭痛太陽病厥氣上衝胸少腹控睪及腰脊上衝心少陰病氣上衝胸嘔逆非諸逆衝上之屬火者乎少陽病譫妄膀胱病癲疾非諸躁狂越之屬火者乎少陽病胕腫善驚少陰病瞀熱足酸胕腫不能久立非諸病胕腫痛酸驚駭之屬火者乎又諸風掉眩屬於肝肝火之動也諸痛癢瘡之屬於心心火之用也諸濕腫滿之屬於脾脾火之甚也諸氣膹郁之屬於肺肺火之郁也諸寒收引屬於腎腎火之伏藏於至陰之下火極而似水也是皆火之為病出於臟腑者然也以上諸症治法於各病下求之人火偏宜正法攻若逢天火術須窮能將脈症分虛實治不乖違是上工君火者人火也遇草而爇遇木而燔可以濕伏可以水滅故逆其性氣以折之攻之相火者天火也得濕而焰遇水而燔不知其性以水濕折之適足光焰詣天物窮方止矣識其性者得當之理以火逐之則燔灼自消焰火撲滅也劉宗厚云火之為脈虛則浮大實則洪數藥之所主各因其屬君火者人火也可以濕伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水濕折之從其性而伏之惟黃柏之屬可以降之此論治君相二火之法也瀉火之法虛實多端各以臟氣司之如黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火也若飲食勞倦內傷元氣火不能兩立為陽虛之病以甘溫之劑除之如黃耆甘草人參之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地玄參之屬若命門火衰為陽脫之病以甘熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬不明諸此之類而眾火為病施治何所依據哉丹溪云實火可瀉如黃連解毒之類脈沉而實大者為實火邪氣盛則實也虛火可補參朮生甘草之類脈浮而洪數者為虛火真氣奪則虛也鬱火可發當看在何經凡火盛者不可驟用寒涼必須瀉散如火急甚者必緩之生甘草參術之類有補陰則火自降炒黃柏熟地黃之類柴胡瀉肝火黃芩佐之片芩瀉肺火桑白皮佐之黃連瀉心火豬膽汁炒以膽草佐之能瀉膽中之火白芍瀉脾火冬月酒炒蓋其性酸寒也青黛瀉五臟之鬱火玄參瀉無根之遊火人中白瀉肝火又能瀉三焦及膀胱之火實火無過瀉火良三焦四治有奇方脈虛形弱還宜補五法經中貴審詳人有病熱者形氣壯實其脈浮大滑數按之有力或沉實者此實火也宜瀉之瀉者謂發汗吐下利小便也謂之四治如桂枝麻黃之輩在皮者汗而發之葛根升麻之輩因其輕而揚之法也承氣陷胸之輩下者引而竭之法也瀉心十棗之輩中滿者瀉之於內之法也瓜蒂梔豉之輩高者因而越之法也故明此四治之輕重可謂中治火之繩墨矣有脈浮惡風寒而熱者謂之表熱宜發之十神湯人參敗毒散有脈沉實惡熱而渴大便秘者謂之裡熱宜下之如大柴胡三乙承氣湯脈洪大有力大熱大渴者人參白虎湯心煩不得眠者宜梔子豉湯方見傷寒病有暴熱者病在心脾以瀉心為主蓋諸熱之屬皆自心生宜三黃瀉心湯清心湯主之病有積熱者病在腎肝以瀉肝為主蓋腎主虛不可瀉宜當歸龍薈丸主之以上治實火之法也有病熱者形氣衰弱其脈浮大而虛按之無力此虛火也宜補之雖有可發汗吐下之症不可便攻宜用內經治熱五法依次行之經云小熱之氣涼以和之如竹葉湯錢氏地骨皮散是也甚熱之氣則汗發之如升陽散火湯拔萃地骨皮散是也大熱之氣寒以取之如柴胡飲子清臟潤燥丸是也發之不盡則逆治之如丹溪治產後陰虛生內熱用人參當歸散內加炒乾姜東垣治癃閉用滋腎丸有肉桂是也制之不盡求其屬以衰之乃壯水之主以制陽光六味地黃丸方見虛勞以上治虛火之法也諸治火熱之藥苦者以治五臟五臟屬陰而居於內內者下之必以苦也辛者以治六腑六腑屬陽而在於外外者發之必以辛也上焦熱者病在心肺也實者河間涼膈散既濟解毒湯主之虛者宜木通散清心蓮子飲主之上清丸時時噙化中焦熱者病在脾胃實者調胃承氣湯主之虛者宜人參白虎湯五蒸湯主之下焦熱者病在腎肝實者八正散虛者八物湯六味地黃丸丹溪補陰丸主之二方見虛勞三焦熱者病在臟腑實者黃連解毒湯大金花丸神芎丸主之虛者宜三補丸龍腦雞蘇丸方見血病晝則發熱夜則安靜者是陽氣自升於陽分也實則柴胡飲子虛則小柴胡湯此晝行陽二十五度氣病也晝則安靜夜則發熱煩躁是陽下陷陰中也實則四順清涼飲虛則四物二連湯此夜行陰二十五度血病也晝則發熱煩躁夜亦發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰宜河間法先以黃連解毒合調胃承氣湯以下之後以黃連解毒湯作丸服以養其血名金花丸若癲狂奔走罵詈不避親疏此陽有餘而陰不足之症也人壯氣實可用正治宜當歸承氣湯滾痰丸主之人虛火盛者切不可用正治犯之必死宜牛黃膏用生薑湯下如實熱能食者胃實也宜小承氣三黃枳朮丸方見內傷如虛熱不能食者脾虛也宜補中益氣湯加厚朴青皮火病生於五臟中仲陽補瀉可旁通內傷自有東垣法陰火丹溪自有功肺熱者輕手捫之則熱重手按之則不熱日間熱甚乃皮毛之熱其脈浮其症喘咳寒熱輕者錢氏瀉白散重者東垣涼膈散拔萃地骨皮散虛則錢氏阿膠散東垣參朮調中湯補之方見內傷心熱者微按至皮毛之下肌肉之上輕手乃得加力按之則全不熱是熱在血脈也其脈洪其症煩心心痛掌中熱而嘔噦宜黃連瀉心湯導赤散硃砂安神丸方見內傷虛則以錢氏安神丸天王補心丹方見虛勞脾熱者輕手捫之不熱重按至筋骨亦不熱不輕不重乃得之此熱在肌肉遇夜尤甚其脈緩其症急惰嗜臥四肢不收無氣以動宜錢氏瀉黃散虛者以補中益氣湯瀉陰火升陽湯手心熱甚者火鬱湯主之肝熱者重按肌肉之下骨之上乃肝之熱寅卯時尤甚其脈洪其症四肢滿悶脅下痛大小便難轉筋多怒多驚四肢困熱筋病不能起於床宜瀉青丸柴胡飲子虛則以錢氏地黃丸補之乃虛則補其母母能令子實也腎熱者輕手重手俱不熱如重手按至骨其熱蒸手如火其脈沉澀其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床宜錢氏地黃丸東垣滋腎丸丹溪補陰丸方見勞損門人有病內傷發熱者此因飲食勞倦得之治在脾胃乃陽虛症也從東垣之法治之詳見內傷門飲酒發熱人難治不飲酒人因飲酒發熱亦難治人有病陰虛發熱者此因房勞色欲得之治在腎肝乃血虛症也從丹溪之法治之詳內傷門陰虛火動者難治黃連解毒湯治一切火熱毒狂躁煩心口燥咽乾熱勢之甚者此瀉實火之要藥也黃連黃柏黃芩梔子仁各等分水煎此太倉公火劑湯也小金花丸方即上解毒湯方上為細末滴水為丸小豆大每服百丸溫水下日三服大金花丸治內外諸熱寢汗咬牙睡語驚悸溺血淋閉咳嗽衄血併骨蒸實熱肺痿喘嗽者即前小金花丸方加將軍等分滴水丸小豆大每三十新汲水下祖傳本方內加硃砂雄黃水飛與大黃各減半為丸名涼驚丸治小兒壯熱大小便不通及急驚風痘疹丹熱毒熱症神效河間涼膈散治上焦積熱煩躁多渴面赤面熱頭昏咽燥咽喉腫痛口瘡便溺赤澀狂言譫語睡臥不安此瀉實火之劑也大黃朴硝甘草各二兩連翹四兩梔仁黃芩薄荷葉各二兩上為粗末每半兩水煎淡竹葉十二片煎一盅入蜜一匙微煎溫服咽膈不利腫痛及涎嗽者加桔梗一兩荊芥穗半兩咳而嘔者加半夏二錢半生薑煎鼻衄嘔血者加當歸生地赤芍各半兩淋閉加滑石四兩茯苓一兩清心湯即上涼膈散方加黃連又分兩不同也連翹大黃山梔仁薄荷葉黃芩各五錢甘草一兩半朴硝二錢半黃連半兩為細末每五錢煎法同東垣涼膈散退六經熱即上涼膈散除硝黃加桔梗又分兩不同也連翹一錢甘草五分山梔仁薄荷葉黃芩桔粳淡竹葉各半錢日三服熱退即止易老云涼膈散減硝黃加桔梗同為舟楫之劑浮而上之治胸膈中與六經熱以其手足少陽之氣俱下胸膈中三焦之氣同相火遊行於身之表膈與六經乃至高之分此藥浮載亦至高之劑故能於無形之中而走去胸膈中及六經熱也硃砂涼膈丸治上焦虛熱咽膈有氣如煙搶上黃連山梔人參白茯苓各等分腦子少許硃砂減半水飛為衣上為末煉蜜丸如小豆大硃砂為衣每五十溫水下神芎丸治一切熱症非氣脈實熱甚者不可輕服常服宜少不宜多大黃黃芩各二兩牽牛頭末滑石各四兩川芎薄荷葉各半兩上為細末水為丸如小豆大溫水下十丸至十五丸三黃瀉心湯治積熱蘊隆三焦皆屬大小便秘黃連黃芩大黃煨各等分每三錢姜三片煎或細末煉蜜丸小豆大每三十食後溫水下名三黃丸洗心散治熱氣上衝口苦唇焦咽喉腫痛心神煩躁多渴五心煩熱小便赤澀大便秘滯口舌生瘡大黃煨甘草當歸赤芍麻黃芥穗各六分白朮五分薄荷葉五分水煎姜引此方以白朮合大黃故名洗心當歸龍薈丸治腎水陰虛肝熱蘊積時發驚悸筋惕搐搦神志不寧榮衛壅滯頭目昏眩肌肉瞤瘈腦膈咽嗌不利腸胃燥澀躁擾狂越罵詈驚駭火熱等症蘆薈五錢當歸膽草山梔黃連黃柏黃芩各一兩大黃煨真青黛各半兩木香一錢麝香半錢上末煉蜜丸小豆大薑湯下二三十丸竹葉湯又名人參竹葉石膏湯治虛損之要藥也人參甘草各五分石膏四錢麥門冬一錢半夏七分淡竹葉七片粳米一撮姜一片水煎米熟服體虛寒而躁者加熟附子名既濟湯錢氏地骨皮散治虛熱潮作知母柴胡甘草炙地骨皮人參赤茯苓半夏等分姜煎服拔萃地骨皮散治渾身壯熱脈長而滑陽毒火熾發渴地骨皮茯苓一錢五分柴胡黃芩生地黃知母各一錢羌活麻黃各七分半石膏二錢有汗並去之姜引水煎柴胡飲子解一切肌熱蒸熱積熱脈洪實弦數黃芩甘草大黃芍藥柴胡人參當歸等分水姜煎清涼飲子治大人小兒血脈壅實臟腑生熱面赤煩渴睡臥不安即上柴胡飲子去柴胡人參黃芩是也水煎服當歸承氣湯治躁熱裡熱火鬱為病或皮膚枯燥或咽乾鼻乾或便溺結秘並宜用此乃調胃承氣湯加當歸也當歸大黃各四兩甘草朴硝各二錢水二盅姜三片棗十枚煎服若陽狂奔走罵詈不避親疏此陽有餘陰不足以大黃朴硝去胃中實熱當歸補血益陰甘草緩中加薑棗者胃屬土此引至於胃中也經所謂微者逆之甚者從之此之謂也清臟潤燥丸專治熱毒臟躁老人血少陽臟便難此藥解熱養血潤腸黃連當歸大黃郁李仁去殼枳殼連翹川芎薄荷葉芍藥麻仁去殼條芩各等分上末煉蜜丸梧桐子大每六七十食前茶湯下東垣瀉陰火升陽湯治肌熱煩熱面赤食少喘咳痰盛脈右關緩弱或弦或浮數羌活炙草炙耆蒼朮各五分升麻四分柴胡七分半人參黃芩各三分半黃連酒炒石膏各二分半水煎升陽散火湯治男子婦人四肢發熱肌肉筋痹熱骨髓中熱困熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物抑遏陽氣於脾土火鬱則發之升麻葛根獨活羌活人參白芍各五分防風二分半柴胡八分生甘草三分炙草二分水煎熱服火鬱湯治手足心發熱升麻葛根柴胡白芍各一錢防風甘草各五分蔥須三寸水煎滋腎丸降腎火黃柏酒拌陰乾三兩知母酒浸陰乾三兩肉桂去皮一錢上為細末以熟水丸百沸湯下黃柏知母氣味俱陰以同腎氣故能補腎而瀉下焦火也桂與火邪同體故以熱因寒用木通散治諸熱利小便導赤瀉白二方合也生地木通地骨皮荊芥炙草桔梗桑白皮炒各等分姜水煎既濟解毒湯治上熱頭目赤腫而痛胸膈煩悶不得安臥大便秘大黃酒煨黃連酒炒炙草桔梗各一錢柴胡升麻連翹當歸各五分水煎食後服清心蓮子飲治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀車前子條芩麥冬炙草地骨皮各五分炙耆白茯苓人參石蓮子肉各七分半水煎如發熱加柴胡薄荷葉五蒸湯治骨蒸潮熱自汗甘草人參知母黃芩各五分白茯苓生地葛根各七分半石膏一錢二分半竹葉五片粳米二勺水煎米熟服上清丸治心肺有熱上焦痰火咳嗽龍腦另研二分硼砂另研三錢薄荷末一兩川芎末五錢甘草末桔梗各二錢半上為細末煉蜜丸如龍眼大每一丸臨臥含化清茶下八正散治下焦積熱二便秘澀多渴咽乾口熱生瘡腫痛淋血大黃瞿麥木通滑石末萹蓄山梔甘草車前子等分燈心水煎三補丸治三焦火黃芩黃連黃柏等分上細末新汲水丸四物二連湯治血虛虛勞發熱五心煩熱晝則明瞭夜則發熱當歸生地白芍川芎黃連胡黃連水煎牛黃膏治熱入血室發狂不認人者牛黃另研二錢半硃砂水飛丹皮真鬱金各二錢腦子另研甘草各一錢上末煉蜜丸皂子大新汲水下錢氏瀉青丸瀉肝火當歸膽草川芎大黃煨山梔羌活防風各等分上末煉蜜丸梧桐子大每三十丸竹葉湯下瀉心湯治心熱黃連一兩為細末每二三分新汲水調服導赤散治小腸實熱甘草木通地黃竹葉水煎瀉黃散治脾熱口臭咽乾藿香七錢山梔一兩石膏半兩甘草三兩防風四兩為末同蜜酒拌炒微香每服一錢瀉白散治肺熱桑白皮地骨皮各一兩甘草半兩上末每服三二錢以上錢氏方也丹溪大補丸治陰火黃柏酒鹽拌炒褐色上為細末粥丸或水丸梧桐子大四物湯下錢氏阿膠散治咳無津液真阿膠蛤粉炒一兩半黍黏子炒二錢半馬兜鈴半兩杏仁去皮尖七個炙草一錢糯米一兩上為末每二錢水煎食後服錢氏安神丸治心虛邪熱頰赤麥冬馬牙硝白茯苓寒水石煅水飛山藥甘草各半兩硃砂飛一兩龍腦二分半上為末煉蜜丸彈子大每一丸沙糖水下六味地黃丸治腎虛發熱地黃八兩山萸肉山藥各四兩白茯苓去膜丹皮去木澤瀉去毛各三兩上為末煉蜜丸梧桐子大每五十空心鹽湯下左金丸治肝火及厥氣上衝之火神效黃連六兩吳萸湯泡濕半時焙乾一兩上為末粥丸煎白朮陳皮湯下
