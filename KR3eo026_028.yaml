body:
  text: 卷之二十八膈噎病人膈噎最難醫結在三陽血已虧金匱有方留指要莫將辛燥亂施為人能飲食能便下則為無病人矣飲食不下而便稍祕則膈噎之病成焉膈噎反胃之證皆由七情太過而動五臟之火熏蒸津液鬱而生痰痰與氣轉升而不降脾胃漸衰飲食不下蓋氣留於咽嗌者則成五噎結於胸膈者則成五膈五噎之名憂思勞食氣也五膈之名憂恚寒熱氣也吐久不止則成反胃反胃之疾十有九死經云三陽結謂之膈子和云三陽者大小腸膀胱也小腸熱結則血脈燥大腸熱結則不能圊膀胱熱結則津液渴三陽既結則前後閉泣不通必反而上矣所以溢食不下縱下而反出也丹溪云夫喜怒憂鬱內傷脾肺肝氣愈盛痰火上升血液俱耗胃脘乾稿其稿在上近咽之下水飲可行食物難入間或可入入亦不多名之曰噎其稿在下與胃為近食雖可入難盡入胃良久復出名之曰膈又曰翻胃所因不同病出入一體其病始有吞酸吐酸吐痰出沫痞塞嘈雜等症醫者不察病原妄投峻劑愈耗真元久則脾胃漸虛血液枯稿以致傳導失常便祕不通治尤難矣其問倘服燥熱過多津液枯塞腸胃燥結屎如羊屎者不治又云年高者不治蓋年少之人氣血未虛用藥劫去痰火調其脾胃病不復矣年老之人血氣已虛用藥劫去痰火雖得暫愈其病亦復所以然者氣虛則不能運化而生痰血虛則不能滋潤而生火也又云不守戒忌厚味房勞之人及誤服香燥之藥者亦不可治蓋病由血虛房勞則益損其血證屬熱燥故不用香燥之藥香能散氣燥能枯血而滋味之厚者能助火而生痰也雞峰云噎是神思間病惟內觀自養可以治之此言深中病情金匱要略云寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷滯趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食則朝吐宿穀不化名曰反胃脈緊而澀其病難治又云反胃嘔吐者大半夏湯主之其方半夏以降氣化痰人參以補氣生血白蜜以潤燥千金方加白朮以養胃生薑以生血此治膈噎之指要也切不可用辛燥之藥以火濟火其病益深膈咽堵塞食難容吐逆還從吐法攻中下二焦痰積聚滌腸去垢令微通問云吐有三氣積寒也皆從三焦論之上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已暴吐渴欲飲水大便燥結氣上衝胸發痛其治當降氣和中宜桔梗湯調木香散治之待氣漸下吐漸止然後去木香散如大便燥結者食不盡下以大承氣湯去硝微下之少利為度金匱治反胃吐而渴欲飲水者茯苓澤瀉湯主之中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而緩其證或先痛而後吐或先吐而後痛治法當以小毒藥去其積宜紫沉丸檳榔木香行其氣宜木香白朮散主之下焦吐者皆從於塞地道也其脈沉而遲其證朝食暮吐暮食朝吐小便清大便祕而不通治法當以毒藥通其閉塞溫其寒氣宜厚朴丸大便漸通復以中焦藥和之不令大便祕結而自愈也凡治膈噎反胃必先審其受病之因或因七情所致或因食物所哽問其從來如因七情得之在上焦者以三因七氣湯合小陷胸湯加枳實主之在中下二焦者宜半夏厚朴湯大便祕者橘杏麻仁丸主之如因食物得之在上焦者以瓜蒂散吐之所謂吐因吐用也在中下焦者以木香檳榔丸下之吐下之後以枳朮二陳湯調之自愈調之時大便祕者宜東垣人參利膈丸相間服之古有諸方不足憑丹溪著論抵千金養陰四物生津液開鬱清痰只二陳治法宜養血生津清痰降火潤氣補脾抑肝開鬱古方皆是香燥大熱之藥如五噎寬中散有薑有桂十膈散有附有烏俱不足取法惟丹溪先生以二陳湯為主加減立法其言曰氣鬱之滯久留清道非借香熱不足以行然有大黃石膏竹茹芒硝澤瀉前胡茯苓黃芩蘆根瓜蔞等藥為之佐使其始則同終則異也病邪易去其病自安古方治膈噎者用人參以補肺御米以解毒竹瀝以清痰乾薑以養血粟米以實胃蜜以潤燥驢屎以防其生蟲皆良法也有氣虛者脈必緩而無力宜四君子湯加牛羊乳去白陳皮有血虛者脈必數而無力宜四物湯加桃仁泥紅花童便韭汁有痰者寸關脈必沉或伏而大宜二陳湯加竹瀝薑汁或九仙餅有氣虛血虛有痰者宜四君子湯四物湯二陳湯三合成劑加薑炒黃連枳實瓜蔞仁少加砂仁入竹瀝薑汁同服有宿食者脈必沉而滑宜加味保和丸有吐甚食不得下者用丹溪三法食即可下然後隨病源調理治者先須得病源勿拘繩墨以求全大都養脾生津液能食能便病即安咽溢閉塞胸膈痞悶者此氣滯也宜桔梗湯加減枳朮二陳湯瓜蔞實丸主之亦有因服耗氣藥過多以致中氣不運似氣滯者法當補氣而自運以四君子湯加蜜炙黃耆去白陳皮少加木香以行其滯氣大便結燥如羊屎者此血熱也宜當歸潤燥湯方見祕結去升麻加人參枳殼及橘杏麻仁丸主之亦有服通利藥過多以致血液耗竭似血熱而愈結者當補血潤血而自行宜四物湯加人參生甘草桃仁泥入牛羊乳同服有因火逆衝上食不得入其脈洪大有力而數者宜荊黃湯檳榔散主之食已即吐者大黃甘草湯有痰飲阻滯而脈結澀者當清痰泄瀉其火自降宜祕傳厚朴半夏湯瓜蔞實丸有因脾胃衰弱其脈沉細而微者當以辛香之藥溫其氣仍以益陰養胃為之主宜寬中進食丸主之反胃之病十有九死者非藥不效良由輒強以食或飲以羹湯是速其吐今得其説不強以食絶其羹湯但投以加減枳朮二陳湯人參利膈丸飢則以陳倉米飯以香乾啖之一點湯水不與三日後不復吐飯食如初方用甘蔗搗汁七升生薑搗汁一升打和分作三服治此病者食不得下以大力奪命丸大便結燥以祕方潤腸膏用之膈噎諸方加減二陳湯凡膈噎反胃悉用本方加薑汁竹瀝韭汁童便牛羊乳為主治不可以人乳代之蓋人乳內有飲食烹飪之火及七情之火故不用也如血虛瘦弱之人本方合四物湯少加杏仁泥紅花童便薑汁如氣虛肥白之人本方合四君子湯亦加竹瀝薑汁為要藥也有七情鬱結者本方加香附撫芎木香檳榔瓜蔞仁砂仁有飲酒人本方加砂糖驢屎如朝食暮吐暮食朝吐或食下須臾即吐者此胃可容忍而脾不能傳送以致腸胃祕結不通食反而上奔也本方加酒蒸大黃桃仁以潤之脾不磨者本方合枳朮丸方多加麥芽神麯面以助化之如胸中覺有熱悶者本方加土炒黃連黃芩瓜蔞仁桔梗凡噎膈大便結燥用大黃者乃急則治其標之劑也仍用四物湯加童便韭汁多飲牛羊乳為上策也加減枳朮二陳湯專治膈噎枳實炒白朮炒陳皮去白各五分半夏洗茯苓各一錢甘草三分清痰加竹瀝薑汁各五匙瀉火加薑汁炒黃連五分開鬱加香附米炒神麯炒橘葉青皮各五分此二味抑肝快氣嘔吐加藿香葉砂仁各三分潤氣加杏仁泥麻子仁各五分津少血虛加當歸生地黃各五分酒洗祕傳枳朮二陳湯治痰氣食隔嘔吐痰涎翻胃嘈雜白朮泔浸土炒一錢黑枳實麩炒陳皮去白各八分茯苓香附子童便浸炒半夏湯洗七次各一錢黃連薑汁炒檳榔雞心者白豆蔻各五分青皮麵炒吳茱萸甘草各三分上㕮咀水一盞半薑三片棗一枚煎八分食遠服氣虛者加人參黃耆血虛者加當歸生地黃郁加神麯撫芎半夏厚朴湯治翻胃吐痰胸滿脅痛嘈雜吐涎半夏洗厚朴薑汁炒山梔仁炒黑黃連薑汁炒各一錢茯苓八分甘草三分香附子五分黑枳實麩炒一錢澤瀉五分蒼朮泔浸炒八分青皮五分白豆蔻當歸各六分廣陳皮去白八分上㕮咀水一盞半薑三片煎八分不拘時服瓜蔞實丸治膈噎胸膈痞痛徹背脅喘急煩悶瓜蔞實去殼另研枳殼麩炒半夏泡洗苦桔梗炒各一錢上為細末薑汁煮神麯糊為丸如梧桐子大每服五十丸生薑湯送下東垣人參利膈丸治膈噎胸中不利大便結燥痰嗽喘滿脾胃壅滯推陳致新治膈氣之聖藥也木香檳榔各七錢半人參當歸藿香甘草枳實麩炒黃各一兩大黃酒蒸厚朴薑汁炒阜一兩上為細末滴水為丸如梧桐子大每服五十丸溫水下橘杏麻仁丸治膈噎大便燥結橘皮炙杏仁去皮尖麻子仁去殼各三兩郁李仁去殼五錢上除橘皮另為末三仁俱搗成膏用大棗去核加石臼內三味搗和丸如梧桐子大每服五六十丸煎枳實湯送下食前服桔梗湯治上焦氣熱上衝食已暴吐脈浮而洪宜先和中桔梗陳皮去白枳實麩炒白茯苓厚朴薑汁炒各一兩白朮一兩半半夏曲二兩上㕮咀分作八劑每服水一大盞煎七分取清溫服調木香散二錢空腹食前服之三服之後氣下吐止本方加白芍藥二兩黃耆一兩半不用木香散木香散木香檳榔各等分共為末煎藥調服荊黃湯治暴吐者上焦氣熱所沖也脈浮而洪經云諸嘔吐酸皆屬於火荊芥穗三兩人參五錢生甘草二錢半大黃三錢上㕮咀分作二劑每服水一大盞煎七分取清調檳榔散二錢空心服檳榔散檳榔二錢木香一錢半輕粉少許共為細末煎藥調服紫沉丸治中焦吐食由食積為寒氣相假故吐而痛宜服之半夏曲代赭石煅砂仁各三錢烏梅去核焙丁香檳榔各二錢杏仁去皮尖沉香木香白朮各一錢陳皮五錢白豆蔻巴豆霜另研各一錢半上為細末入巴豆霜研令勻醋糊為丸如黍米大用橘皮一個浸少時去白裹生薑丆塊麵裹紙封燒令熟去面生薑為三次並橘皮煎湯下五十丸一日二服得大便通至不吐則止木香白朮散治嘔吐腹中痛木香一錢白朮茯苓各五錢半夏一兩檳榔二錢生甘草四錢上為細末濃煎芍藥生薑湯調下一二錢有積而痛按之愈痛無積者按之不痛厚朴丸主翻胃吐逆飲食噎塞氣上衝心腹中結疾厚朴薑汁炒黃連各二兩半吳茱萸湯泡七次紫菀菖蒲柴胡桔梗茯苓人參皂角炙桂刮去皮乾薑炮蜀椒炒去汗巴豆霜各半錢川烏頭炮去皮臍一兩二錢上為細末入巴豆霜令勻煉蜜為劑旋丸如梧桐子大每服三丸漸次加之以利為度春夏加黃連二兩秋冬加厚朴二兩金匱大半夏湯治反胃嘔吐半夏洗五錢人參三錢白蜜一合千金有白朮生薑上㕮咀以水二升二合和蜜揚之二百四十遍煎藥六合去渣溫服茯苓澤瀉湯治反胃吐渴而欲飲水煮千金有小麥一合茯苓八錢澤瀉四錢甘草桂枝各一錢白朮三錢生薑四錢上㕮咀用水一升煮取五合內澤瀉再煮取三合溫服九仙餅治反胃人參白朮南星薑汁洗七次各二錢甘草一錢枳殼麩炒半夏薑汁洗七次五錢白礬明淨者豆豉炒各一兩厚朴薑汁炒五錢上九味各依等分為細末和令勻候夜間睛時露過以人參厚朴煎湯糊作餅子小平錢大慢火焙乾每服一餅用生薑一大塊切作兩片夾餅子藥用紙裹浸濕慢火煨熟連薑並餅子嚼碎以平胃散調湯吞下切忌諸般生冷仍令病人寬心開懷用藥調理方可見效加味保和丸黃連薑汁炒三錢山楂肉二錢保和丸末二錢同為末糊丸麻子大胭脂胚子為衣人參湯入竹瀝下五十丸丹溪三法一方用馬匏兒燒存性一錢好棗肉去核四枚平胃散三錢溫酒調服一方用吳茱萸黃連貝母瓜蔞子牛轉草為丸服一方用生韭二兩生薑半兩搗汁和牛乳一盞溫服效祕方潤腸膏治膈噎大便燥結飲食良久復出其效甚捷威靈仙四五月開花時是新取四兩搗汁生薑搗汁四兩白砂蜜煎沸掠去沫四兩青麻油二兩上四味同入銀石器內攪勻慢火煎候如飴時時以箸挑食之多服效大力奪命丸治膈咽不下食及翻胃等證杵頭粳牛轉草各半斤糯米一斤加沙糖三兩和勻為丸上為細末取黃母牛口內涎沫為丸如龍眼大入鍋中慢火煮熟食之寬中進食丸治形氣美飲食神麯炒四錢木香五分草豆蔻五錢枳實麩炒四錢半夏曲七錢甘草炙一錢人參乾生薑青皮豬苓各一錢白茯苓白陳皮澤瀉各二錢大麥蘖炒一兩砂仁二錢半上為細末湯浸蒸餅丸如梧桐子大每服三四十丸食遠溫米飲下
