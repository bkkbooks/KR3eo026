body:
  text: 卷之二十六腫病濕為腫脹屬太陰先後相傳決重輕論者不知分表裡混同腫脹一家稱經云諸濕腫滿皆屬脾土脾土者足太陰濕土也腫者遍身浮腫乃表病也滿者胸腹脹滿乃里病也二者不同先脹後腫者自里而散於表可治先腫後脹者自表而入於裡不可治今之方書不復分別而以腫脹同論似未盡善五水病分金匱中水流五臟法無同陰陽上下須分別脈證如乖命必終金匱云病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風如一身悉腫不渴無大熱者越婢湯身重自汗者風濕也防己黃耆湯痛加芍藥方見金匱皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗如四肢水氣在皮膚中四肢聶聶動者防己茯苓湯方見金匱正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉以汗出入水中浴水從汗孔入得之宜黃耆芍藥桂枝苦酒湯方見金匱里水者一身面目盡腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之方見金匱肺得澀沉當責有水身體腫重水病脈出者死水病脈洪大者可治微細者不可治心水者其身重而少氣不得臥煩而躁其人陰腫肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足厥冷面反瘦此已上皆金匱之文也唇青傷肝缺盆平傷心臍突傷脾足平傷腎肩背平傷肺陰囊莖俱腫足趺腫膝如斗者皆為不治之證男從腳下腫而上女從身上腫而下或肉硬或手掌無紋並不治按上諸水病五水五臟水外又有里水湧水證及十腫水腫之名頭緒太繁難以悉辨今採諸書陽水陰水氣分血分表裡上下虛實之説立成治法惟高明擇之經曰平治權衡開鬼門潔淨府去菀陳莝夫平治權衡者謂察脈之浮沉也脈浮為在表脈沉為在裡在表者宜汗之在裡者宜泄之開鬼門者謂發其汗也潔淨府者謂利小便也去菀陳莝者謂去其積久之水物猶如草莝之不可久留於身中皆泄之也經曰面腫曰風足腫曰水上下之分也故諸有水者腰以上腫者風濕也當發汗腰以下腫者寒濕也當利小便所謂風從汗散水向便通乃上下分消以去其濕也丹溪云水腫脈多沉伏病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲煩滿小便澀赤大便祕結此為陽水不煩滿大便溏小便少而不赤澀此為陰水陽水為病宜桂苓甘露飲陰水為病生料五積散腰以上腫甚者宜小青龍湯腰以下腫甚者初宜用八正散汗下之後並宜加減胃苓五皮湯主之血氣不足則手足厥冷榮衛不利腹滿腸鳴相逐陽氣不通則身冷陰氣不通則骨疼名曰氣分少陽脈平少陰脈細男子則小便不利婦女則經水不通經為血不利則化為水名曰血分皮中有紅縷赤痕者是也胎前腫者別論氣分病者在表宜桂術湯汗之病在裡宜加減流氣飲主之血分病者在表宜桂苓湯發之病在裡宜加減流氣飲主之有肺移寒於腎名曰湧水者其證如溢囊里裹漿或遍身腫滿按腹不堅疾行則濯濯有聲宜葶藶丸有南人北人不服水上者有因飲食所傷而腫者有因七情氣鬱而腫者或有洗瘡逼毒歸內而腫者此皆有餘之證或因久瘧泄利後而腫者或因大病後而腫者或因産後敗血而腫者此皆不足之證按上二條皆似水氣之病當各以法求之宜加減胃苓湯隨證主治其有因於洗瘡者宜通聖散因於産者宜小調經散主之水病生於脾腎虛散流五臟病形殊補脾安腎為根本榮衛調和病自除夫人所賴以生活者水與谷也水則腎主之谷則脾主之惟腎虛不能行水脾虛不能制水胃與脾合氣胃為水穀之海又因虛而不能傳化焉故腎水泛溢反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫矣其狀目胞下微起肢體重著咳嗽怔忡股間清冷小便黃色皮薄而光手按成窟舉手即滿是也治當補脾胃之虛使肝氣得實則自能健運升降運動其樞機而水自行千金大養脾丸主之又當補腎之虛使腎氣實受五臟六腑之精而藏之水有所歸而不至泛溢宜河間腎氣丸主之如脾腎兼補宜加味安腎丸一名復元丹水腫之人多喘呼只因肺腎水邪留如逢先後為傳變從本從標別法求經曰故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥宜平肺湯如先腫後喘者脾傳肺也宜以脾病為本宜胃苓五皮湯主之如先喘後腫者肺傳脾也宜以肺病為本宜分氣紫蘇湯主之治腫諸方桂苓甘露飲治陽水為腫之病桂枝白朮白茯苓葛根豬苓澤瀉石膏滑石人參藿香葉各等分木香甘草炙各減半上㕮咀生薑三片新汲水煎服取微汗生料五積散治陰水為腫之病蒼朮制麻黃去根節陳皮去白枳殼炒桔梗厚朴薑汁炒乾薑白芷川芎茯苓桂枝白芍藥當歸半夏洗各等分甘草炙減半上㕮咀生薑三片蔥白三莖水煎熱服以汗為度小青龍湯治水病腰以上腫甚者宜此汗之麻黃去根節滾水泡細辛芍藥桂枝乾薑炮甘草炙五味子半夏湯洗石膏各等分上㕮咀水煎服以有汗住加減八正散治腰以下腫甚者宜此利之木通滑石瞿麥車前子白朮山梔子防己白茯苓各等分甘草減半大便不通加大黃上㕮咀入燈芯水煎食前服加減胃苓五皮湯諸腫通治兼主喘胃苓湯方見泄瀉加桑白皮大腹皮茯苓皮生薑皮五加皮上㕮咀生薑三片水煎服桂術湯治氣分水氣桂枝白朮麻黃去節甘草炙細辛枳殼乾薑炮各等分上㕮咀生薑三片水煎服桂苓湯治血分水氣桂枝茯苓當歸川芎莪實赤芍藥三稜檳榔蒼朮炒青皮陳皮瞿麥甘草炙桑白皮大腹皮各等分葶藶大黃煨各減半上㕮咀生薑三片水煎服加減流氣飲治氣血諸腫陳皮青皮紫蘇莖葉厚朴制木通香附子醋製甘草炙大腹皮草果仁肉桂藿香葉白朮木瓜茯苓白芷半夏枳殼各等分氣分加木香檳榔石菖蒲血分加當歸川芎莪朮上㕮咀薑三片水煎服葶藶丸治湧水病葶藶澤瀉椒目桑白皮杏仁炒豬苓各等分上為細末煉蜜丸如梧桐子大每服二三十丸蔥白湯下以利為度加減胃苓湯諸腫通用方見前因於不服水土加藿香木香檳榔因於傷食者加枳實神麯大麥蘖山楂因於鬱氣郁痰者加半夏香附子紫蘇木香烏藥因於久瘧泄利大病後者加人參黃耆當歸白芍藥通聖散治身有惡瘡或用水洗或用藥熏以致毒入腹而腫本方加金銀花升麻乾葛木通去芒硝小調經散治婦人産後敗血流入經絡化為水作腫者白芷五錢沒藥另研肉桂甘草各三錢赤芍藥細辛洗去土當歸酒洗玄胡索炒各一錢琥珀一錢另麝五分另上為細末每服二錢用澤蘭煎湯調服有婦人懷胎氣遏水道而虛腫者此但以紫蘇和胎飲順氣養脾飲食無阻待其産後腫自消矣千金大養脾丸專補脾胃消腫脹調血氣滋形色人參白朮茯苓陳皮青皮半夏曲各一兩枳實麥蘖炒神麯豬苓澤瀉各五錢砂仁草豆蔻木香乾生薑炒甘草炙各三錢上為細末湯浸蒸餅丸如梧桐子大每服五十丸米飲下河間腎氣丸專補腎虛消水腫蒼朮泔浸一斤熟地黃一斤五味子一斤半乾薑春秋七錢炒冬一兩夏五錢上為細末煮棗肉為丸如梧桐子大每服一百丸米飲下加味復元丹治脾腎俱虛皆發為水腫附子炮桂心各五錢白茯苓巴戟去心白朮萆薢山藥破故紙炒砂仁澤瀉茴香炒肉蓯蓉酒浸去甲心焙各一兩上為細末煉蜜丸如梧桐子大每服七十丸米飲下平肺湯肺與腎皆以屬陰積水下為胕腫上為喘呼葶藶桑白皮炒桔梗枳殼炒紫蘇半夏甘草炙五分麻黃去節七分半上㕮咀分作二服每服薑三片煎服以瀉肺水送下青木香丸瀉腎水青木香丸行滯通水黑牽牛六兩炒香研細頭末三兩木香五錢蓽澄茄補骨脂炒檳榔各一兩上為細末滴水為丸如緑豆大每服二十丸白湯下分氣紫蘇湯治氣促喘急面目虛浮五味子大腹皮陳皮去白桔梗茯苓草果仁桑自皮炙甘草炙各二錢上㕮咀為粗末稱二兩淨入嫩紫蘇葉乾者一兩五錢搗碎同一處拌勻每服四錢水一大盞薑三片入鹽少許煎七分溫服附方用大棗一斗鍋內入水上過四指川大戟並根苗蓋之盆合煮熟為度去大戟不用旋旋吃棗無時棗盡決愈神效又祕方治黃腫水腫青礬半斤醋一大盞和勻瓦盆盛之火上煅自干為度平胃散烏藥順氣散各半兩百草霜一兩共為細末醋糊為丸如梧桐子大每服九十丸棗湯下又大戟散治水腫脹大如鼓或遍身皆腫用大戟木香白牽牛頭末各等分為細末每服三錢以豬腰一對批開滲藥在內燒熟空心食之如食左腰子則左塌消食右消右如腫不盡於腹繞塗甘遂末飲甘草水少許其腫盡去凡取水藥惟氣實能食者可與服之不可逡巡待正氣盡化為水則難去矣如取水時五日一服不可多服未服藥先服五苓散白朮茯苓倍用再加人參輔助胃氣通行水道為佳丹溪云治腫脹者理宜補脾又須養肺以制木使脾無賊邪之慮滋腎以制火使肺得清化之令卻鹽味以防助水邪斷妄想以保養母氣遠音樂戒暴怒無有不安
