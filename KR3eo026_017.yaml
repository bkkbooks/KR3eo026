body:
  text: 卷之十七咳嗽咳嗽何分聲與痰只將四氣作蹄筌春風夏暑秋多濕冬月違和總受寒按機要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而生痰也咳嗽謂有聲有痰因傷肺氣動於脾濕也此是論其理如此咳嗽本一證子和論之矣不必拘泥只以風寒暑濕分春夏秋冬為外所因各以正治可也若因虛因氣因痰因火為內所因者已詳見前篇氣血痰火虛之中茲不復贅傷寒咳者憎寒發熱無汗惡寒煩躁不渴鼻塞聲重此由形寒飲冷得之其脈浮而緊多發於冬宜小青龍加杏仁湯主之方見傷寒傷風咳者憎寒壯熱自汗惡風口乾煩躁鼻流清涕欲語因咳言不得竟其脈浮而緩多發於春宜人參荊芥散主之傷暑咳者煩熱飲引口燥或吐涎沫其脈洪數多發於夏宜小柴胡加知母石膏湯主之方見傷寒傷濕咳者骨節煩疼四肢重若灑淅其脈細多見於秋宜不換金正氣散去藿香加紫蘇葉神麯主之治嗽三法脈為例浮則初從發散議沉實消詳清利行濡弱屬虛宜補益治嗽大法以肺脈為主更參以所見之證治之如脈浮者為風寒外感宜以發散治之五拗湯華蓋散參蘇飲是也如脈沉實者為氣壅內熱宜以清利行之便澀者以葶藶丸大陷胸丸無便溺之阻隔者東垣涼膈散合白虎湯或小陷胸湯加枳桔湯主之如脈濡弱者為肺虛宜補益之宜錢氏阿膠散其咳而面浮腫者宜加葶藶五皮湯主之及清肺散人參款花膏九仙散擇而用之痰甚者沉香消痰丸主之肺虛甚者人參膏以生薑陳皮佐之有痰加痰藥此好色腎虛者有之或瓊玉膏亦可用也咳嗽連綿肺已虛補脾滋腎莫躊躇一朝憔悴成勞亟脈證乖違事可虞咳久成勞肺為元氣之主也久咳不止者宜以補脾為主乃虛則補其母也參朮調中湯主之又宜滋腎之陰腎為肺之子肺中有火子來救之六味地黃丸主之此治嗽不易之定法也治咳之法當以順氣為先下痰次之如有表邪未盡者不可便用補劑及烏梅粟殼之類尤忌憂思過度房勞過傷遂成瘵痰矣咳而脈緊者死沉小伏匿者死咳而羸瘦者脈堅大者死咳而脫形發熱脈小堅急者死凡肌瘦脫形熱不去咳而嘔腹脹且泄脈弦急者皆死證也肺痿肺癰何以別脈來虛實分明說數虛肺痿薏苡仁數實肺癰宜甘桔金匱曰熱在上焦因咳為肺痿或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之寸口脈數其人咳口中反有濁唾涎沫者為肺痿若口中辟辟燥咳即胸中隱隱痛脈反數滑此為肺癰咳唾膿血脈數虛者為肺痿宜養其氣薏苡仁散主之脈數實者為肺癰當涼其血宜甘桔主之治咳經驗諸方人參荊芥散治肺感風邪上壅咳嗽頭目不清言語不出咽乾項強鼻流清涕陳皮去白荊芥穗桔梗半夏洗細辛甘草炙人參杏仁去皮尖木通麻黃去根節各等分上㕮咀每服四錢水一盞半姜五片煎八分食後溫服五拗湯治風寒咳嗽肺氣喘急麻黃不去根節杏仁不去皮尖甘草生荊芥穗桔梗各等分上㕮咀姜三片水煎溫服咽痛甚者煎熱加朴硝少許一方去桔梗荊芥名三拗湯內加石膏臘茶葉名五虎湯治喘華蓋散治肺感風寒痰壅咳嗽麻黃去節紫蘇子炒桑白皮炒赤茯苓杏仁去皮尖炒炙甘草減半橘紅去白各等分上㕮咀每服二錢半薑棗煎食後服不換金正氣散治傷濕咳嗽厚朴薑汁炒陳皮去白蒼朮米泔浸半夏洗白茯苓紫蘇葉各等分甘草減半神麯炒研細末等分另入藥上㕮咀除神麯末用水一盞半生薑三片棗二枚煎一盞去渣入曲末服人參膏參朮調中湯六昧地黃丸並見內傷及虛損參蘇飲治咳而有痰者人參茯苓枳殼半夏前胡桔梗紫蘇乾葛陳皮去白各等分甘草減半上㕮咀水二盞姜三片蔥三枝氣盛加木香錢氏葶藶丸治咳嗽面赤身熱痰盛喘促者甜葶藶去土放銚內隔紙略炒黑牽牛炒取頭末漢防己杏仁去皮尖及雙仁者炒黃另研如泥上前三味研為細末入杏膏研勻取蒸陳棗肉搗為丸如綠豆大每服三十三丸至五十丸淡薑湯下中病即止大陷胸丸治咳嗽胸滿氣實者及停飲而咳者大黃葶藶微炒芒硝另研杏仁如上制各半兩甘遂一錢上除芒硝杏仁二味研為細末入芒硝杏膏合研為劑煉蜜丸如彈子大約重一錢用水一盞煎六分食後服小陷胸湯加枳梗湯治痰咳胸滿而痛咽喉不利黃連一錢三分半夏二錢六分瓜蔞子連穰二錢半枳殼枳梗各一錢上㕮咀用水二盞先煎瓜蔞取一盞半去渣入藥再煎八分去渣食後溫服涼膈白虎湯治上焦積熱肺脹而咳胸高上氣而渴者即東垣涼膈散方見火病白虎湯方見暑病二方相合是也葶藶五皮湯治上氣喘嗽面目浮腫陳皮去白桑白皮大腹皮茯苓皮生薑皮葶藶炒研細各等分上㕮咀水煎臨臥服錢氏阿膠散治久嗽肺無津液真阿膠一兩半蛤粉炒黍黏子二錢半炒馬兜鈴半兩甘草一錢炙杏仁七個去皮尖另研霜糯米一兩上為細末每服一錢或二錢水一盞煎六分食後溫服清肺散治肺氣上熱咳嗽前胡荊芥桑白皮炒甘草炙枳殼曲炒各三分貝母去心知母薄荷葉赤茯苓桔梗杏仁去皮尖紫蘇阿膠天門冬去心各五分上㕮咀姜三片烏梅一枚水煎食後服人參款冬膏治肺虛咳嗽款冬花紫菀洗去土炒人參北五味桑白皮蜜炒各等分為末煉蜜丸如彈子大含化一丸淡薑湯下瓊玉膏治虛勞乾咳嗽好色之人此方最捷人參十二兩白茯苓去筋膜二十五兩沉香真琥珀各半兩生地黃擇取十斤搗自然汁忌鐵白沙蜜以法煉去蠟五斤上以前四味共為細末卻將地黃汁入煉蜜中和勻用密絹絞去渣放瓷罐中入藥攬勻外用綿紙封口又以箬葉封固取長流水於鍋中桑柴火慢慢煎一晝夜旋添熱水取罐埋土中一夜去火毒收起每服一二匙滾白水化下九仙散治一切久嗽人參桑白皮蜜炒桔梗阿膠珠五味子各一錢烏梅一個貝母五分款冬花一錢慄殼去穰帶蒂蜜炙二錢上㕮咀作一服水二盞姜三片煎一盞服沉香消化丸治痰壅久嗽不止此滾痰丸變法也青礞石硝煅金色枯白礬牙皂南星炮去皮臍半夏洗去滑各二兩沉香五錢黃芩二兩白茯苓陳皮去白各二兩枳殼炒枳實炒各一兩半薄荷葉一兩上為細末薑汁煮神麯糊為丸如梧桐子大每服五十丸飴餳拌吞淡薑湯下附錄如好色之人陰虛咳嗽者用四物湯加知母黃柏五味子人參麥門冬桑白皮地骨皮服之妙如飲酒之人痰嗽者用半夏曲瓜蔞霜各五兩貝母桔梗各二兩知母一兩枳殼一兩半上為細末薑汁浸蒸餅為丸服如有七情之傷痰嗽氣急者用蒼朮三兩泔水浸香附子一兩半童便浸蘿蔔子炒紫蘇子炒杏仁瓜蔞仁半夏各一兩黃芩茯苓各五錢川芎三錢上為末薑汁為丸止嗽煙筒用鵝管石雄黃款冬花佛耳草各等分為末為雞子清刷紙上待乾轉藥末作筒燒煙以口銜吸菸入喉白湯嚥下立效灸法肺俞二穴足三里三穴薏苡仁散治肺痿薏苡仁百部黃耆生麥門冬當歸身白芍藥黃芩酒炒人參桑白皮蜜炙各等分五味子十粒上㕮咀水二盞生薑三片煎服甘桔湯治肺癰咳唾膿血桔梗當歸瓜蔞仁漢防己桑白皮貝母杏仁炒甘草節薏苡仁百合黃耆玄參上等分㕮咀水二盞姜二片煎服
