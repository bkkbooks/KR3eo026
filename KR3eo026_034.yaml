body:
  text: 卷之三十四攝生輯略攝生卻病延年方論無極之真二五之精妙合而凝以成男成女者元氣之本根也五穀之養五畜之助五菜之充五果之益穀氣之所資也無元氣則化滅無穀氣則神亡二者相須當相交養者也人之身中腎為元氣之根脾胃為穀氣之主故修真之士曰先天真一之氣者即此元氣也曰刀圭者即脾胃戊己穀氣也澄心靜慮惜精愛氣所以養此元氣也飲食必節起居必謹所以養此穀氣也故能無病度百歲乃仙去矣此養生之術當有教外別傳而攝生之功乃在服餌金石不與焉補腎地黃丸男子服之則壯陽益精女子服之則月事以時下能令有子小兒服之能治胎稟怯弱之病此方不寒不燥乃補腎之要方也熟地黃酒洗八兩再蒸焙乾取末忌鐵山藥刮去赤皮四兩茱萸去核取肉焙乾四兩白茯苓去筋膜四兩巴戟去心取肉四兩杜仲去粗皮切鹽水炒絲盡取末三兩川牛膝去蘆酒洗焙乾三兩肉蓯蓉酒洗去外鱗破去內白膜曝乾二兩芡實取肉三兩甘州枸杞焙二兩遠志去蘆取肉二兩共為極細末蜂蜜煉和杵千餘下丸如梧桐子大每服五十丸空心食前溫酒送下鹽湯亦可忌食蘿蔔金鎖祕精丹治夢遺泄精此有三證如喜獨寢矜持太過而或遺者如瓶注水滿而溢也不須服藥情有所感心有所慕而遺者如瓶傾側而水出也宜服前地黃丸更須清心寡欲一妄不生否則日久亦成虛泄矣若因下元虛損酒色放恣而遺者如瓶之破損而滲漏水出也宜用此方以塞其流兼用前地黃丸以固其源夜則側臥伸下一足屈上足以挽下足之膝一手掩其臍一手握固攀起其莖勿挨肉甚妙蓮肉去心芡實去殼各四兩真桑螵蛸炙一兩共為細末取金櫻子黃熟者一斗輕杵去外刺又剜去內子於木臼杵爛以水一斗煮耗五升用布濾去渣再熬成膏和藥杵千餘下丸如梧桐子大每服五十丸空心鹽湯送下更以豬腰子一枚煨熟壓之以助藥力法制何首烏丸久服令人鬚髮不白何首烏赤白二種各取停勻用竹刀刮淨忌鐵川牛膝去蘆視何首烏折半大黑豆一斗水浸濕用大柳木甑一個作平底篳先鋪黑豆一層即鋪何首烏一層又放牛膝一層又鋪黑豆如上安置放鍋中慢火蒸以酒澆之蒸至豆爛取出曝乾去豆不用赤白茯苓先去皮各研取去筋膜各用牛乳拌勻蒸過取出曝乾稱何首烏四兩茯苓二兩牛膝二兩共為細末煉蜜丸如梧桐子大每服五十丸空心食前溫酒送下忌食豬羊血法制鹿角膠丸添精補髓卻老延年鹿角新解者一付鋸斷以寸為度用糯米泔水浸一暮夜刷去角外黑垢劈成薄片每角一斤用桑白皮四兩芡實肉紅者二兩黃蠟四兩放瓦罌中又用生地黃二兩熟地黃二兩天門冬去心二兩麥門冬去心二兩另用瓦罌煮湯以水五升煮三升入鹿角罌內用干桑柴慢火煮一罌鹿角一罌藥物並以桑柴火煮待鹿罌水耗三分之一即以藥罌中熱湯添之切不可入冷水在角罌中藥罌添水煮角罌添湯煮至一日一夜以角酥軟嚼碎為度以淨布濾去渣再入銀鐺中慢火熬成膠取起山藥四兩山茱萸去核焙二兩肉蓯蓉如前制一兩蓮肉去皮心二兩芡實去殼二兩共為細末和鹿角膠杵勻為丸如梧桐子大每服五十丸空心溫酒送下參苓白朮丸健脾胃益氣血長肌肉悅顏色人參去蘆二兩白朮不用油者去蘆三兩白茯苓堅白者去皮三兩粉草去皮炙一兩陳皮去白一兩半留白一兩半山藥如前制四兩蓮肉去皮心三兩縮砂仁一兩枳實去穰麩炒一兩當歸身酒洗二兩川芎大而白堅者一兩山楂子蒸取肉一兩真神麯炒黃色二兩共為細末荷葉浸白粳米即以荷葉包米就以米水中煮熟取出杵爛和藥為丸如梧桐子大每服五十丸溫酒送下米飲亦可不拘時健脾辟穀方山藥刮去赤皮蓮肉去皮心芡實去殼白扁豆去殼炒緑豆去殼炒各味八兩薏苡仁去殼十二兩小茴香炒四兩白粳米炒黃二升共磨為細末每五錢滾白湯調服佳或用白湯調蒸糕食之亦妙神仙醒酒方解酒毒醒酲葛花五兩赤小豆花緑豆花各一兩家葛根搗碎水澄粉八兩真柿霜四兩白豆蔻末五錢各取細末和勻用生藕汁和搗作丸如彈子大每用一丸嚼而咽之
