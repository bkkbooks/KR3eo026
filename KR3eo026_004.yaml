body:
  text: 卷之四濕病霧露清邪降自天濁邪水土地中潛身中飲食生脾胃症治分來不一般正理論云陽中邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出天氣下降如霧露之氣也謂之清邪清邪中上本乎天者親上也地氣上騰如水土之氣是也謂之濁邪濁邪中下本乎地者親下也二氣熏蒸此天地之濕也在人之身有生於外者如汗出衣濕冷氣浸漬此無形之濕也飲食所傷停積痰飲此有形之濕也故人受於天地之氣者謂之外感受於人之自得者謂之內傷症既不同治亦有異宜博求之四時為邪濕最多法無一定待如何明師指與真王法上下分消保太和四氣者為風暑濕寒四氣流行之氣也四氣中人皆能為病惟濕之病十居八九故兼於風者則為風濕兼於寒者則為寒濕兼於暑者則為暑熱自病則為中濕濕之中人乘虛而入入肺為喘嗽入脾為吐利腫脹四肢不舉入肝為脅下痛肢節不利入心為煩渴坐臥不安入腎為腰痛足腫入於皮膚則麻木不仁入於筋骨則拘急痿弱滯而為痰涎溢而為吐瀉聚而為腫脹鬱而為痿痹此病之無一定也治濕之法濕在上者宜微汗而解又云濕家不可汗汗之則成痙濕在下者宜利小便治濕不利小便非其治也又云汗多小便自利者不可再利之重亡津液也脾虛者多中濕當以補脾為主治如邪氣內實壅滿脹腫不利水行氣以去之可乎或以補脾藥為君而利水行氣藥為臣使或以利水行氣藥為君而以補脾為臣使此法之無一定也或曰濕之為病所感不同若居處卑濕之地及道途沖斥風雨或動作辛苦之人汗沾衣背濕從外感者如此之類宜發汗利小便也或恣飲酒漿湩酪多食柑橘瓜果之類皆濕從內傷者宜疏利之也或曰東南地下多陰雨地濕凡受必從外入多自下起故腿重腳氣者多治當發散久者宜疏通滲泄之西北地高人多食生冷濕面湩酪或飲酒後寒氣拂鬱濕不能伸越多致腹皮脹痛甚則水鼓脹滿或通身浮腫按之如泥不起辨其氣之虛實而通利其二便責其根在內也然方土高下不但南北之分飲食所傷人皆有之也不必拘泥大抵治濕之法以發汗利小便為主謂上下分消以去其濕也發汗以羌活蒼朮為主以微汗之不可用麻黃葛根恐汗之過反增濕熱也利小便以五苓散為主裡實濕壅盛者雖葶藶牽牛之類亦不可少也宜辨其虛實用之毋忽治濕惟將水症憑吾今一一細評論一般症有一般法會煞臨機應變人濕病關節疼痛而煩脈沉而細者此名中濕亦名濕痹其候小便不利大便反快但當利其小便宜五苓散加羌活主之如一身盡腫痛或無汗或濕流關節氣在表宜五苓散加桂皮蒼朮微汗之不可大汗或自汗出多熱燥津液內水不利切勿利之重損津液也宜防己黃耆湯黃耆人參湯治夏月濕熱甚妙方見內傷風濕脈浮身重汗出惡風故挾風者多表症也防己黃耆湯治之風濕相搏身體疼痛不能轉側不嘔不渴脈浮虛而澀桂枝附子湯如大便堅小便自利者去桂加白朮湯治之風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫宜甘草附子湯主之杏仁湯亦可一身盡疼發熱日晡轉劇者此名風濕此病得於汗出當風或久傷生冷所致也宜麻黃杏仁甘草薏苡湯主之若治風濕者發其汗但微微似欲汗出者風濕俱去也如汗大出者但風去濕不去所以汗者病不愈也風濕相搏一身盡痛宜羌活湯主之風濕相搏頭項強痛身體屈硬麻痹不仁宜疏風勝濕湯主之風濕相搏肩背痛不可回顧此手太陽氣鬱而不行也如脊痛項強腰似折頭似拔者此足太陽經不通行也宜羌活勝濕湯主之寒濕之病內甚則腹痛下利外甚則四肢沉重疼痛或肌肉濡漬痹而不仁其脈浮虛而澀寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛實者聶聶氣不足按之則氣足以溫之故快然而不痛其脈沉弱宜附子湯主之寒濕病下利者真武湯主之寒濕所傷身重腰冷如坐水中小便或澀大便溏泄皆坐濕地或陰雨所襲得之也宜滲濕中和湯主之如小便自利清白大便泄瀉身痛自汗此為寒濕宜五苓散加生附子蒼朮木瓜濕寒病身痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈瓜蒂散主之濕熱病內甚則瀉痢外甚或痛或熱或腫發黃脈來滑疾身熱煩喘胸滿口燥發黃者濕熱也宜茯苓滲濕湯濕家之為病一身盡痛身熱身色如熏黃者宜茵陳五苓散主之濕熱俱甚內外壅塞水腫腹脹小便赤澀大便祕結者宜葶藶木香散神芎丸主之河間云此藥下水濕消腫脹利小便理脾胃無出乎此也夏秋濕熱腰背胯痛身重怠惰身如板夾腳如沙墜者清濕湯表裡有濕熱痿厥癱瘓不能行走宜東垣清燥湯主之詳見痿病濕熱在下腰以下腳膝痛者宜當歸拈痛湯主之脾濕有餘氣不宣通面目手足痛注悶而痛宜導滯通經湯主之脾胃受濕腹脹身體沉重飲食不進者平胃散主之濕分寒熱法須知寒濕宜從五積施濕熱防風通聖散如單中濕胃苓奇濕症有二熱症多濕寒症少濕當以脈症辨之如脈滑數小便赤澀引飲者為濕熱症宜通聖散主之若小便自利清白大便瀉泄身疼自汗脈浮虛而澀者為濕寒症宜五積散主之若一身盡痛小便不利脈沉而細微緩者此中濕也宜胃苓湯主之治濕諸方防己黃耆湯治風濕脈浮汗出惡風者喘者加麻黃五分胃中不和加白芍藥七分半氣上衝加桂枝七分半亦有陳寒者加細辛七分半服後當如蟲行皮中從腰下如冰厚蓋被上又以一被腰以下溫令微汗差桂枝附子湯治風濕相搏身體痛煩不能自轉側不嘔不渴桂枝八錢生薑六錢附子炮去白三錢甘草炙四錢上㕮咀作二服棗一枚煎服後其人如冒狀勿怪小便自利者去桂枝加白朮三錢名白朮附子湯甘草附子湯治風濕相搏骨節煩疼掣痛近之則痛甚汗出短氣小便不利惡風不欲去衣身微腫者甘草炙四錢附子三錢白朮四錢桂枝八錢分二服水煎杏仁湯治症同上桂枝五錢天冬芍藥麻黃各二錢半杏仁七個水三盞薑十片煎分二服麻黃杏仁甘草薏苡湯治一身盡疼發熱日晡所劇者麻黃去節湯炮半兩薏苡半兩甘草二兩杏仁去皮尖七個水煎分三服有微汗避風羌活湯治風濕相搏一身盡痛羌活七分防風升麻柴胡各五分藁本蒼朮各一錢水煎服羌活勝濕湯治肩背痛不可回顧及脊痛項強腰似折項似拔羌活獨活各一錢甘草炙藁本防風川芎各五分蔓荊子三分水二盞煎一盞大溫食前服如身痛腰重沉沉然經中有寒濕也本方加酒洗漢防己五分輕者附子五分重者川烏五分蘇風勝濕湯治風濕相攻頭項強痛身體屈硬麻痹不仁獨活羌活防風川芎蒼朮蔓荊子各等分薑三片有熱加酒炒黃芩身痹無汗加麻黃荊芥水煎附子湯治寒濕身體痛手足冷骨節疼脈沉弱附子人參各二錢茯苓白芍各三錢白朮四錢水煎即真武湯去生薑加人參滲濕中和湯治寒濕身重腹滿小便不利如坐水中蒼朮泔浸炒白朮陳皮赤茯苓厚朴薑汁炒乾薑炮等分甘草減半水二盞薑一片燈心一撮煎服此平胃散加乾薑茯苓五苓散加附子蒼朮木瓜湯治寒濕小便自利大便泄瀉身重自汗瓜蒂散治頭中霧露寒濕之氣頭痛鼻塞無表裡症瓜蒂君豬牙皂細辛各減半為細末吹入鼻中有水出愈茯苓滲濕湯治濕鬱成熱身體面目俱黃小便不利黃芩黃連梔仁防己蒼朮白朮陳皮青皮枳實各四分赤茯苓澤瀉各五分茵陳六分豬苓一錢水煎服茵陳五苓散治濕熱大盛身黃髮熱五苓散加茵陳一倍是也葶藶木香散治濕熱表裡俱實小便不利葶藶赤茯苓豬苓白朮各一兩澤瀉木通甘草各半兩木香半兩桂枝半兩滑石三兩上為細末每服五錢白湯下神芎丸一名導水丸治濕熱內郁胸膈痞滿鼽衄口舌生瘡咽喉不利牙疳齒蝕口臭或遍身生濕瘡乾疥睡語咬牙大小便閉酒毒大黃錦紋者枯芩各二兩牽牛頭末滑石各四兩薄荷葉淨黃連大川芎各一兩半共為細末滴水為丸如小豆大溫水下十丸至十五丸每服加十丸以利為度非形實脈實者不可輕用也如濕熱蘊積者非此不除然除痰飲消酒毒去積滯利咽膈大有殊功清濕湯治夏秋濕熱腰背胯疼身重怠惰炒柏蒼朮米泔浸炒羌活防己白朮陳皮薏苡白芍酒炒川芎澤瀉茯苓梔仁炒神麯炒紅花炒甘草等分薑三棗一煎當歸拈痛湯治一切風濕熱毒下注濕熱腳氣腫痛浸淫瘡瘍羌活人參苦參酒洗升麻葛根蒼朮各二錢甘草炙黃芩酒洗茵陳葉灑炒半兩歸身防風澤瀉知母酒炒豬苓各三錢白朮一錢半分四服水煎空心服臨睡再服之導滯通經湯治脾濕有餘氣不宣通面目手足腫五苓散加豬苓桂木香陳皮平胃散治脾胃受濕脹滿飲食不進方見前薑棗引五積散治寒濕方見傷寒胃苓湯治濕此理脾胃利小便之方也
