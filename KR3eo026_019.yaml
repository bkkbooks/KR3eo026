body:
  text: 卷之十九霍亂病人霍亂事堪驚吐利交併又轉筋心腹痛疼時眩暈宜分乾溼受三因陳無擇云霍亂者心腹卒痛嘔吐下利憎寒壯熱頭痛眩暈先心痛則先吐先腹痛則先利心腹齊痛吐利並作甚則轉筋入腹即死霍亂惡證無越如此仲景云邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉此為急病也然吐利為急十死其一二如揮霍擾亂而不得吐瀉者此名乾霍亂也多死法曰既有其入必有所出今有其入而不得其出者否塞也仁齋云濕霍亂死者少乾霍亂死者多許仁則嘗有是言矣蓋謂所傷之物因吐利而出泄泄盡則安若上不得吐下不得利所傷之物壅閉則正氣關格陰陽躁擾狂悶喘脹而死矣按陳氏三因之論外因諸風則惡風有汗傷寒則惡寒無汗中濕則重著冒暑則熱煩其因於風寒濕者並宜藿香正氣散蓋此方能發散風寒濕氣也因於暑者宜六和湯主之內因七氣所致郁聚痰涎飲痞膈不通遂致滿悶乃作吐利宜三因七氣湯主之或諸飽食膾炙恣食乳酪冰脯寒醬旨酒胃脘䐜脹脾臟停凝必成吐利此不內外因也雖自吐利還須吐之宜二陳湯探吐吐後以治中湯主之乾霍亂形如鬼邪卒然悶絕可咨嗟古人救此多良法應變而施莫過差乾霍亂者忽然心腹脹滿絞刺疼痛蠱毒煩冤欲吐不吐欲利不利狀若神靈所附頃刻之間便致悶絕俗呼絞腸沙者是也宜用吐法刺法灸法轉筋吐瀉有三因病屬陽明足胃經惟有夏秋多此證陰陽虛實治須分劉宗厚云謹按傷寒傳變為霍亂者殊少惟夏秋之間暄熱人腠理疏感風濕暍之氣而生此證最多有陰陽虛實不同脈來浮洪者可治微而遲氣少不語者為難治河間云轉筋吐瀉者其氣有三一曰風二曰火三曰濕蓋風火濕三氣皆能為轉筋吐瀉也暍即火也大抵三氣之中皆從熱治內經曰諸筋反戾水液渾濁皆屬於熱是也丹溪云凡霍亂者不渴者生薑理中湯最好如渴用五苓散加五味子麥門冬滑石轉筋血熱用四物湯加酒芩紅花蒼朮南星主之又方加減不換金正氣散通治霍亂吐瀉者中焦胃氣所主也是陽明胃之脈榮養宗筋今暴吐瀉胃中之津液頓亡宗筋失養必致攣縮甚則卵縮舌卷者為難治矣如吐瀉不已轉筋擾悶者宜木瓜湯主之如腹痛甚不止者宜訶子散吐瀉不納藥者宜胡椒湯腹痛吐瀉不止者宜訶子散此上三法皆救其危惡之方也如吐瀉過多手足逆冷六脈沉細氣少不語者宜四順湯主之霍亂多緣飲食傷病人損谷最為良待其病去飢求食健胃扶脾別有方河間云吐瀉不止者其本在於中焦或因渴而大飲飲而過度或因飢而始食食而過飽以致濕熱內甚故陰陽交錯而不和是為吐瀉慎勿與粟米粥湯谷入胃則必死丹溪云內有所積外有所感陽不升陰不降乖隔而成非因鬼邪皆飲食所致也此上二條皆先哲格言也切勿與穀食雖米一呷下喉立死必待吐瀉止過半日飢甚方可與稀粥少食以漸而將息也宜椒術養脾丸神效平胃散參苓平胃丸以調理之治霍亂經驗方藿香正氣散治感風寒濕氣憎寒壯熱霍亂吐瀉桔梗紫蘇茯苓白芷藿香大腹皮陳皮白朮蒼朮半夏曲厚朴薑汁炒各等分甘草減半上㕮咀水二盞薑棗煎服腹痛加桂枝六和湯治中暑熱心脾不調氣不升降霍亂吐瀉寒熱交作小便赤澀半夏縮砂人參藿香赤茯苓香薷木瓜扁豆炒杏仁去皮尖厚朴薑汁炒各等分甘草炙減半上㕮咀水二盞薑棗煎服七氣湯治七情鬱結五臟之間互相刑剋陰陽不和揮霍變亂吐瀉交作半夏洗一錢白芍藥八分桂心八分厚朴制六分茯苓各八分紫蘇葉橘皮各四分人參二分上㕮咀水一盞酒半盞生薑七片棗一枚煎七分溫服治中湯治過食生冷遂成霍亂吐下脹滿食不消化心腹痛即理中湯內加橘皮青皮等分如臍下築動者腎氣動也去朮加桂謂理中湯內加也吐多者去朮加生薑半夏利多者仍用術心悸者加茯苓腹滿者去朮加附子厚朴生薑理中湯治霍亂不渴者或煉蜜為丸名理中丸即理中湯加生薑是也加減法見上冬月霍亂加熟附子理中湯夏月霍亂煎成湯放井中澄冷服之如吐利後轉筋者加火煅石膏等分嘔吐者加陳皮半夏丁香等分每服生薑十片同煎泄瀉者加陳皮茯苓等分名補中湯泄瀉不已者再加熟附子不喜飲食米穀不化者又加縮砂共成八味如吐利後胸中痞滿心隔高起急痛手不可近者加枳實茯苓名枳實理中湯渴者再加瓜蔞根等分如吐利過多手足逆冷脈沉細氣少者去白朮加熟附子等分名四順湯天水五苓散治夏月霍亂及身熱熱多欲飲水者五苓散一劑煎成湯調天水散服二方並見濕病加減不換金正氣散治霍亂吐瀉神效藿香蒼朮厚朴陳皮砂仁白芷半夏茯苓甘草炙減半人參神麯炒各等分上㕮咀薑棗煎服寒加乾薑寒甚加熟附子木瓜湯或因飲冷或冒寒或失飢或大怒或乘車船傷動胃氣令人上吐下瀉不止頭旋眼花手足轉筋四肢逆冷此危證也宜急服之乾木瓜一兩吳茱萸湯泡焙半兩茴香炒二錢半甘草炙二錢上㕮咀分作三服姜三片蘇葉十片水煎空心服又方用吳茱萸半兩乾木瓜切半兩食鹽半兩三味同炒焦先用瓦罐水三升煮令有沸卻入藥煎至一升八合分作二服一方用枯白礬為末每服一錢用百沸湯點服一方用鹽一撮醋一盞煎七分溫服加減四物湯治轉筋屬血熱者用四物湯一劑方見血病加酒芩紅花蒼朮南星煎服加減建中湯治吐利轉筋脅下痛脈弦者木剋土也用小建中湯一劑方見傷寒加柴胡木瓜等分煎服轉筋男子以手挽其陰女子以手牽乳兩旁此千金妙法也一方治轉筋霍亂用蓼一握去兩頭水三升煮取二升熏洗立效訶子散治心脾冷痛霍亂吐利如神訶子肉甘草炙厚朴制乾薑陳皮草果仁良薑白茯苓神麯炒各等分上㕮咀入鹽些少水煎服胡椒湯治霍亂吐瀉胡椒七粒生綠豆二十一粒共研細末煎木瓜湯調服良薑飲治霍亂腹痛神效藿香葉良薑木瓜陳皮各等分甘草炙減半上㕮咀水煎服吐法治霍亂心腹絞痛用極鹹鹽湯三盞熱飲一盞以手指刺口令吐使宿食宿痰吐出不吐又服一盞吐訖後服一盞三吐乃止此法大勝諸治俗人以為淺近鄙而不用守死而已吐後以六君子湯調之刺法委中二穴以冷水手拍起青三稜針刺去紫黑血效如腹痛而手足暖者此名陽沙以針刺其手十指頭近爪甲處令其血出仍先自兩臂捋下其惡血令取指頭出血為妙如腹痛而手足冷者此名陰沙看其身上紅點以燈草蘸油火粹之灸法霍亂吐瀉不止中脘一穴在臍上四寸氣海一穴在臍下一寸半天樞二穴在臍心兩旁各開二寸各灸五壯立愈又治霍亂已死而胸中尚有暖氣者其法以鹽填滿臍孔取艾灸之不計壯數立蘇椒米養脾丸扶脾壯胃順氣溫中善治臟寒脾泄腹痛平胃散一斤川椒去目與閉口微炒出汗為末四兩上蒜棗二味搗成膏和平胃散椒末杵和丸如梧桐子大每服五六十丸空心酒或米飲鹽湯下服此丸忌生冷醃藏陰物神效平胃散溫養脾元平和胃氣寬中進食人可常服老人尤宜厚朴薑汁炒陳皮不去白生薑和皮切四兩甘草炙各三兩蒼朮米泔水浸一日五兩小紅棗去核用二百枚上六味各銼碎用水五升慢火煮乾搗作餅子曝乾再研為細末每服二錢淡鹽湯調服參苓平胃丸治脾胃虛弱泄瀉不止人參一兩茯苓去皮二兩厚朴薑汁炒五兩粉草炙一兩陳皮不去白五兩蒼朮米泔水浸一日切焙八兩上為細末另取山藥八兩研末水煮糊為丸如梧桐子大每服十五丸空心食前薑棗湯下霍亂脈或代而散或隱而伏脈結促代皆不可斷以死脈大者生脈微弱漸遲者死
