body:
  text: 卷之十五痿痹痿痹醫書號不仁痿虛痹實勿同論痿因肺熱筋骸廢痹則風寒濕合成醫書以痿痹為不仁痛則為痹不痛則為痿痛則為實不痛則為虛症自有別不可概同論治也蓋痿因血少氣虛火盛制金肺葉焦枯宗筋不潤肝木乘旺脾土受傷飲食減少四肢不舉或食而無力故精血虛耗使皮血筋骨肉痿矣詳見下文痹因風寒濕三氣合而成痹氣滯不行積於患處或痛而麻木手足為之不仁也今世俗痿作痹治痹作痿治者多矣病源論云痿為不足痹為有餘治療之法痹而行氣勝濕痿而清燥滋陰此大略也若醫以治風之藥謬之甚矣諸痿皆因肺熱成法宜清燥取陽明丹溪著論超千古若作風醫誤煞人經云肺熱葉焦五臟因而受之發為痿躄心氣熱生脈痿故脛縱不任地肝氣熱生筋痿故宗筋弛縱脾氣熱生肉痿故痹而不仁腎氣熱生骨痿故足不任身然治痿獨取陽明者陽明者為五臟六腑之海主潤宗筋能束筋骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽宗筋之會會於氣衝而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋弛縱帶脈下引故足痿不用也丹溪曰經云諸痿生於肺熱只此一句便見治法難經云東方實西方虛瀉南方補北方東方木肝也西方金肺也南方火心也北方水腎也肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺受火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此雖然天産作陽厚味發熱凡病痿者若不淡薄滋味吾不能保其全矣又云痿症斷不可以作風治而用風藥有濕熱濕痰氣虛血虛瘀血濕熱用東垣健步丸加燥濕降火之劑黃柏黃芩蒼朮之類濕痰用二陳加蒼朮白朮黃芩黃柏之類入竹瀝薑汁血虛四物湯加蒼朮黃柏大補陰丸氣虛四君子湯加蒼朮黃柏黃芩蓋蒼朮黃柏治痿之要藥也東垣取黃柏為君黃耆等補藥為輔佐以治諸痿如清燥湯健步丸皆治痿之要藥也又如丹溪之補腎丸虎潛丸加味四物湯皆補北方之要藥也又如加味二妙丸鹿角膠丸皆治血虛氣虛兼濕熱之要藥也痹有風寒濕不同各隨所病視從容體虛邪湊斯成痹歷節遊行是痛風經云風寒濕三氣雜至合而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹痹病因體虛腠理空疏受之而成逢寒則急逢熱則縱隨所受邪氣而生症也診其脈大而澀為痹脈來急亦為痹脈澀而緊者亦為痹大抵痹生於虛為病多重痛沉著不易得去須制對症藥日夜飲之雖留連不愈能守病禁不令入臟庶幾可扶持也昔錢仲陽為宋之一代明醫自患痛痹取茯苓之大如斗者以法啖之能移於手足為之偏廢不能盡去可見其為治之難矣如風寒濕三氣合而成痹者宜增味五痹湯主之五痹者謂筋痹脈痹骨痹肌痹皮痹是也風氣勝者為行痹宜防風湯寒氣勝者為痛痹宜茯苓湯濕氣勝者為著痹茯苓川芎湯三痹通用續斷丸主之夫古之所謂痛痹者即今之所謂痛風也諸方書又謂之白虎歷節風以其走痛於四肢骨節如虎咬之狀而以其名名之耳丹溪云大率因血虛受熱其血已自沸騰或加之以涉水受濕熱血得寒汙濁凝滯不得運行所以作痛夜則痛甚行於陰也治以辛溫監以辛涼流散寒濕開通鬱結使血氣行更能慎口節欲無有不安者也肥人多是濕與痰飲流注經絡脈必滑宜二陳湯加減瘦人多是血虛與熱脈必澀宜四物湯加減下部有濕腫痛用防己龍膽草黃柏知母固是捷藥若肥人病此宜蒼朮白朮南星滑石白茯苓之類瘦人宜用當歸紅花桃仁牛膝檳榔等藥惟東垣拈痛湯要藥也薄桂味淡能橫行經絡手臂領南星蒼朮等藥至痛處威靈仙治上體痛人虛弱者勿用烏附治下體痛風以其在下道路遠非烏附不能行故用為引經若以主治非為無益而有殺人之毒若畏而不用則下體之病終莫能治亦殺人也丹溪治痛風有三方一方治上中下痛風一方治飲酒人濕痰痛風一方治氣血虛有痰白濁陰火痛風肢節疼痛屬風濕者東垣大羌活湯屬濕熱者當歸拈痛湯聖藥也屬寒濕者三因附子湯肢節腫痛痛屬火腫屬濕宜丹溪麻黃湯有濕鬱而周身走痛或關節間痛遇陰寒即發當作濕鬱治用白朮一味酒煮服之其痛立愈白虎歷節風有因血虛兼熱者宜丹溪加味四物湯如脈澀數者有瘀血用桃仁紅花芎歸加大黃微利之有因濕痰者宜丹溪加味二陳湯佐以竹瀝薑汁其走注疼痛者如神救苦散定痛丸四妙散金刀如聖散黃耆酒九藤酒洗藥方皆可用也風熱頭痛常發作者宜芎辛菊花散肩背痛者宜東垣通氣防風湯辨疑提肩散手臂者宜濕鬱二陳湯舒筋湯胸背脅走痛者宜辨疑加減二陳湯婦人病丹溪有方腰胯痛者當歸拈痛湯清熱勝濕湯兩足痛者當歸拈痛湯加味二妙丸川木通湯痿痹諸方東垣清燥湯治濕熱成痿似燥金受濕之邪是絶寒水生化之源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能行黃耆一錢半蒼朮一錢白朮陳皮澤瀉各五分人參白茯苓五味子九個升麻各三分豬苓麥冬歸身曲末生地黃酒黃柏各二分柴胡黃連炙草各一分上㕮咀水煎空心熱服健步丸治膝中無力伸而不得屈屈而不得伸腰背腿腳重沉行步艱難瓜蔞根酒製炙草羌活柴胡炒滑石各半兩防己一兩澤瀉防風各三錢川烏頭一錢苦參酒洗一錢肉桂半錢上為細末酒糊丸如梧桐子大每七十愈風湯空心送下愈風湯方羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼白芷麻黃人參菊花薄荷枸杞柴胡知母地骨杜仲獨活秦艽黃芩芍藥各三兩石膏蒼朮生地各四兩肉桂一兩上為粗散入姜煎丹溪治痿加味四物湯治痿四肢軟弱不能舉動當歸麥冬黃柏蒼朮各一錢白芍川芎杜仲各七分半熟地三錢五味子九粒人參黃連各五分知母牛膝足不軟不用各三分上作一服水二盞煎一盞空心服經驗鹿角丸治血氣虛弱兩足痿弱不能動久臥床褥神效鹿角膠一斤鹿角霜半斤另地黃半斤焙取末川牛膝白茯苓菟絲子人參杜仲鹽酒炒白朮各二兩當歸身四兩虎脛骨酥炙龜板酥炙各一兩共為細末另將鹿角膠用無灰好酒二碗溶化為丸如梧桐子大每服一百空心姜鹽湯下加味二妙丸治兩足濕痹疼痛或如火燎從足跗熱上漸至腰胯或麻痹痿軟皆是濕為痛此藥主之蒼朮制黃柏酒浸各四兩日曬川牛膝歸尾各二兩防己龜板酥炙川萆薢各一兩上為末酒煮曲糊為丸如梧桐子大每服一百丸空心姜鹽湯下增損五痹湯治風寒濕合而為痹肌體麻痹不仁羌活防己白朮當歸白芍防風黃耆炙片子薑黃各等分炙草減半上㕮咀姜十片煎服看病在上下服舒筋湯治臂痛不能舉蓋是氣血凝滯經絡不行所致其效如神一名通氣飲子炙草羌活各五分歸頭海桐皮去外皮赤芍白朮各一錢片子薑黃二錢此前五痹湯加減變化也上㕮咀作一服姜三片水二盞煎磨沉香少許服防風湯風寒濕三氣合為痹風氣勝者為行痹上下左右無留隨其所致此治行痹行走無定防風甘草當歸杏仁去皮尖炒赤茯苓桂各一錢黃芩秦艽葛根各三分麻黃去節五分上㕮咀分作二服每酒水各一盞棗三枚姜五片煎一盞溫服一方無葛根麻黃有川獨活赤芍藥各一錢亦名防風湯治血痹皮膚不仁茯苓湯寒氣勝者為痛痹陰寒為痛宜通氣溫經而愈此治痛痹四肢疼痛拘倦浮腫赤茯苓桑白皮各二錢防風官桂川芎芍藥麻黃去節各一錢五分上分作二服每水盞半棗二枚煎八分溫服以姜粥投之汗泄為度效矣或服三因附子湯以溫經勝濕三因附子湯治風寒濕痹骨節疼痛皮膚不仁骨肉重著四肢緩縱生附子白芍桂心甘草白茯苓人參各七分半白朮一錢作一服水煎茯苓川芎湯濕氣勝者為著痹此治著痹留注不去四肢麻木拘攣浮腫赤茯苓防風桂川芎麻黃芍藥炙草當歸桑白皮各五分作一服水煎棗三枚如欲汗姜粥投之續斷丸治風寒濕之氣留注關節麻木痠痛當歸炒萆薢天麻川續斷防風附子各一兩乳香另沒藥另各五錢川芎七錢半上為末煉蜜丸如梧桐子大每服四十溫酒下丹溪治痛風加味四物湯治白虎歷節風症瘦人宜此四物湯桃仁牛膝陳皮茯苓甘草白芷龍膽草血虛甚者倍芎歸佐以桃仁紅花氣虛加人參白朮龜板痰加南星半夏生薑如痛在上者屬風加羌活桂枝桔梗威靈仙痛在下者屬濕加牛膝防己木通黃柏丹溪治痛加減二陳湯治白虎歷節風因痰因濕者肥人宜此二陳湯蒼朮南星黃芩酒洗羌活入薑汁竹瀝氣虛加人參黃耆血虛加當歸川芎白芷上下如前丹溪方治上中下痛風通用黃連酒炒蒼朮制南星各二兩桃仁去皮尖另研防己白芷各五錢桂枝威靈仙酒炒羌活各三錢神麯炒川芎各一兩龍膽草一錢半酒紅花五分共為末神麯糊丸梧桐子大每服一百空心溫酒下又方治飲酒濕痰痛風黃柏酒炒威靈仙酒炒各五錢蒼朮制羌活各三錢炙草二錢陳皮去白白芍各一錢上為末每服一錢七分生薑湯下方治氣血兩虛有痰白濁陰火痛風人參山藥海石南星各一兩白朮地黃黃柏酒炒褐色龜板酥炙各二兩乾薑燒灰取其不足鎖陽各五錢上為末酒糊為丸如梧桐子大每七十白湯下東垣大羌活湯治風濕相搏肢節疼痛羌活升麻各一錢獨活七分蒼朮防己白朮當歸白茯苓威靈仙澤瀉各五分作一服水煎空心服丹溪麻黃湯治肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中濕熱流注於肢節之間而無已也麻黃去節赤芍各一錢防風荊芥羌活獨活片芩酒浸白芷蒼朮枳實桔梗葛根川芎威靈仙各五分甘草歸梢升麻各三分下焦加酒黃柏婦人加酒紅花腫多加檳榔大腹皮澤瀉更加沒藥一錢定痛尤妙如神救苦散治癱瘓手足走痛不止非痛勿用御米殼蜜炒一錢陳皮五錢壁虎一枚炙黃甘草沒藥乳香各二錢半上為極細末每服三錢煎服東垣四妙散治走注疼痛威靈仙酒浸焙乾五錢羯羊角灰三錢蒼耳子一錢半白芥子一錢炒上為極細末每服一錢生薑湯下丹溪定痛丸治風濕一切痛金星草乳香沒藥地龍去土炒五靈脂木鱉去殼上等分為末煉蜜丸如彈子大每服一丸溫酒下金刀如神散治白虎歷節疼痛神效川烏炮草烏炮各四兩硃砂水飛雄黃水飛荊芥麻黃去根天麻當歸細辛石斛川芎全蠍去毒人參何首烏甘草防風各五錢蒼朮制一兩上為細末每服五分臨臥溫茶送下黃耆酒治風寒濕痹身體頑麻皮膚瘙癢筋脈攣急手足不遂黃耆防風桂枝虎脛骨炙天麻萆薢石斛雲母粉白芍當歸白朮茵芋葉木香甘草仙靈脾川續斷各一兩上細銼以絹袋盛用無灰好酒一斗瓷罐盛浸之包封罐口勿令泄氣春五夏三秋七冬十每一盞溫服不拘時祖傳九藤酒治遠年痛風中風癱瘓筋脈拘急日夜作痛叫呼不已鉤藤鉤紅藤即理省藤也丁公藤又名風藤桑絡藤菟絲藤天仙藤即青木香藤苗五味子藤陰地蕨取根忍冬藤青藤各二兩上細銼以無灰老酒一斗浸如上法每服一盞日三服上下分食前後服洗藥方治風濕氣足脛腫痛有效荊芥防風苦參番白草地榆青藤麻黃蒼耳草蒼朮生蔥炒鹽威靈仙各一兩用水一桶煮熱於桶內熏蒸痛處出微汗待湯稍溫再洗痛處一二次覺痛減如貧者只用桃柳榆槐桑椿六件木枝煎洗亦效芎辛菊花散治風熱頭痛發作無時川芎羌活白芷防風荊芥薄荷各一兩細辛甘草菊花各五錢上為細末每二錢清茶調食遠服通氣防風湯治肩背痛不可回顧者此手太陽氣鬱而不行也脊痛項強腰似折項似拔者此足太陽經氣不通也宜風藥散之羌活獨活各一錢藁本防風甘草各半錢川芎荊芥各三錢上水煎服提肩散治風熱乘肺肩背強直作痛羌活防風藁本川芎白芍各七分炒黃連酒炒黃芩各五分甘草四錢水二盞姜三片此上通氣防風湯變化也氣虛加人參五分汗多加黃耆炙一錢血虛加川歸地黃各五分濕加蒼朮防己薏苡各五分丹溪加減二陳湯治手臂痛是上焦濕熱痰橫行經絡中作痛也陳皮茯苓各五分半夏酒芩白朮南星香附各一錢蒼朮一錢半威靈仙三錢炙草三分姜五片水煎辨疑加味二陳湯治胸脅停痰陳皮七分半夏茯苓各一錢甘草三錢死血加桃仁紅花牛膝兼郁加炒曲香附各一錢濕痰加蒼朮羌活防己川芎各五分血少入四物湯及行氣之藥火加柴胡酒芩梔子各五分滯氣加木香五分青皮紫蘇各七分丹溪方治婦人胸背脅走痛赤芍炒蘖香附各一錢桂枝蒼朮甘草各五分威靈仙酒炒七錢半上水煎作一服清熱勝濕湯治腰胯濕熱作痛黃柏鹽水炒羌活澤瀉甘草減半蒼朮杜仲炒去絲白芍炒木瓜威靈仙陳皮去白各五分姜三片水二盅煎服甚加川牛膝炒乳香沒藥各五分水濕停下加檳榔黑醜頭末各五分血痛加歸尾桃仁各一錢酒紅花五分倦怠腳如沙墜加蒼朮白朮防己薏苡仁各五分冷風作痛加熟附子一錢虎脛骨末五分減黃柏澤瀉三分遊走而痛加紫荊皮川烏各五分濕熱加炒梔子五分走氣加烏藥五分痠軟加芎歸地黃川牛膝各五分腎虛加炒破故紙五分加味二妙丸方見前此無萆薢有虎脛骨酥炙一錢熟附五錢經驗川木通湯治白虎歷節風用木通二兩銼細長流水煎汁頓服以遍身癢甚發紅丹如小豆大粒汗出為效
