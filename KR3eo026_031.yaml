body:
  text: 卷之三十一腹痛腹痛多寒見內經部分上下屬三陰傷寒雜病休同論此事難知辨得明舉痛論云寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛其痛或卒然而止者或痛甚不可按或按之痛止或按之無益或喘動應手者或脅肋與小腹相引而痛者或腹痛引陰股者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者各不同形按痛而閉不通者此傷寒陽明裡實之證寒變為熱乃承氣湯證也大抵腹痛寒痛者多熱痛者少然腹痛有部分臟位有高下治之者宜分之此事難知云傷寒中脘痛太陰也理中建中湯之類臍腹少陰也四逆真武湯之類少腹痛厥陰也重則正陽回陽丹之類輕則用當歸四逆湯太陰連少陰痛者當變下利不止雜病腹痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脈洪疾屬手太陰足陽明黃芩芍藥湯主之秋月腹痛肌寒惡寒脈沉疾屬足太陰足少陰桂枝芍藥湯主之四時腹痛芍藥甘草湯主之腹中諸痛半虛寒半實曾因食血痰實則瀉之虛用補惟憑脈證作蹄筌東垣腹中諸痛皆因勞役過甚飲食失節中氣不足寒邪乘虛而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也故用補中益氣湯加減治之方見內傷腹中痛者加白芍藥五分甘草三分如惡寒覺冷痛加中桂五分如夏月腹中痛不惡寒反惡熱者加黃芩甘草各五分白芍藥一錢以治時熱也腹痛在寒涼時加半夏益智仁草豆蔻之類以治時寒也如腹中痛惡寒而脈弦者是木來侮土也此為足厥陰足太陰小建中湯主之蓋芍藥味酸於土中瀉木為君如脈沉細腹中痛是水來侮土此屬足少陰足太陰以理中湯主之乾薑辛熱於土中瀉水以為主也如脈緩體重節痛腹脹自利米穀不化是濕勝屬足太陰以平胃散主之蒼朮苦辛溫瀉濕為主也此以上小建中湯理中湯平胃散非單用本方乃於補中益氣湯中摘其為主者加用之也如臍下痛者屬足少陰加蒸熟地黃五分如不已者乃大寒也加肉桂五分如脈弦惡寒腹痛乃中氣弱也以仲景小建中湯加黃耆一錢半異功散加芍藥選而用之如渴甚者以白朮散葛根倍之如臍腹虛脹疼痛者此屬足太陰足少陰寒痛也宜東垣草豆蔻湯主之如胃虛寒脹滿疼痛者此屬足太陰陽明宜厚朴溫中湯主之如因寒氣腹中痛不脹者此屬足太陰宜加味小建中湯主之如小腹痛者此足厥陰寒痛也宜四物苦楝湯加青皮以行其氣肉桂吳茱萸以散其寒病久者宜酒煮當歸丸主之丹溪云腹痛有寒有積熱有食積有痰有死血戴氏解云痛甚便欲大便去後則痛減者是積食也綿綿痛而無增減者是寒也時痛時止者是熱也其痛有常處而不移動者是死血也脈弦者多屬食宜溫散之蓋食得寒則滯得熱則行更宜以行氣快氣藥助之無不愈者宜豆蔻橘紅散加味枳朮丸如因飲食過傷而作痛者必問因傷何物如傷生冷硬物而作痛者以丁香脾積丸如傷熱物而作痛者以木香檳榔丸用溯源湯送下方見內傷如氣虛之人因飲食過傷而腹痛者宜補瀉兼施用六君子湯加蒼朮香附神麯麥芽作湯送下前推積丸以下之有氣血虛不禁下者宜加味錢氏異功散參苓平胃丸主之脈滑者是痰痰因氣鬱而聚阻礙道路氣不得宣通而痛宜導痰解鬱宜小胃丹下之有氣虛之人不可下者宜強中二香丸成無己云邪氣客於下焦則津涎不得通血氣不得行或溺或血留滯於下是生脹滿而硬痛也若從心下至少腹皆硬滿而痛者邪實也須大陷胸湯下之若但少腹硬滿而痛小便利者則是蓄血外見如狂善忘屎黑之證宜桃仁承氣湯或抵當丸小便不利者則是溺澀之證宜八正散方見傷寒火門如因跌撲損傷而作痛者此瘀血證宜桃仁承氣湯或河間沒藥散用四物湯加桃仁煎湯送下方見心痛如血虛瘦弱之人津液枯涸傳送失常郁成燥熱搏成結糞滯於大小腸之間阻氣不運而作痛者宜用備急大黃丸方見內傷先通其氣止其痛後用四物湯潤燥之劑以治其本如腹中常覺有熱而暴痛暴止者此為積熱宜調胃承氣湯下之如胸中有熱胃中有邪氣腹內痛甚時欲嘔吐者宜河間黃連湯以升降陰陽又加味二陳湯金匱云腹中寒氣雷鳴切痛胸脅逆滿嘔吐宜附子粳米湯主之腹中水鳴乃火擊動其水也凡痛甚不可按者宜大承氣湯大柴胡湯以下之方見傷寒有寒熱者大柴胡湯痞滿痛甚者大承氣湯實痛不可用人參黃耆蓋補其氣氣旺不通而痛愈甚也或按之痛止者為虛宜用前小建中湯異功散方治之外有卒然心腹大痛欲吐不得吐欲瀉不得瀉唇青厥逆死在須臾此內傷飲食外感寒邪是名乾霍亂也宜急以鹽湯灌之而以鵝翎探吐之有臍下忽大痛人中黑者多死脈經云心腹痛不得息脈細小遲者生脈大而疾者死又云脈浮大而長者死腹痛諸方草豆蔻湯治臍腹虛脹作痛澤瀉一錢木香三分神麯四分枳實炒半夏黃耆春夏勿用草豆蔻益智仁炙甘草各五分青皮陳皮各六分當歸茯苓各七分上㕮咀作一服生薑三片水一盞半煎一盞溫服厚朴溫中湯治胃虛寒腹滿疼痛厚朴薑汁炒陳皮各一錢草豆蔻煨炙甘草茯苓木香各半錢乾薑三分半加薑水煎服之加味小建中湯治虛寒作痛者小建中湯方見內傷加乾薑煎成湯調川芎蒼朮香附白芷等分為細末每服調二錢四物苦楝湯治臍下虛冷腹痛四物湯六錢加川楝子肉玄胡索各一錢半吳茱萸青皮各五分上㕮咀生薑三片水二盞煎一盞食前溫服酒煮當歸丸治小腹寒痛及婦人白帶疝㿗大寒等證茴香五錢黑附子炮良薑七錢當歸一兩上四味切細以上樣好酒無灰者一升半煮至酒干焙乾加入後藥炙甘草川楝肉丁香各五錢升麻一錢柴胡二錢鹽炒黃色全蠍各二錢玄胡索四錢上與前四味同研為細末酒煮麵糊丸如梧桐子大每服五七十丸空心淡醋湯下忌油膩冷物及酒濕面豆蔻橘紅散溫脾養胃升降陰陽和三焦化宿食丁香木香各一錢白豆蔻厚朴制人參神麯炒乾薑炮半夏曲陳皮去白藿香炙甘草白朮各半兩上共為細末每服三錢水一盞薑三片棗一枚煎七分去渣溫服加味枳朮丸治氣虛之人傷飲食而腹痛者白朮二兩枳實炒山楂肉神麯炒橘紅大麥芽炒各一兩木香砂仁各三錢上為末如制枳朮丸法如梧桐子大每服五十丸米飲下加味錢氏異功散治氣虛之人腹痛不可下者異功散方見內傷加川蒼朮香附子白芷入薑煎服加味參苓平胃散溫脾胃消寒痰大半夏切開沸湯浸七次焙乾良薑青皮去白乾薑陳皮去白各一兩南星炮半兩上為末薑汁煮麵糊為丸如梧桐子大每服五十丸薑湯下加味二陳湯治因熱而痛者二陳湯方見痰加黃芩黃連梔子痛甚者加炒乾薑從之河間黃連湯治胸中有熱胃中有邪氣腹內痛甚時欲作嘔黃連炙甘草乾薑桂枝人參各二錢半夏二錢半上㕮咀分作二服大棗一枚水煎服附子粳米湯治腹中寒氣雷鳴切痛胸脅氣逆嘔吐附子炮一枚半夏二兩半甘草一兩大棗十枚粳米半升上㕮咀分十劑每服水一盞半煎至米熟去渣溫服日三服
